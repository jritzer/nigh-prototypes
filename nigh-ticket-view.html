<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nigh Drops - Ticket View</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{--bg:#0a0a14;--bg2:#111118;--card:#1c1c28;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#fff;--text2:rgba(255,255,255,0.60);--text3:rgba(255,255,255,0.38);--blue:#0E4EF5;--purple:#6226E9;--teal:#41EFF9;--magenta:#EC1977;--green:#4ADE80;--amber:#F5A623;--nav-h:64px;--sb-w:240px}
    html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',Roboto,sans-serif;background:var(--bg);color:var(--text)}
    #app{display:flex;height:100vh}
    #main{flex:1;display:flex;flex-direction:column;min-width:0}
    #content{flex:1;overflow-y:auto}
    #content::-webkit-scrollbar{width:0}
    #tabbar{height:var(--nav-h);background:#0d0d1a;border-top:1px solid var(--border);display:flex;flex-shrink:0}
    .tb-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--text3);font-size:9px;font-weight:600;letter-spacing:0.04em;cursor:pointer;text-decoration:none;padding:4px 0;position:relative}
    .tb-btn.active{color:var(--blue)}
    .tb-btn svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .tb-badge{position:absolute;top:4px;right:calc(50% - 18px);width:16px;height:16px;border-radius:50%;background:#EF4444;font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center}
    #sidebar{display:none}
    @media(min-width:900px){
      #sidebar{display:flex;flex-direction:column;width:var(--sb-w);background:#0d0d1a;border-right:1px solid var(--border);flex-shrink:0}
      #tabbar{display:none}
      .sb-brand{padding:20px 20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);margin-bottom:8px}
      .sb-wordmark{font-size:17px;font-weight:700;color:var(--blue);letter-spacing:-0.01em}
      .sb-item{display:flex;align-items:center;gap:12px;padding:11px 16px;margin:2px 8px;border-radius:10px;color:var(--text3);font-size:13px;font-weight:600;text-decoration:none;border:none;background:none;cursor:pointer;transition:background .15s,color .15s;width:calc(100% - 16px)}
      .sb-item:hover{background:rgba(255,255,255,0.05);color:var(--text)}
      .sb-item.active{background:rgba(14,78,245,0.14);color:#fff}
      .sb-item svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
      .sb-badge{margin-left:auto;background:#EF4444;color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px}
      .sb-nigh-icon{width:14px !important;height:21px !important;stroke:none !important;fill:currentColor !important;flex-shrink:0}
      .sb-app-link{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;text-decoration:none;transition:background .15s}
      .sb-app-link:hover{background:rgba(255,255,255,0.06)}
    }

    /* ── Page header ── */
    .page-hdr{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border)}
    .page-hdr-top{padding:14px 16px;display:flex;align-items:center;gap:10px}
    .page-hdr-title{font-size:17px;font-weight:700;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .back-btn{background:none;border:none;padding:4px;color:var(--text2);display:flex;align-items:center;cursor:pointer;flex-shrink:0}
    .back-btn svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2}
    .event-meta-bar{padding:0 16px 12px;display:flex;align-items:center;gap:10px}
    .event-meta-date{font-size:12px;color:var(--text3);font-weight:500}
    .event-meta-dot{width:3px;height:3px;border-radius:50%;background:var(--text3);flex-shrink:0}
    .event-meta-spots{font-size:12px;font-weight:700;color:var(--blue)}

    /* ── Page content ── */
    .page-inner{padding:20px 16px 100px}
    @media(min-width:600px){.page-inner{max-width:480px;margin:0 auto;padding:24px 20px 80px}}
    @media(min-width:900px){.page-inner{max-width:480px;margin:0 auto;padding:28px 0 80px}}

    /* ── Ticket stack ── */
    .ticket-stack{display:flex;flex-direction:column;gap:20px}
    .ticket-wrap{}
    .spot-label-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .spot-num{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase}
    .spot-tag{font-size:9px;font-weight:700;letter-spacing:0.05em;padding:2px 8px;border-radius:5px;text-transform:uppercase}
    .spot-tag-yours{background:rgba(14,78,245,0.15);color:var(--blue)}
    .spot-tag-accepted{background:rgba(74,222,128,0.12);color:var(--green)}
    .spot-tag-pending{background:rgba(245,166,35,0.14);color:var(--amber)}
    .spot-tag-open{background:rgba(255,255,255,0.07);color:var(--text3)}

    /* ── Active ticket card (flip) ── */
    .ticket-card-outer{position:relative;perspective:1000px;height:460px;max-width:440px}
    .ticket-card-inner{position:relative;width:100%;height:100%;transition:transform 0.6s;transform-style:preserve-3d}
    .ticket-card-inner.flipped{transform:rotateY(180deg)}
    .ticket-card-front,.ticket-card-back{position:absolute;top:0;left:0;width:100%;height:100%;backface-visibility:hidden;border-radius:18px;padding:20px;display:flex;flex-direction:column;overflow:hidden}
    .ticket-card-front{background-image:linear-gradient(155deg,rgba(98,38,233,0.18),rgba(14,78,245,0.10),rgba(65,239,249,0.06)),linear-gradient(155deg,#6226E9,#0E4EF5,#41EFF9);background-origin:padding-box,border-box;border:2px solid transparent;background-clip:padding-box;box-shadow:0 0 48px rgba(14,78,245,0.18)}
    .ticket-card-back{background:var(--card);border:1px solid var(--border);transform:rotateY(180deg)}
    .ticket-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;margin-bottom:8px}
    .ticket-title-big{font-size:22px;font-weight:700;color:#fff;margin-bottom:3px;line-height:1.2}
    .ticket-host-line{font-size:13px;color:rgba(255,255,255,0.55);margin-bottom:12px}
    .ticket-date-time{display:flex;gap:36px;margin-bottom:0}
    .ticket-date-time-item{display:flex;flex-direction:column}
    .ticket-date{font-size:22px;color:#fff;font-weight:700}
    .ticket-time{font-size:22px;font-weight:700;color:var(--teal)}
    .ticket-qr{width:148px;height:148px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;margin:14px auto 0;flex-shrink:0}
    .ticket-qr svg{width:100px;height:100px}
    .ticket-bottom-block{margin-top:auto;padding-top:2px}
    .ticket-divider{border-top:2px dashed rgba(255,255,255,0.12);margin:0 0 12px}
    .ticket-venue{font-size:15px;font-weight:600;color:#fff;margin-bottom:3px}
    .ticket-address{font-size:13px;color:var(--text3);line-height:1.4}
    .ticket-reserved{margin-top:6px;font-size:13px;color:var(--text2);font-style:italic}
    .ticket-tap-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:10px;padding-bottom:4px;font-style:italic}
    .back-content{height:100%;display:flex;flex-direction:column}
    .back-desc{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.5}
    .back-terms{font-size:11px;color:var(--text3);margin-bottom:16px;line-height:1.4}
    .back-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;margin-bottom:8px}
    .receipt-item{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:8px}
    .receipt-item.total{color:#fff;font-weight:700;border-top:1px solid var(--border);padding-top:8px;margin-top:8px}
    .payment-method{font-size:11px;color:var(--text2)}

    /* ── Transferred (accepted) ticket ── */
    .ticket-transferred-card{border-radius:18px;overflow:hidden;position:relative;border:1.5px solid rgba(255,255,255,0.06);max-width:440px}
    .transferred-inner{padding:20px;filter:grayscale(0.6) brightness(0.55);background-image:linear-gradient(155deg,rgba(98,38,233,0.18),rgba(14,78,245,0.10),rgba(65,239,249,0.06)),linear-gradient(155deg,#6226E9,#0E4EF5,#41EFF9);background-origin:padding-box,border-box}
    .transferred-banner{background:rgba(74,222,128,0.14);border-bottom:1px solid rgba(74,222,128,0.20);padding:8px 20px;display:flex;align-items:center;gap:8px}
    .transferred-banner-text{font-size:11px;font-weight:700;color:var(--green);letter-spacing:0.05em;text-transform:uppercase}
    .transferred-to-block{display:flex;align-items:center;gap:12px;padding:16px 20px 20px;background:rgba(0,0,0,0.3)}
    .transferred-avatar{width:40px;height:40px;border-radius:50%;background:rgba(74,222,128,0.15);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--green);flex-shrink:0}
    .transferred-name{font-size:14px;font-weight:600;color:rgba(255,255,255,0.55)}
    .transferred-sub{font-size:11px;color:rgba(255,255,255,0.28);margin-top:2px}

    /* ── Pending ticket ── */
    .ticket-pending-card{border-radius:18px;overflow:hidden;border:1.5px solid rgba(245,166,35,0.22);max-width:440px;box-shadow:0 0 24px rgba(245,166,35,0.07)}
    .pending-banner{background:rgba(245,166,35,0.12);border-bottom:1px solid rgba(245,166,35,0.18);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;gap:8px}
    .pending-banner-text{font-size:11px;font-weight:700;color:var(--amber);letter-spacing:0.05em;text-transform:uppercase}
    .pending-inner{filter:brightness(0.75);background-image:linear-gradient(155deg,rgba(98,38,233,0.18),rgba(14,78,245,0.10),rgba(65,239,249,0.06)),linear-gradient(155deg,#6226E9,#0E4EF5,#41EFF9);background-origin:padding-box,border-box;padding:20px}
    .pending-invitee-block{display:flex;align-items:center;gap:12px;padding:14px 20px 18px;background:rgba(0,0,0,0.3)}
    .pending-avatar{width:40px;height:40px;border-radius:50%;background:rgba(245,166,35,0.14);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--amber);flex-shrink:0}
    .pending-name{font-size:14px;font-weight:600;color:rgba(255,255,255,0.55)}
    .pending-sub{font-size:11px;color:rgba(255,255,255,0.28);margin-top:2px}
    .cancel-transfer-btn{background:transparent;border:1.5px solid rgba(245,166,35,0.55);color:var(--amber);border-radius:10px;padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:0.02em;white-space:nowrap;flex-shrink:0}
    .cancel-transfer-btn:active{background:rgba(245,166,35,0.1)}

    /* ── Available (open) ticket ── */
    .ticket-available-card{border-radius:18px;border:1.5px dashed rgba(255,255,255,0.14);padding:32px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(255,255,255,0.02);max-width:440px;min-height:160px}
    .available-icon{width:44px;height:44px;border-radius:50%;background:rgba(14,78,245,0.12);display:flex;align-items:center;justify-content:center;border:1.5px dashed rgba(14,78,245,0.35)}
    .available-label{font-size:14px;font-weight:600;color:var(--text2)}
    .available-sub{font-size:12px;color:var(--text3);text-align:center}
    .transfer-spot-btn{background:var(--blue);color:#fff;border:none;border-radius:12px;padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px}
  </style>
</head>

        <a href="nigh-tickets.html" class="tb-btn active">
          <svg viewBox="0 0 24 24"><path d="M2 9a2 2 0 012-2h16a2 2 0 012 2v2a2 2 0 000 4v2a2 2 0 01-2 2H4a2 2 0 01-2-2v-2a2 2 0 000-4V9z"/></svg>
          Tickets
        </a>
        <a href="nigh-alerts.html" class="tb-btn">
          <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
          <span class="tb-badge">2</span> Alerts
        </a>
        <a href="nigh-menu.html" class="tb-btn">
          <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          Menu
        </a>
      </nav>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    var myTickets = [
      {id:'TK001',title:'Nike Air Max Day Access',host:'Nike Boulder',date:'Mar 5, 2026',time:'2:00 PM',addr:'1800 29th St, Boulder, CO',price:0,qty:1,orderId:'ORD-4821',desc:'Exclusive early access to the Air Max Day collection.',terms:'No refunds. Must arrive within 15 min of start.',subTickets:[{idx:0,status:'active'}]},
      {id:'TK003',title:"Whole Foods Chef's Table",host:'Whole Foods Market',date:'Mar 5, 2026',time:'6:30 PM',addr:'2905 Pearl St, Boulder, CO',price:45,qty:4,orderId:'ORD-7291',desc:"5-course tasting menu with seasonal organic ingredients, paired with natural wines. Chef Maria will guide you through each course.",terms:'All sales final. One person per spot. Valid ID required.',subTickets:[
        {idx:0,status:'active'},
        {idx:1,status:'transferred',transferTo:{name:'Maya Torres',uname:'@mayat'},acceptedAt:'Mar 4 · 2:47 PM'},
        {idx:2,status:'pending',invitee:{name:'Jordan Williams',phone:'(303) 555-0192'},invitedAt:'Mar 4 · 3:40 PM'},
        {idx:3,status:'available'}
      ]},
    ];

    var ticketId = new URLSearchParams(window.location.search).get('id') || 'TK003';
    var ticket = myTickets.find(function(t){ return t.id === ticketId; }) || myTickets[1];

    function getInitials(name) {
      var parts = name.trim().split(' ');
      return parts.length >= 2 ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase() : name.substring(0,2).toUpperCase();
    }

    function qrSVG() {
      return '<svg viewBox="0 0 24 24"><rect x="2" y="2" width="8" height="8" rx="1"/><rect x="14" y="2" width="8" height="8" rx="1"/><rect x="2" y="14" width="8" height="8" rx="1"/><path d="M14 14h2v2h-2zM20 14h2v2h-2zM14 20h2v2h-2zM20 20h2v2h-2zM17 17h2v2h-2z"/></svg>';
    }

    function renderYourTicket(i) {
      return '<div class="ticket-wrap">'
        + '<div class="spot-label-row"><span class="spot-num">Spot ' + (i+1) + '</span><span class="spot-tag spot-tag-yours">Your Ticket</span></div>'
        + '<div class="ticket-card-outer"><div class="ticket-card-inner" id="cardInner_' + i + '">'
        + '<div class="ticket-card-front" onclick="toggleFlip(' + i + ')">'
          + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
          +   '<div class="ticket-label" style="margin-bottom:0">Starts in <span style="color:#EC1977">3h 45m</span></div>'
          +   '<div class="ticket-label" style="color:var(--green);margin-bottom:0">✓ Scan QR upon arrival</div>'
          + '</div>'
          + '<div class="ticket-title-big">' + ticket.title + '</div>'
          + '<div class="ticket-host-line">Hosted by ' + ticket.host + '</div>'
          + '<div class="ticket-date-time">'
          +   '<div class="ticket-date-time-item"><div class="ticket-label">Date</div><div class="ticket-date">' + ticket.date + '</div></div>'
          +   '<div class="ticket-date-time-item"><div class="ticket-label">Time</div><div class="ticket-time">' + ticket.time + '</div></div>'
          + '</div>'
          + '<div class="ticket-qr">' + qrSVG() + '</div>'
          + '<div class="ticket-bottom-block">'
          +   '<div class="ticket-divider"></div>'
          +   '<div class="ticket-venue">' + ticket.host + '</div>'
          +   '<div class="ticket-address">' + ticket.addr + '</div>'
          +   '<div class="ticket-reserved">Reserved for Alex Rivera</div>'
          +   '<div class="ticket-tap-hint">Tap for details &amp; receipt</div>'
          + '</div>'
        + '</div>'
        + '<div class="ticket-card-back" onclick="toggleFlip(' + i + ')">'
          + '<div class="back-content">'
          +   '<div class="back-label">Description</div>'
          +   '<div class="back-desc">' + ticket.desc + '</div>'
          +   '<div class="back-label">Terms</div>'
          +   '<div class="back-terms">' + ticket.terms + '</div>'
          +   '<div class="back-label">Receipt</div>'
          +   '<div class="receipt-item"><span>' + ticket.qty + ' Spots × $' + ticket.price + '</span><span>$' + (ticket.qty * ticket.price).toFixed(2) + '</span></div>'
          +   '<div class="receipt-item"><span>Tax</span><span>$' + (ticket.qty * ticket.price * 0.08).toFixed(2) + '</span></div>'
          +   '<div class="receipt-item total"><span>Total</span><span>$' + (ticket.qty * ticket.price * 1.08).toFixed(2) + '</span></div>'
          +   '<div class="back-label" style="margin-top:12px">Payment</div>'
          +   '<div class="payment-method">VISA •••• 4821 via Apple Pay</div>'
          + '</div>'
        + '</div>'
        + '</div></div>'
        + '</div>';
    }

    function renderTransferredTicket(spot, i) {
      var t = spot.transferTo;
      return '<div class="ticket-wrap">'
        + '<div class="spot-label-row"><span class="spot-num">Spot ' + (i+1) + '</span><span class="spot-tag spot-tag-accepted">Transferred</span></div>'
        + '<div class="ticket-transferred-card">'
          + '<div class="transferred-banner">'
          +   '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
          +   '<span class="transferred-banner-text">Transfer Accepted</span>'
          +   '<span style="margin-left:auto;font-size:10px;color:rgba(74,222,128,0.55)">' + spot.acceptedAt + '</span>'
          + '</div>'
          + '<div class="transferred-inner">'
          +   '<div class="ticket-title-big" style="font-size:17px;margin-bottom:2px">' + ticket.title + '</div>'
          +   '<div class="ticket-host-line" style="margin-bottom:8px">Hosted by ' + ticket.host + '</div>'
          +   '<div class="ticket-date-time">'
          +     '<div class="ticket-date-time-item"><div class="ticket-label">Date</div><div class="ticket-date" style="font-size:17px">' + ticket.date + '</div></div>'
          +     '<div class="ticket-date-time-item"><div class="ticket-label">Time</div><div class="ticket-time" style="font-size:17px">' + ticket.time + '</div></div>'
          +   '</div>'
          + '</div>'
          + '<div class="transferred-to-block">'
          +   '<div class="transferred-avatar">' + getInitials(t.name) + '</div>'
          +   '<div><div class="transferred-name">' + t.name + ' <span style="color:rgba(255,255,255,0.28);font-weight:400">' + t.uname + '</span></div><div class="transferred-sub">' + ticket.addr + '</div></div>'
          + '</div>'
        + '</div>'
        + '</div>';
    }

    function renderPendingTicket(spot, i) {
      var inv = spot.invitee;
      return '<div class="ticket-wrap">'
        + '<div class="spot-label-row"><span class="spot-num">Spot ' + (i+1) + '</span><span class="spot-tag spot-tag-pending">Awaiting Acceptance</span></div>'
        + '<div class="ticket-pending-card">'
          + '<div class="pending-banner">'
          +   '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'
          +   '<span class="pending-banner-text">Awaiting Acceptance</span>'
          +   '<button class="cancel-transfer-btn" onclick="confirmCancel(' + i + ')">Cancel Transfer</button>'
          + '</div>'
          + '<div class="pending-inner">'
          +   '<div class="ticket-title-big" style="font-size:17px;margin-bottom:2px">' + ticket.title + '</div>'
          +   '<div class="ticket-host-line" style="margin-bottom:8px">Hosted by ' + ticket.host + '</div>'
          +   '<div class="ticket-date-time">'
          +     '<div class="ticket-date-time-item"><div class="ticket-label">Date</div><div class="ticket-date" style="font-size:17px">' + ticket.date + '</div></div>'
          +     '<div class="ticket-date-time-item"><div class="ticket-label">Time</div><div class="ticket-time" style="font-size:17px">' + ticket.time + '</div></div>'
          +   '</div>'
          + '</div>'
          + '<div class="pending-invitee-block">'
          +   '<div class="pending-avatar">' + getInitials(inv.name) + '</div>'
          +   '<div><div class="pending-name">' + inv.name + '</div><div class="pending-sub">Invited ' + spot.invitedAt + ' · ' + inv.phone + '</div></div>'
          + '</div>'
        + '</div>'
        + '</div>';
    }

    function renderAvailableTicket(i) {
      return '<div class="ticket-wrap">'
        + '<div class="spot-label-row"><span class="spot-num">Spot ' + (i+1) + '</span><span class="spot-tag spot-tag-open">Open Spot</span></div>'
        + '<div class="ticket-available-card">'
          + '<div class="available-icon"><svg width="18" height="18" viewBox="0 0 24 24" stroke="var(--blue)" fill="none" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>'
          + '<div class="available-label">Transfer to a Friend</div>'
          + '<div class="available-sub">Send this spot to anyone — they\'ll get their own ticket.</div>'
          + '<button class="transfer-spot-btn" onclick="window.location.href=\'nigh-transfer.html?id=' + ticket.id + '&spot=' + i + '\'">Transfer This Spot</button>'
        + '</div>'
        + '</div>';
    }

    function renderAllTickets() {
      document.getElementById('hdrTitle').textContent = ticket.title;
      document.getElementById('hdrDate').textContent = ticket.date + ' · ' + ticket.time;
      document.getElementById('hdrSpots').textContent = ticket.subTickets.length + ' Spots';

      var html = '';
      ticket.subTickets.forEach(function(spot, i) {
        if (spot.status === 'active')       html += renderYourTicket(i);
        else if (spot.status === 'transferred') html += renderTransferredTicket(spot, i);
        else if (spot.status === 'pending') html += renderPendingTicket(spot, i);
        else if (spot.status === 'available') html += renderAvailableTicket(i);
      });
      document.getElementById('ticketStack').innerHTML = html;
    }

    function toggleFlip(i) {
      var el = document.getElementById('cardInner_' + i);
      if (el) el.classList.toggle('flipped');
    }

    function confirmCancel(spotIdx) {
      var inv = ticket.subTickets[spotIdx].invitee;
      if (confirm('Cancel the transfer to ' + inv.name + '? The spot will become available again.')) {
        ticket.subTickets[spotIdx] = { idx: spotIdx, status: 'available' };
        renderAllTickets();
      }
    }

    renderAllTickets();

    // App modal
    var _qrGenerated = false;
    function showAppModal() {
      document.getElementById('app-modal').style.display = 'flex';
      document.body.style.overflow = 'hidden';
      if (!_qrGenerated && typeof QRCode !== 'undefined') {
        new QRCode(document.getElementById('app-qr-code'), {text:'https://nighdrops.com/app',width:160,height:160,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});
        _qrGenerated = true;
      }
    }
    function closeAppModal() {
      document.getElementById('app-modal').style.display = 'none';
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeAppModal(); });
  </script>

  <!-- App Download Modal -->
  <div id="app-modal" onclick="if(event.target===this)closeAppModal()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.80);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:9999;align-items:center;justify-content:center">
    <div style="background:#1c1c28;border:1px solid rgba(255,255,255,0.12);border-radius:22px;padding:28px 24px 22px;max-width:290px;width:88%;text-align:center;position:relative;box-shadow:0 24px 60px rgba(0,0,0,0.6)">
      <button onclick="closeAppModal()" style="position:absolute;top:12px;right:12px;background:rgba(255,255,255,0.08);border:none;width:30px;height:30px;border-radius:50%;color:rgba(255,255,255,0.55);font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit">&times;</button>
      <div style="width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#6226E9,#0E4EF5);display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
        <svg width="18" height="18" viewBox="0 0 24 24" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
      </div>
      <div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:4px">Get the Nigh Drops App</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:18px;line-height:1.5">Scan with your phone's camera<br>to download on iOS or Android</div>
      <div style="background:#fff;border-radius:14px;padding:14px;display:inline-block;margin-bottom:16px"><div id="app-qr-code"></div></div>
      <div style="font-size:9px;font-weight:700;color:rgba(245,166,35,0.75);letter-spacing:0.10em">EARLY ACCESS · INVITE ONLY</div>
    </div>
  </div>
</body>
</html>
