function brandById(id){return BRANDS.find(b=>b.id===id);}
function locById(id){return LOCATIONS.find(l=>l.id===id);}
function filteredLocations(){
  return LOCATIONS.filter(l=>{
    if(S.selectedBrand&&l.brand!==S.selectedBrand) return false;
    if(S.selectedCity&&l.city!==S.selectedCity) return false;
    return true;
  });
}
function badge(status){
  const map={live:'#dcfce7:#16a34a:Live',scheduled:'#fef9c3:#854d0e:Scheduled',draft:'#f1f5f9:#64748b:Draft',ended:'#fee2e2:#b91c1c:Ended',active:'#dcfce7:#16a34a:Active',paused:'#fef3c7:#b45309:Paused'};
  const [bg,color,label]=(map[status]||'#f1f5f9:#64748b:Unknown').split(':');
  return `<span style="background:${bg};color:${color};font-size:0.68rem;font-weight:700;padding:3px 8px;border-radius:20px;">${label}</span>`;
}
function brandBadge(brandId){
  const b=brandById(brandId);
  if(!b) return '';
  return `<span style="background:${b.color}18;color:${b.color};font-size:0.68rem;font-weight:800;padding:3px 8px;border-radius:20px;">${b.abbr}</span>`;
}
// brandIcon: renders actual brand logo in a colored pill — works on both dark and light backgrounds
function brandIcon(b,h){
  if(!b||!b.logo) return '';
  h=h||16;
  const pad=Math.max(2,Math.round(h*0.2));
  return `<span style="display:inline-flex;align-items:center;justify-content:center;background:${b.color};border-radius:5px;padding:${pad}px ${pad+3}px;flex-shrink:0;line-height:0;"><img src="${b.logo}" alt="${b.short}" style="height:${h}px;max-width:${Math.round(h*4)}px;object-fit:contain;filter:brightness(0) invert(1);display:block;"></span>`;
}
function dropTypeBadge(type){
  const map={
    'happy-hour':{bg:'#fef3c7',c:'#92400e',label:'&#127867; Happy Hour'},
    'menu-drop': {bg:'#f0fdf4',c:'#14532d',label:'&#129389; Menu Drop'},
    'event':     {bg:'#f3e8ff',c:'#5b21b6',label:'&#127917; Event'},
    'vip':       {bg:'#fef9c3',c:'#713f12',label:'&#11088; VIP Dining'},
  };
  const t=map[type]||{bg:'#f1f5f9',c:'#475569',label:type};
  return `<span style="background:${t.bg};color:${t.c};font-size:0.68rem;font-weight:800;padding:3px 8px;border-radius:20px;">${t.label}</span>`;
}
function pct(a,b){return b>0?Math.round(a/b*100):0;}
function fmtMoney(n){return '$'+n.toLocaleString();}
function fmtNum(n){return n>=1000?(n/1000).toFixed(1)+'K':String(n);}
function showColor(p){return p>=80?'#16a34a':p>=60?'#ca8a04':'#dc2626';}
function infoRow(label,val){return `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f1f5f9;"><span style="font-size:0.78rem;color:#64748b;">${label}</span><span style="font-size:0.78rem;font-weight:700;color:#0f172a;">${val}</span></div>`;}

function kpi(label,val,sub,color){
  return `<div style="background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:16px 18px;">
    <div style="font-size:0.72rem;color:#64748b;font-weight:600;margin-bottom:4px;">${label}</div>
    <div style="font-size:1.6rem;font-weight:900;color:${color||'#0f172a'};">${val}</div>
    <div style="font-size:0.7rem;color:#94a3b8;margin-top:2px;">${sub}</div>
  </div>`;
}
function statusBar(label,val,max,color,sub){
  const p=max>0?Math.min(Math.round(val/max*100),100):0;
  return `<div style="margin-bottom:10px;">

function rDashboard(){
  const fDrops=DROPS.filter(d=>!S.selectedBrand||d.brand===S.selectedBrand);
  const liveDrops=fDrops.filter(d=>d.status==='live');
  const active=fDrops.filter(d=>d.status!=='draft');
  const totalCI=active.reduce((s,d)=>s+(d.checkins||0),0);
  const totalRes=active.reduce((s,d)=>s+(d.res||0),0);
  const overallConv=pct(totalCI,totalRes);
  const maxCI=Math.max(...active.map(d=>d.checkins||0),1);
  const sorted=[...active].sort((a,b)=>(b.checkins||0)-(a.checkins||0));

  const brandStats=BRANDS.map(b=>{
    const bDrops=active.filter(d=>d.brand===b.id);
    const ci=bDrops.reduce((s,d)=>s+(d.checkins||0),0);
    const res=bDrops.reduce((s,d)=>s+(d.res||0),0);
    const locs=LOCATIONS.filter(l=>l.brand===b.id).length;
    return {...b,ci,res,conv:res>0?pct(ci,res):0,dropCount:bDrops.length,locs};
  }).sort((a,b)=>b.ci-a.ci);
  const maxBrandCI=Math.max(...brandStats.map(b=>b.ci),1);

  const typeStats=[
    {type:'happy-hour',label:'Happy Hour'},
    {type:'menu-drop', label:'Menu Drops'},
    {type:'event',     label:'Events'},
    {type:'vip',       label:'VIP Dining'},
  ].map(t=>({...t,ci:active.filter(d=>d.type===t.type).reduce((s,d)=>s+(d.checkins||0),0)}));
  const maxTypeCI=Math.max(...typeStats.map(t=>t.ci),1);

  return `<div style="padding:28px 32px;">
    <div style="margin-bottom:20px;">
      <div style="font-size:1.3rem;font-weight:800;color:#0f172a;">Dashboard</div>
      <div style="font-size:0.82rem;color:#64748b;margin-top:2px;">${liveDrops.length} drops live &middot; ${totalCI.toLocaleString()} total redemptions &middot; ${S.selectedBrand?brandById(S.selectedBrand)?.short+' only':'All 6 brands'}</div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;">
      ${kpi('Drops Live',liveDrops.length,`${fDrops.length} total drops`,'#C41230')}
      ${kpi('Total Redemptions',fmtNum(totalCI),'Guest check-ins across all brands')}
      ${kpi('Reservations',fmtNum(totalRes),'Drop reservations / RSVPs')}
      ${kpi('Redemption Rate',overallConv+'%','Reserved \u2192 Redeemed',showColor(overallConv))}
    </div>

    <div style="display:grid;grid-template-columns:1fr 300px;gap:20px;margin-bottom:20px;">
      <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;overflow:hidden;">
        <div style="padding:14px 18px;background:#f8f9fb;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;">
          <div style="font-size:0.85rem;font-weight:800;color:#0f172a;">Top Drops by Redemptions</div>
          <div style="font-size:0.72rem;color:#64748b;">${sorted.length} active drops</div>
        </div>
        ${sorted.slice(0,7).map((d,i)=>{
          const conv=d.res>0?pct(d.checkins,d.res):0;
          const b=brandById(d.brand)||BRANDS[0];
          const loc=locById(d.locId);
          return `<div style="padding:12px 18px;border-bottom:1px solid #f1f5f9;background:${i%2?'#fafafa':'#fff'};">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
              <span style="font-size:0.72rem;font-weight:900;color:#94a3b8;width:18px;">#${i+1}</span>
              <span style="font-size:1rem;">${brandIcon(b,16)}</span>
              <div style="font-weight:700;font-size:0.82rem;color:#0f172a;flex:1;">${d.title}</div>
              ${dropTypeBadge(d.type)}
            </div>
            <div style="display:flex;align-items:center;gap:8px;padding-left:26px;">
              ${brandBadge(d.brand)}
              <span style="font-size:0.7rem;color:#64748b;">${loc?loc.city:'—'}</span>
              <div style="flex:1;background:#f1f5f9;border-radius:20px;height:5px;overflow:hidden;">
                <div style="height:5px;border-radius:20px;background:${b.color};width:${Math.round((d.checkins||0)/maxCI*100)}%;"></div>
              </div>
              <span style="font-size:0.78rem;font-weight:800;color:#0f172a;min-width:36px;text-align:right;">${fmtNum(d.checkins)}</span>
              <span style="font-size:0.75rem;font-weight:700;color:${showColor(conv)};min-width:34px;text-align:right;">${conv}%</span>
            </div>
          </div>`;
        }).join('')}
      </div>

      <div style="display:flex;flex-direction:column;gap:14px;">
        <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:16px;">
          <div style="font-size:0.82rem;font-weight:800;color:#0f172a;margin-bottom:12px;">Drop Type Mix</div>
          ${typeStats.map(t=>statusBar(t.label,t.ci,maxTypeCI,'#C41230','')).join('')}
        </div>
        <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:16px;">
          <div style="font-size:0.82rem;font-weight:800;color:#0f172a;margin-bottom:12px;">Brand Snapshot</div>
          ${brandStats.map(b=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">

    </div>

    <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:18px 20px;">
      <div style="font-size:0.85rem;font-weight:800;color:#0f172a;margin-bottom:14px;">Brand Performance Breakdown</div>
      <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:0;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;">
        ${brandStats.map((b,i)=>{
          const isLast=i===brandStats.length-1;
          return `<div style="padding:14px 12px;border-right:${isLast?'none':'1px solid #e5e7eb'};text-align:center;background:${S.selectedBrand===b.id?b.color+'08':'#fff'};" onclick="ss({selectedBrand:S.selectedBrand===b.id?null:'${b.id}'})" style="cursor:pointer;">
            <div style="font-size:1.3rem;margin-bottom:6px;">${brandIcon(b,16)}</div>
            <div style="font-size:0.65rem;font-weight:800;color:${b.color};margin-bottom:4px;">${b.abbr}</div>
            <div style="font-size:1.1rem;font-weight:900;color:#0f172a;">${fmtNum(b.ci)}</div>
            <div style="font-size:0.62rem;color:#94a3b8;margin-top:2px;">${b.conv}% conv</div>
            <div style="font-size:0.62rem;color:#94a3b8;">${b.locs} loc &middot; ${b.dropCount} drops</div>

            <div style="font-size:0.65rem;font-weight:800;color:${b.color};margin-bottom:4px;">${b.abbr}</div>
            <div style="font-size:1rem;font-weight:900;color:#0f172a;">${fmtMoney(bCost)}</div>
            <div style="font-size:0.65rem;color:#94a3b8;margin-top:2px;">${bLocs} loc/mo</div>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;">
      ${[
        {label:'Active Locations',val:'13',sub:'Across 7 cities'},
        {label:'Monthly Cost',val:fmtMoney(monthly),sub:'Auto-renews Apr 1'},
        {label:'Cost per Drop',val:fmtMoney(Math.round(monthly/DROPS.length)),sub:`${DROPS.length} total drops`},
        {label:'Est. ROI',val:'8.7x',sub:'Based on guest spend lift'},
      ].map(s=>`<div style="background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:16px 18px;">
        <div style="font-size:0.72rem;color:#64748b;font-weight:600;margin-bottom:4px;">${s.label}</div>
        <div style="font-size:1.5rem;font-weight:900;color:#0f172a;">${s.val}</div>
        <div style="font-size:0.7rem;color:#94a3b8;margin-top:2px;">${s.sub}</div>
      </div>`).join('')}
    </div>
    <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;overflow:hidden;">
      <div style="padding:14px 18px;background:#f8f9fb;border-bottom:1px solid #e5e7eb;font-size:0.82rem;font-weight:800;color:#0f172a;">Invoice History</div>
      ${invoices.map((inv,i)=>`<div style="padding:14px 18px;border-bottom:1px solid #f1f5f9;background:${i%2?'#fafafa':'#fff'};display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font-weight:700;font-size:0.82rem;">${inv.desc}</div>
          <div style="font-size:0.72rem;color:#64748b;margin-top:2px;">${inv.date}</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="font-weight:800;font-size:0.9rem;">${fmtMoney(inv.amt)}</div>
          <span style="background:#dcfce7;color:#16a34a;font-size:0.7rem;font-weight:700;padding:3px 8px;border-radius:20px;">${inv.status}</span>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
}

// ── SETTINGS ───────────────────────────────────────────────────────────────
function rSettings(){
  function sCard(title,content){
    return `<div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:20px 24px;margin-bottom:16px;">
      <div style="font-size:0.9rem;font-weight:800;color:#0f172a;margin-bottom:14px;">${title}</div>
      ${content}
    </div>`;
  }
  function sRow(label,val,sub){
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f1f5f9;">
      <div><div style="font-size:0.82rem;font-weight:600;color:#0f172a;">${label}</div>${sub?`<div style="font-size:0.7rem;color:#94a3b8;margin-top:1px;">${sub}</div>`:''}</div>
      <div style="font-size:0.82rem;font-weight:700;color:#475569;">${val}</div>
    </div>`;
  }
  return `<div style="padding:28px 32px;">
    <div style="font-size:1.3rem;font-weight:800;color:#0f172a;margin-bottom:22px;">Settings</div>
    ${sCard('Group Settings',
      sRow('Group Name','Big Red F Restaurant Group')+
      sRow('Short Name','Big Red F')+
      sRow('Headquarters','Boulder, CO')+
      sRow('Primary Color','<span style="display:inline-flex;align-items:center;gap:6px;"><span style="width:14px;height:14px;border-radius:3px;background:#C41230;display:inline-block;"></span>#C41230 Big Red</span>')+
      sRow('Active Brands','6 restaurant brands')+
      sRow('Cities','Boulder, Denver, Fort Collins, Colorado Springs, Lafayette, Longmont, Estes Park')
    )}
    ${sCard('Brand Profiles',`
      <div style="display:flex;flex-direction:column;gap:8px;">
        ${BRANDS.map(b=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:${b.color}06;border-radius:8px;border:1px solid ${b.color}20;">
          <div style="display:flex;align-items:center;gap:10px;">
            <span style="font-size:1.1rem;">${brandIcon(b,16)}</span>
            <div>
              <div style="font-size:0.82rem;font-weight:700;color:#0f172a;">${b.name}</div>
              <div style="font-size:0.68rem;color:#64748b;">${b.cuisine} &middot; ${LOCATIONS.filter(l=>l.brand===b.id).length} locations</div>
            </div>
          </div>
          <span style="background:${b.color}15;color:${b.color};font-size:0.68rem;font-weight:800;padding:3px 8px;border-radius:20px;">${b.abbr}</span>
        </div>`).join('')}
      </div>
    `)}
    ${sCard('Drop Policies',
      sRow('Max Simultaneous Drops','5 per location','Per brand location')+
      sRow('Default Geo-Fence','~150 ft (Dining Room)','Can be adjusted per drop')+
      sRow('Default Broadcast Window','3 hours','Typical happy hour / service window')+
      sRow('Group-wide drops','Enabled','Drops can broadcast across all brands')+
      sRow('Cross-brand analytics','Enabled','Compare performance across brands')
    )}
    ${.map(([k,v])=>sRow(v.short,v.label)).join('')
    )}
    ${sCard('Hierarchy: Group &rarr; Brand &rarr; Location',`
      <div style="display:flex;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;">
        ${['Big Red F (Group)','6 Brands','4 Cities','17 Locations'].map((l,i)=>`<div style="flex:1;padding:10px 12px;background:${i%2?'#f8f9fb':'#fff'};border-right:1px solid #e5e7eb;text-align:center;">
          <div style="font-size:0.65rem;font-weight:800;color:#64748b;text-transform:uppercase;">Level ${i+1}</div>
          <div style="font-size:0.75rem;font-weight:700;color:#0f172a;margin-top:3px;">${l}</div>
        </div>`).join('')}
      </div>
    `)}
    ${sCard('Alerts &amp; Notifications',
      sRow('Redemption spike alerts','Enabled','Notify when location redemptions +30% in 15 min')+
      sRow('Capacity warnings','Enabled','Alert at 85% and 95% of drop cap')+
      sRow('Cross-brand performance','Weekly','Weekly digest comparing brand performance')+
      sRow('New guest milestones','Enabled','Alert when guest reaches VIP Regular tier')
    )}
  </div>`;
}

// ── NEW COLLECTION MODAL ────────────────────────────────────────────────────
function newCollModal(){
  const step=S.newCollStep||1;
  const steps=['Scope''Review'];
  return `<div style="position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:1000;display:flex;align-items:center;justify-content:center;" onclick="if(event.target===this)ss({showNewColl:false,newCollStep:1})">
    <div style="background:#fff;border-radius:18px;width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.25);" onclick="event.stopPropagation()">
      <div style="background:linear-gradient(135deg,#1a0505 0%,#C41230 100%);padding:20px 24px;border-radius:18px 18px 0 0;">
        <div style="color:#fff;font-size:1.1rem;font-weight:800;">New Collection</div>
        <div style="display:flex;gap:6px;margin-top:14px;">
          ${steps.map((s,i)=>`<div style="flex:1;">
            <div style="height:4px;border-radius:2px;background:${i+1<=step?'#fff':'rgba(255,255,255,0.3)'};margin-bottom:5px;"></div>
            <div style="font-size:0.65rem;font-weight:700;color:${i+1<=step?'#fff':'rgba(255,255,255,0.5)'};">Step ${i+1}: ${s}</div>
          </div>`).join('')}
        </div>
      </div>
      <div style="padding:24px;">
        ${step===1?`
          <div style="margin-bottom:16px;">
            <label style="font-size:0.78rem;font-weight:700;color:#0f172a;display:block;margin-bottom:6px;">Collection Name</label>
            <input placeholder="e.g. Happy Hour Passport \u2014 Spring 2026" style="width:100%;border:1px solid #e5e7eb;border-radius:8px;padding:10px 12px;font-size:0.85rem;box-sizing:border-box;">
          </div>
          <div style="margin-bottom:16px;">
            <label style="font-size:0.78rem;font-weight:700;color:#0f172a;display:block;margin-bottom:6px;">Brand Scope</label>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
              <div onclick="ss({newCollBrand:null})" style="border:2px solid ${!S.newCollBrand?'#C41230':'#e5e7eb'};border-radius:10px;padding:12px;cursor:pointer;background:${!S.newCollBrand?'#fef2f2':'#fff'};">
                <div style="font-size:1rem;">&#127860;</div>
                <div style="font-weight:700;font-size:0.82rem;margin-top:4px;">All Brands</div>
                <div style="font-size:0.7rem;color:#64748b;">Group-wide collection, 13 locations</div>
              </div>
              ${BRANDS.map(b=>`<div onclick="ss({newCollBrand:'${b.id}'})" style="border:2px solid ${S.newCollBrand===b.id?b.color:'#e5e7eb'};border-radius:10px;padding:12px;cursor:pointer;background:${S.newCollBrand===b.id?b.color+'10':'#fff'};">
                <div style="font-size:1rem;">${brandIcon(b,16)}</div>
                <div style="font-weight:700;font-size:0.78rem;margin-top:4px;">${b.short}</div>
                <div style="font-size:0.68rem;color:#64748b;">${LOCATIONS.filter(l=>l.brand===b.id).length} locations</div>
              </div>`).join('')}
            </div>
          </div>
        `:''}
        ${step===2?`
          <div style="margin-bottom:16px;">
            <div style="display:flex;flex-direction:column;gap:8px;">
              ${Object.entries(GEO_TIERS).map(([k,v])=>`<label style="display:flex;align-items:center;gap:10px;border:2px solid ${S.newCollGeo===k?'#C41230':'#e5e7eb'};border-radius:8px;padding:10px 12px;cursor:pointer;background:${S.newCollGeo===k?'#fef2f2':'#fff'};">
                <input type="radio" name="collGeo" ${S.newCollGeo===k?'checked':''} onclick="ss({newCollGeo:'${k}'})">
                <div>
                  <div style="font-weight:700;font-size:0.82rem;color:#0f172a;">${v.short}</div>
                  <div style="font-size:0.7rem;color:#64748b;">${v.label}</div>
                </div>
              </label>`).join('')}
            </div>
          </div>
        `:''}
        ${step===3?`
          <div style="background:#f8f9fb;border-radius:10px;padding:16px;margin-bottom:16px;">
            <div style="font-weight:800;font-size:0.85rem;color:#0f172a;margin-bottom:10px;">Collection Summary</div>
            ${infoRow('Brand Scope',S.newCollBrand?BRANDS.find(b=>b.id===S.newCollBrand)?.short||'—':'All Brands (Group-wide)')}
            ${infoRow('Locations',S.newCollBrand?LOCATIONS.filter(l=>l.brand===S.newCollBrand).length+' locations':'13 locations')}
            ${infoRow(S.newCollGeo?GEO_TIERS[S.newCollGeo].short:'Not set')}
          </div>
          <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:12px 14px;font-size:0.78rem;color:#991b1b;">
            Drops can be added after the collection is created. Group-wide collections will appear across all brand apps.
          </div>
        `:''}
        <div style="display:flex;gap:10px;margin-top:20px;">
          ${step>1?`<button onclick="ss({newCollStep:${step-1}})" style="flex:1;background:#f1f5f9;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;color:#475569;">Back</button>`:''}
          ${step<3?`<button onclick="ss({newCollStep:${step+1}})" style="flex:2;background:#C41230;color:#fff;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;">Next: ${steps[step]}</button>`:`<button onclick="ss({showNewColl:false,newCollStep:1})" style="flex:2;background:#1a0505;color:#fff;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;">Create Collection</button>`}
          <button onclick="ss({showNewColl:false,newCollStep:1})" style="flex:1;background:#f1f5f9;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;color:#94a3b8;">Cancel</button>
        </div>
      </div>
    </div>
  </div>`;
}

// ── PUSH MODAL ──────────────────────────────────────────────────────────────
function pushModal(){
  const step=S.pushStep||1;
  return `<div style="position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:1000;display:flex;align-items:center;justify-content:center;" onclick="if(event.target===this)ss({showPush:false,pushStep:1})">
    <div style="background:#fff;border-radius:18px;width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.25);" onclick="event.stopPropagation()">
      <div style="background:#C41230;padding:20px 24px;border-radius:18px 18px 0 0;display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="color:#fff;font-size:1.1rem;font-weight:800;">Push Drop</div>
          <div style="color:rgba(255,255,255,0.8);font-size:0.78rem;margin-top:2px;">Step ${step} of 3</div>
        </div>
        <button onclick="ss({showPush:false,pushStep:1})" style="background:rgba(255,255,255,0.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;">X</button>
      </div>
      <div style="padding:24px;">
        ${step===1?pushStep1():step===2?pushStep2():pushStep3()}
        <div style="display:flex;gap:10px;margin-top:20px;">
          ${step>1?`<button onclick="ss({pushStep:${step-1}})" style="flex:1;background:#f1f5f9;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;color:#475569;">Back</button>`:''}
          ${step<3?`<button onclick="ss({pushStep:${step+1}})" style="flex:2;background:#C41230;color:#fff;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;">Next</button>`:`<button onclick="ss({showPush:false,pushStep:1})" style="flex:2;background:#1a0505;color:#fff;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;">Send Push</button>`}
          ${step===1?`<button onclick="ss({showPush:false,pushStep:1})" style="flex:1;background:#f1f5f9;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;color:#94a3b8;">Cancel</button>`:''}
        </div>
      </div>
    </div>
  </div>`;
}

function pushStep1(){
  return `<div>
    <div style="font-size:0.85rem;font-weight:800;color:#0f172a;margin-bottom:12px;">Select a Drop to Push</div>
    <div style="display:flex;flex-direction:column;gap:8px;max-height:320px;overflow-y:auto;">
      ${DROPS.filter(d=>d.status==='live'&&(!S.selectedBrand||d.brand===S.selectedBrand)).map(d=>{
        const b=brandById(d.brand)||BRANDS[0];
        const loc=locById(d.locId);
        return `<div style="border:2px solid ${S.pushDrop===d.id?b.color:'#e5e7eb'};border-radius:10px;padding:12px 14px;cursor:pointer;background:${S.pushDrop===d.id?b.color+'08':'#fff'};" onclick="ss({pushDrop:'${d.id}'})">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
            <div style="display:flex;align-items:center;gap:6px;">
              <span style="font-size:0.9rem;">${brandIcon(b,16)}</span>
              <div style="font-weight:700;font-size:0.82rem;color:#0f172a;">${d.title}</div>
            </div>
            ${dropTypeBadge(d.type)}
          </div>
          <div style="font-size:0.7rem;color:#64748b;">${b.short} &middot; ${loc?loc.city:'—'} &middot; ${d.checkins} redemptions</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function pushStep2(){
  const scopes=['All Guests Nearby','Guests in Restaurant','Guests on Block','VIP Regulars Only','Loyal Guests &amp; VIP'];
  return `<div>
    <div style="font-size:0.85rem;font-weight:800;color:#0f172a;margin-bottom:4px;">Who receives this push?</div>
    <div style="font-size:0.75rem;color:#64748b;margin-bottom:12px;">Select the audience for this drop notification</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;">
      ${scopes.map(sc=>`<div onclick="ss({pushScope:'${sc}'})" style="padding:8px 14px;border-radius:20px;border:2px solid ${S.pushScope===sc?'#C41230':'#e5e7eb'};background:${S.pushScope===sc?'#fef2f2':'#fff'};font-size:0.75rem;font-weight:700;cursor:pointer;color:${S.pushScope===sc?'#C41230':'#475569'};">${sc}</div>`).join('')}
    </div>
    <div style="font-size:0.85rem;font-weight:800;color:#0f172a;margin-bottom:8px;">Geo-Fence Tier</div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      ${Object.entries(GEO_TIERS).map(([k,v])=>`<label style="display:flex;align-items:center;gap:10px;border:2px solid ${S.newCollGeo===k?'#C41230':'#e5e7eb'};border-radius:8px;padding:8px 12px;cursor:pointer;background:${S.newCollGeo===k?'#fef2f2':'#fff'};">
        <input type="radio" name="pushGeo" ${S.newCollGeo===k?'checked':''} onclick="ss({newCollGeo:'${k}'})">
        <span style="font-size:0.75rem;font-weight:600;color:#0f172a;">${v.short}</span>
        <span style="font-size:0.68rem;color:#94a3b8;">${v.label}</span>
      </label>`).join('')}
    </div>
  </div>`;
}

function pushStep3(){
  const drop=DROPS.find(d=>d.id===S.pushDrop);
  const b=drop?brandById(drop.brand):null;
  const loc=drop?locById(drop.locId):null;
  return `<div>
    <div style="font-size:0.85rem;font-weight:800;color:#0f172a;margin-bottom:12px;">Preview &amp; Confirm</div>
    <div style="background:#0f172a;border-radius:16px;padding:16px;margin-bottom:16px;">
      <div style="background:#1e293b;border-radius:12px;padding:16px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <div style="width:36px;height:36px;border-radius:8px;background:${b?b.color:'#C41230'};display:flex;align-items:center;justify-content:center;">${b?`<img src="${b.logo}" alt="${b.short}" style="height:18px;max-width:64px;object-fit:contain;filter:brightness(0) invert(1);display:block;">`:'🍽️'}</div>
          <div>
            <div style="color:#fff;font-size:0.78rem;font-weight:700;">${b?b.short:'Big Red F'} &middot; Nigh</div>
            <div style="color:#94a3b8;font-size:0.7rem;">now</div>
          </div>
        </div>
        <div style="color:#fff;font-weight:800;font-size:0.88rem;margin-bottom:4px;">${drop?drop.title:'Drop Selected'}</div>
        <div style="color:#cbd5e1;font-size:0.78rem;">${loc?loc.city:'—'} &middot; Tap to redeem</div>
      </div>
    </div>
    <div style="background:#f8f9fb;border-radius:10px;padding:14px 16px;">
      ${infoRow('Drop',drop?drop.title:'Not selected')}
      ${infoRow('Brand',b?b.short:'—')}
      ${infoRow('Location',loc?loc.city:'—')}
      ${infoRow('Audience',S.pushScope||'Not set')}
      ${infoRow(S.newCollGeo?GEO_TIERS[S.newCollGeo].short:'Not set')}
    </div>
  </div>`;
}

// ── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('app').innerHTML=`
    ${layout()}
    ${S.showNewColl?newCollModal():''}
    ${S.showPush?pushModal():''}
  `;
}

window.ss=function(patch){Object.assign(S,patch);render();};
window.go=function(page){S.page=page;render();};
window.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
