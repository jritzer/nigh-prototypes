    if(obStep>=8 && exChoice==='newhandle'){
      msgs.push(uMsg(S.loginDropIdea||'Something fun'));
      msgs.push(nMsg("That sounds incredible! I can already tell people are going to love showing up. 🔥"));
      msgs.push(nMsg("You're all set, "+fname+". Let's create your first Drop!"));
    }
  }

  // Render bubbles
  const bubbles=msgs.map((m,i)=>{
    const delay=i*0.06+'s';
    if(m.from==='niya'){
      return '<div style="display:flex;align-items:flex-end;gap:9px;margin-bottom:10px;padding:0 16px;animation:fadeIn 0.25s ease-out '+delay+' both">'+
        niyaAvatar(28)+
        '<div style="max-width:76%;background:#F3F4F6;border-radius:18px 18px 18px 4px;padding:10px 14px;font-size:13px;color:#111827;line-height:1.5">'+m.text+'</div></div>';
    } else {
      return '<div style="display:flex;justify-content:flex-end;margin-bottom:10px;padding:0 16px;animation:fadeIn 0.25s ease-out '+delay+' both">'+
        '<div style="max-width:76%;background:#0E4EF5;border-radius:18px 18px 4px 18px;padding:10px 14px;font-size:13px;color:#fff;line-height:1.5">'+m.text+'</div></div>';
    }
  }).join('');

  // ── Input area varies by step and user type ──
  let inputArea='';
  const resetAndHome="S.niyaOnboarding=false;S.niyaMode=null;S.loginObStep=0;S.loginFirstName='';S.loginLastName='';S.loginHandle='';S.loginDropIdea='';S.loginExChoice='';S.loginExHandle='';S.loginBizCategory='';S.loginBizSubCat='';S.scr='home';render()";

  // Helper: personal vs brand account card selector
  const accountChoiceCards=function(personalLabel){
    return '<div style="border-top:1px solid #F3F4F6;background:#fff;padding:12px 16px 16px">'+
      '<div style="font-size:11px;font-weight:600;color:#9CA3AF;margin-bottom:8px">Choose one</div>'+
      '<button onclick="S.loginExChoice=\'personal\';S.loginObStep='+(obStep+1)+';render()" style="width:100%;background:#F9FAFB;border:1.5px solid #E5E7EB;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;text-align:left;font-family:inherit">'+
        '<div style="width:36px;height:36px;border-radius:10px;background:#EDE9FE;display:flex;align-items:center;justify-content:center;color:#7C3AED;flex-shrink:0">'+ic('user',18)+'</div>'+
        '<div><div style="font-size:13px;font-weight:600;color:#111827">'+personalLabel+'</div><div style="font-size:11px;color:#6B7280;margin-top:1px">Use your personal account to host Drops</div></div></button>'+
      '<button onclick="S.loginExChoice=\'newhandle\';S.loginObStep='+(obStep+1)+';render()" style="width:100%;background:#F9FAFB;border:1.5px solid #E5E7EB;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;text-align:left;font-family:inherit">'+
        '<div style="width:36px;height:36px;border-radius:10px;background:#EDE9FE;display:flex;align-items:center;justify-content:center;color:#7C3AED;flex-shrink:0">'+ic('store',18)+'</div>'+
        '<div><div style="font-size:13px;font-weight:600;color:#111827">Create a different host account</div><div style="font-size:11px;color:#6B7280;margin-top:1px">Set up a new handle for a business or brand</div></div></button>'+
    '</div>';
  };

  // Helper: CTA button
  const ctaDone='<div style="padding:10px 16px 16px;border-top:1px solid #F3F4F6;background:#fff">'+
    '<div style="text-align:center"><button onclick="finishHostOnboarding()" style="background:#0E4EF5;color:#fff;border:none;border-radius:14px;padding:13px 32px;font-family:inherit;font-size:15px;font-weight:700;box-shadow:0 4px 16px rgba(14,78,245,0.35);display:inline-flex;align-items:center;gap:8px;cursor:pointer">Create your first Drop '+ic('right',16)+'</button></div></div>';

  // Helper: category card grid
  function catGrid(nextStep){
    const cats=Object.keys(HOST_CATS);
    let cards='';
    cats.forEach(function(c){
      const emoji=HOST_CAT_ICONS[c]||'📌';
      cards+='<button onclick="S.loginBizCategory=\''+c.replace(/'/g,"\\'")+'\';S.loginObStep='+nextStep+';render()" style="background:#F9FAFB;border:1.5px solid #E5E7EB;border-radius:12px;padding:10px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-family:inherit;min-width:0">'+
        '<span style="font-size:22px">'+emoji+'</span>'+
        '<span style="font-size:10px;font-weight:600;color:#111827;text-align:center;line-height:1.2;word-break:break-word">'+c+'</span></button>';
    });
    return '<div style="border-top:1px solid #F3F4F6;background:#fff;padding:12px 16px 16px;max-height:260px;overflow-y:auto">'+
      '<div style="font-size:11px;font-weight:600;color:#9CA3AF;margin-bottom:8px">Pick a category</div>'+
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">'+cards+'</div></div>';
  }

  // Helper: sub-category card list
  function subCatGrid(catName,nextStep){
    const subs=HOST_CATS[catName]||[];
    let cards='';
    subs.forEach(function(s){
      cards+='<button onclick="S.loginBizSubCat=\''+s.replace(/'/g,"\\'")+'\';S.loginObStep='+nextStep+';render()" style="width:100%;background:#F9FAFB;border:1.5px solid #E5E7EB;border-radius:10px;padding:10px 14px;cursor:pointer;font-family:inherit;text-align:left;font-size:13px;font-weight:500;color:#111827;margin-bottom:6px">'+s+'</button>';
    });
    return '<div style="border-top:1px solid #F3F4F6;background:#fff;padding:12px 16px 16px;max-height:260px;overflow-y:auto">'+
      '<div style="font-size:11px;font-weight:600;color:#9CA3AF;margin-bottom:8px">'+(HOST_CAT_ICONS[catName]||'')+ ' '+catName+'</div>'+
      cards+'</div>';
  }

  if(userType==='existing'){
    // ── EXISTING USER INPUT AREAS ──
    // Steps: 0=choose account | personal→1=drop idea,2=done | newhandle→1=handle,2=category,3=sub-cat,4=drop idea,5=done
    const maxStep=(exChoice==='personal')?2:5;

    if(obStep===0){
      inputArea=accountChoiceCards('Host as '+exHandle);
    } else if(obStep===1 && exChoice==='personal'){
      inputArea=loginObInput('loginDropInput','e.g., Happy hour, yoga class, tasting…','',
        "const v=__SIMVAL__;if(v){S.loginDropIdea=v;S.loginListening=false;S.loginObStep=2;render();}");
    } else if(obStep===1 && exChoice==='newhandle'){
      inputArea=loginObInput('loginHandleInput','@yourbrand','',
        "const v=__SIMVAL__;if(v){S.loginHandle=v.startsWith('@')?v:'@'+v;S.loginListening=false;S.loginObStep=2;render();}");
    } else if(obStep===2 && exChoice==='newhandle'){
      inputArea=catGrid(3);
    } else if(obStep===3 && exChoice==='newhandle'){
      inputArea=subCatGrid(bizCat,4);
    } else if(obStep===4 && exChoice==='newhandle'){
      inputArea=loginObInput('loginDropInput','e.g., Happy hour, yoga class, tasting…','',
        "const v=__SIMVAL__;if(v){S.loginDropIdea=v;S.loginListening=false;S.loginObStep=5;render();}");
    } else if(obStep>=maxStep){
      inputArea=ctaDone;
    }

  } else {
    // ── NEW USER INPUT AREAS ──
    // Steps: 0=first name | 1=last name | 2=handle | 3=choose account |
    // personal→4=drop idea,5=done | newhandle→4=brand handle,5=category,6=sub-cat,7=drop idea,8=done
    const maxStep=(exChoice==='personal'||exChoice==='')?5:8;

    if(obStep===0){
      inputArea=loginObInput('loginNameInput','Your first name…','',
        "const v=__SIMVAL__;if(v){S.loginFirstName=v;S.loginListening=false;S.loginObStep=1;render();}");
    } else if(obStep===1){
      inputArea=loginObInput('loginLastNameInput','Your last name…','',
        "const v=__SIMVAL__;if(v){S.loginLastName=v;S.loginListening=false;S.loginObStep=2;render();}");
    } else if(obStep===2){
      inputArea=loginObInput('loginHandleInput',sugHandle,handle,
        "const v=__SIMVAL__;if(v){var hh=v.replace(/^@/,'').replace(/[^a-zA-Z0-9_]/g,'').toLowerCase();S.loginHandle='@'+hh;S.loginListening=false;if(handleTaken(hh)){S.loginHandleErr=true;render();}else{S.loginHandleErr=false;S.loginObStep=3;render();}}");
    } else if(obStep===3){
      inputArea=accountChoiceCards('Host as '+handle);
    } else if(obStep===4 && exChoice==='personal'){
      inputArea=loginObInput('loginDropInput','e.g., Happy hour, yoga class, tasting…','',
        "const v=__SIMVAL__;if(v){S.loginDropIdea=v;S.loginListening=false;S.loginObStep=5;render();}");
    } else if(obStep===4 && exChoice==='newhandle'){
      inputArea=loginObInput('loginBrandHandleInput','@yourbrand','',
        "const v=__SIMVAL__;if(v){S.loginHandle=v.startsWith('@')?v:'@'+v;S.loginListening=false;S.loginObStep=5;render();}");
    } else if(obStep===5 && exChoice==='newhandle'){
      inputArea=catGrid(6);
    } else if(obStep===6 && exChoice==='newhandle'){
      inputArea=subCatGrid(bizCat,7);
    } else if(obStep===7 && exChoice==='newhandle'){
      inputArea=loginObInput('loginDropInput','e.g., Happy hour, yoga class, tasting…','',
        "const v=__SIMVAL__;if(v){S.loginDropIdea=v;S.loginListening=false;S.loginObStep=8;render();}");
    } else if(obStep>=maxStep){
      inputArea=ctaDone;
    }
  }

  // Scroll chat to bottom
  setTimeout(()=>{const el=document.getElementById('loginChatScroll');if(el)el.scrollTop=el.scrollHeight;},30);

  const skipHome="S.niyaOnboarding=false;S.niyaMode=null;S.scr='home';render()";

  return hdr('Niya','')+
    '<div style="text-align:center;padding:14px 0 4px"><span style="font-size:11px;color:#9CA3AF;background:#F9FAFB;padding:3px 10px;border-radius:10px">Today</span></div>'+
    '<div id="loginChatScroll" style="flex:1;overflow-y:auto;padding:8px 0 6px">'+bubbles+'</div>'+
    inputArea;
}

function loginObInput(inputId,placeholder,value,onSubmit){
  if(S.loginListening){
    return '<div style="border-top:1px solid #F3F4F6;background:#fff;padding:16px;text-align:center">'+
      '<div style="font-size:11px;font-weight:600;color:#7C3AED;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:10px">Listening…</div>'+
      '<div style="display:flex;justify-content:center;margin-bottom:14px">'+niyaWave(true)+'</div>'+
      '<button onclick="S.loginListening=false;'+onSubmit.replace('__SIMVAL__','\'Alex\'')+'" style="background:#F3F4F6;color:#374151;border:none;border-radius:22px;padding:9px 22px;font-family:inherit;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;cursor:pointer">'+ic('x',14)+' Done</button></div>';
  }
  return '<div style="border-top:1px solid #F3F4F6;background:#fff;padding:10px 16px 14px">'+
    '<div style="display:flex;gap:10px;align-items:center;margin-bottom:8px">'+
      '<button onclick="S.loginListening=true;render()" title="Speak to Niya" style="background:none;border:none;padding:0;cursor:pointer;flex-shrink:0;width:44px;height:44px;border-radius:50%;overflow:hidden;"><img src="'+NIYA_ICON+'" style="width:44px;height:44px;object-fit:cover;display:block;animation:niyaInnerPulse 2.5s ease-in-out infinite"/></button>'+
      '<div style="flex:1;background:#F9FAFB;border-radius:22px;border:1.5px solid #E5E7EB;display:flex;align-items:center;padding:0 6px 0 14px;gap:6px">'+
        '<input id="'+inputId+'" type="text" placeholder="'+placeholder+'" value="'+(value||'')+'" autocomplete="off" style="flex:1;border:none;background:none;font-size:13px;color:#111827;padding:10px 0;outline:none;font-family:inherit" onkeydown="if(event.key===\'Enter\'){'+onSubmit.replace('__SIMVAL__',"document.getElementById('"+inputId+"').value.trim()")+'}"/>'+
        '<button onclick="'+onSubmit.replace('__SIMVAL__',"document.getElementById('"+inputId+"').value.trim()")+'" style="width:32px;height:32px;border-radius:50%;border:none;background:#7C3AED;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;cursor:pointer">'+ic('right',14)+'</button>'+
      '</div>'+
    '</div></div>';
}

// ── Render ──
function render(){
  const c=document.getElementById('scr');
  const prevScroll=c?c.scrollTop:0;
  const prevScr=S._lastScr;const prevStep=S._lastStep;
  const m={home:renderHome,create:renderCreate,liveview:renderLive,checkin:renderCI,guests:renderG,inbox:renderInbox,menu:renderMenu,niya:renderNiya,login:renderLogin,newacct:renderNewAccount};
  const isGuestMsgs=S.scr==='menu'&&S.menuSub==='customers'&&S.modal&&S.modal.startsWith('customer-')&&(S.guestTab||'overview')==='comms';
  if(S.scr==='niya'||S.scr==='liveview'||isGuestMsgs){c.style.overflow='hidden';c.style.display='flex';c.style.flexDirection='column';}
  else{c.style.overflow='';c.style.display='';c.style.flexDirection='';}
  c.innerHTML=(m[S.scr]||renderHome)();
  renderTB();renderModal();renderNiyaBar();renderFAB();
  const navChanged=S.scr!==prevScr||S.cStep!==prevStep;
  S._lastScr=S.scr;S._lastStep=S.cStep;
  if(navChanged){c.scrollTop=0;c.style.animation='fadeIn 0.25s ease-out';}else{c.scrollTop=prevScroll;c.style.animation='none';}
  if(isGuestMsgs)setTimeout(()=>{const el=document.getElementById('guestMsgScroll');if(el)el.scrollTop=el.scrollHeight;},0);
  if(S.scr==='create'&&S.cStep===1)setTimeout(()=>{
    updateBroadcastPanel();
    if(S.openTimePicker){
      const km={start:'dropStartTime',wstart:'dropWindowStart',wend:'dropWindowEnd','bcast-start':'dropBcastStartTime','bcast-end':'dropBcastEndTime'};
      const selTime=S[km[S.openTimePicker]]||'18:00';
      const el=document.getElementById('tp-'+S.openTimePicker+'-'+selTime.replace(':','-'));
      if(el)el.scrollIntoView({block:'center'});
      else{const d=document.getElementById('tp-'+S.openTimePicker+'-18-00');if(d)d.scrollIntoView({block:'center'});}
    }
  },0);
  const oldFab=document.querySelector('.niya-fab');if(oldFab)oldFab.remove();
}
render();
</script>
</body>
</html>
