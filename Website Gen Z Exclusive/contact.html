<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Nigh</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --blue: #0E4EF5;
            --teal: #41EFF9;
            --pink: #EC1977;
            --bg: #0B0B1A;
            --surface: #12122A;
            --surface-2: #1A1A3A;
            --border: rgba(255,255,255,0.08);
            --border-light: rgba(255,255,255,0.12);
            --text: #F5F5F7;
            --text-secondary: #A8A8C0;
            --radius: 20px;
            --radius-sm: 12px;
        }

        body {
            font-family: 'Poppins', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== NAV ===== */
        nav { border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .nav-inner {
            max-width: 1200px; margin: 0 auto; padding: 0 24px;
            height: 72px; display: flex; align-items: center; justify-content: space-between;
        }
        .nav-logo { display: flex; align-items: center; text-decoration: none; }
        .nav-logo img { height: 56px; width: auto; display: block; }
        .back-link {
            font-size: 0.82rem; font-weight: 600;
            color: var(--text-secondary); text-decoration: none; transition: color 0.2s;
        }
        .back-link:hover { color: var(--text); }

        /* ===== PAGE ===== */
        main {
            flex: 1; width: 100%; max-width: 580px;
            margin: 0 auto; padding: 56px 24px 64px;
        }

        .intro { margin-bottom: 32px; }
        .intro h1 { font-size: 1.9rem; font-weight: 800; letter-spacing: -0.015em; margin-bottom: 10px; }
        .intro p { color: var(--text-secondary); font-size: 0.95rem; font-weight: 400; }

        /* ===== FORM ===== */
        .card {
            background: var(--surface); border: 1px solid var(--border-light);
            border-radius: var(--radius); padding: 28px;
        }

        .field { margin-bottom: 18px; }
        .field:last-of-type { margin-bottom: 0; }
        .field label {
            display: block; font-size: 0.76rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.08em;
            color: var(--text-secondary); margin-bottom: 8px;
        }
        .field label .opt { text-transform: none; letter-spacing: 0; font-weight: 400; }
        .field input, .field textarea {
            width: 100%; background: var(--bg); color: var(--text);
            border: 1px solid var(--border-light); border-radius: 10px;
            padding: 13px 15px; font-family: inherit; font-size: 0.95rem;
            font-weight: 400; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field textarea { resize: vertical; min-height: 140px; line-height: 1.65; }
        .field input:focus, .field textarea:focus {
            border-color: var(--blue); box-shadow: 0 0 0 3px rgba(14,78,245,0.15);
        }
        .field input::placeholder, .field textarea::placeholder { color: #5A5A78; }
        .field input.invalid, .field textarea.invalid { border-color: var(--pink); }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

        .btn {
            display: block; margin: 24px auto 0; padding: 14px 34px;
            border-radius: var(--radius-sm); background: var(--blue); color: #fff;
            font-size: 0.95rem; font-weight: 700; font-family: inherit;
            border: none; cursor: pointer; transition: all 0.25s;
        }
        .btn:hover { filter: brightness(1.15); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(14,78,245,0.35); }

        .error-msg {
            color: var(--pink); font-size: 0.83rem; font-weight: 500;
            margin-top: 14px; display: none;
        }

        /* ===== CONFIRMATION ===== */
        .confirm { text-align: center; padding: 12px 4px; }
        .confirm-check {
            width: 64px; height: 64px; border-radius: 50%;
            background: rgba(14,78,245,0.12); border: 1.5px solid rgba(14,78,245,0.35);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; font-size: 1.6rem; color: var(--blue);
        }
        .confirm h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.01em; }
        .confirm p { color: var(--text-secondary); font-size: 0.93rem; font-weight: 400; margin-bottom: 6px; }
        .ref {
            display: inline-block; margin-top: 16px; padding: 8px 17px;
            background: var(--surface-2); border: 1px solid var(--border);
            border-radius: 100px; font-size: 0.78rem; font-weight: 700;
            letter-spacing: 0.06em; color: var(--text-secondary);
        }

        /* ===== FOOTER ===== */
        footer {
            flex-shrink: 0; border-top: 1px solid var(--border);
            padding: 22px 24px; text-align: center;
            font-size: 0.78rem; color: #555; font-weight: 400;
        }
        footer a { color: #555; text-decoration: none; margin: 0 10px; }
        footer a:hover { color: var(--text-secondary); }

        .hidden { display: none !important; }

        /* Honeypot: off-screen rather than display:none, which some bots skip. */
        .hp {
            position: absolute; left: -9999px; top: auto;
            width: 1px; height: 1px; overflow: hidden;
        }

        @media (max-width: 600px) {
            main { padding: 36px 20px 48px; }
            .intro h1 { font-size: 1.55rem; }
            .card { padding: 22px; }
            .row { grid-template-columns: 1fr; gap: 0; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a href="index.html" class="nav-logo"><img src="Nigh_Logo.svg" alt="Nigh"></a>
        <a class="back-link" href="index.html">&larr; Back</a>
    </div>
</nav>

<main>
    <div class="intro">
        <h1>Contact</h1>
        <p>Thanks for reaching out. Tell us how we can help and we'll make sure your message gets routed correctly.</p>
    </div>

    <!-- FORM -->
    <div class="card" id="form-card">
        <div class="row">
            <div class="field">
                <label for="first-name">First Name</label>
                <input id="first-name" type="text" placeholder="First name" autocomplete="given-name">
            </div>
            <div class="field">
                <label for="last-name">Last Name</label>
                <input id="last-name" type="text" placeholder="Last name" autocomplete="family-name">
            </div>
        </div>

        <div class="field">
            <label for="phone">Mobile Phone</label>
            <input id="phone" type="tel" placeholder="(555) 123-4567" autocomplete="tel">
        </div>

        <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="you@example.com" autocomplete="email">
        </div>

        <div class="field">
            <label for="message">How can we help?</label>
            <textarea id="message" placeholder="Tell us what's going on &mdash; in your own words."></textarea>
        </div>

        <!-- Honeypot. Hidden from people, irresistible to bots. Leave empty. -->
        <div class="hp" aria-hidden="true">
            <label for="company-website">Company website</label>
            <input id="company-website" name="company_website" type="text" tabindex="-1" autocomplete="off">
        </div>

        <p class="error-msg" id="err"></p>
        <button class="btn" id="submit">Submit Message</button>
    </div>

    <!-- CONFIRMATION -->
    <div class="card hidden" id="done-card">
        <div class="confirm">
            <div class="confirm-check">&#10003;</div>
            <h2>Thanks &mdash; we've got it.</h2>
            <p id="done-line"></p>
            <p>We'll reply to <strong id="done-email"></strong>.</p>
            <div class="ref" id="done-ref"></div>
        </div>
    </div>
</main>

<footer>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="waitlist.html">Join the list</a>
</footer>

<script>
(function () {
    'use strict';

    /* Routing runs quietly on submit so nobody has to classify themselves. */
    var ROUTES = [
        { team: 'our host team',        sla: 'a business day',
          kw: { host:4, hosting:4, venue:3, restaurant:3, bar:3, cafe:3, coffee:3, shop:2, store:2, brewery:3, gym:2, studio:3, salon:3, drop:2, drops:3, capacity:2, onboard:2, owner:2 } },
        { team: 'our partnerships team', sla: 'two to three business days',
          kw: { partner:4, partnership:5, collab:4, collaboration:4, sponsor:4, sponsorship:4, brand:3, agency:3, enterprise:3, franchise:3, reseller:3, integration:2, api:2 } },
        { team: 'our press office',     sla: 'a business day',
          kw: { press:5, media:4, journalist:5, reporter:5, interview:4, article:3, podcast:4, coverage:3, embargo:3, publication:3, magazine:3 } },
        { team: 'our access team',      sla: 'two business days',
          kw: { invite:5, invitation:5, access:4, waitlist:5, 'private beta':4, beta:3, code:3, join:3, download:3, early:2 } },
        { team: 'our support team',     sla: 'the same day',
          kw: { refund:5, cancel:4, cancelled:4, ticket:3, reservation:4, booking:4, 'no-show':4, noshow:4, 'check in':3, checkin:3, order:3, missed:3, problem:3, issue:3, broken:3, bug:4, error:3, wrong:2 } },
        { team: 'our billing team',     sla: 'a business day',
          kw: { billing:5, invoice:5, payout:5, charge:4, charged:4, payment:4, subscription:5, pricing:3, receipt:3, stripe:4, tax:3 } },
        { team: 'our trust and safety team', sla: 'a few hours',
          kw: { report:4, safety:5, unsafe:5, harass:5, abuse:5, scam:5, fraud:5, fake:4, impersonat:5, dangerous:4, threat:4, discriminat:5, violation:4 } },
        { team: 'our privacy team',     sla: 'two business days',
          kw: { privacy:5, gdpr:5, ccpa:5, 'delete my':5, 'my data':4, 'opt out':4, unsubscribe:3, consent:3, tracking:3 } },
        { team: 'the Nigh Foundation team', sla: 'a few business days',
          kw: { foundation:5, grant:4, nonprofit:4, 'non-profit':4, charity:3, donation:3, governance:4, steward:4 } },
        { team: 'our people team',      sla: 'about a week',
          kw: { job:5, jobs:5, career:5, careers:5, hiring:5, role:3, resume:5, cv:4, portfolio:3, apply:4, intern:5, internship:5, recruit:4 } },
        { team: 'our founding team',    sla: 'a few business days',
          kw: { invest:5, investor:5, investment:5, funding:5, raise:4, round:3, venture:4, vc:4, diligence:4 } },
        { team: 'the right team',       sla: 'two business days', kw: {} }
    ];

    var $ = function (id) { return document.getElementById(id); };

    /* ---- Bot defences ----------------------------------------------------
       Two cheap, invisible checks. Neither is sufficient on its own: a bot
       that posts straight to the endpoint never runs this code at all. When
       this form is wired to a real backend, keep these AND add server-side
       rate limiting plus a challenge such as Cloudflare Turnstile.
    ---------------------------------------------------------------------- */
    var MIN_FILL_MS = 3000;                 // nobody types name + email + a message faster than this
    window.__loadedAt = Date.now();         // prototype hook, also lets tests back-date the clock

    function looksLikeBot() {
        if ($('company-website').value.trim() !== '') return 'honeypot';
        if (Date.now() - window.__loadedAt < MIN_FILL_MS) return 'too-fast';
        return null;
    }

    function classify(text) {
        var t = ' ' + text.toLowerCase().replace(/[^a-z0-9\s'-]/g, ' ').replace(/\s+/g, ' ') + ' ';
        var best = null, bestScore = 0;
        ROUTES.forEach(function (r) {
            var score = 0;
            Object.keys(r.kw).forEach(function (w) {
                if (t.indexOf(' ' + w) !== -1 || t.indexOf(w + ' ') !== -1) score += r.kw[w];
            });
            if (score > bestScore) { bestScore = score; best = r; }
        });
        return (best && bestScore >= 4) ? best : ROUTES[ROUTES.length - 1];
    }

    function isEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v); }

    /* Accepts (555) 123-4567, 555-123-4567, 5551234567, +44 20 7946 0958 and
       similar. Deliberately lenient on punctuation, strict on digit count. */
    function isPhone(v) {
        if (/[a-z]/i.test(v)) return false;
        var digits = v.replace(/\D/g, '');
        return digits.length >= 10 && digits.length <= 15;
    }

    ['first-name', 'last-name', 'phone', 'email', 'message'].forEach(function (id) {
        $(id).addEventListener('input', function () { $(id).classList.remove('invalid'); });
    });

    $('submit').addEventListener('click', function () {
        var firstName = $('first-name').value.trim();
        var lastName = $('last-name').value.trim();
        var phone = $('phone').value.trim();
        var email = $('email').value.trim();
        var message = $('message').value.trim();

        var problems = [];
        if (!firstName) { $('first-name').classList.add('invalid'); problems.push('your first name'); }
        if (!lastName) { $('last-name').classList.add('invalid'); problems.push('your last name'); }
        if (!isPhone(phone)) { $('phone').classList.add('invalid'); problems.push('a valid mobile number'); }
        if (!isEmail(email)) { $('email').classList.add('invalid'); problems.push('a valid email'); }
        if (message.length < 5) { $('message').classList.add('invalid'); problems.push('a short message'); }

        if (problems.length) {
            $('err').textContent = 'Please add ' + problems.join(', ').replace(/, ([^,]*)$/, ' and $1') + '.';
            $('err').style.display = 'block';
            return;
        }
        $('err').style.display = 'none';

        var route = classify(message);
        var ref = 'NGH-' + Math.random().toString(36).slice(2, 8).toUpperCase();

        /* A suspected bot sees the ordinary confirmation but nothing is sent.
           Silence beats an error message, which just tells a bot what to fix. */
        var bot = looksLikeBot();
        window.__lastSubmission = { delivered: !bot, reason: bot || 'ok', ref: ref };

        if (!bot) {
            // TODO: wire to a real endpoint here.
            // POST { firstName, lastName, phone, email, message, route: route.team, ref }
        }

        $('done-line').textContent = 'Your message is with ' + route.team + '. They usually reply within ' + route.sla + '.';
        $('done-email').textContent = email;
        $('done-ref').textContent = 'Reference ' + ref;

        $('form-card').classList.add('hidden');
        $('done-card').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
})();
</script>

</body>
</html>
