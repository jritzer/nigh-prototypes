<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Nigh</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --blue: #0E4EF5;
            --teal: #41EFF9;
            --pink: #EC1977;
            --bg: #0B0B1A;
            --surface: #12122A;
            --surface-2: #1A1A3A;
            --border: rgba(255,255,255,0.08);
            --border-light: rgba(255,255,255,0.12);
            --text: #F5F5F7;
            --text-secondary: #A8A8C0;
            --radius-sm: 12px;
        }

        body {
            font-family: 'Poppins', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== NAV ===== */
        nav { border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .nav-inner {
            max-width: 1200px; margin: 0 auto; padding: 0 24px;
            height: 72px; display: flex; align-items: center; justify-content: space-between;
        }
        .nav-logo { display: flex; align-items: center; text-decoration: none; }
        .nav-logo img { height: 56px; width: auto; display: block; }
        .back-link {
            font-size: 0.82rem; font-weight: 600;
            color: var(--text-secondary); text-decoration: none; transition: color 0.2s;
        }
        .back-link:hover { color: var(--text); }

        /* ===== CHAT ===== */
        main {
            flex: 1; width: 100%; max-width: 640px;
            margin: 0 auto; padding: 48px 24px 32px;
            display: flex; flex-direction: column;
        }

        .intro { margin-bottom: 32px; }
        .intro h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.01em; margin-bottom: 6px; }
        .intro p { color: var(--text-secondary); font-size: 0.92rem; font-weight: 400; }

        .thread { display: flex; flex-direction: column; gap: 16px; margin-bottom: 28px; }

        .msg { max-width: 88%; font-size: 0.97rem; font-weight: 400; line-height: 1.65; }
        .msg.them { color: var(--text); align-self: flex-start; white-space: pre-line; }
        .msg.you {
            align-self: flex-end; background: var(--blue); color: #fff;
            padding: 12px 17px; border-radius: 16px 16px 4px 16px;
            font-weight: 500; white-space: pre-line;
        }

        .typing { display: inline-flex; gap: 5px; align-items: center; padding: 4px 0; }
        .typing span {
            width: 7px; height: 7px; border-radius: 50%; background: var(--text-secondary);
            animation: pulse 1.3s infinite ease-in-out;
        }
        .typing span:nth-child(2) { animation-delay: 0.18s; }
        .typing span:nth-child(3) { animation-delay: 0.36s; }
        @keyframes pulse { 0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }

        /* ===== COMPOSER ===== */
        .composer {
            display: flex; align-items: flex-end; gap: 10px;
            background: var(--surface); border: 1px solid var(--border-light);
            border-radius: 16px; padding: 12px 12px 12px 18px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .composer:focus-within { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(14,78,245,0.15); }
        .composer textarea {
            flex: 1; background: transparent; border: none; outline: none; resize: none;
            color: var(--text); font-family: inherit; font-size: 0.97rem;
            line-height: 1.6; font-weight: 400; max-height: 160px; padding: 6px 0;
        }
        .composer textarea::placeholder { color: #5A5A78; }
        .send {
            flex-shrink: 0; width: 38px; height: 38px; border-radius: 50%;
            background: var(--blue); border: none; cursor: pointer;
            color: #fff; font-size: 1rem; line-height: 1;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.2s, transform 0.2s;
        }
        .send:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.15); }
        .send:disabled { opacity: 0.3; cursor: not-allowed; }

        .composer-hint { font-size: 0.74rem; color: #6A6A85; margin-top: 10px; font-weight: 400; }

        /* ===== FOOTER ===== */
        footer {
            flex-shrink: 0; border-top: 1px solid var(--border);
            padding: 22px 24px; text-align: center;
            font-size: 0.78rem; color: #555; font-weight: 400;
        }
        footer a { color: #555; text-decoration: none; margin: 0 10px; }
        footer a:hover { color: var(--text-secondary); }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            main { padding: 32px 20px 24px; }
            .intro h1 { font-size: 1.35rem; }
            .msg { max-width: 94%; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a href="index.html" class="nav-logo"><img src="Nigh_Logo.svg" alt="Nigh"></a>
        <a class="back-link" href="index.html">&larr; Back</a>
    </div>
</nav>

<main>
    <div class="intro">
        <h1>Contact</h1>
        <p>Tell us what you need in your own words.</p>
    </div>

    <div class="thread" id="thread" aria-live="polite"></div>

    <div id="composer-wrap">
        <div class="composer">
            <label for="input" class="hidden">Your message</label>
            <textarea id="input" rows="1" placeholder="Type your message&hellip;"></textarea>
            <button class="send" id="send" disabled aria-label="Send">&uarr;</button>
        </div>
        <div class="composer-hint">Enter to send &middot; Shift + Enter for a new line</div>
    </div>
</main>

<footer>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="waitlist.html">Join the list</a>
</footer>

<script>
(function () {
    'use strict';

    var ROUTES = [
        { team: 'the host team',      sla: 'a business day',
          line: "Got it — sounds like you want to run drops.",
          kw: { host:4, hosting:4, venue:3, restaurant:3, bar:3, cafe:3, coffee:3, shop:2, store:2, brewery:3, gym:2, studio:3, salon:3, drop:2, drops:3, capacity:2, onboard:2, owner:2 } },
        { team: 'our partnerships team', sla: 'two or three days',
          line: "Thanks — this reads like a partnership question.",
          kw: { partner:4, partnership:5, collab:4, collaboration:4, sponsor:4, sponsorship:4, brand:3, agency:3, enterprise:3, franchise:3, reseller:3, integration:2, api:2 } },
        { team: 'our press office',   sla: 'a business day',
          line: "Thanks — press inquiry noted.",
          kw: { press:5, media:4, journalist:5, reporter:5, interview:4, article:3, podcast:4, coverage:3, embargo:3, publication:3, magazine:3 } },
        { team: 'the access team',    sla: 'a couple of days',
          line: "Nigh is invite-only during the private beta, so I'll pass this along.",
          kw: { invite:5, invitation:5, access:4, waitlist:5, 'private beta':4, beta:3, code:3, join:3, download:3, early:2 } },
        { team: 'support',            sla: 'the same day',
          line: "Sorry about that — sounds like something went wrong with a reservation.",
          kw: { refund:5, cancel:4, cancelled:4, ticket:3, reservation:4, booking:4, 'no-show':4, noshow:4, 'check in':3, checkin:3, order:3, missed:3, problem:3, issue:3, broken:3, bug:4, error:3, wrong:2 } },
        { team: 'billing',            sla: 'a business day',
          line: "Got it — that's a billing question.",
          kw: { billing:5, invoice:5, payout:5, charge:4, charged:4, payment:4, subscription:5, pricing:3, receipt:3, stripe:4, tax:3 } },
        { team: 'trust and safety',   sla: 'a few hours',
          line: "Thank you for reporting this — we take it seriously. If anyone is in immediate danger, please contact local emergency services rather than waiting on us.",
          kw: { report:4, safety:5, unsafe:5, harass:5, abuse:5, scam:5, fraud:5, fake:4, impersonat:5, dangerous:4, threat:4, discriminat:5, violation:4 } },
        { team: 'our privacy team',   sla: 'a couple of days',
          line: "Understood — that's a privacy request.",
          kw: { privacy:5, gdpr:5, ccpa:5, 'delete my':5, 'my data':4, 'opt out':4, unsubscribe:3, consent:3, tracking:3 } },
        { team: 'the foundation team', sla: 'a few days',
          line: "Got it — that's one for the Nigh Foundation.",
          kw: { foundation:5, grant:4, nonprofit:4, 'non-profit':4, charity:3, donation:3, governance:4, steward:4 } },
        { team: 'our people team',    sla: 'about a week',
          line: "Thanks for your interest in working with us.",
          kw: { job:5, jobs:5, career:5, careers:5, hiring:5, role:3, resume:5, cv:4, portfolio:3, apply:4, intern:5, internship:5, recruit:4 } },
        { team: 'the founders',       sla: 'a few days',
          line: "Thanks — I'll pass this straight to the founding team.",
          kw: { invest:5, investor:5, investment:5, funding:5, raise:4, round:3, venture:4, vc:4, diligence:4 } },
        { team: 'our general queue',  sla: 'a couple of days',
          line: "Thanks — I'll make sure the right person sees this.",
          kw: {} }
    ];

    var thread = document.getElementById('thread');
    var input = document.getElementById('input');
    var send = document.getElementById('send');
    var composer = document.getElementById('composer-wrap');

    var stage = 'message';   // message -> email -> done
    var route = null;

    function classify(text) {
        var t = ' ' + text.toLowerCase().replace(/[^a-z0-9\s'-]/g, ' ').replace(/\s+/g, ' ') + ' ';
        var best = null, bestScore = 0;
        ROUTES.forEach(function (r) {
            var score = 0;
            Object.keys(r.kw).forEach(function (w) {
                if (t.indexOf(' ' + w) !== -1 || t.indexOf(w + ' ') !== -1) score += r.kw[w];
            });
            if (score > bestScore) { bestScore = score; best = r; }
        });
        return (best && bestScore >= 4) ? best : ROUTES[ROUTES.length - 1];
    }

    function keepInView(el) {
        if (el && typeof el.scrollIntoView === 'function') el.scrollIntoView({ block: 'nearest' });
    }

    function bubble(who, text) {
        var el = document.createElement('div');
        el.className = 'msg ' + who;
        el.textContent = text;
        thread.appendChild(el);
        keepInView(el);
        return el;
    }

    function reply(text, after) {
        var t = document.createElement('div');
        t.className = 'msg them';
        t.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
        thread.appendChild(t);
        keepInView(t);
        window.setTimeout(function () {
            t.textContent = text;
            keepInView(t);
            if (after) after();
        }, 700);
    }

    function isEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v); }

    function grow() {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 160) + 'px';
    }

    function sync() { send.disabled = input.value.trim().length === 0; }

    function submit() {
        var text = input.value.trim();
        if (!text) return;

        bubble('you', text);
        input.value = ''; grow(); sync();

        if (stage === 'message') {
            route = classify(text);
            stage = 'email';
            reply(route.line + " I'll get this to " + route.team + ".\n\nWhat's the best email to reply to?");
            return;
        }

        if (stage === 'email') {
            if (!isEmail(text)) {
                reply("That doesn't look like an email address — mind trying again?");
                return;
            }
            stage = 'done';
            var ref = 'NGH-' + Math.random().toString(36).slice(2, 8).toUpperCase();
            reply("Sent. " + route.team.charAt(0).toUpperCase() + route.team.slice(1) +
                  " usually replies within " + route.sla + ".\n\nYour reference is " + ref + ".", function () {
                composer.classList.add('hidden');
            });
        }
    }

    input.addEventListener('input', function () { grow(); sync(); });
    input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
    });
    send.addEventListener('click', submit);

    reply("Hey — what do you need? Hosting, press, access, a problem with a reservation, anything at all.");
    sync();
})();
</script>

</body>
</html>
