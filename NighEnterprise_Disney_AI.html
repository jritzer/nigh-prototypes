function go(page, extra) { Object.assign(S, { page }, extra||{}); render(); }
function ss(updates) { Object.assign(S, updates); render(); }
function resortById(id) { return RESORTS.find(r=>r.id===id); }
function parkById(id) { return PARKS.find(p=>p.id===id); }

function filteredLocations() {
  return LOCATIONS.filter(l => {
    if (S.resortFilter !== 'all' && l.resort !== S.resortFilter) return false;
    if (S.parkFilter !== 'all' && l.park !== S.parkFilter) return false;
    return true;
  });
}

function badge(status) {
  const map = {
    live:       ['#10b981','#d1fae5','Live'],
    scheduled:  ['#3b82f6','#dbeafe','Scheduled'],
    ended:      ['#6b7280','#f3f4f6','Ended'],
    upcoming:   ['#8b5cf6','#ede9fe','Upcoming'],
    active:     ['#10b981','#d1fae5','Active'],
    inactive:   ['#ef4444','#fee2e2','Inactive'],
    push:       ['#7c3aed','#ede9fe','Resort Push'],
    local:      ['#6b7280','#f3f4f6','Local'],
    dining:     ['#7c3aed','#ede9fe','Dining'],
    merch:      ['#1d4ed8','#dbeafe','Merch'],
    experience: ['#065f46','#d1fae5','Experience'],
    character:  ['#be185d','#fce7f3','Character'],
    vip:        ['#0f172a','#f1f5f9','VIP'],
    'f&b':      ['#92400e','#fef3c7','F&B'],
  };
  const [color,bg,label] = map[status]||['#6b7280','#f3f4f6',status];
  return `<span style="background:${bg};color:${color};font-size:0.68rem;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap;letter-spacing:0.02em;">${label}</span>`;
}

function vendorBadge(type) {
  if (type === 'disney-owned') return `<span style="background:#dbeafe;color:#1d4ed8;font-size:0.65rem;font-weight:800;padding:2px 8px;border-radius:20px;white-space:nowrap;">Disney</span>`;
  if (type === '3rd-party')   return `<span style="background:#ffedd5;color:#ea580c;font-size:0.65rem;font-weight:800;padding:2px 8px;border-radius:20px;white-space:nowrap;">3rd Party</span>`;
  return '';
}

function pct(n,d) { return d ? Math.round(n/d*100) : 0; }
function fmtMoney(n) { return n>=1000 ? '$'+(n/1000).toFixed(1)+'k' : '$'+n; }
function fmtNum(n) { return n>=1000 ? (n/1000).toFixed(1)+'k' : String(n); }
function showColor(r) { return r>=85?'#10b981':r>=75?'#f59e0b':'#ef4444'; }

function infoRow(label, value) {
  return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:0.82rem;"><span style="color:#64748b;">${label}</span><span style="font-weight:700;color:#0f172a;">${value}</span></div>`;
}

function layout() {
  return `
    <div style="display:flex;height:100vh;overflow:hidden;">
      ${sidebar()}
      <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
        ${topbar()}
        <main style="flex:1;overflow-y:auto;padding:28px 32px;background:#f0f2f5;">
          ${renderPage()}
        </main>
      </div>
    </div>
    ${S.pushModal ? pushModal() : ''}
    ${S.locationDetail ? locationDetail() : ''}
  `;
}

// ─────────────────────────────────────────────────────────────
// PAGE ROUTER
// ─────────────────────────────────────────────────────────────
function renderPage() {
  switch(S.page) {
    case 'dashboard':   return rDashboard();
    case 'locations':   return rLocations();
    case 'drops':       return rDrops();
    case 'collections': return rCollections();
    case 'customers':   return rCustomers();
    case 'analytics':   return rAnalytics();
    case 'users':       return rUsers();
    case 'billing':     return rBilling();
    case 'settings':    return rSettings();
    default: return rDashboard();
  }
}

// ─────────────────────────────────────────────────────────────
// DASHBOARD
// ─────────────────────────────────────────────────────────────
function rDashboard() {
  const totalCI   = LOCATIONS.reduce((a,l)=>a+l.mtdCheckins,0);
  const totalDrops= LOCATIONS.reduce((a,l)=>a+l.mtdDrops,0);
  const totalRev  = LOCATIONS.reduce((a,l)=>a+l.mtdRevenue,0);
  const avgShow   = Math.round(LOCATIONS.reduce((a,l)=>a+l.showRate,0)/LOCATIONS.length);
  const liveNow   = LOCATIONS.filter(l=>l.activeDrop).length;
  const activeCount = LOCATIONS.filter(l=>l.status==='active').length;

  const parkData = PARKS.map(p=>{

  const maxCI = Math.max(...parkData.map(p=>p.ci));
  const topLocs = [...LOCATIONS].sort((a,b)=>b.mtdCheckins-a.mtdCheckins).slice(0,4);

      ${kpi('Revenue MTD',     fmtMoney(totalRev),  'paid drops only',     ic('dollar',16),'#0ea5e9')}

        <div style="font-weight:800;font-size:0.92rem;margin-bottom:3px;">Park Performance</div>
        <div style="font-size:0.75rem;color:#64748b;margin-bottom:18px;">Month-to-date check-ins by park</div>
        ${parkData.map(p=>`
          <div style="margin-bottom:13px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">

                <div style="width:9px;height:9px;border-radius:50%;background:${p.color};flex-shrink:0;"></div>

                <span style="font-size:0.7rem;color:#94a3b8;">${p.count} loc${p.count!==1?'s':''}</span>
              </div>
              <div style="display:flex;align-items:center;gap:14px;">
                <span style="font-size:0.75rem;color:#64748b;">${p.show}% show</span>
                <span style="font-weight:800;font-size:0.88rem;">${fmtNum(p.ci)} check-ins</span>
              </div>
            </div>
            <div style="background:#f1f5f9;border-radius:4px;height:6px;overflow:hidden;">
              <div style="background:${p.color};height:100%;border-radius:4px;width:${p.ci>0?Math.round(p.ci/maxCI*100):0}%;"></div>
            </div>
          </div>
        `).join('')}

        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid #f1f5f9;">
          ${parkData.map(p=>`
            <div onclick="go('locations',{resortFilter:p.resort,parkFilter:'${p.id}',hierarchyView:'location'})" style="background:${p.color}10;border:1px solid ${p.color}30;border-radius:10px;padding:10px 8px;text-align:center;cursor:pointer;">
              <div style="font-size:0.68rem;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;color:${p.color};margin-bottom:4px;">${p.abbr}</div>
              <div style="font-weight:900;font-size:1rem;">${p.count}</div>
              <div style="font-size:0.62rem;color:#94a3b8;">loc${p.count!==1?'s':''}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:14px;">
        <div style="background:#fff;border-radius:16px;border:1px solid #e5e7eb;padding:20px;flex:1;">
          <div style="font-weight:800;font-size:0.88rem;margin-bottom:3px;">Top Locations</div>
          <div style="font-size:0.72rem;color:#64748b;margin-bottom:14px;">By check-ins this month</div>
          ${topLocs.map((l,i)=>{

              <div onclick="ss({locationDetail:'${l.id}'})" style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:${i<3?'1px solid #f8f9fb':''};cursor:pointer;">
                <div style="width:24px;height:24px;background:${i===0?'#fef3c7':i===1?'#f1f5f9':'#f8f9fb'};color:${i===0?'#92400e':'#64748b'};border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.72rem;flex-shrink:0;">#${i+1}</div>
                <div style="flex:1;min-width:0;">
                  <div style="font-weight:700;font-size:0.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${l.name}</div>

                <div style="text-align:right;flex-shrink:0;">

                </div>
              </div>`;
          }).join('')}
          <div onclick="go('analytics')" style="text-align:center;margin-top:10px;font-size:0.75rem;color:#6366f1;cursor:pointer;font-weight:700;">Full leaderboard →</div>
        </div>

        ${attnLocs.length ? `
          <div style="background:#fff;border-radius:16px;border:1px solid #fca5a5;padding:18px;">
            <div style="font-weight:800;font-size:0.85rem;color:#dc2626;margin-bottom:10px;">⚠ Needs Attention</div>
            ${attnLocs.map(l=>{
              const park = parkById(l.park);
              return `
                <div onclick="ss({locationDetail:'${l.id}'})" style="display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer;border-bottom:1px solid #fef2f2;">
                  <div style="flex:1;">
                    <div style="font-weight:700;font-size:0.8rem;">${l.name}</div>
                    <div style="font-size:0.68rem;color:#94a3b8;">${park?.abbr} · ${l.land}</div>
                  </div>
                  <div style="font-size:0.72rem;font-weight:700;color:#ef4444;">${l.status==='inactive'?'Inactive':l.showRate+'% show'}</div>

      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 320px;gap:18px;">
      <div style="background:#fff;border-radius:16px;border:1px solid #e5e7eb;padding:22px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <div>
            <div style="font-weight:800;font-size:0.92rem;">Recent Resort Drops</div>
            <div style="font-size:0.75rem;color:#64748b;">Pushed from resort to locations</div>
          </div>
          <span onclick="go('drops')" style="font-size:0.75rem;color:#6366f1;cursor:pointer;font-weight:700;">View all →</span>
        </div>
        ${CORP_DROPS.slice(0,5).map(d=>`
          <div style="display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #f8f9fb;">
            <div style="flex:1;min-width:0;">
              <div style="font-weight:700;font-size:0.83rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${d.title}</div>
              <div style="font-size:0.7rem;color:#94a3b8;">${d.scopeDetail} · ${d.date}</div>
            </div>
            <div style="flex-shrink:0;">${badge(d.status)}</div>
            <div style="text-align:right;flex-shrink:0;min-width:48px;">
              <div style="font-weight:800;font-size:0.88rem;">${d.status==='ended'?d.totalCI:d.totalRes}</div>
              <div style="font-size:0.65rem;color:#94a3b8;">${d.status==='ended'?'checked in':'reserved'}</div>
            </div>
          </div>
        `).join('')}
      </div>

      <div style="background:#fff;border-radius:16px;border:1px solid #e5e7eb;padding:22px;">
        <div style="font-weight:800;font-size:0.88rem;margin-bottom:3px;">Location Status</div>
        <div style="font-size:0.72rem;color:#64748b;margin-bottom:16px;">Across all 22 locations</div>
        ${statusBar('Active + Live Drop', LOCATIONS.filter(l=>l.status==='active'&&l.activeDrop).length, 22, '#10b981')}
        ${statusBar('Active · No Drop',   LOCATIONS.filter(l=>l.status==='active'&&!l.activeDrop).length, 22, '#6366f1')}
        ${statusBar('3rd Party Venues',   LOCATIONS.filter(l=>l.vendorType==='3rd-party').length, 22, '#f97316')}
        ${statusBar('Inactive',           LOCATIONS.filter(l=>l.status==='inactive').length, 22, '#ef4444')}

        <div style="margin-top:18px;padding-top:14px;border-top:1px solid #f1f5f9;">
          <div style="font-size:0.72rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">Live right now</div>
          ${LOCATIONS.filter(l=>l.activeDrop).map(l=>{
            const park = parkById(l.park);
            return `
              <div onclick="ss({locationDetail:'${l.id}'})" style="display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;">

function kpi(label, value, sub, icon, color) {
  return `
    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:18px 20px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div style="font-size:0.72rem;font-weight:700;color:#64748b;">${label}</div>
        <div style="width:30px;height:30px;background:${color}18;border-radius:8px;display:flex;align-items:center;justify-content:center;color:${color};">${icon}</div>
      </div>
      <div style="font-size:1.6rem;font-weight:900;letter-spacing:-0.03em;color:#0f172a;margin-bottom:3px;">${value}</div>
      <div style="font-size:0.68rem;color:#94a3b8;">${sub}</div>
    </div>
  `;
}

function statusBar(label, count, total, color) {
  return `
    <div style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
        <span style="font-size:0.78rem;font-weight:600;">${label}</span>
        <span style="font-size:0.78rem;font-weight:800;color:${color};">${count}</span>
      </div>
      <div style="background:#f1f5f9;border-radius:4px;height:6px;overflow:hidden;">
        <div style="background:${color};height:100%;width:${pct(count,total)}%;border-radius:4px;"></div>
      </div>
    </div>
  `;
}

function miniStat(label, value, color) {
  return `<div style="background:#f8f9fb;border:1px solid #e5e7eb;border-radius:10px;padding:12px;text-align:center;"><div style="font-size:0.65rem;color:#94a3b8;margin-bottom:4px;">${label}</div><div style="font-weight:900;font-size:1.05rem;${color?'color:'+color+';':''}">${value}</div></div>`;
}

// ─────────────────────────────────────────────────────────────
// LOCATIONS
// ─────────────────────────────────────────────────────────────
function rLocations() {
  if (S.hierarchyView === 'resort')   return rLocByResort();
  if (S.hierarchyView === 'park')     return rLocByPark();
  return rLocByLocation();
}

function filterBar() {
  const resortParks = S.resortFilter !== 'all' ? PARKS.filter(p=>p.resort===S.resortFilter) : [];
  return `
    <div style="display:flex;gap:10px;margin-bottom:20px;align-items:center;flex-wrap:wrap;">
      <select onchange="ss({resortFilter:this.value,parkFilter:'all'})" style="border:1px solid #e5e7eb;border-radius:8px;padding:8px 28px 8px 12px;font-size:0.82rem;font-weight:600;background:#fff;cursor:pointer;">
        <option value="all">All Resorts</option>
        ${RESORTS.map(r=>`<option value="${r.id}" ${S.resortFilter===r.id?'selected':''}>${r.name}</option>`).join('')}
      </select>
      ${S.resortFilter!=='all'?`
        <select onchange="ss({parkFilter:this.value})" style="border:1px solid #e5e7eb;border-radius:8px;padding:8px 28px 8px 12px;font-size:0.82rem;font-weight:600;background:#fff;cursor:pointer;">
          <option value="all">All Parks</option>
          ${resortParks.map(p=>`<option value="${p.id}" ${S.parkFilter===p.id?'selected':''}>${p.name}</option>`).join('')}
        </select>
      `:''}
      <div style="margin-left:auto;font-size:0.8rem;color:#64748b;">${filteredLocations().length} location${filteredLocations().length!==1?'s':''}</div>
      <button onclick="ss({pushModal:true,pushStep:1})" style="background:#0f172a;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-weight:700;font-size:0.78rem;cursor:pointer;">⚡ Create Drop</button>
    </div>
  `;
}

function rLocByResort() {
  const resorts = RESORTS.filter(r => S.resortFilter==='all' || r.id===S.resortFilter);
  return filterBar() + resorts.map(r=>{
    const parks = PARKS.filter(p=>p.resort===r.id && (S.parkFilter==='all'||p.id===S.parkFilter));
    const locs  = LOCATIONS.filter(l=>l.resort===r.id && (S.parkFilter==='all'||l.park===S.parkFilter));
    if (!locs.length) return '';
    const ci   = locs.reduce((a,l)=>a+l.mtdCheckins,0);
    const show = Math.round(locs.reduce((a,l)=>a+l.showRate,0)/locs.length);
    return `
      <div style="margin-bottom:22px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
          <div style="width:10px;height:10px;border-radius:50%;background:${r.color};flex-shrink:0;"></div>
          <span style="font-weight:800;font-size:1rem;">${r.name}</span>
          <span style="font-size:0.75rem;color:#94a3b8;">${locs.length} locations · ${fmtNum(ci)} check-ins · ${show}% avg show</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;">
          ${locs.map(l=>locationCard(l)).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function rLocByPark() {
  const parks = PARKS.filter(p=>(S.resortFilter==='all'||p.resort===S.resortFilter)&&(S.parkFilter==='all'||p.id===S.parkFilter));
  return filterBar() + parks.map(p=>{
    const locs = LOCATIONS.filter(l=>l.park===p.id);
    if (!locs.length) return '';
    const r  = resortById(p.resort);
    const ci = locs.reduce((a,l)=>a+l.mtdCheckins,0);
    return `
      <div style="margin-bottom:22px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
          <span style="background:${r?.color}18;color:${r?.color};font-size:0.7rem;font-weight:800;padding:3px 10px;border-radius:20px;">${r?.abbr}</span>
          <span style="font-weight:800;font-size:0.95rem;">${p.name}</span>
          <span style="font-size:0.72rem;color:#94a3b8;">${locs.length} locations · ${fmtNum(ci)} check-ins</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;">
          ${locs.map(l=>locationCard(l)).join('')}

function rCustomers() {
  const custSort   = S.custSort   || 'checkins';

  const custResort = S.custResort || 'all';

  let list = [...CUSTOMER_DATA];
  if (custFilter !== 'all') list = list.filter(c=>c.status===custFilter);
  if (custResort !== 'all') list = list.filter(c=>c.resort===custResort);
  list.sort((a,b)=>{
    if (custSort==='drops')    return b.drops-a.drops;
    if (custSort==='checkins') return b.checkins-a.checkins;
    if (custSort==='spend')    return b.totalSpend-a.totalSpend;
    if (custSort==='showRate') return (b.checkins/b.drops)-(a.checkins/a.drops);
    return 0;
  });

  const totalUnique = CUSTOMER_DATA.length;
  const totalCI     = CUSTOMER_DATA.reduce((a,c)=>a+c.checkins,0);
  const avgDrops    = (CUSTOMER_DATA.reduce((a,c)=>a+c.drops,0)/CUSTOMER_DATA.length).toFixed(1);
  const avgShow     = Math.round(CUSTOMER_DATA.reduce((a,c)=>a+(c.checkins/c.drops),0)/CUSTOMER_DATA.length*100);

              <div style="font-weight:800;font-size:0.82rem;color:#6b21a8;margin-bottom:2px;">${col.venueName} — ${col.venueType}</div>
              <div style="font-size:0.74rem;color:#7e22ce;line-height:1.5;">This is a Venue Collection. Participating businesses are independent Nigh accounts invited by the venue operator. Disney Parks sees aggregate participation metrics only — individual guest data remains private to each business.</div>

        ${col.geoFence ? `
          <div style="background:#fefce8;border:1px solid #fde68a;border-radius:12px;padding:16px 18px;margin-bottom:20px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
              <div style="display:flex;align-items:center;gap:8px;">
                <span style="color:#d97706;">${ic('map',18)}</span>

            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">
              ${infoRow('Coverage Tier', tierLabel)}

            </div>
            <div style="background:#fff8e1;border-radius:8px;padding:10px 12px;">
              <div style="font-size:0.62rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:#92400e;margin-bottom:4px;">Guest-Facing Message</div>

            <div style="background:linear-gradient(90deg,#6366f1,#8b5cf6);height:100%;border-radius:6px;width:100%;"></div>

        </div>

        <div style="font-size:0.75rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:#94a3b8;margin-bottom:10px;">${col.type==='venue' ? 'Business Participation' : 'Location Participation'}</div>
        <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
          ${[['confirmed','Confirmed','#10b981'],['pending','Pending','#f59e0b'],['declined','Declined','#ef4444'],['live','Live Now','#10b981'],['ended','Ended','#6b7280']].map(([s,label,color])=>{
            const n = col.participation.filter(p=>p.status===s).length;
            return n>0 ? `<span style="background:${statusBg[s]||'#f3f4f6'};color:${color};font-size:0.72rem;font-weight:800;padding:4px 10px;border-radius:20px;">${label}: ${n}</span>` : '';

        </div>

        <div style="background:#f8f9fb;border-radius:12px;overflow:hidden;margin-bottom:22px;">
          <table>
            <thead>
              <tr style="background:#f1f5f9;border-bottom:1px solid #e5e7eb;">
                ${col.type==='venue'
                  ? ['Business','Category','Status','Drop Title','Cap','Res','CI','Show'].map((h,i)=>`<th style="padding:9px 12px;text-align:${i>3?'right':'left'};font-size:0.62rem;font-weight:800;text-transform:uppercase;letter-spacing:0.07em;color:#64748b;white-space:nowrap;">${h}</th>`).join('')
                  : ['Location','Park','Status','Drop Title','Cap','Res','CI','Show'].map((h,i)=>`<th style="padding:9px 12px;text-align:${i>3?'right':'left'};font-size:0.62rem;font-weight:800;text-transform:uppercase;letter-spacing:0.07em;color:#64748b;white-space:nowrap;">${h}</th>`).join('')
                }
              </tr>
            </thead>
            <tbody>
              ${col.participation.map((p,i)=>{
                const sr = p.res>0&&p.ci>0 ? pct(p.ci,p.res) : null;
                if (col.type === 'venue') {
                  return `
                    <tr style="border-bottom:1px solid #e5e7eb;background:${i%2?'#fafafa':'#fff'}">
                      <td style="padding:10px 12px;"><div style="font-weight:700;font-size:0.8rem;">${p.bizName}</div><div style="font-size:0.65rem;color:#9333ea;">${p.bizType}</div></td>
                      <td style="padding:10px 12px;font-size:0.72rem;color:#475569;">${p.bizCategory}</td>
                      <td style="padding:10px 12px;"><span style="background:${statusBg[p.status]||'#f3f4f6'};color:${statusColors[p.status]||'#6b7280'};font-size:0.65rem;font-weight:800;padding:2px 8px;border-radius:20px;white-space:nowrap;">${p.status.charAt(0).toUpperCase()+p.status.slice(1)}</span></td>
                      <td style="padding:10px 12px;font-size:0.78rem;font-weight:600;color:${p.dropTitle?'#0f172a':'#94a3b8'};font-style:${p.dropTitle?'normal':'italic'};">${p.dropTitle||'Not yet set'}</td>
                      <td style="padding:10px 12px;text-align:right;font-size:0.8rem;font-weight:700;">${p.cap||'—'}</td>
                      <td style="padding:10px 12px;text-align:right;font-size:0.8rem;font-weight:700;">${p.res||'—'}</td>
                      <td style="padding:10px 12px;text-align:right;font-size:0.8rem;font-weight:700;">${p.ci||'—'}</td>
                      <td style="padding:10px 12px;text-align:right;font-size:0.8rem;font-weight:800;color:${sr?showColor(sr):'#94a3b8'};">${sr?sr+'%':'—'}</td>
                    </tr>`;
                } else {
                  const loc  = LOCATIONS.find(l=>l.id===p.locId);
                  const park = loc ? parkById(loc.park) : null;
                  return `
                    <tr style="border-bottom:1px solid #e5e7eb;background:${i%2?'#fafafa':'#fff'}">
                      <td style="padding:10px 12px;"><div style="font-weight:700;font-size:0.8rem;">${loc?.name||p.locId}</div><div style="font-size:0.65rem;color:#94a3b8;">${loc?.land}</div></td>
                      <td style="padding:10px 12px;"><span style="background:${park?.color||'#e5e7eb'}15;color:${park?.color||'#64748b'};font-size:0.65rem;font-weight:800;padding:2px 8px;border-radius:20px;">${park?.abbr||'—'}</span></td>
                      <td style="padding:10px 12px;"><span style="background:${statusBg[p.status]||'#f3f4f6'};color:${statusColors[p.status]||'#6b7280'};font-size:0.65rem;font-weight:800;padding:2px 8px;border-radius:20px;white-space:nowrap;">${p.status.charAt(0).toUpperCase()+p.status.slice(1)}</span></td>
                      <td style="padding:10px 12px;font-size:0.78rem;font-weight:600;color:${p.dropTitle?'#0f172a':'#94a3b8'};font-style:${p.dropTitle?'normal':'italic'};">${p.dropTitle||'Not yet set'}</td>
                      <td style="padding:10px 12px;text-align:right;font-size:0.8rem;font-weight:700;">${p.cap||'—'}</td>
                      <td style="padding:10px 12px;text-align:right;font-size:0.8rem;font-weight:700;">${p.res||'—'}</td>
                      <td style="padding:10px 12px;text-align:right;font-size:0.8rem;font-weight:700;">${p.ci||'—'}</td>
                      <td style="padding:10px 12px;text-align:right;font-size:0.8rem;font-weight:800;color:${sr?showColor(sr):'#94a3b8'};">${sr?sr+'%':'—'}</td>
                    </tr>`;
                }
              }).join('')}
            </tbody>
          </table>
        </div>
        ${col.type==='venue' ? `
          <div style="background:#f8f9fb;border:1px solid #e5e7eb;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:0.73rem;color:#64748b;line-height:1.6;">
            <span style="font-weight:800;color:#0f172a;">🔒 Data Privacy Note:</span> Each participating business owns its own guest data. Venue aggregate metrics are visible above, but individual guest identities and contact info are not shared with the venue or other participants.
          </div>
        ` : ''}
        <div style="display:flex;gap:10px;">
          ${col.status!=='ended' && col.type!=='venue' ? `<button style="flex:1;background:#0f172a;color:#fff;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;">Send Reminder to Pending</button>` : ''}
          ${col.status!=='ended' && col.type==='venue' ? `<button style="flex:1;background:#9333ea;color:#fff;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;">Invite More Businesses</button>` : ''}
          <button onclick="ss({collectionDetail:null})" style="flex:1;background:#f1f5f9;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;color:#475569;">Close</button>
        </div>
      </div>
    </div>
  `;
}

// ─────────────────────────────────────────────────────────────
// ANALYTICS
// ─────────────────────────────────────────────────────────────
function rAnalytics() {
  const sorted = [...LOCATIONS].sort((a,b)=>{
    if (S.analyticsSort==='checkins') return b.mtdCheckins-a.mtdCheckins;
    if (S.analyticsSort==='showRate') return b.showRate-a.showRate;
    if (S.analyticsSort==='revenue')  return b.mtdRevenue-a.mtdRevenue;
    return b.mtdDrops-a.mtdDrops;
  });
  if (S.hierarchyView==='resort') return rAnalyticsByResort();
  if (S.hierarchyView==='park')   return rAnalyticsByPark();
  return `
    <div style="display:grid;grid-template-columns:1fr 280px;gap:18px;">
      <div style="background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:22px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
          <div>
            <div style="font-weight:800;font-size:0.92rem;">Location Leaderboard</div>
            <div style="font-size:0.75rem;color:#64748b;">Month-to-date — all 22 locations</div>
          </div>
          <select onchange="ss({analyticsSort:this.value})" style="border:1px solid #e5e7eb;border-radius:8px;padding:6px 28px 6px 10px;font-size:0.78rem;font-weight:600;background:#fff;cursor:pointer;">
            <option value="checkins">Sort: Check-ins</option>
            <option value="showRate">Sort: Show Rate</option>
            <option value="revenue">Sort: Revenue</option>
            <option value="drops">Sort: Drops</option>
          </select>
        </div>
        <table style="width:100%;border-collapse:collapse;">
          <thead>
            <tr style="border-bottom:2px solid #e5e7eb;">
              ${['#','Location','Park','Drops','Check-ins','Show Rate','Revenue'].map((h,i)=>`
                <th style="padding:8px ${i>0?'10px':'0'};text-align:${i>2?'right':'left'};font-size:0.65rem;font-weight:800;text-transform:uppercase;color:#94a3b8;white-space:nowrap;">${h}</th>
              `).join('')}
            </tr>
          </thead>
          <tbody>
            ${sorted.map((l,i)=>{
              const park = parkById(l.park);
              return `
                <tr style="border-bottom:1px solid #f8f9fb;" onmouseover="this.style.background='#f8f9fb'" onmouseout="this.style.background='transparent'">
                  <td style="padding:9px 0;font-weight:900;font-size:0.8rem;color:${i===0?'#d97706':i===1?'#9ca3af':i===2?'#cd7c2f':'#cbd5e1'};">${i+1}</td>
                  <td style="padding:9px 10px;">
                    <div style="font-weight:700;font-size:0.83rem;">${l.name}</div>
                    <div style="font-size:0.68rem;color:#94a3b8;">${l.land}</div>
                  </td>
                  <td style="padding:9px 10px;"><span style="background:${park?.color}15;color:${park?.color};font-size:0.65rem;font-weight:800;padding:2px 7px;border-radius:20px;">${park?.abbr}</span></td>
                  <td style="padding:9px 10px;text-align:right;font-size:0.83rem;font-weight:600;">${l.mtdDrops}</td>
                  <td style="padding:9px 10px;text-align:right;font-size:0.83rem;font-weight:800;">${fmtNum(l.mtdCheckins)}</td>
                  <td style="padding:9px 10px;text-align:right;font-size:0.83rem;font-weight:800;color:${showColor(l.showRate)};">${l.showRate}%</td>
                  <td style="padding:9px 10px;text-align:right;font-size:0.83rem;font-weight:600;">${fmtMoney(l.mtdRevenue)}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        ${PARKS.map(p=>{
          const ls = LOCATIONS.filter(l=>l.park===p.id);
          if (!ls.length) return '';
          const ci    = ls.reduce((a,l)=>a+l.mtdCheckins,0);
          const drops = ls.reduce((a,l)=>a+l.mtdDrops,0);
          const show  = Math.round(ls.reduce((a,l)=>a+l.showRate,0)/ls.length);
          const rev   = ls.reduce((a,l)=>a+l.mtdRevenue,0);
          return `
            <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px;">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
                <div style="width:10px;height:10px;border-radius:50%;background:${p.color};flex-shrink:0;"></div>
                <span style="font-weight:800;font-size:0.82rem;">${p.name}</span>
                <span style="font-size:0.68rem;color:#94a3b8;margin-left:auto;">${ls.length} locs</span>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;">
                <div><div style="font-size:0.62rem;color:#94a3b8;">Check-ins</div><div style="font-weight:900;font-size:0.9rem;">${fmtNum(ci)}</div></div>
                <div><div style="font-size:0.62rem;color:#94a3b8;">Show Rate</div><div style="font-weight:900;font-size:0.9rem;color:${showColor(show)};">${show}%</div></div>
                <div><div style="font-size:0.62rem;color:#94a3b8;">Drops</div><div style="font-weight:900;font-size:0.9rem;">${drops}</div></div>
                <div><div style="font-size:0.62rem;color:#94a3b8;">Revenue</div><div style="font-weight:900;font-size:0.9rem;">${fmtMoney(rev)}</div></div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function rAnalyticsByResort() {
  const resData = RESORTS.map(r=>{
    const ls = LOCATIONS.filter(l=>l.resort===r.id);
    return { ...r, ls, ci:ls.reduce((a,l)=>a+l.mtdCheckins,0), drops:ls.reduce((a,l)=>a+l.mtdDrops,0), show:ls.length?Math.round(ls.reduce((a,l)=>a+l.showRate,0)/ls.length):0, rev:ls.reduce((a,l)=>a+l.mtdRevenue,0) };
  }).sort((a,b)=>b.ci-a.ci);
  return `
    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:22px;">
      <div style="font-weight:800;font-size:0.92rem;margin-bottom:3px;">Resort Comparison</div>
      <div style="font-size:0.75rem;color:#64748b;margin-bottom:18px;">Month-to-date performance across 2 resorts</div>
      <table style="width:100%;border-collapse:collapse;">
        <thead>
          <tr style="border-bottom:2px solid #e5e7eb;">
            ${['Resort','Locations','Parks','Drops MTD','Check-ins MTD','Avg Show Rate','Revenue MTD','Top Location'].map((h,i)=>`
              <th style="padding:8px 12px;text-align:${i>2?'right':'left'};font-size:0.65rem;font-weight:800;text-transform:uppercase;color:#94a3b8;white-space:nowrap;">${h}</th>
            `).join('')}
          </tr>
        </thead>
        <tbody>
          ${resData.map(r=>{
            const top = r.ls.slice().sort((a,b)=>b.mtdCheckins-a.mtdCheckins)[0];
            const parkCount = PARKS.filter(p=>p.resort===r.id).length;
            return `
              <tr style="border-bottom:1px solid #f8f9fb;">
                <td style="padding:14px 12px;"><div style="display:flex;align-items:center;gap:8px;"><div style="width:9px;height:9px;border-radius:50%;background:${r.color};"></div><span style="font-weight:800;font-size:0.88rem;">${r.name}</span><span style="background:${r.color}15;color:${r.color};font-size:0.65rem;font-weight:800;padding:2px 7px;border-radius:20px;margin-left:4px;">${r.abbr}</span></div></td>
                <td style="padding:14px 12px;text-align:right;font-size:0.85rem;font-weight:600;">${r.ls.length}</td>
                <td style="padding:14px 12px;text-align:right;font-size:0.85rem;font-weight:600;">${parkCount}</td>
                <td style="padding:14px 12px;text-align:right;font-size:0.85rem;font-weight:700;">${r.drops}</td>
                <td style="padding:14px 12px;text-align:right;font-size:0.88rem;font-weight:900;">${fmtNum(r.ci)}</td>
                <td style="padding:14px 12px;text-align:right;font-size:0.88rem;font-weight:900;color:${showColor(r.show)};">${r.show}%</td>
                <td style="padding:14px 12px;text-align:right;font-size:0.85rem;font-weight:700;">${fmtMoney(r.rev)}</td>
                <td style="padding:14px 12px;font-size:0.78rem;font-weight:700;color:#475569;">${top?.name||'—'}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function rAnalyticsByPark() {
  const parkData = PARKS.map(p=>{
    const ls  = LOCATIONS.filter(l=>l.park===p.id);

        <div style="font-weight:800;font-size:0.82rem;color:#78350f;">Geo-fence Coverage Tier</div>
      </div>
      <select style="width:100%;box-sizing:border-box;border:1px solid #fde68a;border-radius:8px;padding:10px 12px;font-size:0.85rem;font-family:inherit;outline:none;background:#fff8e1;margin-bottom:10px;">
        <option value="location">Specific Location (~300 ft)</option>
        <option value="land">Land / Zone (~1,500 ft)</option>
        <option value="park">Full Park (~1 mi)</option>
        <option value="resort">Resort-Wide (~3 mi)</option>
      </select>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div><label style="font-size:0.68rem;font-weight:700;color:#92400e;display:block;margin-bottom:5px;">Start Date &amp; Time</label><input type="datetime-local" style="width:100%;box-sizing:border-box;border:1px solid #fde68a;border-radius:8px;padding:9px 11px;font-size:0.82rem;font-family:inherit;outline:none;background:#fff8e1;"></div>
        <div><label style="font-size:0.68rem;font-weight:700;color:#92400e;display:block;margin-bottom:5px;">End Date &amp; Time</label><input type="datetime-local" style="width:100%;box-sizing:border-box;border:1px solid #fde68a;border-radius:8px;padding:9px 11px;font-size:0.82rem;font-family:inherit;outline:none;background:#fff8e1;"></div>
      </div>
    </div>
    <div style="display:flex;gap:10px;">
      <button onclick="ss({pushStep:1})" style="flex:1;background:#f1f5f9;border:none;padding:12px;border-radius:10px;font-weight:700;cursor:pointer;color:#475569;">← Back</button>
      <button onclick="ss({pushStep:3})" style="flex:2;background:#0057B8;color:#fff;border:none;padding:12px;border-radius:10px;font-weight:700;cursor:pointer;">Next: Review →</button>
    </div>
  `;
}

function pushStep3() {
  return `
    <div style="background:#f8f9fb;border-radius:12px;padding:18px;margin-bottom:18px;">
      <div style="font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:#64748b;margin-bottom:12px;">Drop Summary</div>
      ${[['Drop Title','(from Step 1)'],['Type','Character Meet &amp; Greet'],['Scope','Walt Disney World — All Parks'],['Geo-fence','Land / Zone (~1,500 ft)'],['Price','$0 (free)'],['Capacity','—'],['Broadcast','— hours before start']].map(([l,v])=>`
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #e5e7eb;font-size:0.82rem;"><span style="color:#64748b;">${l}</span><span style="font-weight:700;">${v}</span></div>
      `).join('')}
    </div>
    <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:14px 16px;margin-bottom:18px;font-size:0.78rem;color:#1e40af;line-height:1.6;">
      <span style="font-weight:800;">📋 What happens next:</span> This drop will be pushed to all selected park locations. Park managers receive a notification to confirm. Once confirmed, it goes live at the scheduled start time and surfaces to guests within the geo-fence boundary in the Nigh app.
    </div>
    <div style="display:flex;gap:10px;">
      <button onclick="ss({pushStep:2})" style="flex:1;background:#f1f5f9;border:none;padding:12px;border-radius:10px;font-weight:700;cursor:pointer;color:#475569;">← Back</button>
      <button onclick="ss({pushModal:false,pushStep:1,page:'drops'})" style="flex:2;background:#0057B8;color:#fff;border:none;padding:12px;border-radius:10px;font-weight:700;cursor:pointer;">🚀 Create Drop to Parks</button>
    </div>
  `;
}

// ─────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML = layout();
}
render();
</script>
</body>
</html>
