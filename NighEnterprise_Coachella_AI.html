function stageById(id){return STAGES.find(s=>s.id===id);}
function dayById(id){return DAYS.find(d=>d.id===id);}
function badge(status){
  const map={live:'#dcfce7:#16a34a:Live',scheduled:'#fef9c3:#854d0e:Scheduled',draft:'#f1f5f9:#64748b:Draft',ended:'#fee2e2:#b91c1c:Ended',active:'#dcfce7:#16a34a:Active',paused:'#fef3c7:#b45309:Paused'};
  const [bg,color,label]=(map[status]||'#f1f5f9:#64748b:Unknown').split(':');
  return `<span style="background:${bg};color:${color};font-size:0.68rem;font-weight:700;padding:3px 8px;border-radius:20px;">${label}</span>`;
}
function vendorBadge(type){
  if(type==='festival') return `<span style="background:#e8f5e9;color:#2e7d32;font-size:0.68rem;font-weight:800;padding:3px 8px;border-radius:20px;">&#127914; Goldenvoice</span>`;
  if(type==='sponsor')  return `<span style="background:#fffde7;color:#f57f17;font-size:0.68rem;font-weight:800;padding:3px 8px;border-radius:20px;">&#10022; Sponsor</span>`;
  if(type==='vendor')   return `<span style="background:#e3f2fd;color:#1565c0;font-size:0.68rem;font-weight:800;padding:3px 8px;border-radius:20px;">&#128722; Vendor</span>`;
  if(type==='artist')   return `<span style="background:#f3e5f5;color:#6a1b9a;font-size:0.68rem;font-weight:800;padding:3px 8px;border-radius:20px;">&#127908; Artist</span>`;
  return '';
}
function dayBadge(dayId){
  const d=dayById(dayId);
  if(!d) return '';
  const w=WEEKENDS.find(wk=>wk.id===d.weekend);
  return `<span style="background:${d.color}18;color:${d.color};font-size:0.65rem;font-weight:800;padding:3px 8px;border-radius:20px;">${w?w.label:''} &middot; ${d.label}</span>`;
}
function catBadge(type){
  const map={
    'merch':      {bg:'#fce7f3',c:'#9d174d',label:'&#127903; Merch'},
    'food':       {bg:'#fef3c7',c:'#92400e',label:'&#127829; F&amp;B'},
    'meet-greet': {bg:'#f3e8ff',c:'#5b21b6',label:'&#127908; Meet &amp; Greet'},
    'vip':        {bg:'#fef9c3',c:'#713f12',label:'&#11088; VIP'},
  };
  const t=map[type]||{bg:'#f1f5f9',c:'#475569',label:type};
  return `<span style="background:${t.bg};color:${t.c};font-size:0.68rem;font-weight:800;padding:3px 8px;border-radius:20px;">${t.label}</span>`;
}
function pct(a,b){return b>0?Math.round(a/b*100):0;}

// ── DASHBOARD KPI HELPERS ─────────────────────────────────────────────────
function kpi(label,val,sub,color='#0f172a'){
  return `<div style="background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:16px 18px;">
    <div style="font-size:0.72rem;color:#64748b;font-weight:600;margin-bottom:4px;">${label}</div>
    <div style="font-size:1.6rem;font-weight:900;color:${color};">${val}</div>
    <div style="font-size:0.7rem;color:#94a3b8;margin-top:2px;">${sub}</div>
  </div>`;
}
function statusBar(label,val,max,color,sub){
  const p=max>0?Math.min(Math.round(val/max*100),100):0;
  return `<div style="margin-bottom:10px;">
    <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
      <span style="font-size:0.75rem;font-weight:600;color:#0f172a;">${label}</span>
      <span style="font-size:0.75rem;font-weight:700;color:${color};">${val.toLocaleString()}${sub?' &middot; '+sub:''}</span>
    </div>
    <div style="background:#f1f5f9;border-radius:20px;height:6px;overflow:hidden;">
      <div style="height:6px;border-radius:20px;background:${color};width:${p}%;"></div>
    </div>
  </div>`;
}
function miniStat(label,val,color){
  return `<div style="background:#f8f9fb;border-radius:8px;padding:8px 10px;">
    <div style="font-size:0.65rem;color:#94a3b8;margin-bottom:2px;">${label}</div>
    <div style="font-size:0.88rem;font-weight:800;color:${color||'#0f172a'};">${val}</div>
  </div>`;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────
function rDashboard(){
  const liveDrops=FESTIVAL_DROPS.filter(d=>d.status==='live');
  const allActive=FESTIVAL_DROPS.filter(d=>d.status!=='draft');
  const totalCI=allActive.reduce((s,d)=>s+(d.checkins||0),0);
  const totalRes=allActive.reduce((s,d)=>s+(d.res||0),0);
  const overallConv=pct(totalCI,totalRes);
  const maxCI=Math.max(...FESTIVAL_DROPS.map(d=>d.checkins||0),1);

  const w1Drops=FESTIVAL_DROPS.filter(d=>dayById(d.day)&&dayById(d.day).weekend==='W1');
  const w2Drops=FESTIVAL_DROPS.filter(d=>dayById(d.day)&&dayById(d.day).weekend==='W2');
  const w1CI=w1Drops.reduce((s,d)=>s+(d.checkins||0),0);
  const w2CI=w2Drops.reduce((s,d)=>s+(d.checkins||0),0);

  const maxStageCI=Math.max(...stageStats.map(s=>s.ci),1);

  const vendorCI=[

  const sorted=[...allActive].sort((a,b)=>(b.checkins||0)-(a.checkins||0));

  return `<div style="padding:28px 32px;">

      ${kpi('Total Reserved',fmtNum(totalRes),'Across all drops')}
      ${kpi('Overall Conv %',overallConv+'%','Reserved \u2192 Check-in',showColor(overallConv))}
    </div>

    <div style="display:grid;grid-template-columns:1fr 300px;gap:20px;margin-bottom:20px;">
      <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;overflow:hidden;">
        <div style="padding:14px 18px;background:#f8f9fb;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;">

          <div style="font-size:0.72rem;color:#64748b;">${sorted.length} active drops</div>
        </div>
        ${sorted.slice(0,7).map((d,i)=>{
          const conv=d.res>0?pct(d.checkins,d.res):0;
          const stage=stageById(d.stage)||STAGES[0];
          return `<div style="padding:12px 18px;border-bottom:1px solid #f1f5f9;background:${i%2?'#fafafa':'#fff'};">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
              <span style="font-size:0.72rem;font-weight:900;color:#94a3b8;width:18px;">#${i+1}</span>
              <div style="font-weight:700;font-size:0.82rem;color:#0f172a;flex:1;">${d.title}</div>
              ${catBadge(d.type)}
              ${vendorBadge(d.vendorType)}
            </div>
            <div style="display:flex;align-items:center;gap:8px;padding-left:26px;">
              <span style="background:${stage.color}20;color:${stage.color};font-size:0.62rem;font-weight:800;padding:2px 7px;border-radius:20px;">${stage.abbr}</span>
              ${dayBadge(d.day)}
              <div style="flex:1;background:#f1f5f9;border-radius:20px;height:5px;overflow:hidden;">
                <div style="height:5px;border-radius:20px;background:${FESTIVAL.color};width:${Math.round((d.checkins||0)/maxCI*100)}%;"></div>
              </div>
              <span style="font-size:0.78rem;font-weight:800;color:#0f172a;min-width:42px;text-align:right;">${fmtNum(d.checkins)}</span>
              <span style="font-size:0.75rem;font-weight:700;color:${showColor(conv)};min-width:34px;text-align:right;">${conv}%</span>
            </div>
          </div>`;
        }).join('')}
      </div>

      <div style="display:flex;flex-direction:column;gap:14px;">
        <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:16px;">
          <div style="font-size:0.82rem;font-weight:800;color:#0f172a;margin-bottom:12px;">Weekend Comparison</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
            <div style="background:#fff8f5;border-radius:10px;border:1px solid #fed7aa;padding:10px 12px;">
              <div style="font-size:0.62rem;font-weight:800;color:#E8502A;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;">Weekend 1</div>
              <div style="font-size:1.3rem;font-weight:900;color:#E8502A;">${fmtNum(w1CI)}</div>
              <div style="font-size:0.68rem;color:#64748b;margin-top:2px;">${w1Drops.filter(d=>d.status==='live').length} drops &middot; ${pct(w1CI,w1Res)}% conv</div>
            </div>
            <div style="background:#f5f3ff;border-radius:10px;border:1px solid #ddd6fe;padding:10px 12px;">
              <div style="font-size:0.62rem;font-weight:800;color:#6B2D8B;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;">Weekend 2</div>
              <div style="font-size:1.3rem;font-weight:900;color:#6B2D8B;">${fmtNum(w2CI)}</div>
              <div style="font-size:0.68rem;color:#64748b;margin-top:2px;">${w2Drops.filter(d=>d.status==='live').length} drops &middot; ${pct(w2CI,w2Res)}% conv</div>

        <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:16px;">

      </div>
    </div>

    <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:18px 20px;">
      <div style="font-size:0.85rem;font-weight:800;color:#0f172a;margin-bottom:14px;">Stage Breakdown</div>

        ${stageStats.map(s=>statusBar(s.name,s.ci,maxStageCI,s.color,`${s.dropCount} drops`)).join('')}

}

function filterBar(options,selectedKey,stateKey){
  return `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">

    ${options.map(o=>`<button onclick="ss({${stateKey}:'${o.id}'})" style="padding:6px 14px;border-radius:20px;border:2px solid ${S[stateKey]===o.id?o.color||'#E8502A':'#e5e7eb'};background:${S[stateKey]===o.id?(o.color||'#E8502A')+'12':'#fff'};font-size:0.75rem;font-weight:700;cursor:pointer;color:${S[stateKey]===o.id?o.color||'#E8502A':'#475569'};">${o.abbr||o.name}</button>`).join('')}

function locationCard(loc,i,total){
  const st=stageById(loc.stage);
  const drops=FESTIVAL_DROPS.filter(d=>d.stage===loc.stage&&d.status==='live');
  const isLast=i===total-1;
  const isLastRow=i>=total-3;
  return `<div onclick="ss({locationDetail:'${loc.id}'})" style="padding:14px 16px;border-right:${(i+1)%3===0?'none':'1px solid #e5e7eb'};border-bottom:${isLastRow?'none':'1px solid #e5e7eb'};cursor:pointer;background:#fff;transition:background 0.1s;" onmouseover="this.style.background='#fafafa'" onmouseout="this.style.background='#fff'">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
      ${vendorBadge(loc.vendorType)}
      ${badge(loc.status)}

    <div style="font-weight:700;font-size:0.8rem;color:#0f172a;">${loc.name}</div>
    <div style="font-size:0.68rem;color:#64748b;margin-top:3px;">${drops.length} live drop${drops.length!==1?'s':''}</div>
  </div>`;
}

function locationDetail(locId){
  const loc=LOCATIONS.find(l=>l.id===locId);
  if(!loc) return '';
  const st=stageById(loc.stage);
  const drops=FESTIVAL_DROPS.filter(d=>d.stage===loc.stage);
  const liveDrops=drops.filter(d=>d.status==='live');
  const totalCI=drops.reduce((s,d)=>s+(d.checkins||0),0);
  const totalRes=drops.reduce((s,d)=>s+(d.res||0),0);
  return `<div style="padding:28px 32px;">

    <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;overflow:hidden;">
      <div style="padding:14px 18px;background:#f8f9fb;border-bottom:1px solid #e5e7eb;font-size:0.85rem;font-weight:800;color:#0f172a;">Drops at ${st?st.name:'this stage'}</div>
      ${drops.length?drops.map((d,i)=>`<div style="padding:14px 18px;border-bottom:1px solid #f1f5f9;background:${i%2?'#fafafa':'#fff'};">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
          <div style="font-weight:700;font-size:0.82rem;color:#0f172a;">${d.title}</div>
          ${badge(d.status)}

        <div style="display:flex;align-items:center;gap:8px;">

      </div>`).join(''):'<div style="padding:20px;text-align:center;color:#94a3b8;font-size:0.82rem;">No drops at this location yet.</div>'}

  </div>`;
}

function rAnalytics(){
  const drops=FESTIVAL_DROPS.filter(d=>d.status!=='draft');
  const sorted=[...drops].sort((a,b)=>(b.checkins||0)-(a.checkins||0));
  const stageStats=STAGES.map(st=>{
    const stDrops=drops.filter(d=>d.stage===st.id);
    const ci=stDrops.reduce((s,d)=>s+(d.checkins||0),0);
    const res=stDrops.reduce((s,d)=>s+(d.res||0),0);
    return {...st,dropCount:stDrops.length,ci,res,conv:res>0?pct(ci,res):0};
  }).sort((a,b)=>b.ci-a.ci);
  return `<div style="padding:28px 32px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;">
      <div>
        <div style="font-size:1.3rem;font-weight:800;color:#0f172a;">Analytics</div>

          return `<div style="padding:11px 18px;border-bottom:1px solid #f1f5f9;background:${i%2?'#fafafa':'#fff'};display:grid;grid-template-columns:2fr 80px 80px 80px 80px 80px;gap:8px;align-items:center;">

// ── BILLING ────────────────────────────────────────────────────────────────

  const locs=24,ppL=199,monthly=locs*ppL;
  const invoices=[
    {date:'Mar 1, 2026',desc:'Festival Pro &middot; 24 locations',amt:monthly,status:'paid'},
    {date:'Feb 1, 2026',desc:'Festival Pro &middot; 24 locations',amt:monthly,status:'paid'},
    {date:'Jan 1, 2026',desc:'Festival Pro &middot; 24 locations',amt:monthly,status:'paid'},
  ];
  return `<div style="padding:28px 32px;">
    <div style="font-size:1.3rem;font-weight:800;color:#0f172a;margin-bottom:22px;">Billing &amp; Plan</div>
    <div style="background:linear-gradient(135deg,#2D1B69 0%,#E8502A 100%);border-radius:16px;padding:24px 28px;color:#fff;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div style="font-size:0.75rem;font-weight:700;opacity:0.8;letter-spacing:0.08em;margin-bottom:6px;">CURRENT PLAN</div>
        <div style="font-size:1.8rem;font-weight:900;">Festival Pro</div>
        <div style="font-size:0.85rem;opacity:0.85;margin-top:4px;">Multi-weekend event management &middot; Unlimited drops &middot; Full analytics</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:0.75rem;opacity:0.8;margin-bottom:4px;">MONTHLY TOTAL</div>
        <div style="font-size:2.8rem;font-weight:900;">${fmtMoney(monthly)}</div>
        <div style="font-size:0.8rem;opacity:0.75;">${locs} locations &times; ${fmtMoney(ppL)}/loc/mo</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;">
      ${[
        {label:'Active Locations',val:'24',sub:'Empire Polo Club'},
        {label:'Monthly Cost',val:fmtMoney(monthly),sub:'Covers both weekends'},
        {label:'Cost per Drop',val:fmtMoney(Math.round(monthly/FESTIVAL_DROPS.length)),sub:`${FESTIVAL_DROPS.length} total drops`},
        {label:'Est. ROI',val:'11.4x',sub:'Based on attendee spend lift'},
      ].map(s=>`<div style="background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:16px 18px;">
        <div style="font-size:0.72rem;color:#64748b;font-weight:600;margin-bottom:4px;">${s.label}</div>
        <div style="font-size:1.5rem;font-weight:900;color:#0f172a;">${s.val}</div>
        <div style="font-size:0.7rem;color:#94a3b8;margin-top:2px;">${s.sub}</div>
      </div>`).join('')}
    </div>
    <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;overflow:hidden;">
      <div style="padding:14px 18px;background:#f8f9fb;border-bottom:1px solid #e5e7eb;font-size:0.82rem;font-weight:800;color:#0f172a;">Invoice History</div>
      ${invoices.map((inv,i)=>`<div style="padding:14px 18px;border-bottom:1px solid #f1f5f9;background:${i%2?'#fafafa':'#fff'};display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font-weight:700;font-size:0.82rem;">${inv.desc}</div>
          <div style="font-size:0.72rem;color:#64748b;margin-top:2px;">${inv.date}</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="font-weight:800;font-size:0.9rem;">${fmtMoney(inv.amt)}</div>
          <span style="background:#dcfce7;color:#16a34a;font-size:0.7rem;font-weight:700;padding:3px 8px;border-radius:20px;">${inv.status}</span>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
}

// ── SETTINGS ───────────────────────────────────────────────────────────────
function rSettings(){
  function sCard(title,content){
    return `<div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:20px 24px;margin-bottom:16px;">
      <div style="font-size:0.9rem;font-weight:800;color:#0f172a;margin-bottom:14px;">${title}</div>
      ${content}
    </div>`;
  }
  function sRow(label,val,sub){
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f1f5f9;">
      <div><div style="font-size:0.82rem;font-weight:600;color:#0f172a;">${label}</div>${sub?`<div style="font-size:0.7rem;color:#94a3b8;margin-top:1px;">${sub}</div>`:''}</div>
      <div style="font-size:0.82rem;font-weight:700;color:#475569;">${val}</div>
    </div>`;
  }
  return `<div style="padding:28px 32px;">
    <div style="font-size:1.3rem;font-weight:800;color:#0f172a;margin-bottom:22px;">Settings</div>
    ${sCard('Festival Settings',
      sRow('Festival Name','Coachella Valley Music and Arts Festival')+
      sRow('Short Name','Coachella 2026')+
      sRow('Venue','Empire Polo Club, Indio, CA')+
      sRow('Primary Color','<span style="display:inline-flex;align-items:center;gap:6px;"><span style="width:14px;height:14px;border-radius:3px;background:#E8502A;display:inline-block;"></span>#E8502A Desert Orange</span>')+
      sRow('Secondary Color','<span style="display:inline-flex;align-items:center;gap:6px;"><span style="width:14px;height:14px;border-radius:3px;background:#2D1B69;display:inline-block;"></span>#2D1B69 Deep Purple</span>')+
      sRow('Timezone','Pacific Time (PT)')
    )}
    ${sCard('Festival Schedule',
      WEEKENDS.map(w=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f1f5f9;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="background:${w.color}18;color:${w.color};font-size:0.68rem;font-weight:800;padding:3px 8px;border-radius:20px;">${w.label}</span>
          <span style="font-size:0.8rem;color:#0f172a;">${w.dates}</span>
        </div>
        <div style="font-size:0.75rem;color:#64748b;">3 days &middot; Fri / Sat / Sun</div>
      </div>`).join('')
    )}
    ${sCard('Drop Policies',
      sRow('Max Simultaneous Drops','15 per stage','Across all drop types')+
      sRow('Min Geo-Fence Radius','~100 ft (Booth tier)','Tightest pinpoint accuracy')+
      sRow('Default Broadcast Window','8 hours','Full festival day')+
      sRow('Drop auto-expire','Enabled','Drops close at end of each day')+
      sRow('Sponsor drop approval','Required','All partner drops need festival review')
    )}
    ${sCard('Hierarchy: Festival &rarr; Weekend &rarr; Day &rarr; Stage &rarr; Location',`
      <div style="display:flex;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;">
        ${['Coachella 2026','2 Weekends','6 Days','8 Stages','24 Locations'].map((l,i)=>`<div style="flex:1;padding:10px 12px;background:${i%2?'#f8f9fb':'#fff'};border-right:1px solid #e5e7eb;text-align:center;">
          <div style="font-size:0.65rem;font-weight:800;color:#64748b;text-transform:uppercase;">L${i+1}</div>
          <div style="font-size:0.75rem;font-weight:700;color:#0f172a;margin-top:3px;">${l}</div>
        </div>`).join('')}
      </div>
    `)}
    ${sCard('Geo-Fence Tiers',
      Object.entries(GEO_TIERS).map(([k,v])=>sRow(v.short,v.label)).join('')
    )}
    ${sCard('Alerts &amp; Notifications',
      sRow('Check-in spike alerts','Enabled','Notify when stage check-ins +30% in 15 min')+
      sRow('Capacity warnings','Enabled','Alert at 85% and 95% of drop cap')+
      sRow('Day transition reminders','Enabled','30 min before gates open each day')+
      sRow('Sponsor drop pending','Enabled','New sponsor drops awaiting approval')
    )}
  </div>`;
}

// ── NEW COLLECTION MODAL ────────────────────────────────────────────────────
function newCollModal(){
  const step=S.newCollStep||1;
  const steps=['Details','Geo-Fence','Review'];
  return `<div style="position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:1000;display:flex;align-items:center;justify-content:center;" onclick="if(event.target===this)ss({showNewColl:false,newCollStep:1})">
    <div style="background:#fff;border-radius:18px;width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.25);" onclick="event.stopPropagation()">
      <div style="background:linear-gradient(135deg,#2D1B69 0%,#E8502A 100%);padding:20px 24px;border-radius:18px 18px 0 0;">
        <div style="color:#fff;font-size:1.1rem;font-weight:800;">New Collection</div>
        <div style="display:flex;gap:6px;margin-top:14px;">
          ${steps.map((s,i)=>`<div style="flex:1;">
            <div style="height:4px;border-radius:2px;background:${i+1<=step?'#fff':'rgba(255,255,255,0.3)'};margin-bottom:5px;"></div>
            <div style="font-size:0.65rem;font-weight:700;color:${i+1<=step?'#fff':'rgba(255,255,255,0.5)'};">Step ${i+1}: ${s}</div>
          </div>`).join('')}
        </div>
      </div>
      <div style="padding:24px;">
        ${step===1?`
          <div style="margin-bottom:16px;">
            <label style="font-size:0.78rem;font-weight:700;color:#0f172a;display:block;margin-bottom:6px;">Collection Name</label>
            <input placeholder="e.g. Weekend 1 VIP Experience Bundle" style="width:100%;border:1px solid #e5e7eb;border-radius:8px;padding:10px 12px;font-size:0.85rem;box-sizing:border-box;">
          </div>
          <div style="margin-bottom:16px;">
            <label style="font-size:0.78rem;font-weight:700;color:#0f172a;display:block;margin-bottom:6px;">Weekend</label>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
              ${[...WEEKENDS,{id:'both',label:'Both Weekends',color:'#0f172a'}].map(w=>`<div onclick="ss({newCollType:'${w.id}'})" style="border:2px solid ${S.newCollType===w.id?w.color:'#e5e7eb'};border-radius:10px;padding:10px 12px;cursor:pointer;background:${S.newCollType===w.id?w.color+'10':'#fff'};text-align:center;">
                <div style="font-weight:700;font-size:0.78rem;color:#0f172a;">${w.label}</div>
                ${w.dates?`<div style="font-size:0.65rem;color:#64748b;margin-top:2px;">${w.dates}</div>`:''}
              </div>`).join('')}
            </div>
          </div>
          <div style="margin-bottom:16px;">
            <label style="font-size:0.78rem;font-weight:700;color:#0f172a;display:block;margin-bottom:6px;">Stage Focus</label>
            <div style="display:flex;flex-wrap:wrap;gap:6px;">
              <div onclick="ss({selectedStage:null})" style="padding:6px 12px;border-radius:20px;border:2px solid ${!S.selectedStage?'#E8502A':'#e5e7eb'};font-size:0.72rem;font-weight:700;cursor:pointer;color:${!S.selectedStage?'#E8502A':'#475569'};">All Stages</div>
              ${STAGES.map(st=>`<div onclick="ss({selectedStage:'${st.id}'})" style="padding:6px 12px;border-radius:20px;border:2px solid ${S.selectedStage===st.id?st.color:'#e5e7eb'};font-size:0.72rem;font-weight:700;cursor:pointer;color:${S.selectedStage===st.id?st.color:'#475569'};">${st.abbr}</div>`).join('')}
            </div>
          </div>
        `:''}
        ${step===2?`
          <div style="margin-bottom:16px;">
            <label style="font-size:0.78rem;font-weight:700;color:#0f172a;display:block;margin-bottom:6px;">Geo-Fence Tier</label>
            <div style="display:flex;flex-direction:column;gap:8px;">
              ${Object.entries(GEO_TIERS).map(([k,v])=>`<label style="display:flex;align-items:center;gap:10px;border:2px solid ${S.newCollGeo===k?'#E8502A':'#e5e7eb'};border-radius:8px;padding:10px 12px;cursor:pointer;background:${S.newCollGeo===k?'#fff8f5':'#fff'};">
                <input type="radio" name="collGeo" ${S.newCollGeo===k?'checked':''} onclick="ss({newCollGeo:'${k}'})">
                <div>
                  <div style="font-weight:700;font-size:0.82rem;color:#0f172a;">${v.short}</div>
                  <div style="font-size:0.7rem;color:#64748b;">${v.label}</div>
                </div>
              </label>`).join('')}
            </div>
          </div>
        `:''}
        ${step===3?`
          <div style="background:#f8f9fb;border-radius:10px;padding:16px;margin-bottom:16px;">
            <div style="font-weight:800;font-size:0.85rem;color:#0f172a;margin-bottom:10px;">Collection Summary</div>
            ${infoRow('Weekend',S.newCollType==='both'?'Both Weekends':WEEKENDS.find(w=>w.id===S.newCollType)?.label||'Not set')}
            ${infoRow('Stage Focus',S.selectedStage?STAGES.find(s=>s.id===S.selectedStage)?.name||'—':'All Stages')}
            ${infoRow('Geo-Fence',S.newCollGeo?GEO_TIERS[S.newCollGeo].short:'Not set')}
          </div>
          <div style="background:#fff3ec;border:1px solid #fed7aa;border-radius:10px;padding:12px 14px;font-size:0.78rem;color:#9a3412;">
            This collection will broadcast to attendees in the selected stage area and geo-fence range. Drops can be added after creation.
          </div>
        `:''}
        <div style="display:flex;gap:10px;margin-top:20px;">
          ${step>1?`<button onclick="ss({newCollStep:${step-1}})" style="flex:1;background:#f1f5f9;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;color:#475569;">Back</button>`:''}
          ${step<3?`<button onclick="ss({newCollStep:${step+1}})" style="flex:2;background:#E8502A;color:#fff;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;">Next: ${steps[step]}</button>`:`<button onclick="ss({showNewColl:false,newCollStep:1})" style="flex:2;background:#2D1B69;color:#fff;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;">Create Collection</button>`}
          <button onclick="ss({showNewColl:false,newCollStep:1})" style="flex:1;background:#f1f5f9;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;color:#94a3b8;">Cancel</button>
        </div>
      </div>
    </div>
  </div>`;
}

// ── PUSH MODAL ──────────────────────────────────────────────────────────────
function pushModal(){
  const step=S.pushStep||1;
  return `<div style="position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:1000;display:flex;align-items:center;justify-content:center;" onclick="if(event.target===this)ss({showPush:false,pushStep:1})">
    <div style="background:#fff;border-radius:18px;width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.25);" onclick="event.stopPropagation()">
      <div style="background:#E8502A;padding:20px 24px;border-radius:18px 18px 0 0;display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="color:#fff;font-size:1.1rem;font-weight:800;">Create Drop</div>
          <div style="color:rgba(255,255,255,0.8);font-size:0.78rem;margin-top:2px;">Step ${step} of 3</div>
        </div>
        <button onclick="ss({showPush:false,pushStep:1})" style="background:rgba(255,255,255,0.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:1rem;">X</button>
      </div>
      <div style="padding:24px;">
        ${step===1?pushStep1():step===2?pushStep2():pushStep3()}
        <div style="display:flex;gap:10px;margin-top:20px;">
          ${step>1?`<button onclick="ss({pushStep:${step-1}})" style="flex:1;background:#f1f5f9;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;color:#475569;">Back</button>`:''}
          ${step<3?`<button onclick="ss({pushStep:${step+1}})" style="flex:2;background:#E8502A;color:#fff;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;">Next</button>`:`<button onclick="ss({showPush:false,pushStep:1})" style="flex:2;background:#2D1B69;color:#fff;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;">Send Push</button>`}
          ${step===1?`<button onclick="ss({showPush:false,pushStep:1})" style="flex:1;background:#f1f5f9;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;color:#94a3b8;">Cancel</button>`:''}
        </div>
      </div>
    </div>
  </div>`;
}

function pushStep1(){
  return `<div>
    <div style="font-size:0.85rem;font-weight:800;color:#0f172a;margin-bottom:12px;">Select a Drop to Push</div>
    <div style="display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto;">
      ${FESTIVAL_DROPS.filter(d=>d.status==='live').map(d=>{
        const st=stageById(d.stage)||STAGES[0];
        return `<div style="border:2px solid ${S.pushDrop===d.id?'#E8502A':'#e5e7eb'};border-radius:10px;padding:12px 14px;cursor:pointer;background:${S.pushDrop===d.id?'#fff8f5':'#fff'};" onclick="ss({pushDrop:'${d.id}'})">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
            <div style="font-weight:700;font-size:0.82rem;color:#0f172a;">${d.title}</div>
            ${catBadge(d.type)}
          </div>
          <div style="display:flex;align-items:center;gap:6px;">
            <span style="background:${st.color}20;color:${st.color};font-size:0.62rem;font-weight:800;padding:2px 7px;border-radius:20px;">${st.abbr}</span>
            ${dayBadge(d.day)}
            <span style="font-size:0.7rem;color:#64748b;">${d.checkins} check-ins</span>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function pushStep2(){
  const scopes=['All Attendees','Weekend 1 Only','Weekend 2 Only','VIP Platinum','VIP Gold',...STAGES.map(s=>s.abbr+' Area')];
  return `<div>
    <div style="font-size:0.85rem;font-weight:800;color:#0f172a;margin-bottom:4px;">Notification Scope</div>
    <div style="font-size:0.75rem;color:#64748b;margin-bottom:12px;">Which attendees receive this push notification?</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;">
      ${scopes.map(sc=>`<div onclick="ss({pushScope:'${sc}'})" style="padding:7px 13px;border-radius:20px;border:2px solid ${S.pushScope===sc?'#E8502A':'#e5e7eb'};background:${S.pushScope===sc?'#fff8f5':'#fff'};font-size:0.75rem;font-weight:700;cursor:pointer;color:${S.pushScope===sc?'#E8502A':'#475569'};">${sc}</div>`).join('')}
    </div>
    <div style="font-size:0.85rem;font-weight:800;color:#0f172a;margin-bottom:8px;">Day Target</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      ${DAYS.map(d=>`<label style="display:flex;align-items:center;gap:6px;border:2px solid ${S.pushDay===d.id?d.color:'#e5e7eb'};border-radius:8px;padding:7px 12px;cursor:pointer;background:${S.pushDay===d.id?d.color+'10':'#fff'};">
        <input type="radio" name="pushDay" ${S.pushDay===d.id?'checked':''} onclick="ss({pushDay:'${d.id}'})">
        <span style="font-size:0.75rem;font-weight:700;color:${S.pushDay===d.id?d.color:'#475569'};">${WEEKENDS.find(w=>w.id===d.weekend)?.label} ${d.short}</span>
      </label>`).join('')}
    </div>
  </div>`;
}

function pushStep3(){
  const drop=FESTIVAL_DROPS.find(d=>d.id===S.pushDrop);
  const selDay=dayById(S.pushDay);
  const wknd=selDay?WEEKENDS.find(w=>w.id===selDay.weekend):null;
  return `<div>
    <div style="font-size:0.85rem;font-weight:800;color:#0f172a;margin-bottom:12px;">Preview &amp; Confirm</div>
    <div style="background:#0f172a;border-radius:16px;padding:16px;margin-bottom:16px;">
      <div style="background:#1e293b;border-radius:12px;padding:16px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <div style="width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#2D1B69,#E8502A);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:0.72rem;">CVF</div>
          <div>
            <div style="color:#fff;font-size:0.78rem;font-weight:700;">Coachella 2026 &middot; Nigh</div>
            <div style="color:#94a3b8;font-size:0.7rem;">now</div>
          </div>
        </div>
        <div style="color:#fff;font-weight:800;font-size:0.88rem;margin-bottom:4px;">${drop?drop.title:'Drop Selected'}</div>
        <div style="color:#cbd5e1;font-size:0.78rem;">${S.pushScope||'All Attendees'} &middot; Tap to redeem</div>
      </div>
    </div>
    <div style="background:#f8f9fb;border-radius:10px;padding:14px 16px;">
      ${infoRow('Drop',drop?drop.title:'Not selected')}
      ${infoRow('Scope',S.pushScope||'Not set')}
      ${infoRow('Day Target',selDay?`${wknd?wknd.label+' ':''} ${selDay.label} ${selDay.date}`:'Not set')}
      ${infoRow('Est. Reach',S.pushScope==='All Attendees'?'~125,000':S.pushScope==='VIP Platinum'?'~8,200':S.pushScope==='Weekend 1 Only'?'~62,500':'~22,000')}
    </div>
  </div>`;
}

// ── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('app').innerHTML=`
    ${layout()}
    ${S.showNewColl?newCollModal():''}
    ${S.showPush?pushModal():''}
  `;
}

window.ss=function(patch){Object.assign(S,patch);render();};
window.go=function(page){S.page=page;render();};
window.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
