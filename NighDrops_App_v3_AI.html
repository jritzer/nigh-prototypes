// ── PRO PROFILE ────────────────────────────────────────
function renderProProfile(){
  const p=proProfiles[S.proHandle]||proProfiles['@nikeboulder'];
  if(!S.followedHosts)S.followedHosts=Object.values(proProfiles).filter(x=>x.following).map(x=>x.handle);
  const isFollowing=(S.followedHosts||[]).includes(p.handle);
  const bizMenuBtn=`<button onclick="modal('blockBiz');event.stopPropagation()" style="background:none;border:none;padding:6px;display:flex;align-items:center;justify-content:center;color:#6B7280;cursor:pointer;border-radius:8px" onmouseover="this.style.background='#F3F4F6'" onmouseout="this.style.background='none'">${ic('more',20)}</button>`;
  return`${hdr(p.name,null,"go(S.backScr||'feed')",bizMenuBtn)}
  <div style="padding:14px 16px">
    <!-- Header card -->
    <div style="background:${p.brand?'linear-gradient(135deg,#111827,#374151)':'linear-gradient(135deg,#1B2A4A,#0E4EF5)'};border-radius:16px;padding:20px;margin-bottom:14px;text-align:center;position:relative">
      <div style="width:64px;height:64px;border-radius:16px;background:rgba(255,255,255,0.15);border:3px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;margin:0 auto 10px">${p.short.charAt(0)}</div>
      <div style="font-size:17px;font-weight:800;color:#fff;margin-bottom:2px">${p.name}</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:14px">${p.handle}</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:8px">

}

    if(!grp.members) return [];
    return grp.members.map((m,mi)=>{
      if(typeof m==='string'){
        const f=friendsList.find(f=>f.id===m);
        if(!f) return null;

function handleTyping(el){
  const v=el.value.replace(/[^a-zA-Z0-9_]/g,'').toLowerCase();
  if(el.value!==v){const pos=el.selectionStart-1;el.value=v;el.setSelectionRange(pos,pos);}
  S.handleNew=v;S.handleAvail=null;S.handleConfirm=false;
  const isSame=v==='alexr',tooShort=v.length<3,canCheck=v.length>=3&&!isSame;
  const st=document.getElementById('handleStatus');
  if(st){
    let h='';
    if(tooShort&&v.length>0) h='<div style="font-size:10px;color:#9CA3AF;margin-top:4px">Must be at least 3 characters</div>';
    else if(isSame) h='<div style="font-size:10px;color:#F59E0B;margin-top:4px">This is your current handle</div>';
    st.innerHTML=h;
  }
  const ac=document.getElementById('handleAction');
  if(ac){
    ac.innerHTML=canCheck?'<button onclick="S.handleAvail=![\'alexr\',\'joshr\',\'sarahm\',\'jamesk\',\'centro\',\'nigh\'].includes((S.handleNew||\'\').toLowerCase());renderModal()" style="padding:9px 22px;border-radius:10px;border:1px solid #E5E7EB;background:#F9FAFB;font-size:13px;font-weight:600;color:#374151;cursor:pointer;display:block;margin:0 auto">Check Availability</button>':'';
  }
}

window._setHuDate=function(val){
  S.composeHuDate=val;
  var on='rgba(65,239,249,0.6)',onBg='rgba(65,239,249,0.10)',onC='rgba(65,239,249,0.95)';
  var off='rgba(255,255,255,0.14)',offBg='rgba(255,255,255,0.05)',offC='rgba(255,255,255,0.55)';
  ['today','tomorrow','pick'].forEach(function(k){
    var b=document.getElementById('hu-btn-'+k);
    if(!b)return;
    var act=k===val;
    b.style.borderColor=act?on:off;b.style.background=act?onBg:offBg;b.style.color=act?onC:offC;
  });
  var wrap=document.getElementById('hu-date-wrap');
  if(wrap){
    if(val==='pick'){
      var today=new Date().toISOString().split('T')[0];
      wrap.innerHTML='<input id="hu-date-pick" type="date" min="'+today+'" value="'+(S.composeHuPickVal||'')+'" onchange="S.composeHuPickVal=this.value" style="margin-top:8px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:7px 10px;font-size:12px;color:#fff;font-family:inherit;color-scheme:dark">';
      setTimeout(function(){var el=document.getElementById('hu-date-pick');if(el&&el.showPicker)el.showPicker();else if(el)el.focus();},50);
    } else { wrap.innerHTML=''; }

  var lbl=document.getElementById('hu-btn-label');
  if(lbl) lbl.textContent=val==='today'?'Post Heads Up':'Schedule Heads Up';
};

// ── FULL-SCREEN CHAT VIEW ─────────────────────────────
function renderChat(){
  const initials=(name)=>{const p=name.split(' ');return p[0][0]+(p[1]?p[1][0]:'');};
  let chatName='';
  let chatSubtitle='';
  let messages=[];
  let isGroup=false;
  let inputPlaceholder='Type a message...';

  if(S.chatMsgId){
    const msg=inboxMessages.find(m=>m.id===S.chatMsgId);
    if(!msg){S.scr='inbox';S.chatMsgId=null;render();return '';}
    const d=msg.detail;

    if(msg.type==='headsup'){
      if(d.broadcast&&S.chatReplyIdx!==null&&S.chatReplyIdx!==undefined){
        // Broadcast Heads Up - viewing a specific reply as 1:1 DM
        const reply=d.replies[S.chatReplyIdx];
        if(!reply){S.scr='inbox';S.chatMsgId=null;S.chatReplyIdx=null;render();return '';}
        chatName=reply.name;
        chatSubtitle='replied to your Heads Up';
        inputPlaceholder='Reply to '+reply.name.split(' ')[0]+'...';
        // Show history if any
        if(reply.history&&reply.history.length){
          reply.history.forEach(h=>{
            messages.push({mine:h.from==='me',name:h.from==='me'?'You':reply.name,av:h.from==='me'?'JR':initials(reply.name),text:h.text,time:h.time,drop:h.drop||null});
          });
          messages.push({type:'divider',text:'Today · You sent a Heads Up'});
        }
        // Show Heads Up context card
        messages.push({type:'headsup-card',message:d.message,sentTo:d.sentTo,time:msg.time,dropRef:d.dropRef});
        // Show the reply
        messages.push({mine:false,name:reply.name,av:initials(reply.name),text:reply.msg,time:reply.time,drop:reply.drop||null});
        // Show thread if any
        if(reply.thread&&reply.thread.length){
          reply.thread.forEach(t=>{
            messages.push({mine:t.from==='me',name:t.from==='me'?'You':reply.name,av:t.from==='me'?'JR':initials(reply.name),text:t.text,time:t.time,drop:t.drop||null});
          });
        }
      } else if(!d.broadcast){
        // Group Heads Up thread
        isGroup=true;
        chatName=d.group;
        chatSubtitle=(d.groupMembers||'')+ ' members';
        inputPlaceholder='Reply in '+d.group+'...';
        // Thread history
        if(d.threadHistory&&d.threadHistory.length){
          messages.push({type:'divider',text:'Earlier in '+d.group});
          d.threadHistory.forEach(h=>{
            messages.push({mine:h.av==='JR',name:h.av==='JR'?'You':h.name,av:h.av,text:h.msg,time:h.time});
          });
          messages.push({type:'divider',text:'Today · Heads Up sent'});
        }
        // The Heads Up message itself
        messages.push({mine:true,name:'You',av:'JR',text:d.message,time:msg.time,isHeadsUp:true});
        // Replies
        if(d.replies&&d.replies.length){
          d.replies.forEach(r=>{
            messages.push({mine:r.name==='You'||r.av==='JR',name:r.name,av:r.av||initials(r.name),text:r.msg,time:r.time,drop:r.drop||null});
          });
        }
      } else {
        // Broadcast Heads Up without a specific reply - show overview, redirect to inbox modal
        S.scr='inbox';S.chatMsgId=null;modal('inbox-'+msg.id);render();return '';
      }
    } else if(msg.type==='dropgroup'){
      // Drop coordination thread (auto-created on transfer)
      isGroup=true;
      chatName=d.dropTitle||msg.title;
      chatSubtitle=(d.members?d.members.length:0)+' going together';
      inputPlaceholder='Message your group...';
      S._dropGroupData=d; // stash for header banner
      // Show drop context card
      messages.push({type:'dropgroup-info',dropTitle:d.dropTitle,dropHost:d.dropHost,dropTime:d.dropTime,members:d.members,memberAvs:d.memberAvs});
      // Show replies
      if(d.replies&&d.replies.length){
        d.replies.forEach(r=>{
          messages.push({mine:r.name==='You'||r.av==='JR',name:r.name,av:r.av||initials(r.name),text:r.msg,time:r.time});
        });
      }
    } else if(msg.type==='friend'){
      // Friend-type messages (DM conversations)
      chatName=d.friend||(d.isGroup?d.groupMembers&&d.groupMembers[0]:msg.title);
      isGroup=d.isGroup||false;
      if(isGroup){
        chatSubtitle=(d.groupMembers?d.groupMembers.length:'')+' members';
        inputPlaceholder='Message...';
      } else {
        chatSubtitle='';
        inputPlaceholder='Message '+((d.friend||'').split(' ')[0]||'')+'...';
      }
      // Show replies as messages
      if(d.replies&&d.replies.length){
        d.replies.forEach(r=>{
          messages.push({mine:r.name==='You'||r.av==='JR',name:r.name,av:r.av||initials(r.name),text:r.msg,time:r.time,drop:r.drop||null});
        });
      } else if(d.message&&!d.replies){
        // Legacy friend notifications (e.g. "got a ticket") - show as info
        messages.push({mine:false,name:d.friend||msg.title,av:initials(d.friend||msg.title),text:d.message,time:msg.time});
      }
    }
  } else if(S.chatNew){
    chatName=S.chatNew.name||'New Chat';
    chatSubtitle=S.chatNew.group?'Group':'';
    isGroup=!!S.chatNew.group;
    inputPlaceholder='Type a message...';
  }

  // Build HTML
  const isDropGroup=S.chatMsgId&&inboxMessages.find(m=>m.id===S.chatMsgId&&m.type==='dropgroup');
  const avatarBg=isDropGroup?'background:linear-gradient(135deg,rgba(14,78,245,0.85),rgba(98,38,233,0.85));border-radius:10px':isGroup?'background:rgba(34,197,94,0.18);border:1px solid rgba(34,197,94,0.3);border-radius:10px':'background:rgba(65,239,249,0.15);border:1px solid rgba(65,239,249,0.3);border-radius:50%';
  const avatarIcon=isDropGroup?
    '<svg width="16" height="16" viewBox="0 0 24 24" stroke="#fff" stroke-width="2" fill="none"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>'
    :isGroup?
    '<svg width="16" height="16" viewBox="0 0 24 24" stroke="rgba(34,197,94,0.9)" stroke-width="2" fill="none"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>':
    '<span style="font-size:12px;font-weight:700;color:#41EFF9">'+initials(chatName)+'</span>';

  let messagesHtml=messages.map(m=>{
    if(m.type==='divider'){
      return '<div style="text-align:center;margin:12px 0"><span style="font-size:10px;color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.06);padding:3px 10px;border-radius:10px">'+m.text+'</span></div>';
    }
    if(m.type==='dropgroup-info'){
      const saved=S.dropGroupSaved&&S.dropGroupSaved[S.chatMsgId];
      return '<div style="background:rgba(14,78,245,0.07);border:1px solid rgba(14,78,245,0.18);border-radius:12px;padding:12px 13px;margin:4px 0 12px">'+
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">'+
        '<svg width="12" height="12" viewBox="0 0 24 24" stroke="rgba(14,78,245,0.8)" stroke-width="2" fill="none"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>'+
        '<span style="font-size:10px;font-weight:700;color:rgba(14,78,245,0.85);letter-spacing:0.04em">GOING TOGETHER</span></div>'+
        '<div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:3px">'+(m.dropTitle||'')+'</div>'+
        '<div style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:2px">'+(m.dropHost||'')+' · '+(m.dropTime||'')+'</div>'+
        '<div style="display:flex;align-items:center;gap:6px;margin-top:8px">'+
        (m.memberAvs||[]).map(function(av){return '<div style="width:26px;height:26px;border-radius:50%;background:rgba(65,239,249,0.15);border:1px solid rgba(65,239,249,0.25);display:flex;align-items:center;justify-content:center"><span style="font-size:9px;font-weight:700;color:#41EFF9">'+av+'</span></div>';}).join('')+
        '</div>'+
        (saved
          ?'<div style="display:flex;align-items:center;gap:6px;margin-top:10px;padding:8px 10px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:8px"><svg width="12" height="12" viewBox="0 0 24 24" stroke="#22C55E" stroke-width="2" fill="none"><polyline points="20 6 9 17 4 12"/></svg><span style="font-size:11px;font-weight:600;color:#22C55E">Saved as a group</span></div>'
          :'<button onclick="if(!S.dropGroupSaved)S.dropGroupSaved={};S.dropGroupSaved['+S.chatMsgId+']=true;render()" style="margin-top:10px;padding:7px 14px;border-radius:8px;background:rgba(14,78,245,0.12);border:1px solid rgba(14,78,245,0.3);color:#93C5FD;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px"><svg width="12" height="12" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Save as Group</button>')+
        '</div>';
    }
    if(m.type==='headsup-card'){
      return '<div style="background:rgba(34,197,94,0.07);border:1px solid rgba(34,197,94,0.18);border-radius:12px;padding:11px 13px;margin:8px 0">'+
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:7px">'+
        '<svg width="11" height="11" viewBox="0 0 24 24" stroke="rgba(34,197,94,0.8)" stroke-width="2" fill="none"><path d="m3 11 18-5v12L3 13v-2z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>'+
        '<span style="font-size:10px;font-weight:700;color:rgba(34,197,94,0.8);letter-spacing:0.04em">YOUR HEADS UP · '+(m.sentTo||'')+' · '+(m.time||'')+'</span></div>'+
        '<div style="font-size:12px;color:rgba(255,255,255,0.70);line-height:1.5">'+m.message+'</div>'+
        (m.dropRef?'<div style="margin-top:8px;padding:7px 10px;background:rgba(245,166,35,0.1);border-radius:8px;display:flex;align-items:center;gap:8px"><svg width="12" height="12" viewBox="0 0 24 24" stroke="rgba(245,166,35,0.8)" stroke-width="2" fill="none"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><span style="font-size:11px;color:rgba(245,166,35,0.85);font-weight:600">'+m.dropRef.title+'</span></div>':'')+
        '</div>';
    }
    const isMe=m.mine;
    const bubbleBg=isMe?'background:rgba(14,78,245,0.3);border:1px solid rgba(14,78,245,0.4)':'background:rgba(255,255,255,0.08)';
    const bubbleRadius=isMe?'border-radius:14px 4px 14px 14px':'border-radius:4px 14px 14px 14px';
    let headsUpBadge='';
    if(m.isHeadsUp) headsUpBadge='<span style="font-size:9px;font-weight:700;color:rgba(34,197,94,0.8);background:rgba(34,197,94,0.1);padding:1px 6px;border-radius:4px;margin-left:6px">Heads Up</span>';

    // Drop card HTML helper
    let dropCardHtml='';
    if(m.drop){
      const dp=m.drop;
      const priceLabel=(!dp.price||dp.price===0)?'Free':'$'+dp.price;
      const spotsText=(dp.spotsLeft!==undefined)?dp.spotsLeft+' spots left':'';
      dropCardHtml='<div style="margin-top:6px;background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.22);border-radius:12px;padding:11px 13px;max-width:260px">'+
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:7px">'+
        '<svg width="13" height="13" viewBox="0 0 24 24" stroke="rgba(245,166,35,0.85)" stroke-width="2" fill="none"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>'+
        '<span style="font-size:10px;font-weight:700;color:rgba(245,166,35,0.85);letter-spacing:0.04em;text-transform:uppercase">Drop</span></div>'+
        '<div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:3px">'+dp.title+'</div>'+
        '<div style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:6px">'+(dp.host||'')+'</div>'+
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'+
        '<span style="font-size:11px;font-weight:700;color:rgba(245,166,35,0.9);background:rgba(245,166,35,0.12);padding:2px 8px;border-radius:6px">'+priceLabel+'</span>'+
        (spotsText?'<span style="font-size:10px;color:rgba(255,255,255,0.4)">'+spotsText+'</span>':'')+
        '</div>'+
        '<button onclick="event.stopPropagation();go(\'dropDetail\',{drop:'+dp.dropIdx+'})" style="width:100%;padding:7px 0;background:rgba(245,166,35,0.18);border:1px solid rgba(245,166,35,0.3);border-radius:8px;color:rgba(245,166,35,0.95);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">View Drop</button>'+
        '</div>';
    }

    if(isMe){
      return '<div style="display:flex;align-items:flex-end;gap:8px;flex-direction:row-reverse;margin-bottom:10px">'+
        '<div style="display:flex;flex-direction:column;align-items:flex-end;max-width:80%">'+
        (m.text?'<div style="'+bubbleBg+';'+bubbleRadius+';padding:9px 12px;display:inline-block">'+
        '<div style="font-size:13px;color:#fff;line-height:1.5">'+m.text+'</div></div>':'')+
        dropCardHtml+
        '<div style="font-size:10px;color:rgba(255,255,255,0.28);margin-top:3px">'+m.time+headsUpBadge+'</div></div></div>';
    } else {
      return '<div style="display:flex;align-items:flex-end;gap:8px;margin-bottom:10px">'+
        '<div style="width:28px;height:28px;border-radius:50%;background:rgba(65,239,249,0.12);border:1px solid rgba(65,239,249,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0">'+
        '<span style="font-size:9px;font-weight:700;color:#41EFF9">'+(m.av||initials(m.name))+'</span></div>'+
        '<div style="flex:1;max-width:80%">'+
        (isGroup||messages.filter(x=>!x.mine&&!x.type).length>1?'<div style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.5);margin-bottom:3px">'+m.name+'</div>':'')+
        (m.text?'<div style="'+bubbleBg+';'+bubbleRadius+';padding:9px 12px;display:inline-block">'+
        '<div style="font-size:13px;color:#fff;line-height:1.5">'+m.text+'</div></div>':'')+
        dropCardHtml+
        '<div style="font-size:10px;color:rgba(255,255,255,0.28);margin-top:3px">'+m.time+'</div></div></div>';
    }
  }).join('');

  if(!messagesHtml){
    messagesHtml='<div style="text-align:center;padding:60px 0;color:rgba(255,255,255,0.3);font-size:13px">Start a conversation</div>';
  }

  return `<div id="chat-view" style="position:absolute;top:0;left:0;right:0;bottom:0;z-index:600;background:#0B0B1A;display:flex;flex-direction:column">
    <!-- Header -->
    <div style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;background:#0B0B1A;z-index:2">
      <button onclick="S.scr='inbox';S.chatMsgId=null;S.chatNew=null;S.chatReplyIdx=null;S.chatDropPicker=false;S.chatDropAttach=null;render()" style="background:none;border:none;color:rgba(255,255,255,0.6);padding:0;display:flex;align-items:center;cursor:pointer">
        <svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div style="width:36px;height:36px;${avatarBg};display:flex;align-items:center;justify-content:center;flex-shrink:0">
        ${avatarIcon}
      </div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:700;color:#fff">${chatName}</div>
        ${chatSubtitle?'<div style="font-size:11px;color:rgba(255,255,255,0.40)">'+chatSubtitle+'</div>':''}
      </div>
    </div>
    <!-- Messages -->
    <div id="chat-scroll" style="flex:1;overflow-y:auto;padding:16px">
      ${messagesHtml}
    </div>
    <!-- Drop Picker Overlay -->
    ${S.chatDropPicker?`<div style="position:relative;z-index:3">
      <div style="position:absolute;bottom:0;left:14px;right:14px;background:rgba(18,18,36,0.97);border:1px solid rgba(245,166,35,0.2);border-radius:14px 14px 0 0;max-height:200px;overflow-y:auto;padding:6px 0">
        <div style="padding:6px 12px 4px;display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:10px;font-weight:700;color:rgba(245,166,35,0.8);letter-spacing:0.05em;text-transform:uppercase">Attach a Drop</span>
          <button onclick="S.chatDropPicker=false;render()" style="background:none;border:none;color:rgba(255,255,255,0.4);font-size:16px;cursor:pointer;padding:0 2px;line-height:1">&times;</button>
        </div>
        ${feedDrops.map((fd,fi)=>{
          const pl=(!fd.price||fd.price===0)?'Free':'$'+fd.price;
          return '<div onclick="S.chatDropAttach='+fi+';S.chatDropPicker=false;render()" style="display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-top:1px solid rgba(255,255,255,0.05)">'+
            '<div style="width:28px;height:28px;border-radius:8px;background:rgba(245,166,35,0.12);border:1px solid rgba(245,166,35,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0">'+
            '<svg width="12" height="12" viewBox="0 0 24 24" stroke="rgba(245,166,35,0.8)" stroke-width="2" fill="none"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg></div>'+
            '<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+fd.title+'</div>'+
            '<div style="font-size:10px;color:rgba(255,255,255,0.4)">'+fd.host.name+' · '+pl+(fd.spotsLeft!==undefined?' · '+fd.spotsLeft+' left':'')+'</div></div></div>';
        }).join('')}
      </div>
    </div>`:''}
    <!-- Attached Drop Preview -->
    ${S.chatDropAttach!==null&&S.chatDropAttach!==undefined?`<div style="padding:6px 14px 0;flex-shrink:0;background:#0B0B1A">
      <div style="display:flex;align-items:center;gap:8px;background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.18);border-radius:10px;padding:8px 10px">
        <svg width="12" height="12" viewBox="0 0 24 24" stroke="rgba(245,166,35,0.8)" stroke-width="2" fill="none"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <div style="flex:1;min-width:0">
          <div style="font-size:11px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${feedDrops[S.chatDropAttach].title}</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.4)">${feedDrops[S.chatDropAttach].host.name} · ${(!feedDrops[S.chatDropAttach].price||feedDrops[S.chatDropAttach].price===0)?'Free':'$'+feedDrops[S.chatDropAttach].price}${feedDrops[S.chatDropAttach].spotsLeft!==undefined?' · '+feedDrops[S.chatDropAttach].spotsLeft+' left':''}</div>
        </div>
        <button onclick="S.chatDropAttach=null;render()" style="background:none;border:none;color:rgba(255,255,255,0.4);font-size:14px;cursor:pointer;padding:0 2px;line-height:1">&times;</button>
      </div>
    </div>`:''}
    <!-- Input -->
    <div style="padding:10px 14px 16px;border-top:1px solid rgba(255,255,255,0.07);flex-shrink:0;background:#0B0B1A">
      <div style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.07);border-radius:24px;padding:4px 4px 4px 6px;border:1px solid rgba(255,255,255,0.1)">
        <button onclick="S.chatDropPicker=!S.chatDropPicker;render()" style="width:32px;height:32px;border-radius:50%;background:${S.chatDropPicker?'rgba(245,166,35,0.2)':'rgba(255,255,255,0.08)'};border:1px solid ${S.chatDropPicker?'rgba(245,166,35,0.35)':'rgba(255,255,255,0.1)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:background 0.15s">
          <svg width="14" height="14" viewBox="0 0 24 24" stroke="${S.chatDropPicker?'rgba(245,166,35,0.9)':'rgba(255,255,255,0.5)'}" stroke-width="2.5" fill="none"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <input id="chat-input" placeholder="${inputPlaceholder}" onkeydown="if(event.key==='Enter'){event.preventDefault();chatSend();}" style="flex:1;background:none;border:none;font-size:13px;color:#fff;outline:none;font-family:inherit;padding:8px 0"/>
        <button onclick="chatSend()" style="width:36px;height:36px;border-radius:50%;background:#0E4EF5;border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer">
          <svg width="13" height="13" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.5" fill="none"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>`;
}

function chatSend(){
  var inp=document.getElementById('chat-input');
  var txt=inp?inp.value.trim():'';
  var dropData=null;
  if(S.chatDropAttach!==null&&S.chatDropAttach!==undefined){
    var fd=feedDrops[S.chatDropAttach];
    dropData={id:fd.id,title:fd.title,host:fd.host.name,price:fd.price,spotsLeft:fd.spotsLeft,dropIdx:S.chatDropAttach};
  }
  if(!txt&&!dropData)return;

  if(S.chatNew){
    // New conversation - create inbox entry
    var isGrp=!!S.chatNew.group;
    var newMsg={id:Date.now(),type:'friend',
      title:S.chatNew.name,
      subtitle:txt,time:'just now',unread:false,
      detail:{friend:S.chatNew.name,isGroup:isGrp,
        groupMembers:S.chatNew.members||S.chatNew.friends||[],
        message:txt,
        replies:[{name:'You',av:'JR',time:'just now',msg:txt,drop:dropData}]}};
    inboxMessages.unshift(newMsg);
    S.chatMsgId=newMsg.id;
    S.chatNew=null;
  } else if(S.chatMsgId){
    var msg=inboxMessages.find(m=>m.id===S.chatMsgId);
    if(msg&&msg.detail){
      if(msg.type==='headsup'&&msg.detail.broadcast&&S.chatReplyIdx!==null&&S.chatReplyIdx!==undefined){
        // Broadcast reply thread
        var reply=msg.detail.replies[S.chatReplyIdx];
        if(reply){
          if(!reply.thread)reply.thread=[];
          reply.thread.push({from:'me',text:txt,time:'just now',drop:dropData});
        }
      } else if(msg.type==='headsup'&&!msg.detail.broadcast){
        // Group thread
        if(!msg.detail.replies)msg.detail.replies=[];
        msg.detail.replies.push({name:'You',av:'JR',time:'just now',msg:txt,drop:dropData});
      } else {
        // Friend DM
        if(!msg.detail.replies)msg.detail.replies=[];
        msg.detail.replies.push({name:'You',av:'JR',time:'just now',msg:txt,drop:dropData});
      }
    }
  }
  if(inp)inp.value='';
  S.chatDropAttach=null;
  S.chatDropPicker=false;
  render();
  setTimeout(()=>{var sc=document.getElementById('chat-scroll');if(sc)sc.scrollTop=sc.scrollHeight;},30);
}

// ── RENDER ─────────────────────────────────────────────
function render(){
  const scrEl=document.getElementById('scr');
  const onFeed=S.scr==='feed';
  scrEl.className=onFeed?'feed-mode':'';
  let html='';
  switch(S.scr){
    case 'onboarding': html=renderOnboarding();break;
    case 'feed': html=renderFeed();break;
    case 'dropDetail': html=renderDropDetail();break;
    case 'passwordDrop': html=renderPasswordDrop();break;
    case 'placeOrder': html=renderPlaceOrder();break;
    case 'orderConfirmation': html=renderOrderConfirmation();break;
    case 'ticketView': html=renderTicketView();break;
    case 'ticketCollection': html=renderTicketCollection();break;
    case 'transferTicket': html=renderTransferTicket();break;
    case 'inbox': html=renderInbox();break;
    case 'proProfile': html=renderProProfile();break;
    case 'menu': html=renderMenu();break;
    case 'niya': html=renderNiya();break;
    case 'dm': html=renderDM();break;
    case 'groups': html=renderGroups();break;
    case 'groupDetail': html=renderGroupDetail();break;
    case 'createGroup': html=renderCreateGroup();break;
    case 'chat': html=renderChat();break;
    default: html=renderFeed();
  }
  scrEl.innerHTML=html;
  if(onFeed){
    scrEl.scrollTop=S.drop*762;
  } else if(S.scr==='dm'){
    setTimeout(()=>{const el=document.getElementById('dm-list');if(el)el.scrollTop=el.scrollHeight;},30);
  } else if(S.scr==='chat'){
    setTimeout(()=>{const sc=document.getElementById('chat-scroll');if(sc)sc.scrollTop=sc.scrollHeight;},30);
  } else if(S.modal){
    // Preserve scroll when opening a modal overlay
  } else {
    scrEl.scrollTop=0;
  }
  renderTB();
  renderModal();
}

render();
</script>
</body>
</html>
