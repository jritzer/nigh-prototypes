<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nigh Pro — App Screens v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#E5E7EB;display:flex;justify-content:center;padding:24px 16px;min-height:100vh}
#app{width:375px;height:812px;border-radius:24px;border:1px solid #D1D5DB;box-shadow:0 8px 32px rgba(0,0,0,0.12);overflow:hidden;display:flex;flex-direction:column;background:#F9FAFB;position:relative}
#scr{flex:1;overflow-y:auto}
#scr::-webkit-scrollbar{width:0}
button,input,textarea,select{font-family:inherit}
button{cursor:pointer}
@keyframes scanLine{0%,100%{top:15%}50%{top:75%}}
.scanL{animation:scanLine 2s ease-in-out infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadeIn 0.25s ease-out}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.pulse{animation:pulse 2s ease-in-out infinite}
.card{background:#fff;border-radius:14px;border:1px solid #E5E7EB;overflow:hidden}
.cb{padding:14px}
/* Badges */
.bg{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;letter-spacing:0.01em}
.bg-s{font-size:10px;padding:2px 7px}
.bg .dt{width:6px;height:6px;border-radius:50%}
.bg-live{background:#DCFCE7;color:#166534}.bg-live .dt{background:#22C55E}
.bg-sold{background:#FEF3C7;color:#92400E}.bg-sold .dt{background:#F59E0B}
.bg-draft{background:#F3F4F6;color:#4B5563}.bg-draft .dt{background:#9CA3AF}
.bg-ended{background:#F3F4F6;color:#6B7280}.bg-ended .dt{background:#9CA3AF}
.bg-ci{background:#DCFCE7;color:#166534}.bg-ci .dt{background:#22C55E}
.bg-res{background:#DBEAFE;color:#1E40AF}.bg-res .dt{background:#3B82F6}
.bg-ns{background:#FEE2E2;color:#991B1B}.bg-ns .dt{background:#EF4444}
.bg-sched{background:#EDE9FE;color:#5B21B6}.bg-sched .dt{background:#8B5CF6}
/* Tab bar */
.tb{display:flex;justify-content:space-around;align-items:center;background:#fff;border-top:1px solid #E5E7EB;padding:6px 0 10px;flex-shrink:0}
.tt{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;padding:4px 10px;min-width:50px;color:#9CA3AF;transition:color 0.15s;font-size:10px;font-weight:500}
.tt.a{color:#3B82F6;font-weight:600}
</style>
</head>
<body>
<div id="app">
<div id="scr"></div>
<div class="tb" id="tb"></div>
</div>

  formTiming: 'start', formPrice: 'free', formPartners: []

function go(scr, extra) {
  S.scr = scr;
  if (extra) Object.assign(S, extra);
  if (scr === 'create') { S.cStep = 1; S.cloneFrom = null; }
  if (scr === 'checkin') S.ciMode = 'scan';
  if (scr === 'guests') { S.rFilter = 'All'; S.rSel = null; }

  S.showAcctPicker = false;
  render();
}

// ── Helpers ──
function bg(st,sm){
  const m={'Live':'bg-live','Live - Sold Out':'bg-sold','Draft':'bg-draft','Ended':'bg-ended','Scheduled':'bg-sched',
    'Checked-In':'bg-ci','Reserved':'bg-res','No-Show':'bg-ns'};
  return `<span class="bg ${m[st]||'bg-draft'}${sm?' bg-s':''}""><span class="dt"></span>${st}</span>`;
}
function fmtDate(d){const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function sameDay(a,b){return a.toDateString()===b.toDateString()}
function dayKey(d){return d.toISOString().slice(0,10)}
function mc(l,v,sub,icn,col,bgc){
  return `<div style="background:#fff;border-radius:12px;padding:14px;border:1px solid #E5E7EB;flex:1 1 45%;min-width:130px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><div style="font-size:11px;color:#6B7280;font-weight:500;margin-bottom:3px">${l}</div>
      <div style="font-size:20px;font-weight:700;color:#111827">${v}</div>
      ${sub?`<div style="font-size:10px;color:${col||'#0D9488'};margin-top:2px">${sub}</div>`:''}</div>
      <div style="width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:${bgc||'#EFF6FF'};color:${col||'#3B82F6'}">${ic(icn,16)}</div>
    </div></div>`;
}
function hdr(title,sub,back,right){
  return `<div style="background:#fff;padding:12px 16px;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99">
    <div style="display:flex;align-items:center;gap:10px">
      ${back?`<button onclick="${back}" style="background:none;border:none;padding:4px;display:flex;color:#374151">${ic('left',20)}</button>`:''}
      <div><div style="font-size:17px;font-weight:700;color:#111827;line-height:1.2">${title}</div>
      ${sub?`<div style="font-size:12px;color:#6B7280;margin-top:1px">${sub}</div>`:''}</div>
    </div>
    ${right||''}
  </div>`;
}

// ── Tab Bar ──
function renderTB(){
  const tabs=[{id:'home',ic:'home',l:'Home'},{id:'create',ic:'plus',l:'Create'},{id:'checkin',ic:'qr',l:'Check-In'},{id:'guests',ic:'users',l:'Guests'},{id:'menu',ic:'menu2',l:'Menu'}];
  const bar=document.getElementById('tb');
  bar.style.display=(S.scr==='liveview')?'none':'flex';
  bar.innerHTML=tabs.map(t=>`<button class="tt${S.scr===t.id?' a':''}" onclick="go('${t.id}')">${ic(t.ic,22)}<span>${t.l}</span></button>`).join('');
}

// ═══════════ HOME SCREEN ═══════════
function renderHome(){
  const today=S.calDay;
  const dayStr=dayKey(today);
  const isToday=sameDay(today,new Date());

  // Week strip
  const weekStart=new Date(today);
  weekStart.setDate(weekStart.getDate()-3);
  let weekDays=[];
  for(let i=0;i<7;i++){const d=new Date(weekStart);d.setDate(d.getDate()+i);weekDays.push(d);}

  const dayDrops=drops.filter(d=>d.date===dayStr);
  const draftDrops=drops.filter(d=>d.status==='Draft');

  return `
  <!-- Top: Account Switcher -->
  <div style="background:#1B2A4A;padding:14px 16px 12px;color:#fff">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <button onclick="S.showAcctPicker=!S.showAcctPicker;render()" style="background:none;border:none;color:#fff;display:flex;align-items:center;gap:8px;cursor:pointer">
        <div style="width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700">${acct().name.charAt(0)}</div>
        <div style="text-align:left">
          <div style="font-size:15px;font-weight:700;display:flex;align-items:center;gap:4px">${acct().name} ${ic('down',14)}</div>
          <div style="font-size:11px;opacity:0.6">${acct().role}</div>
        </div>
      </button>
      <div style="display:flex;gap:8px">
        <button style="width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;display:flex;align-items:center;justify-content:center;color:#fff">${ic('bell',18)}</button>
      </div>
    </div>
    ${S.showAcctPicker?`
    <div class="fi" style="margin-top:10px;background:rgba(255,255,255,0.1);border-radius:10px;overflow:hidden">
      ${accts.map((a,i)=>`
        <button onclick="acctIdx=${i};S.showAcctPicker=false;render()" style="width:100%;padding:10px 14px;background:${i===acctIdx?'rgba(255,255,255,0.15)':'transparent'};border:none;color:#fff;display:flex;align-items:center;gap:10px;text-align:left;border-bottom:${i<accts.length-1?'1px solid rgba(255,255,255,0.1)':'none'}">
          <div style="width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700">${a.name.charAt(0)}</div>
          <div><div style="font-size:13px;font-weight:600">${a.name}</div><div style="font-size:10px;opacity:0.6">${a.role} — ${a.cat}</div></div>
          ${i===acctIdx?`<div style="margin-left:auto;color:#22C55E">${ic('check',16)}</div>`:''}
        </button>
      `).join('')}
    </div>
    `:''}
  </div>

  <!-- Calendar Week Strip -->
  <div style="background:#fff;padding:10px 0 6px;border-bottom:1px solid #E5E7EB">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:0 16px;margin-bottom:8px">
      <button onclick="S.calDay.setDate(S.calDay.getDate()-7);render()" style="background:none;border:none;color:#374151;padding:4px">${ic('left',18)}</button>
      <span style="font-size:14px;font-weight:700;color:#111827">${today.toLocaleDateString('en-US',{month:'long',year:'numeric'})}</span>
      <button onclick="S.calDay.setDate(S.calDay.getDate()+7);render()" style="background:none;border:none;color:#374151;padding:4px">${ic('right',18)}</button>
    </div>
    <div style="display:flex;justify-content:space-around;padding:0 8px">
      ${weekDays.map(d=>{
        const sel=sameDay(d,today);
        const isT=sameDay(d,new Date());
        const hasDrops=drops.some(dr=>dr.date===dayKey(d));
        return `<button onclick="S.calDay=new Date('${d.toISOString()}');render()" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 8px;border-radius:12px;border:none;background:${sel?'#3B82F6':'transparent'};cursor:pointer;min-width:40px">
          <span style="font-size:10px;font-weight:500;color:${sel?'rgba(255,255,255,0.7)':isT?'#3B82F6':'#9CA3AF'}">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]}</span>
          <span style="font-size:16px;font-weight:${sel||isT?700:500};color:${sel?'#fff':isT?'#3B82F6':'#374151'}">${d.getDate()}</span>
          ${hasDrops?`<span style="width:5px;height:5px;border-radius:50%;background:${sel?'rgba(255,255,255,0.8)':'#3B82F6'}"></span>`:'<span style="width:5px;height:5px"></span>'}
        </button>`;
      }).join('')}
    </div>
  </div>

  <div style="padding:14px 16px">
    <!-- Selected day label -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:14px;font-weight:700;color:#111827">
        ${isToday?'Today':today.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}
        ${dayDrops.length>0?` — ${dayDrops.length} Drop${dayDrops.length>1?'s':''}`:''}
      </span>
      ${isToday?`<button onclick="S.calDay=new Date();render()" style="font-size:11px;color:#3B82F6;background:none;border:none;font-weight:600">Today</button>`:''}
    </div>

    ${dayDrops.length===0?`

      </div>
    </div></div>

    <div style="font-size:12px;font-weight:600;color:#6B7280;margin-bottom:6px">TEAM</div>
    ${team.map(t=>`
      <div style="background:#fff;border-radius:10px;border:1px solid #E5E7EB;padding:10px 12px;margin-bottom:5px;display:flex;align-items:center;gap:10px">
        <div style="width:32px;height:32px;border-radius:50%;background:${t.active?'#EFF6FF':'#F3F4F6'};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:${t.active?'#3B82F6':'#9CA3AF'}">${t.name.charAt(0)}</div>
        <div style="flex:1"><div style="font-size:12px;font-weight:600;color:#111827">${t.name}</div><div style="font-size:10px;color:#6B7280">${t.role}</div></div>
        <span class="bg ${t.active?'bg-ci':'bg-draft'} bg-s"><span class="dt"></span>${t.active?'Active':'Inactive'}</span>
      </div>
    `).join('')}
  </div>`;
}

// ── Render ──
function render(){
  const c=document.getElementById('scr');
  const map={home:renderHome,create:renderCreate,liveview:renderLive,checkin:renderCheckIn,guests:renderGuests,menu:renderMenu};
  c.innerHTML=(map[S.scr]||renderHome)();
  renderTB();
  c.scrollTop=0;
}
render();
</script>
</body>
