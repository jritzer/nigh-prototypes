// Helpers
function bg(st,sm){const m={'Live':'bg-live','Draft':'bg-draft','Ended':'bg-ended','Scheduled':'bg-sched','Paused':'bg-paused','Checked-In':'bg-ci','Reserved':'bg-res','No-Show':'bg-ns'};
  return `<span class="bg ${m[st]||'bg-draft'}${sm?' bg-s':''}""><span class="dt"></span>${st}</span>`;}
function fmtD(d){return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function sameD(a,b){return a.toDateString()===b.toDateString()}
function dk(d){return d.toISOString().slice(0,10)}
function fmtVenue(v){return v.replace(/,?\s*\d{5}(-\d{4})?\s*$/,'');}
function gSt(g){const t=g.tickets;if(t.length===1)return t[0].status;const ci=t.filter(x=>x.status==='Checked-In').length;if(ci===t.length)return'Checked-In';if(ci>0)return`${ci}/${t.length} In`;if(t.some(x=>x.status==='No-Show'))return'No-Show';return'Reserved';}
function mc(l,v,sub,icn,col,bgc){return `<div style="background:#fff;border-radius:12px;padding:14px;border:1px solid #E5E7EB;flex:1 1 45%;min-width:130px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:11px;color:#6B7280;font-weight:500;margin-bottom:3px">${l}</div><div style="font-size:20px;font-weight:700;color:#111827">${v}</div>${sub?`<div style="font-size:10px;color:${col||'#0D9488'};margin-top:2px">${sub}</div>`:''}</div><div style="width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:${bgc||'#EFF6FF'};color:${col||'#3B82F6'}">${ic(icn,16)}</div></div></div>`;}

// Tab
function timeRem(drop){
  const parseT=t=>{if(!t)return null;const m=t.match(/(\d+):(\d+)\s*(AM|PM)/i);if(!m)return null;let h=+m[1];const mn=+m[2];const ap=m[3].toUpperCase();if(ap==='PM'&&h!==12)h+=12;if(ap==='AM'&&h===12)h=0;const d=new Date(TODAY);d.setHours(h,mn,0,0);return d;};
  if(drop.status==='Live'){const end=parseT(drop.bcastEnd);if(!end)return'';const diff=end-TODAY;if(diff<=0)return'Ending soon';const h=Math.floor(diff/3600000);const m=Math.floor((diff%3600000)/60000);return h>0?h+'h '+m+'m remaining':m+'m remaining';}
  if(drop.status==='Scheduled'){const base=drop.date?new Date(drop.date+'T12:00:00'):new Date(TODAY);const pm=drop.bcastStart.match(/(\d+):(\d+)\s*(AM|PM)/i);if(!pm)return'';let bh=+pm[1];const bmn=+pm[2];const bap=pm[3].toUpperCase();if(bap==='PM'&&bh!==12)bh+=12;if(bap==='AM'&&bh===12)bh=0;base.setHours(bh,bmn,0,0);const diff=base-TODAY;if(diff<=0)return'Starting soon';const td=Math.floor(diff/86400000);const th=Math.floor((diff%86400000)/3600000);const tm=Math.floor((diff%3600000)/60000);return td>0?'Live in '+td+'d '+th+'h '+tm+'m':th>0?'Live in '+th+'h '+tm+'m':'Live in '+tm+'m';}
  if(drop.status==='Paused')return'Paused';
  return'';
}

  }).join('');
}

  if(S.cStep===0){

    <div style="padding:20px 16px 40px;display:flex;flex-direction:column;gap:8px">

        <div style="flex:1"><div style="font-size:12px;font-weight:700;color:#4C1D95">Resume with Niya</div><div style="font-size:11px;color:#7C3AED;margin-top:1px">Pick up where you left off</div></div>
        <span style="color:#8B5CF6">${ic('right',14)}</span>
      </button>`:''}

      ${(()=>{const allDrafts=drops.filter(d=>d.status==='Draft');if(!allDrafts.length)return'';return`<div style="margin-bottom:4px"><div style="font-size:11px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">Continue a Draft</div>${allDrafts.map(d=>{const idx=drops.indexOf(d);return`<div id="dcard-${idx}" style="width:100%;background:#fff;border:2px dashed #D1D5DB;border-radius:14px;overflow:hidden;margin-bottom:6px;box-sizing:border-box"><div class="dcard-normal" style="display:flex;align-items:stretch"><button onclick="go('create',{cloneFrom:${idx}})" style="flex:1;min-width:0;background:none;border:none;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;text-align:left;box-sizing:border-box"><div style="width:42px;height:42px;border-radius:10px;background:#F3F4F6;display:flex;align-items:center;justify-content:center;color:#9CA3AF;flex-shrink:0">${ic('edit',18)}</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.title||'Untitled Drop'}</div><div style="font-size:11px;color:#9CA3AF;margin-top:2px">${d.date?'Scheduled \u00B7 '+d.date:'No date set yet'}</div></div><span style="font-size:11px;font-weight:600;color:#3B82F6;flex-shrink:0;padding-left:8px">Continue \u2192</span></button><button onclick="draftDeleteAsk(${idx})" style="background:none;border:none;border-left:1.5px dashed #D1D5DB;width:44px;min-width:44px;cursor:pointer;color:#EF4444;display:flex;align-items:center;justify-content:center;flex-shrink:0">${ic('x',16)}</button></div><div class="dcard-confirm" style="display:none;align-items:center;padding:12px 14px;gap:10px"><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:#EF4444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.title||'Untitled Drop'}</div><div style="font-size:11px;color:#F87171;margin-top:2px">Delete this draft?</div></ // ═══ LIVE VIEW (Drop Detail) ═══
function renderLive(){
  const d=drops[S.drop||0];
  const isLive=d.status==='Live';const isPaused=d.status==='Paused';
  const dropGuests=guests.filter(g=>g.drop===d.id);
  const f=S.lvFilter||'All';
  const allTicketRows=dropGuests.flatMap(g=>g.tickets.map((t,ti)=>({g,t,ti:ti===0})));
  const filteredRows=f==='All'?allTicketRows:allTicketRows.filter(r=>r.t.status===f);
  const ciG=allTicketRows.filter(r=>r.t.status==='Checked-In').length;
  const resG=allTicketRows.filter(r=>r.t.status==='Reserved').length;
  const nsG=allTicketRows.filter(r=>r.t.status==='No-Show').length;
  // Smart default: Scheduled always shows Details; Live/Paused/Ended shows Guests if reservations exist
  const activeTab=S.lvTab||(d.status==='Scheduled'?'details':d.res>0?'guests':'details');
  const pct=d.res>0?Math.round((d.ci/d.res)*100):0;
  return `${hdr('Drop Details',null,"go('home')",`<button onclick="modal('dropmenu')" style="background:none;border:none;color:#4B5563;padding:4px">${ic('more',20)}</button>`)}
  <div style="padding:10px 16px">
    <!-- Compact identity strip -->
    <div style="background:#fff;border-radius:14px;border:2px solid ${isLive?'#22C55E':isPaused?'#F59E0B':'#E5E7EB'};padding:10px 12px;display:flex;gap:10px;align-items:center;margin-bottom:8px">
      <div style="width:46px;height:46px;border-radius:8px;background:linear-gradient(135deg,#1B2A4A,#3B82F6);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.2)">${d.media==='video'?ic('play',20):ic('image',20)}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
          <span style="font-size:14px;font-weight:700;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1">${d.title}</span>
          ${bg(d.status)}
        </div>
        <div style="font-size:11px;color:#6B7280;display:flex;gap:8px;flex-wrap:wrap">
          <span>${fmtD(d.date)} · ${d.start}</span>
          <span>${d.price===0?'Free':'$'+d.price}</span>
        </div>
        ${isLive?`<div style="font-size:10px;color:#16A34A;margin-top:2px;display:flex;align-items:center;gap:3px">${ic('radio',10)} Broadcasting until ${d.bcastEnd}</div>`:isPaused?`<div style="font-size:10px;color:#D97706;margin-top:2px;display:flex;align-items:center;gap:3px">${ic('alert',10)} Paused — spot holders only</div>`:''}
      </div>
    </div>

    <!-- Stats bar -->
    <div style="background:#fff;border-radius:12px;border:1px solid #E5E7EB;display:flex;margin-bottom:8px">
      ${[['Total',d.cap,'#1F2937'],['Reserved',d.res,'#3B82F6'],['Checked In',d.ci,'#0D9488'],['Not In',d.res-d.ci,'#F59E0B']].map((s,i)=>`${i?'<div style="width:1px;background:#E5E7EB"></div>':''}<div style="flex:1;text-align:center;padding:8px 4px"><div style="font-size:17px;font-weight:700;color:${s[2]}">${s[1]}</div><div style="font-size:9px;color:#9CA3AF;margin-top:1px">${s[0]}</div></div>`).join('')}
    </div>

    <!-- Tab switcher -->
    <div style="display:flex;background:#F3F4F6;border-radius:10px;padding:3px;margin-bottom:8px">
      <button onclick="S.lvTab='guests';render()" style="flex:1;padding:7px;border-radius:8px;font-size:12px;font-weight:600;border:none;background:${activeTab==='guests'?'#fff':'transparent'};color:${activeTab==='guests'?'#111827':'#9CA3AF'};box-shadow:${activeTab==='guests'?'0 1px 2px rgba(0,0,0,0.06)':'none'}">Guests</button>
      <button onclick="S.lvTab='details';render()" style="flex:1;padding:7px;border-radius:8px;font-size:12px;font-weight:600;border:none;background:${activeTab==='details'?'#fff':'transparent'};color:${activeTab==='details'?'#111827':'#9CA3AF'};box-shadow:${activeTab==='details'?'0 1px 2px rgba(0,0,0,0.06)':'none'}">Details</button>
    </div>

    <!-- Guests tab -->
    ${activeTab==='guests'?`
    <div style="margin-bottom:8px">
      ${d.status==='Scheduled'?'':`<div style="display:flex;background:#F9FAFB;border-radius:8px;padding:2px;margin-bottom:6px">
        ${[['All',allTicketRows.length],['Checked-In',ciG],['Reserved',resG],['No-Show',nsG]].map(([lbl,cnt])=>`<button onclick="S.lvFilter='${lbl}';render()" style="flex:1;padding:4px 2px;border-radius:6px;font-size:10px;font-weight:600;border:none;background:${f===lbl?'#fff':'transparent'};color:${f===lbl?'#374151':'#9CA3AF'};box-shadow:${f===lbl?'0 1px 2px rgba(0,0,0,0.06)':'none'}">${lbl==='Checked-In'?'In':lbl} <span style="font-size:9px;opacity:0.7">${cnt}</span></button>`).join('')}
      </div>`}
      <div style="height:348px;overflow-y:auto">
        ${d.status==='Scheduled'
          ?`<div style="text-align:center;padding:48px 16px;color:#9CA3AF">${ic('users',28)}<div style="font-size:13px;font-weight:500;margin-top:12px;color:#6B7280">Guests with reservations will be here</div></div>`
          :filteredRows.length?filteredRows.map(({g,t,ti})=>`
          <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F3F4F6">
            ${ti
              ?`<div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#3B82F6,#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0">${g.av}</div>`
              :`<div style="width:36px;flex-shrink:0;display:flex;justify-content:center"><div style="width:1px;height:36px;background:#E5E7EB;margin-top:-4px"></div></div>`}
            <div style="flex:1;min-width:0">
              ${ti?`<div style="font-size:13px;font-weight:600;color:#111827;line-height:1.2">${g.name}</div><div style="font-size:11px;color:#9CA3AF">${g.uname}</div>`:''}
              <div style="font-size:10px;color:#9CA3AF;font-family:monospace;letter-spacing:0.04em;margin-top:${ti?2:0}px">${t.tid}</div>
            </div>
            ${t.status!=='Reserved'?bg(t.status,true):''}
            ${t.status==='Reserved'&&d.status!=='Ended'?`<button style="padding:5px 10px;border-radius:7px;font-size:10px;font-weight:700;border:none;background:#0D9488;color:#fff;flex-shrink:0">Check In</button>`:''}
            ${t.status==='Reserved'&&d.status==='Ended'?`<div style="display:flex;gap:5px;flex-shrink:0"><button style="padding:5px 10px;border-radius:7px;font-size:10px;font-weight:700;border:none;background:#0D9488;color:#fff">Mark Attended</button><button style="padding:5px 10px;border-radius:7px;font-size:10px;font-weight:600;border:1px solid #E5E7EB;background:#fff;color:#9CA3AF">No Show</button></div>`:''}
          </div>`).join('')
          :`<div style="text-align:center;padding:40px 16px;color:#9CA3AF"><div style="font-size:13px">No tickets in this category</div></div>`}
      </div>

    </div>`}


    <!-- Actions -->
    <div style="display:flex;gap:6px">
      <button onclick="S.niyaFabContext='liveview';S.niyaMode='manage';S.niyaStep=0;S.niyaListening=false;S.scr='niya';render()" style="flex:2;padding:10px;border-radius:10px;font-size:12px;font-weight:600;background:linear-gradient(135deg,#1B0057,#5B21B6);color:#fff;border:none;display:flex;align-items:center;justify-content:center;gap:5px">${ic('sparkles',13)} Edit with Niya</button>
      ${isLive?`<button onclick="modal('share-${S.drop}')" style="flex:1;padding:10px;border-radius:10px;font-size:12px;font-weight:600;border:1px solid #D1D5DB;background:#fff;color:#374151;display:flex;align-items:center;justify-content:center;gap:5px">${ic('share',13)} Share</button>`:''}
      ${isLive?`<button onclick="S.niyaFabContext='liveview';S.niyaMode='manage';S.niyaStep=0;S.niyaListening=false;S.scr='niya';render()" style="flex:1;padding:10px;border-radius:10px;font-size:12px;font-weight:600;border:1px solid #F59E0B;background:#FFFBEB;color:#F59E0B;display:flex;align-items:center;justify-content:center;gap:5px">${ic('pause',13)} Pause</button>`
      :isPaused?`<button onclick="S.niyaFabContext='liveview';S.niyaMode='manage';S.niyaStep=0;S.niyaListening=false;S.scr='niya';render()" style="flex:1;padding:10px;border-radius:10px;font-size:12px;font-weight:600;border:none;background:#22C55E;color:#fff;display:flex;align-items:center;justify-content:center;gap:5px">${ic('play',13)} Resume</button>`:''}
      ${d.status==='Ended'?`<button onclick="go('create',{cloneFrom:${S.drop}})" style="flex:1;padding:10px;border-radius:10px;font-size:12px;font-weight:600;border:1px solid #8B5CF6;background:#EDE9FE;color:#5B21B6;display:flex;align-items:center;justify-content:center;gap:5px">${ic('copy',13)} Duplicate</button>`:''}
    </div>
  </div>`;
}

      </div>

      <div style="display:flex;gap:8px;justify-content:center">

// ═══ GUESTS ═══
function renderG(){
  const live=drops.find(d=>d.status==='Live')||drops[0];
  const cur=S.guestDrop==='all'?null:S.guestDrop&&S.guestDrop!=='current'?drops.find(d=>d.id===S.guestDrop)||live:live;
  const fl=['All','Checked-In','Reserved','No-Show'];
  const gl=cur?guests.filter(g=>g.drop===cur.id):guests;
  const fg=S.rFilter==='All'?gl:gl.filter(g=>{const st=gSt(g);return S.rFilter==='Checked-In'?st.includes('Checked')||st.includes('In'):st===S.rFilter;});
  const isLiveDrop=drops.some(d=>d.status==='Live');
  const view=S.guestView||'list';

  const modeToggle=isLiveDrop?`<div style="display:flex;background:#F3F4F6;border-radius:10px;padding:3px;margin-bottom:10px">
    <button onclick="S.guestView='checkin';S.ciMode='scan';render()" style="flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:600;border:none;display:flex;align-items:center;justify-content:center;gap:5px;background:${view==='checkin'?'#fff':'transparent'};color:${view==='checkin'?'#1F2937':'#6B7280'};box-shadow:${view==='checkin'?'0 1px 2px rgba(0,0,0,0.06)':'none'}">${ic('qr',14)} Check-In</button>
    <button onclick="S.guestView='list';render()" style="flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:600;border:none;display:flex;align-items:center;justify-content:center;gap:5px;background:${view==='list'?'#fff':'transparent'};color:${view==='list'?'#1F2937':'#6B7280'};box-shadow:${view==='list'?'0 1px 2px rgba(0,0,0,0.06)':'none'}">${ic('users',14)} Guest List</button>
  </div>`:'';

  if(view==='checkin') return `${hdr('Check-In','')}
  <div style="padding:12px 16px">${modeToggle}${renderCIBody()}</div>`;

  const guestList=`
    <select onchange="S.guestDrop=this.value;S.rFilter='All';S.rSel=null;render()" style="width:100%;padding:8px 10px;border-radius:8px;border:1px solid #E5E7EB;font-size:13px;color:#111827;background:#fff;font-weight:600;margin-bottom:8px;box-sizing:border-box">
      ${drops.filter(d=>d.status!=='Draft').map(d=>`<option value="${d.id}" ${(S.guestDrop===d.id||((!S.guestDrop||S.guestDrop==='current')&&d.id===live.id))?'selected':''}>${d.title} — ${fmtD(d.date)}</option>`).join('')}
      <option value="all" ${S.guestDrop==='all'?'selected':''}>All Guests</option>
    </select>
    <div style="display:flex;align-items:center;gap:8px;background:#fff;border-radius:10px;border:1px solid #E5E7EB;padding:7px 10px;margin-bottom:8px"><span style="color:#9CA3AF">${ic('search',15)}</span><input placeholder="Search by name or username..." style="flex:1;border:none;outline:none;font-size:12px;color:#111827;background:transparent"/></div>
    <div style="display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap">${fl.map(f=>{const cnt=f==='All'?gl.length:gl.filter(g=>{const st=gSt(g);return f==='Checked-In'?st.includes('Checked')||st.includes('In'):st===f}).length;return`<button onclick="S.rFilter='${f}';S.rSel=null;render()" style="padding:5px 12px;border-radius:18px;font-size:11px;font-weight:500;border:1px solid ${S.rFilter===f?'#3B82F6':'#E5E7EB'};background:${S.rFilter===f?'#EFF6FF':'#fff'};color:${S.rFilter===f?'#3B82F6':'#4B5563'};white-space:nowrap">${f} (${cnt})</button>`;}).join('')}</div>
    ${fg.map(g=>{const st=gSt(g);const multi=g.tickets.length>1;const exp=S.rSel===g.id;
      return `<div onclick="S.rSel=S.rSel==='${g.id}'?null:'${g.id}';render()" style="background:#fff;border-radius:10px;padding:10px 12px;border:1px solid ${exp?'#3B82F6':'#E5E7EB'};margin-bottom:6px;cursor:pointer">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#3B82F6,#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0">${g.av}</div>
          <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:#111827">${g.name}</div><div style="font-size:11px;color:#9CA3AF">${g.uname}</div></div>
          <div style="text-align:right;flex-shrink:0">
            ${multi?`<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:${st.includes('/')? '#FEF3C7':'#DCFCE7'};color:${st.includes('/')?'#92400E':'#166534'}">${st}</span>`
              :bg(g.tickets[0].status,true)}
            ${multi?`<div style="font-size:10px;color:#9CA3AF;margin-top:2px">${g.tickets.length} spots</div>`:''}
          </div>
        </div>
        ${exp?`<div class="fi" style="margin-top:8px;padding-top:8px;border-top:1px solid #F3F4F6">
          ${multi?`<div style="margin-bottom:8px">${g.tickets.map(t=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:11px"><span style="color:#6B7280">${t.tid}</span>${bg(t.status,true)}<div style="display:flex;gap:4px">${t.status==='Reserved'?`<button onclick="event.stopPropagation()" style="padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;border:none;background:#0D9488;color:#fff">Check In</button>`:''}<button onclick="event.stopPropagation()" style="padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;border:1px solid #EF4444;background:#FEF2F2;color:#EF4444">Cancel</button></div></div>`).join('')}</div>`:''}
          ${!multi?`<div style="display:flex;gap:5px">
            ${g.tickets[0].status==='Reserved'?`<button onclick="event.stopPropagation()" style="flex:1;padding:7px;border-radius:7px;font-size:11px;font-weight:600;border:none;background:#0D9488;color:#fff;display:flex;align-items:center;justify-content:center;gap:3px">${ic('check',13)} Check In</button>`:''}
            <button onclick="event.stopPropagation()" style="flex:1;padding:7px;border-radius:7px;font-size:11px;font-weight:600;border:1px solid #EF4444;background:#FEF2F2;color:#EF4444;display:flex;align-items:center;justify-content:center;gap:3px">${ic('x',13)} Cancel & Refund</button></div>`:''}
        </div>`:''}</div>`;}).join('')}`;

  return `${hdr('Check-In','')}
  <div style="padding:12px 16px">${modeToggle}${guestList}</div>`;
}

function renderCustomers(){
  if(S.modal&&S.modal.startsWith('customer-'))return renderCustomerDetail(S.modal.replace('customer-',''));
  if(S.modal==='csv-import')return renderCsvImport();

  const custFilter=S.custFilter||'all';
  const custDrop=S.custDropFilter||'all';
  const q=S.custSearch.toLowerCase();

  // Apply filters
  let filtered=customerList.filter(c=>{
    if(q&&!c.name.toLowerCase().includes(q)&&!c.email.toLowerCase().includes(q)&&!c.phone.includes(q))return false;
    if(custFilter==='attended'&&c.drops.length===0)return false;
    if(custFilter==='never'&&c.drops.length>0)return false;

        ? `<div style="display:flex;gap:8px;align-items:center;justify-content:center">
            <button onclick="S.niyaListening=true;render()" style="background:none;border:none;padding:0;cursor:pointer;border-radius:50%;overflow:hidden;width:48px;height:48px;flex-shrink:0"><img src="niya_icon.svg" style="width:48px;height:48px;object-fit:cover;display:block;border-radius:50%;animation:niyaInnerPulse 2.5s ease-in-out infinite"/></button>
            <button onclick="S.niyaMode='review';render()" style="background:#7C3AED;color:#fff;border:none;border-radius:12px;padding:13px 22px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px;flex:1;justify-content:center">${ic('check',16)} Review Drop</button>
          </div>`
        : `<button onclick="S.niyaListening=true;render()" style="background:none;border:none;padding:0;cursor:pointer;border-radius:50%;overflow:hidden;width:64px;height:64px;display:block;margin:0 auto"><img src="niya_icon.svg" style="width:64px;height:64px;object-fit:cover;display:block;border-radius:50%;animation:niyaInnerPulse 2.5s ease-in-out infinite"/></button>
           <div style="display:flex;justify-content:center;gap:14px;margin-top:10px">
             <button onclick="S.niyaStep=Math.min(S.niyaStep+1,8);render()" style="background:none;border:none;color:#7C3AED;font-size:11px;font-weight:600;cursor:pointer">Next step →</button>
             <span style="color:#D1D5DB">|</span>
             <button onclick="S.niyaStep=8;render()" style="background:none;border:none;color:#7C3AED;font-size:11px;font-weight:600;cursor:pointer">Skip to Review ⇒</button>
           </div>`
      }
      `}
    </div>
  </div>`;
}

function renderNiyaManage(){
  const conv=niyaConvData.manage;
  const step=S.niyaStep;
  const visibleConv=conv.slice(0,Math.min(step*2+1,conv.length));
  const isListening=S.niyaListening;

  const ctxLabel=niyaContextLabels[S.niyaFabContext]||'';
  const manageTitle=ctxLabel?'Ask Niya — '+ctxLabel:'Ask Niya';
  const manageBack="S.scr='"+(S.niyaFabContext||'home')+"';S.niyaMode=null;render()";
  return `${hdr(manageTitle,'',manageBack)}
  <div style="padding:14px 16px">

    <!-- Quick prompts -->
    ${step===0?`<div style="margin-bottom:14px">
      <div style="font-size:11px;font-weight:600;color:#9CA3AF;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em">Try asking</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${(niyaContextPrompts[S.niyaFabContext||'home']||niyaContextPrompts.home).map((q,i)=>`<button onclick="S.niyaStep=${i+1};S.niyaListening=false;render()" style="background:#F5F3FF;border:1px solid #DDD6FE;border-radius:10px;padding:10px 12px;text-align:left;font-size:12px;color:#4C1D95;font-weight:500;display:flex;align-items:center;gap:8px">${ic('mic',14)} ${q}</button>`).join('')}
      </div>
    </div>`:''}

    <!-- Conversation -->
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px">
      ${visibleConv.map((m,i)=>{
        const isN=m.from==='niya';
        return `<div class="slideUp" style="display:flex;gap:8px;align-items:flex-end;${isN?'':'flex-direction:row-reverse'}">
          ${isN?niyaAvatar(30):''}
          <div style="max-width:80%;display:flex;flex-direction:column;gap:6px">
            <div style="background:${isN?'#EDE9FE':'#1B2A4A'};border-radius:${isN?'14px 14px 14px 4px':'14px 14px 4px 14px'};padding:10px 12px">
              <div style="font-size:13px;color:${isN?'#4C1D95':'#fff'};line-height:1.45">${m.text}</div>
            </div>
            ${m.card&&m.card.startsWith('guests')?niyaGuestCard(m.card.replace('guests-','')):''}
            ${m.card&&!m.card.startsWith('guests')?niyaDropCard(m.card):''}
          </div>
        </div>`;
      }).join('')}

      ${step>0&&step<3?`<div style="display:flex;gap:8px;align-items:center">${niyaAvatar(30)}<div style="background:#EDE9FE;border-radius:14px;padding:8px 12px;display:flex;gap:5px">
        <div class="niya-dot" style="animation-delay:0s"></div>
        <div class="niya-dot" style="animation-delay:0.2s"></div>
        <div class="niya-dot" style="animation-delay:0.4s"></div>
      </div></div>`:''}
    </div>

    <!-- Voice input -->
    <div style="background:#fff;border-radius:16px;border:1px solid #E5E7EB;padding:14px;text-align:center">
      ${isListening?`<div style="display:flex;justify-content:center;margin-bottom:10px">${niyaWave(true)}</div>
      <div style="font-size:12px;font-weight:600;color:#7C3AED;margin-bottom:10px">Listening...</div>
      <button onclick="S.niyaListening=false;if(S.niyaStep<3)S.niyaStep++;render()" style="background:#EF4444;color:#fff;border:none;border-radius:50%;width:52px;height:52px;display:flex;align-items:center;justify-content:center;margin:0 auto">${ic('x',20)}</button>`
      :`<div style="font-size:12px;color:#6B7280;margin-bottom:10px">Tap mic or type your question</div>
      <button onclick="S.niyaListening=true;render()" style="background:none;border:none;padding:0;cursor:pointer;border-radius:50%;overflow:hidden;width:64px;height:64px;display:block;margin:0 auto"><img src="niya_icon.svg" style="width:64px;height:64px;object-fit:cover;display:block;border-radius:50%;animation:niyaInnerPulse 2.5s ease-in-out infinite"/></button>
      <div style="display:flex;align-items:center;gap:8px;margin-top:12px;background:#F9FAFB;border-radius:10px;border:1px solid #E5E7EB;padding:8px 12px">
        <input placeholder="Or type here..." style="flex:1;border:none;background:transparent;font-size:12px;outline:none;color:#111827"/>
        <button onclick="if(S.niyaStep<3)S.niyaStep++;render()" style="background:#7C3AED;border:none;border-radius:8px;padding:5px 10px;color:#fff;font-size:11px;font-weight:600">Ask</button>
      </div>`}
    </div>
  </div>`;
}

function renderNiyaReview(){
  const d={title:'Spring Wine Tasting Dinner',date:'2026-03-14',start:'7:00 PM',bcastStart:'4:00 PM',bcastEnd:'6:45 PM',cap:16,price:65,venue:acct().name+', '+acct().addr,hosts:['Josh Ritzer'],partners:[],desc:'5-course dinner paired with local Colorado wines.'};
  const pl='$'+d.price+' / spot';
  return `${hdr('Review Your Drop','Created with Niya',"S.niyaMode='create';render()")}
  <div style="padding:14px 16px">

    <!-- Niya summary line -->
    <div style="display:flex;align-items:flex-start;gap:10px;background:#EDE9FE;border-radius:12px;padding:12px;margin-bottom:14px">
      ${niyaAvatar(32)}
      <div style="font-size:12px;color:#4C1D95;line-height:1.5">Everything looks great! Review the details below. Once you're happy, tap <strong>Publish</strong> to go live.</div>
    </div>

    <!-- Drop preview card -->
    <div class="card" style="margin-bottom:14px">
      <div style="height:140px;position:relative;overflow:hidden;border-radius:12px 12px 0 0">
        <!-- Nice generic Nigh background -->
        <div style="position:absolute;inset:0;background:linear-gradient(135deg,#0F172A 0%,#1E3A5F 40%,#1B2A4A 70%,#0F172A 100%)"></div>
        <!-- Subtle geometric pattern -->
        <svg style="position:absolute;inset:0;width:100%;height:100%;opacity:0.07" viewBox="0 0 375 140" preserveAspectRatio="xMidYMid slice">
          <circle cx="80" cy="30" r="60" fill="none" stroke="#fff" stroke-width="1"/>
          <circle cx="80" cy="30" r="90" fill="none" stroke="#fff" stroke-width="0.5"/>
          <circle cx="300" cy="110" r="70" fill="none" stroke="#fff" stroke-width="1"/>
          <circle cx="300" cy="110" r="100" fill="none" stroke="#fff" stroke-width="0.5"/>
          <circle cx="190" cy="70" r="40" fill="none" stroke="#fff" stroke-width="0.5"/>
        </svg>
        <!-- Nigh wordmark centered -->
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
          <span style="font-size:28px;font-weight:900;color:rgba(255,255,255,0.18);letter-spacing:0.15em;font-family:-apple-system,BlinkMacSystemFont,sans-serif">NIGH</span>
        </div>
        <!-- Upload nudge -->
        <div style="position:absolute;bottom:8px;right:10px;display:flex;gap:6px;align-items:center">
          <span style="font-size:10px;color:rgba(255,255,255,0.5);background:rgba(0,0,0,0.3);padding:3px 8px;border-radius:6px">Default background</span>
          <button style="font-size:10px;font-weight:600;color:#fff;background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.2);border-radius:6px;padding:3px 8px">Upload yours</button>
        </div>
      </div>
      <div class="cb">
        <div style="font-size:16px;font-weight:700;color:#111827;margin-bottom:6px">${d.title}</div>
        <div style="font-size:12px;color:#6B7280;margin-bottom:10px;line-height:1.5">${d.desc}</div>
        ${[['cal','Date',fmtD(d.date)],['clock','Time',d.start],['radio','Broadcast',d.bcastStart+' — '+d.bcastEnd],['map','Location',d.venue.split(',').slice(0,2).join(',')],['users','Capacity',''+d.cap+' spots'],['dollar','Price',pl],['user','Host',d.hosts.join(', ')]].map((r,i,a)=>`
          <div style="display:flex;align-items:center;gap:8px;padding:7px 0;${i<a.length-1?'border-bottom:1px solid #F3F4F6':''}">
            <span style="color:#9CA3AF">${ic(r[0],14)}</span>
            <span style="font-size:11px;color:#6B7280;width:68px">${r[1]}</span>
            <span style="font-size:12px;color:#111827;font-weight:500;flex:1">${r[2]}</span>
          </div>`).join('')}
      </div>
    </div>

    <!-- Edit nudge -->
    <div style="background:#FFF7ED;border-radius:10px;border:1px solid #FDE68A;padding:10px 12px;display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:11px;color:#92400E">
      ${ic('alert',14)} Want to change something? <button onclick="S.niyaMode='create';render()" style="background:none;border:none;color:#D97706;font-size:11px;font-weight:700;cursor:pointer">Go back →</button>
    </div>

    <!-- Publish buttons -->
    <div style="display:flex;gap:8px">
      <button onclick="S.scr='create';S.cStep=0;S.niyaMode=null;render()" style="flex:1;padding:13px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid #D1D5DB;background:#fff;color:#374151">Save Draft</button>
      <button onclick="S.scr='home';S.niyaMode=null;S.niyaStep=0;render()" style="flex:2;padding:13px;border-radius:10px;font-size:13px;font-weight:700;border:none;background:#0E4EF5;color:#fff;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 2px 8px rgba(14,78,245,0.35)">${ic('sparkles',16)} Publish Drop</button>
    </div>
    <div style="text-align:center;font-size:11px;color:#9CA3AF;margin-top:12px;line-height:1.5">Niya A.I. assistant is still learning —<br>always double-check your drop details before publishing.</div>
  </div>`;
}


function renderNiyaFAB(){return;
  const show=['home','liveview','checkin','guests','inbox'].includes(S.scr);
  if(!show) return;
  const fab=document.createElement('button');
  fab.className='niya-fab';
  fab.title='Ask Niya';
  fab.innerHTML=niyaAvatar(52,true);
  fab.onclick=()=>{
    S.niyaFabContext=S.scr;
    S.scr='niya';S.niyaMode='manage';S.niyaStep=0;S.niyaListening=false;
    render();
  };
  document.getElementById('app').appendChild(fab);
}

// ── Render ──
function render(){
  const c=document.getElementById('scr');
  const m={home:renderHome,create:renderCreate,liveview:renderLive,checkin:renderCI,guests:renderG,inbox:renderInbox,menu:renderMenu,niya:renderNiya};
  c.innerHTML=(m[S.scr]||renderHome)();
  renderTB();renderModal();c.scrollTop=0;
  // Remove any existing FAB then re-render
  const oldFab=document.querySelector('.niya-fab');if(oldFab)oldFab.remove();
  renderNiyaFAB();
}
render();
</script>
