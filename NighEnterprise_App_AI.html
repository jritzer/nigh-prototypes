// ─────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────
function go(page, extra) { Object.assign(S, { page }, extra||{}); render(); }
function ss(updates) { Object.assign(S, updates); render(); }
function regionById(id) { return REGIONS.find(r=>r.id===id); }
function districtById(id) { return DISTRICTS.find(d=>d.id===id); }

function filteredLocations() {
  return LOCATIONS.filter(l => {
    if (S.regionFilter !== 'all' && l.region !== S.regionFilter) return false;
    if (S.districtFilter !== 'all' && l.district !== S.districtFilter) return false;
    return true;
  });
}

function badge(status) {
  const map = {
    live:       ['#10b981','#d1fae5','Live'],
    scheduled:  ['#3b82f6','#dbeafe','Scheduled'],
    ended:      ['#6b7280','#f3f4f6','Ended'],
    active:     ['#10b981','#d1fae5','Active'],
    inactive:   ['#ef4444','#fee2e2','Inactive'],
    push:       ['#7c3aed','#ede9fe','Corp Push'],
    local:      ['#6b7280','#f3f4f6','Local'],
    flagship:   ['#f59e0b','#fef3c7','Flagship'],
    seasonal:   ['#0ea5e9','#e0f2fe','Seasonal'],
    standard:   ['#6b7280','#f3f4f6','Standard'],
  };
  const [color,bg,label] = map[status]||['#6b7280','#f3f4f6',status];
  return `<span style="background:${bg};color:${color};font-size:0.68rem;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap;letter-spacing:0.02em;">${label}</span>`;
}

function pct(n,d) { return d ? Math.round(n/d*100) : 0; }
function fmtMoney(n) { return n>=1000 ? '$'+(n/1000).toFixed(1)+'k' : '$'+n; }
function fmtNum(n) { return n>=1000 ? (n/1000).toFixed(1)+'k' : String(n); }
function showColor(r) { return r>=85?'#10b981':r>=75?'#f59e0b':'#ef4444'; }

function infoRow(label, value) {
  return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:0.82rem;"><span style="color:#64748b;">${label}</span><span style="font-weight:700;color:#0f172a;">${value}</span></div>`;
}

  switch(S.page) {
    case 'dashboard': return rDashboard();
    case 'locations': return rLocations();
    case 'drops':     return rDrops();
    case 'collections': return rCollections();
    case 'customers': return rCustomers();
    case 'analytics': return rAnalytics();
    case 'users':     return rUsers();

    case 'settings':  return rSettings();
    default: return rDashboard();
  }
}

// ─────────────────────────────────────────────────────────────
// DASHBOARD
// ─────────────────────────────────────────────────────────────
function rDashboard() {
  const totalCI = LOCATIONS.reduce((a,l)=>a+l.mtdCheckins,0);
  const totalDrops = LOCATIONS.reduce((a,l)=>a+l.mtdDrops,0);
  const totalRev = LOCATIONS.reduce((a,l)=>a+l.mtdRevenue,0);
  const avgShow = Math.round(LOCATIONS.reduce((a,l)=>a+l.showRate,0)/LOCATIONS.length);
  const liveNow = LOCATIONS.filter(l=>l.activeDrop).length;
  const activeCount = LOCATIONS.filter(l=>l.status==='active').length;

  const regData = REGIONS.map(r=>{
    const ls = LOCATIONS.filter(l=>l.region===r.id);
    return { ...r, count:ls.length, ci:ls.reduce((a,l)=>a+l.mtdCheckins,0), drops:ls.reduce((a,l)=>a+l.mtdDrops,0), show:Math.round(ls.reduce((a,l)=>a+l.showRate,0)/ls.length), rev:ls.reduce((a,l)=>a+l.mtdRevenue,0) };
  });
  const maxCI = Math.max(...regData.map(r=>r.ci));
  const topLocs = [...LOCATIONS].sort((a,b)=>b.mtdCheckins-a.mtdCheckins).slice(0,4);
  const attnLocs = LOCATIONS.filter(l=>l.showRate<72||l.status==='inactive');

  return `
    <!-- KPIs -->
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px;">
      ${kpi('Check-ins MTD',   fmtNum(totalCI),   'across all locations',ic('check',16),'#10b981')}
      ${kpi('Drops MTD',       String(totalDrops), 'across all locations',nighBug(19),'#6366f1')}
      ${kpi('Avg Show Rate',   avgShow+'%',        'reserv → check-in',  ic('trending',16),'#f59e0b')}
      ${kpi('Revenue MTD',     fmtMoney(totalRev), 'paid drops only',    ic('dollar',16),'#0ea5e9')}
      ${kpi('Live Right Now',  liveNow+' drops',   activeCount+' active locations',ic('radio',16),'#ef4444')}
    </div>

    <div style="display:grid;grid-template-columns:1fr 320px;gap:18px;margin-bottom:18px;">
      <!-- Regional performance -->
      <div style="background:#fff;border-radius:16px;border:1px solid #e5e7eb;padding:22px;">

function kpi(label, value, sub, icon, color) {
  return `
    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:18px 20px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div style="font-size:0.72rem;font-weight:700;color:#64748b;">${label}</div>
        <div style="width:30px;height:30px;background:${color}18;border-radius:8px;display:flex;align-items:center;justify-content:center;color:${color};">${icon}</div>
      </div>
      <div style="font-size:1.6rem;font-weight:900;letter-spacing:-0.03em;color:#0f172a;margin-bottom:3px;">${value}</div>
      <div style="font-size:0.68rem;color:#94a3b8;">${sub}</div>
    </div>
  `;
}

function statusBar(label, count, total, color) {
  return `
    <div style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
        <span style="font-size:0.78rem;font-weight:600;">${label}</span>
        <span style="font-size:0.78rem;font-weight:800;color:${color};">${count}</span>
      </div>
      <div style="background:#f1f5f9;border-radius:4px;height:6px;overflow:hidden;">
        <div style="background:${color};height:100%;width:${pct(count,total)}%;border-radius:4px;"></div>
      </div>
    </div>
  `;
}

// ─────────────────────────────────────────────────────────────
// LOCATIONS
// ─────────────────────────────────────────────────────────────
function rLocations() {
  if (S.hierarchyView === 'region') return rLocByRegion();
  if (S.hierarchyView === 'district') return rLocByDistrict();
  return rLocByCity();
}

function filterBar() {
  const regDistricts = S.regionFilter !== 'all' ? DISTRICTS.filter(d=>d.region===S.regionFilter) : [];
  return `
    <div style="display:flex;gap:10px;margin-bottom:20px;align-items:center;flex-wrap:wrap;">
      <select onchange="ss({regionFilter:this.value,districtFilter:'all'})" style="border:1px solid #e5e7eb;border-radius:8px;padding:8px 28px 8px 12px;font-size:0.82rem;font-weight:600;background:#fff;cursor:pointer;">
        <option value="all">All Regions</option>
        ${REGIONS.map(r=>`<option value="${r.id}" ${S.regionFilter===r.id?'selected':''}>${r.name}</option>`).join('')}
      </select>
      ${S.regionFilter!=='all'?`
        <select onchange="ss({districtFilter:this.value})" style="border:1px solid #e5e7eb;border-radius:8px;padding:8px 28px 8px 12px;font-size:0.82rem;font-weight:600;background:#fff;cursor:pointer;">
          <option value="all">All Districts</option>
          ${regDistricts.map(d=>`<option value="${d.id}" ${S.districtFilter===d.id?'selected':''}>${d.name}</option>`).join('')}
        </select>
      `:''}
      <div style="margin-left:auto;font-size:0.8rem;color:#64748b;">${filteredLocations().length} location${filteredLocations().length!==1?'s':''}</div>
      <button onclick="ss({pushModal:true,pushStep:1})" style="background:#0f172a;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-weight:700;font-size:0.78rem;cursor:pointer;">⚡ Push Drop</button>
    </div>
  `;
}

function rLocByRegion() {
  const regions = REGIONS.filter(r=> S.regionFilter==='all' || r.id===S.regionFilter);
  return filterBar() + regions.map(r=>{
    const locs = LOCATIONS.filter(l=>l.region===r.id && (S.districtFilter==='all'||l.district===S.districtFilter));
    if (!locs.length) return '';
    const ci = locs.reduce((a,l)=>a+l.mtdCheckins,0);
    const show = Math.round(locs.reduce((a,l)=>a+l.showRate,0)/locs.length);
    return `
      <div style="margin-bottom:22px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
          <div style="width:10px;height:10px;border-radius:50%;background:${r.color};flex-shrink:0;"></div>
          <span style="font-weight:800;font-size:1rem;">${r.name}</span>
          <span style="font-size:0.75rem;color:#94a3b8;">${locs.length} locations · ${fmtNum(ci)} check-ins · ${show}% avg show</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;">
          ${locs.map(l=>locationCard(l)).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function rLocByDistrict() {
  const dists = DISTRICTS.filter(d=>(S.regionFilter==='all'||d.region===S.regionFilter)&&(S.districtFilter==='all'||d.id===S.districtFilter));
  return filterBar() + dists.map(d=>{
    const locs = LOCATIONS.filter(l=>l.district===d.id);
    if (!locs.length) return '';
    const r = regionById(d.region);
    const ci = locs.reduce((a,l)=>a+l.mtdCheckins,0);
    return `
      <div style="margin-bottom:22px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
          <span style="background:${r?.color}18;color:${r?.color};font-size:0.7rem;font-weight:800;padding:3px 10px;border-radius:20px;">${r?.name}</span>
          <span style="font-weight:800;font-size:0.95rem;">${d.name}</span>
          <span style="font-size:0.72rem;color:#94a3b8;">${locs.length} locations · ${fmtNum(ci)} check-ins</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;">
          ${locs.map(l=>locationCard(l)).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function rLocByCity() {
  const locs = filteredLocations().sort((a,b)=>a.city.localeCompare(b.city));
  return filterBar() + `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;">${locs.map(l=>locationCard(l)).join('')}</div>`;
}

function locationCard(l) {
  const reg = regionById(l.region);
  return `
    <div onclick="ss({locationDetail:'${l.id}'})" style="background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:18px;cursor:pointer;transition:box-shadow 0.15s,transform 0.1s;" onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,0.09)';this.style.transform='translateY(-1px)'" onmouseout="this.style.boxShadow='none';this.style.transform='none'">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
        <div>
          <div style="font-weight:800;font-size:0.88rem;">${l.name}</div>
          <div style="font-size:0.72rem;color:#94a3b8;margin-top:2px;">${l.city}, ${l.state}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          ${badge(l.status)}
          ${l.activeDrop?`<span style="font-size:0.65rem;color:#10b981;font-weight:800;">● Live</span>`:''}
        </div>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;">
        <span style="background:${reg?.color}15;color:${reg?.color};font-size:0.65rem;font-weight:800;padding:2px 8px;border-radius:20px;">${reg?.abbr}</span>
        ${badge(l.tier)}
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding-top:10px;border-top:1px solid #f1f5f9;">
        <div><div style="font-size:0.65rem;color:#94a3b8;">Drops</div><div style="font-weight:900;font-size:1rem;">${l.mtdDrops}</div></div>
        <div><div style="font-size:0.65rem;color:#94a3b8;">Check-ins</div><div style="font-weight:900;font-size:1rem;">${fmtNum(l.mtdCheckins)}</div></div>
        <div><div style="font-size:0.65rem;color:#94a3b8;">Show Rate</div><div style="font-weight:900;font-size:1rem;color:${showColor(l.showRate)};">${l.showRate}%</div></div>
      </div>
      <div style="margin-top:8px;font-size:0.68rem;color:#94a3b8;">Mgr: <span style="color:#475569;font-weight:600;">${l.manager}</span></div>
    </div>
  `;
}

// Location detail modal

  const dist = districtById(l.district);

          <div>
            <div style="font-weight:900;font-size:1.15rem;">${l.name}</div>

          </div>
          <button onclick="ss({locationDetail:null})" style="background:#f1f5f9;border:none;border-radius:8px;width:30px;height:30px;font-size:0.9rem;cursor:pointer;color:#475569;">✕</button>

          <div style="font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:#94a3b8;margin-bottom:10px;">Location Details</div>
          ${infoRow('Manager', l.manager)}
          ${infoRow('Region', reg?.name||'—')}
          ${infoRow('District', dist?.name||'—')}
          ${infoRow('Tier', l.tier.charAt(0).toUpperCase()+l.tier.slice(1))}
          ${infoRow('Status', l.status.charAt(0).toUpperCase()+l.status.slice(1))}
          ${infoRow('Active Drop', l.activeDrop ? '● Live right now' : 'None')}
        </div>
        <div style="display:flex;gap:8px;">
          <button onclick="ss({pushModal:true,pushStep:1,locationDetail:null})" style="flex:1;background:#0f172a;color:#fff;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;">⚡ Push a Drop Here</button>
          <button onclick="ss({locationDetail:null})" style="flex:1;background:#f1f5f9;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;color:#475569;">Close</button>
        </div>
      </div>
    </div>
  `;
}

function miniStat(label, value, color) {

function rDrops() {
  const tabs = ['all','live','scheduled','ended'];

  return `
    <div style="display:flex;gap:6px;margin-bottom:20px;align-items:center;">
      ${tabs.map(t=>`
        <button onclick="ss({dropsTab:'${t}'})" style="background:${S.dropsTab===t?'#0f172a':'#fff'};color:${S.dropsTab===t?'#fff':'#475569'};border:1px solid ${S.dropsTab===t?'#0f172a':'#e5e7eb'};padding:7px 16px;border-radius:8px;font-weight:700;font-size:0.78rem;cursor:pointer;text-transform:capitalize;">${t==='all'?'All Drops ('+CORP_DROPS.length+')':t.charAt(0).toUpperCase()+t.slice(1)+' ('+CORP_DROPS.filter(d=>d.status===t).length+')'}</button>
      `).join('')}
      <button onclick="ss({pushModal:true,pushStep:1})" style="margin-left:auto;background:#0f172a;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-weight:700;font-size:0.8rem;cursor:pointer;">⚡ Push New Drop</button>

    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:16px;overflow:hidden;">
      <table>
        <thead>
          <tr style="background:#f8f9fb;border-bottom:1px solid #e5e7eb;">
            ${['Drop Title','Scope','Type / Status','Cap','Reserved','Checked In','Show Rate'].map((h,i)=>`
              <th style="padding:11px 14px;text-align:${i>2?'right':'left'};font-size:0.68rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:#64748b;white-space:nowrap;">${h}</th>

          </tr>
        </thead>
        <tbody>
          ${list.map((d,i)=>{
            const showRate = d.totalRes>0&&d.totalCI>0 ? pct(d.totalCI,d.totalRes) : null;
            return `
              <tr style="border-bottom:1px solid #f8f9fb;${i%2?'background:#fafafa':''}">
                <td style="padding:13px 14px;">
                  <div style="font-weight:700;font-size:0.83rem;">${d.title}</div>
                  <div style="font-size:0.68rem;color:#94a3b8;margin-top:2px;">${d.date} · by ${d.creator}</div>
                </td>
                <td style="padding:13px 14px;">
                  <div style="font-size:0.82rem;font-weight:600;">${d.scope}</div>
                  <div style="font-size:0.68rem;color:#94a3b8;">${d.scopeDetail}</div>
                </td>
                <td style="padding:13px 14px;">
                  <div style="display:flex;gap:4px;flex-wrap:wrap;">${badge(d.type)} ${badge(d.status)}</div>

                <td style="padding:13px 14px;text-align:right;font-weight:700;font-size:0.85rem;">${d.totalCap}</td>
                <td style="padding:13px 14px;text-align:right;font-weight:700;font-size:0.85rem;">${d.totalRes}</td>
                <td style="padding:13px 14px;text-align:right;font-weight:700;font-size:0.85rem;">${d.totalCI||'—'}</td>
                <td style="padding:13px 14px;text-align:right;font-weight:800;font-size:0.85rem;color:${showRate?showColor(showRate):'#94a3b8'};">${showRate ? showRate+'%' : '—'}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>

function rCollections() {
  const filter = S.collectionFilter || 'all';
  const list = filter === 'all' ? COLLECTIONS : COLLECTIONS.filter(c=>c.status===filter);

  const statusColors = { live:'#10b981', upcoming:'#3b82f6', ended:'#6b7280' };
  const statusBg     = { live:'#d1fae5', upcoming:'#dbeafe', ended:'#f3f4f6' };

  // Summary KPIs
  const totalCollections  = COLLECTIONS.length;
  const liveCount         = COLLECTIONS.filter(c=>c.status==='live').length;
  const upcomingCount     = COLLECTIONS.filter(c=>c.status==='upcoming').length;
  const totalParticipants = COLLECTIONS.reduce((a,c)=>a+c.participation.filter(p=>['confirmed','live','ended'].includes(p.status)).length,0);

  return `
    <!-- KPIs -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;">
      ${kpi('Collections',    String(totalCollections), 'total campaigns',             ic('layers',16),'#6366f1')}
      ${kpi('Live Now',       String(liveCount),        'actively running',             ic('radio',16),'#10b981')}
      ${kpi('Upcoming',       String(upcomingCount),    'in planning or confirmed',     ic('cal',16),'#3b82f6')}

    </div>

    <!-- Filter tabs -->
    <div style="display:flex;gap:6px;margin-bottom:18px;align-items:center;">
      ${['all','live','upcoming','ended'].map(f=>`
        <button onclick="ss({collectionFilter:'${f}'})" style="background:${filter===f?'#0f172a':'#fff'};color:${filter===f?'#fff':'#475569'};border:1px solid ${filter===f?'#0f172a':'#e5e7eb'};padding:7px 16px;border-radius:8px;font-weight:700;font-size:0.78rem;cursor:pointer;text-transform:capitalize;">${f==='all'?'All ('+COLLECTIONS.length+')':f.charAt(0).toUpperCase()+f.slice(1)+' ('+COLLECTIONS.filter(c=>c.status===f).length+')'}</button>

    </div>

    <!-- Collection cards -->
    <div style="display:flex;flex-direction:column;gap:14px;">
      ${list.map(col => {
        const confirmed  = col.participation.filter(p=>['confirmed','live','ended'].includes(p.status)).length;

        const totalCap   = col.participation.reduce((a,p)=>a+p.cap,0);
        const totalRes   = col.participation.reduce((a,p)=>a+p.res,0);

        return `

              ${collStat('Pending',    pending,             '#f59e0b')}
              ${collStat('Declined',   declined,            '#ef4444')}

              ${collStat('Reserved',   totalRes||'—',       '#0ea5e9')}

            <!-- Participation bar -->

              <div style="flex:1;height:6px;background:#f1f5f9;border-radius:4px;overflow:hidden;display:flex;">
                <div style="background:#10b981;width:${pct(confirmed,totalLocs)}%;"></div>
                <div style="background:#fbbf24;width:${pct(pending,totalLocs)}%;"></div>
                <div style="background:#fca5a5;width:${pct(declined,totalLocs)}%;"></div>
              </div>
              <span style="font-size:0.68rem;color:#64748b;margin-left:8px;white-space:nowrap;">${confirmed}/${totalLocs} ${col.type==='venue'?'biz':'loc'}</span>
            </div>
          </div>
        `;
      }).join('')}
    </div>

    ${S.collectionDetail ? collectionDetailPanel() : ''}
    ${S.newCollModal ? newCollModal() : ''}
  `;
}

}

function rCustomers() {
  const custSort = S.custSort || 'checkins';
  const custFilter = S.custFilter || 'all';
  const custRegion = S.custRegion || 'all';

  let list = [...CUSTOMERS];
  if (custFilter !== 'all') list = list.filter(c=>c.status===custFilter);
  if (custRegion !== 'all') list = list.filter(c=>c.region===custRegion);
  list.sort((a,b)=>{
    if (custSort==='drops')    return b.drops-a.drops;
    if (custSort==='checkins') return b.checkins-a.checkins;
    if (custSort==='spend')    return b.totalSpend-a.totalSpend;
    if (custSort==='showRate') return (b.checkins/b.drops)-(a.checkins/a.drops);
    return 0;
  });

  const totalUnique   = CUSTOMERS.length;
  const totalCI       = CUSTOMERS.reduce((a,c)=>a+c.checkins,0);
  const avgDrops      = (CUSTOMERS.reduce((a,c)=>a+c.drops,0)/CUSTOMERS.length).toFixed(1);
  const avgShow       = Math.round(CUSTOMERS.reduce((a,c)=>a+(c.checkins/c.drops),0)/CUSTOMERS.length*100);
  const multiLocCount = CUSTOMERS.filter(c=>{
    const loc = LOCATIONS.find(l=>l.id===c.homeLocation);
    return loc && LOCATIONS.filter(l=>l.region===loc.region).length > 1;
  }).length;

  const statusColors  = { active:'#10b981', 'at-risk':'#f59e0b', churned:'#ef4444' };
  const statusLabels  = { active:'Active', 'at-risk':'At Risk', churned:'Churned' };

  // Regional customer breakdown
  const regBreakdown = REGIONS.map(r=>{
    const cs = CUSTOMERS.filter(c=>c.region===r.id);
    return { ...r, count:cs.length, ci:cs.reduce((a,c)=>a+c.checkins,0), show:cs.length?Math.round(cs.reduce((a,c)=>a+(c.checkins/c.drops),0)/cs.length*100):0 };
  });

  return `
    <!-- KPIs -->
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px;">
      ${kpi('Unique Customers', String(totalUnique),   'across all locations',ic('user',16),'#6366f1')}
      ${kpi('Total Check-ins',  fmtNum(totalCI),       'all-time customer CI', ic('check',16),'#10b981')}
      ${kpi('Avg Drops / Customer', avgDrops,          'per active customer',  nighBug(19),'#0ea5e9')}
      ${kpi('Avg Show Rate',    avgShow+'%',            'across all customers', ic('trending',16),'#f59e0b')}
      ${kpi('Multi-Location',   multiLocCount,          'visited 2+ locations', ic('map',16),'#8b5cf6')}
    </div>

    <div style="display:grid;grid-template-columns:1fr 280px;gap:18px;margin-bottom:18px;">
      <!-- Filters + table -->
      <div>
        <div style="display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap;">
          <!-- Status filter -->
          <div style="display:flex;gap:4px;background:#f1f5f9;border-radius:8px;padding:3px;">
            ${['all','active','at-risk','churned'].map(f=>`
              <button onclick="ss({custFilter:'${f}'})" style="background:${custFilter===f?'#fff':'transparent'};border:none;padding:5px 12px;border-radius:6px;font-size:0.75rem;font-weight:${custFilter===f?'700':'500'};color:${custFilter===f?'#0f172a':'#64748b'};cursor:pointer;white-space:nowrap;box-shadow:${custFilter===f?'0 1px 4px rgba(0,0,0,0.08)':'none'};">${f==='all'?'All':statusLabels[f]||f}</button>
            `).join('')}
          </div>
          <!-- Region filter -->
          <select onchange="ss({custRegion:this.value})" style="border:1px solid #e5e7eb;border-radius:8px;padding:7px 28px 7px 10px;font-size:0.8rem;font-weight:600;background:#fff;cursor:pointer;">
            <option value="all">All Regions</option>
            ${REGIONS.map(r=>`<option value="${r.id}" ${custRegion===r.id?'selected':''}>${r.name}</option>`).join('')}
          </select>
          <!-- Sort -->
          <select onchange="ss({custSort:this.value})" style="border:1px solid #e5e7eb;border-radius:8px;padding:7px 28px 7px 10px;font-size:0.8rem;font-weight:600;background:#fff;cursor:pointer;">
            <option value="checkins">Sort: Check-ins</option>
            <option value="drops">Sort: Drops</option>
            <option value="spend">Sort: Total Spend</option>
            <option value="showRate">Sort: Show Rate</option>
          </select>
          <div style="margin-left:auto;font-size:0.78rem;color:#64748b;">${list.length} customer${list.length!==1?'s':''}</div>
        </div>

        <div style="background:#fff;border:1px solid #e5e7eb;border-radius:16px;overflow:hidden;">
          <table>
            <thead>
              <tr style="background:#f8f9fb;border-bottom:1px solid #e5e7eb;">
                ${['#','Customer','Home Location','Region','Drops','Check-ins','Show Rate','Spend','Status','Last Drop'].map((h,i)=>`
                  <th style="padding:10px 12px;text-align:${i>2?'right':i===9?'left':'left'};font-size:0.63rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:#64748b;white-space:nowrap;">${h}</th>
                `).join('')}
              </tr>
            </thead>
            <tbody>
              ${list.map((c,i)=>{
                const loc = LOCATIONS.find(l=>l.id===c.homeLocation);
                const reg = regionById(c.region);
                const sr  = Math.round(c.checkins/c.drops*100);
                return `
                  <tr style="border-bottom:1px solid #f8f9fb;" onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background='transparent'">
                    <td style="padding:10px 12px;font-size:0.78rem;font-weight:700;color:#cbd5e1;">${i+1}</td>
                    <td style="padding:10px 12px;">
                      <div style="display:flex;align-items:center;gap:8px;">
                        <div style="width:28px;height:28px;background:${statusColors[c.status]}20;color:${statusColors[c.status]};border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:800;flex-shrink:0;">${c.name.split(' ').map(n=>n[0]).join('')}</div>
                        <div>
                          <div style="font-weight:700;font-size:0.82rem;white-space:nowrap;">${c.name}</div>
                          <div style="font-size:0.65rem;color:#94a3b8;">${c.city}, ${c.state}</div>
                        </div>
                      </div>
                    </td>
                    <td style="padding:10px 12px;font-size:0.8rem;font-weight:600;color:#475569;white-space:nowrap;">${loc?.name||'—'}</td>
                    <td style="padding:10px 12px;"><span style="background:${reg?.color}15;color:${reg?.color};font-size:0.63rem;font-weight:800;padding:2px 7px;border-radius:20px;">${reg?.abbr}</span></td>
                    <td style="padding:10px 12px;text-align:right;font-size:0.83rem;font-weight:700;">${c.drops}</td>
                    <td style="padding:10px 12px;text-align:right;font-size:0.83rem;font-weight:800;">${c.checkins}</td>
                    <td style="padding:10px 12px;text-align:right;font-size:0.83rem;font-weight:800;color:${showColor(sr)};">${sr}%</td>
                    <td style="padding:10px 12px;text-align:right;font-size:0.83rem;font-weight:600;">${c.totalSpend>0?'$'+c.totalSpend:'—'}</td>
                    <td style="padding:10px 12px;text-align:right;">
                      <span style="background:${statusColors[c.status]}18;color:${statusColors[c.status]};font-size:0.63rem;font-weight:800;padding:3px 8px;border-radius:20px;">${statusLabels[c.status]}</span>
                    </td>
                    <td style="padding:10px 12px;font-size:0.75rem;color:#64748b;white-space:nowrap;">${c.lastDrop}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <!-- Right column: breakdown + segments -->
      <div style="display:flex;flex-direction:column;gap:14px;">

        <!-- Status breakdown -->
        <div style="background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:18px;">
          <div style="font-weight:800;font-size:0.88rem;margin-bottom:3px;">Customer Health</div>
          <div style="font-size:0.72rem;color:#64748b;margin-bottom:14px;">Across all regions</div>
          ${[['active','Active','#10b981'],['at-risk','At Risk','#f59e0b'],['churned','Churned','#ef4444']].map(([s,label,color])=>{
            const count = CUSTOMERS.filter(c=>c.status===s).length;
            return statusBar(label, count, CUSTOMERS.length, color);
          }).join('')}
          <div style="font-size:0.7rem;color:#94a3b8;margin-top:10px;line-height:1.6;">At Risk = no drop in 30+ days. Churned = no drop in 60+ days or 0 check-ins.</div>
        </div>

        <!-- Regional breakdown -->
        <div style="background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:18px;">
          <div style="font-weight:800;font-size:0.88rem;margin-bottom:3px;">By Region</div>
          <div style="font-size:0.72rem;color:#64748b;margin-bottom:14px;">Customers per region</div>
          ${regBreakdown.map(r=>`
            <div onclick="ss({custRegion:custRegion===r.id?'all':r.id})" style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f8f9fb;cursor:pointer;" onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background='transparent'">
              <div style="width:8px;height:8px;border-radius:50%;background:${r.color};flex-shrink:0;"></div>

        <!-- Multi-location insight -->
        <div style="background:#f0f9ff;border:1px solid #bae6fd;border-radius:14px;padding:18px;">
          <div style="font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:#0369a1;margin-bottom:6px;">💡 Cross-Location Insight</div>
          <div style="font-size:0.8rem;color:#0c4a6e;line-height:1.65;"><strong>${multiLocCount} customers</strong> have visited drops across multiple locations in their region. These are your highest-loyalty customers — ideal targets for enterprise-wide drop invitations.</div>
        </div>

      </div>
    </div>
  `;
}

    if (S.analyticsSort==='revenue') return b.mtdRevenue-a.mtdRevenue;

  if (S.hierarchyView==='district') return rAnalyticsByDistrict();

                <th style="padding:8px ${i>0?'10px':'0'};text-align:${i>2?'right':'left'};font-size:0.65rem;font-weight:800;text-transform:uppercase;color:#94a3b8;white-space:nowrap;">${h}</th>

function rSettings() {
  function sRow(label, val) {
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #f1f5f9;font-size:0.83rem;"><span style="color:#475569;">${label}</span><span style="font-weight:700;">${val}</span></div>`;
  }
  function sCard(title, sub, rows) {
    return `<div style="background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:24px;margin-bottom:16px;"><div style="font-weight:800;font-size:0.92rem;margin-bottom:2px;">${title}</div><div style="font-size:0.75rem;color:#64748b;margin-bottom:16px;">${sub}</div>${rows}</div>`;
  }
  return `<div style="max-width:640px;">
    ${sCard('Brand Settings','Enterprise account configuration',
      sRow('Brand Name','Patagonia')+sRow('Account Tier','Enterprise')+sRow('Total Locations','20')+sRow('Active Regions','5')+sRow('Primary Contact','alex.torres@patagonia.com')+sRow('Nigh Enterprise ID','ENT-PAT-001')
    )}
    ${sCard('Drop Policies','Corporate rules applied to all locations',
      sRow('Corporate Approval Required','No — locations can run independently')+sRow('Max Broadcast Window','48 hours before start time')+sRow('Same-Day Drops Allowed','Yes')+sRow('Location Customization','Allowed within corporate template parameters')+sRow('Revenue Reporting','Required for all paid drops')
    )}
    ${sCard('Hierarchy','How your organization is structured in Nigh',
      sRow('Structure','Brand → Region → District → Location')+sRow('Regions','5 (West Coast, Mountain West, Northeast, Southeast, Central)')+sRow('Districts','11 across all regions')+sRow('Total Locations','20 · 19 active, 1 inactive')
    )}
    ${sCard('Notifications & Alerts','What triggers alerts to corporate admins',
      sRow('Low show rate alert','Below 70% — notify regional manager')+sRow('Drop capacity filled','Notify location manager immediately')+sRow('Inactive location alert','No drop in 14 days — escalate to regional')+sRow('Weekly rollup report','Every Monday, 8am — all corporate admins')+sRow('New location onboarded','Notify corporate admin immediately')
    )}
  </div>`;
}

          </div>

          <!-- Geo-fence section -->
          <div style="background:#fefce8;border:1px solid #fde68a;border-radius:12px;padding:16px 18px;margin-bottom:16px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
              <div style="display:flex;align-items:center;gap:8px;">
                <span style="color:#d97706;">${ic('map',18)}</span>
                <div>
                  <div style="font-weight:800;font-size:0.82rem;color:#78350f;">Geo-fence</div>
                  <div style="font-size:0.7rem;color:#92400e;">Drops only surface in-app when the customer is physically within the boundary</div>
                </div>
              </div>
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                <span style="font-size:0.72rem;font-weight:700;color:#78350f;">${isVenue ? 'On (recommended)' : 'Optional'}</span>
                <input type="checkbox" ${isVenue ? 'checked' : ''} style="width:16px;height:16px;accent-color:#d97706;cursor:pointer;">
              </label>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
              <div>
                <label style="font-size:0.68rem;font-weight:700;color:#92400e;display:block;margin-bottom:5px;">Boundary Type</label>
                <select style="width:100%;box-sizing:border-box;border:1px solid #fde68a;border-radius:8px;padding:9px 11px;font-size:0.82rem;font-family:inherit;outline:none;background:#fff8e1;">
                  <option>Circular radius</option>
                  <option>Custom polygon</option>
                </select>
              </div>
              <div>
                <label style="font-size:0.68rem;font-weight:700;color:#92400e;display:block;margin-bottom:5px;">Radius</label>
                <select style="width:100%;box-sizing:border-box;border:1px solid #fde68a;border-radius:8px;padding:9px 11px;font-size:0.82rem;font-family:inherit;outline:none;background:#fff8e1;">
                  <option>300 ft — tight (store interior)</option>
                  <option ${isVenue?'selected':''}>600 ft — standard (venue grounds)</option>
                  <option>1,000 ft — wide (festival / mall)</option>
                  <option>2,500 ft — large (amusement park)</option>
                  <option>Custom</option>
                </select>
              </div>
            </div>
            <div style="margin-bottom:12px;">
              <label style="font-size:0.68rem;font-weight:700;color:#92400e;display:block;margin-bottom:5px;">Center Address</label>
              <input placeholder="e.g. 1000 Chopper Cir, Denver, CO 80204" style="width:100%;box-sizing:border-box;border:1px solid #fde68a;border-radius:8px;padding:9px 11px;font-size:0.82rem;font-family:inherit;outline:none;background:#fff8e1;" onfocus="this.style.borderColor='#d97706'" onblur="this.style.borderColor='#fde68a'">
            </div>
            <div>
              <label style="font-size:0.68rem;font-weight:700;color:#92400e;display:block;margin-bottom:5px;">Customer-Facing Message (shown on geo-fence trigger)</label>
              <input placeholder='e.g. "You&apos;re inside Ball Arena — exclusive drops are live"' style="width:100%;box-sizing:border-box;border:1px solid #fde68a;border-radius:8px;padding:9px 11px;font-size:0.82rem;font-family:inherit;outline:none;background:#fff8e1;" onfocus="this.style.borderColor='#d97706'" onblur="this.style.borderColor='#fde68a'">
            </div>
          </div>

          <div style="display:flex;gap:10px;">
            <button onclick="ss({newCollStep:1})" style="flex:1;background:#f1f5f9;border:none;padding:12px;border-radius:10px;font-weight:700;cursor:pointer;color:#475569;">← Back</button>
            <button onclick="ss({newCollStep:3})" style="flex:2;background:#0f172a;color:#fff;border:none;padding:12px;border-radius:10px;font-weight:700;cursor:pointer;">Next: Review & Create →</button>
          </div>
        ` : `
          <!-- STEP 3: Review & Create -->
          <div style="background:#f8f9fb;border-radius:14px;padding:20px;margin-bottom:20px;">
            <div style="font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:#94a3b8;margin-bottom:14px;">Collection Summary</div>
            <div style="display:grid;gap:10px;">
              ${infoRow('Type', isVenue ? '🏟️ Venue' : '🏢 Internal')}
              ${infoRow('Name', '(from step 1)')}
              ${infoRow('Theme', '(from step 1)')}
              ${infoRow('Window', '(from step 2)')}
              ${infoRow('Scope', isVenue ? '(venue name from step 1)' : '(from step 2)')}
              ${infoRow('Price Guardrail', '(from step 2)')}
              ${infoRow('Cap Guardrail', '(from step 2)')}
              ${infoRow('Geo-fence', isVenue ? '📍 Enabled · 600 ft radius' : '—')}
            </div>
          </div>

          <div style="background:${isVenue?'#fdf4ff':'#f0fdf4'};border:1px solid ${isVenue?'#e9d5ff':'#bbf7d0'};border-radius:10px;padding:14px;margin-bottom:20px;">
            <div style="font-size:0.78rem;font-weight:700;color:${isVenue?'#7e22ce':'#15803d'};margin-bottom:4px;">${isVenue ? '🏟️ Venue Collection' : '🏢 Internal Collection'}</div>
            <div style="font-size:0.73rem;color:${isVenue?'#9333ea':'#166534'};line-height:1.6;">
              ${isVenue
                ? 'Invites will be sent to external businesses via Nigh. Each business opts in, creates their own drop, and owns their customer data independently.'
                : 'Participation invites will be sent to all location managers in scope. Each location can opt in or decline and create their own drop within your guardrails.'}
            </div>
          </div>

          <div style="display:flex;gap:10px;">
            <button onclick="ss({newCollStep:2})" style="flex:1;background:#f1f5f9;border:none;padding:12px;border-radius:10px;font-weight:700;cursor:pointer;color:#475569;">← Back</button>
            <button onclick="ss({newCollModal:false,page:'collections'})" style="flex:2;background:${isVenue?'#9333ea':'#10b981'};color:#fff;border:none;padding:12px;border-radius:10px;font-weight:800;cursor:pointer;font-size:0.9rem;">✓ Create Collection</button>
          </div>
        `}
      </div>
    </div>
  `;
}

// ─────────────────────────────────────────────────────────────
// PUSH DROP MODAL (3 steps)
// ─────────────────────────────────────────────────────────────
function pushModal() {
  return `
    <div onclick="ss({pushModal:false})" style="position:fixed;inset:0;background:rgba(15,23,42,0.5);z-index:200;display:flex;align-items:center;justify-content:center;">
      <div onclick="event.stopPropagation()" style="background:#fff;border-radius:20px;width:580px;max-height:88vh;overflow-y:auto;padding:32px;">
        <!-- Progress bar -->
        <div style="display:flex;gap:4px;margin-bottom:28px;">
          ${[1,2,3].map(n=>`<div style="flex:1;height:4px;border-radius:4px;background:${n<=S.pushStep?'#0f172a':'#e5e7eb'};"></div>`).join('')}
        </div>
        ${S.pushStep===1 ? pushStep1() : S.pushStep===2 ? pushStep2() : pushStep3()}
      </div>
    </div>
  `;
}

function pushStep1() {
  return `
    <div style="margin-bottom:24px;">
      <div style="font-size:0.65rem;font-weight:800;color:#94a3b8;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;">Step 1 of 3</div>
      <div style="font-weight:900;font-size:1.2rem;">Create Drop Template</div>
      <div style="font-size:0.82rem;color:#64748b;margin-top:2px;">Define the drop that will be pushed to your locations.</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div>
        <label style="display:block;font-size:0.75rem;font-weight:800;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em;">Drop Title</label>
        <input type="text" placeholder="e.g. Earth Day Repair Workshop" style="width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 14px;font-size:0.88rem;outline:none;"/>
      </div>
      <div>
        <label style="display:block;font-size:0.75rem;font-weight:800;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em;">Drop Type</label>
        <select style="width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 14px;font-size:0.88rem;background:#fff;">
          <option>Free experience / event</option>
          <option>Paid ticketed experience</option>
          <option>Product launch / preview</option>
          <option>Community / brand activation</option>
          <option>Worn Wear / repair event</option>
          <option>Staff demo / pro day</option>
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div>
          <label style="display:block;font-size:0.75rem;font-weight:800;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em;">Drop Date</label>
          <input type="date" style="width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 14px;font-size:0.88rem;"/>
        </div>
        <div>
          <label style="display:block;font-size:0.75rem;font-weight:800;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em;">Start Time</label>
          <input type="time" style="width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 14px;font-size:0.88rem;"/>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div>
          <label style="display:block;font-size:0.75rem;font-weight:800;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em;">Cap per Location</label>
          <input type="number" placeholder="e.g. 30" style="width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 14px;font-size:0.88rem;"/>
        </div>
        <div>
          <label style="display:block;font-size:0.75rem;font-weight:800;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em;">Price per Spot</label>
          <input type="text" placeholder="$0 for free" style="width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 14px;font-size:0.88rem;"/>
        </div>
      </div>
      <div>
        <label style="display:block;font-size:0.75rem;font-weight:800;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em;">Description</label>
        <textarea placeholder="Describe the experience customers will have..." style="width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 14px;font-size:0.88rem;height:76px;resize:none;font-family:inherit;"></textarea>
      </div>
      <div style="background:#f8f9fb;border-radius:10px;padding:14px;">
        <div style="font-size:0.75rem;font-weight:800;margin-bottom:8px;">Location Customization</div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          <label style="display:flex;align-items:center;gap:8px;font-size:0.82rem;cursor:pointer;"><input type="radio" name="custom" checked/> Allow locations to adjust title, description & image</label>
          <label style="display:flex;align-items:center;gap:8px;font-size:0.82rem;cursor:pointer;"><input type="radio" name="custom"/> Run exactly as defined — no changes</label>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:22px;">
      <button onclick="ss({pushModal:false})" style="flex:1;background:#f1f5f9;border:none;padding:12px;border-radius:10px;font-weight:700;cursor:pointer;color:#475569;">Cancel</button>
      <button onclick="ss({pushStep:2})" style="flex:2;background:#0f172a;color:#fff;border:none;padding:12px;border-radius:10px;font-weight:700;cursor:pointer;">Next: Select Scope →</button>
    </div>
  `;
}

function pushStep2() {
  const scopes = [
    { id:'all',      label:'All Locations',    sub:'All 20 locations across 5 regions', count:20 },
    { id:'region',   label:'By Region',        sub:'Push to one or more regions',       count:null },
    { id:'district', label:'By District',      sub:'Target specific districts',          count:null },
    { id:'custom',   label:'Custom Selection', sub:'Hand-pick individual locations',     count:null },
  ];
  return `
    <div style="margin-bottom:24px;">
      <div style="font-size:0.65rem;font-weight:800;color:#94a3b8;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;">Step 2 of 3</div>
      <div style="font-weight:900;font-size:1.2rem;">Select Scope</div>
      <div style="font-size:0.82rem;color:#64748b;margin-top:2px;">Where should this drop run?</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;">
      ${scopes.map(o=>`
        <div onclick="ss({pushTarget:'${o.id}'})" style="border:2px solid ${S.pushTarget===o.id?'#0f172a':'#e5e7eb'};border-radius:12px;padding:14px 16px;cursor:pointer;background:${S.pushTarget===o.id?'#f8f9fb':'#fff'};transition:all 0.12s;">
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:18px;height:18px;border-radius:50%;border:2px solid ${S.pushTarget===o.id?'#0f172a':'#cbd5e1'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">${S.pushTarget===o.id?`<div style="width:8px;height:8px;border-radius:50%;background:#0f172a;"></div>`:''}</div>
            <div style="flex:1;">
              <div style="font-weight:700;font-size:0.88rem;">${o.label} ${o.count?`<span style="color:#6366f1;">(${o.count})</span>`:''}</div>
              <div style="font-size:0.75rem;color:#64748b;">${o.sub}</div>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
    ${S.pushTarget==='region'?`
      <div style="margin-bottom:18px;">
        <div style="font-size:0.75rem;font-weight:800;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em;">Select Regions</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          ${REGIONS.map(r=>`<div style="border:2px solid ${r.color};border-radius:8px;padding:7px 14px;cursor:pointer;font-size:0.8rem;font-weight:700;color:${r.color};background:${r.color}10;">${r.name}</div>`).join('')}
        </div>
      </div>
    `:''}
    ${S.pushTarget==='district'?`
      <div style="margin-bottom:18px;">
        <div style="font-size:0.75rem;font-weight:800;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em;">Select Districts</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          ${DISTRICTS.map(d=>{const r=regionById(d.region);return `<div style="border:2px solid ${r?.color};border-radius:8px;padding:6px 12px;cursor:pointer;font-size:0.75rem;font-weight:700;color:${r?.color};background:${r?.color}10;">${d.name}<span style="opacity:0.6;margin-left:4px;">${r?.abbr}</span></div>`;}).join('')}
        </div>
      </div>
    `:''}
    ${S.pushTarget==='custom'?`
      <div style="margin-bottom:18px;">
        <div style="font-size:0.75rem;font-weight:800;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em;">Select Locations</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:180px;overflow-y:auto;border:1px solid #e5e7eb;border-radius:10px;padding:10px;">
          ${LOCATIONS.map(l=>{const r=regionById(l.region);return `<label style="display:flex;align-items:center;gap:8px;padding:5px;border-radius:7px;cursor:pointer;font-size:0.78rem;" onmouseover="this.style.background='#f8f9fb'" onmouseout="this.style.background='transparent'"><input type="checkbox"/><span style="font-weight:600;">${l.name}</span><span style="color:${r?.color};font-size:0.65rem;">${r?.abbr}</span></label>`;}).join('')}
        </div>
      </div>
    `:''}
    <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:13px;margin-bottom:18px;font-size:0.82rem;">
      <span style="font-weight:700;">Estimated reach: </span>
      <span style="color:#1d4ed8;font-weight:800;">${S.pushTarget==='all'?'20 locations · ~600 total cap (30/location)':'Select your scope above to see the reach estimate'}</span>
    </div>
    <div style="display:flex;gap:10px;">
      <button onclick="ss({pushStep:1})" style="flex:1;background:#f1f5f9;border:none;padding:12px;border-radius:10px;font-weight:700;cursor:pointer;color:#475569;">← Back</button>
      <button onclick="ss({pushStep:3})" style="flex:2;background:#0f172a;color:#fff;border:none;padding:12px;border-radius:10px;font-weight:700;cursor:pointer;">Next: Review & Push →</button>
    </div>
  `;
}

function pushStep3() {
  return `
    <div style="margin-bottom:24px;">
      <div style="font-size:0.65rem;font-weight:800;color:#94a3b8;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;">Step 3 of 3</div>
      <div style="font-weight:900;font-size:1.2rem;">Review & Push</div>
      <div style="font-size:0.82rem;color:#64748b;margin-top:2px;">Confirm details before sending to your locations.</div>
    </div>
    <div style="background:#f8f9fb;border-radius:14px;padding:18px;margin-bottom:18px;">
      <div style="font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:#94a3b8;margin-bottom:12px;">Drop Summary</div>
      ${infoRow('Title','Earth Day Repair Workshop')}
      ${infoRow('Type','Free experience / event')}
      ${infoRow('Date','April 22, 2026')}
      ${infoRow('Start Time','10:00 AM local time (each location)')}
      ${infoRow('Cap per Location','30 spots')}
      ${infoRow('Price','Free')}
      ${infoRow('Scope','All Locations — 20 locations')}
      ${infoRow('Estimated Total Cap','600 spots')}
      ${infoRow('Location Customization','Allowed within template')}
    </div>
    <div style="background:#fefce8;border:1px solid #fde68a;border-radius:10px;padding:14px;margin-bottom:18px;">
      <div style="font-weight:800;font-size:0.82rem;color:#92400e;margin-bottom:5px;">⚡ What happens when you push</div>
      <div style="font-size:0.78rem;color:#78350f;line-height:1.65;">Each location manager receives a notification and can confirm or customize within the parameters you set. Drops go live at each location only after the manager confirms. You'll see real-time confirmation status in your Drops dashboard.</div>
    </div>
    <div style="display:flex;gap:10px;">
      <button onclick="ss({pushStep:2})" style="flex:1;background:#f1f5f9;border:none;padding:12px;border-radius:10px;font-weight:700;cursor:pointer;color:#475569;">← Back</button>
      <button onclick="ss({pushModal:false,page:'drops'})" style="flex:2;background:#10b981;color:#fff;border:none;padding:12px;border-radius:10px;font-weight:800;cursor:pointer;font-size:0.9rem;">⚡ Push to All 20 Locations</button>
    </div>
  `;
}

// ─────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML = layout();
}
render();
</script>
</body>
</html>
