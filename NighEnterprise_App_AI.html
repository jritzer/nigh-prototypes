function go(page, extra) { Object.assign(S, { page }, extra||{}); render(); }
function ss(updates) { Object.assign(S, updates); render(); }
function regionById(id) { return REGIONS.find(r=>r.id===id); }
function districtById(id) { return DISTRICTS.find(d=>d.id===id); }

function filteredLocations() {
  return LOCATIONS.filter(l => {
    if (S.regionFilter !== 'all' && l.region !== S.regionFilter) return false;
    if (S.districtFilter !== 'all' && l.district !== S.districtFilter) return false;
    return true;
  });
}

function badge(status) {
  const map = {
    live:       ['#10b981','#d1fae5','Live'],
    scheduled:  ['#3b82f6','#dbeafe','Scheduled'],
    ended:      ['#6b7280','#f3f4f6','Ended'],
    active:     ['#10b981','#d1fae5','Active'],
    inactive:   ['#ef4444','#fee2e2','Inactive'],
    push:       ['#7c3aed','#ede9fe','Corp Push'],
    local:      ['#6b7280','#f3f4f6','Local'],
    flagship:   ['#f59e0b','#fef3c7','Flagship'],
    seasonal:   ['#0ea5e9','#e0f2fe','Seasonal'],
    standard:   ['#6b7280','#f3f4f6','Standard'],
  };
  const [color,bg,label] = map[status]||['#6b7280','#f3f4f6',status];
  return `<span style="background:${bg};color:${color};font-size:0.68rem;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap;letter-spacing:0.02em;">${label}</span>`;
}

function pct(n,d) { return d ? Math.round(n/d*100) : 0; }
function fmtMoney(n) { return n>=1000 ? '$'+(n/1000).toFixed(1)+'k' : '$'+n; }
function fmtNum(n) { return n>=1000 ? (n/1000).toFixed(1)+'k' : String(n); }
function showColor(r) { return r>=85?'#10b981':r>=75?'#f59e0b':'#ef4444'; }

function infoRow(label, value) {
  return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:0.82rem;"><span style="color:#64748b;">${label}</span><span style="font-weight:700;color:#0f172a;">${value}</span></div>`;
}

  switch(S.page) {
    case 'dashboard': return rDashboard();
    case 'locations': return rLocations();
    case 'drops':     return rDrops();
    case 'analytics': return rAnalytics();
    case 'users':     return rUsers();
    case 'settings':  return rSettings();
    default: return rDashboard();
  }
}

    return { ...r, count:ls.length, ci:ls.reduce((a,l)=>a+l.mtdCheckins,0), drops:ls.reduce((a,l)=>a+l.mtdDrops,0), show:Math.round(ls.reduce((a,l)=>a+l.showRate,0)/ls.length), rev:ls.reduce((a,l)=>a+l.mtdRevenue,0) };
  });
  const maxCI = Math.max(...regData.map(r=>r.ci));
  const topLocs = [...LOCATIONS].sort((a,b)=>b.mtdCheckins-a.mtdCheckins).slice(0,4);
  const attnLocs = LOCATIONS.filter(l=>l.showRate<72||l.status==='inactive');

  return `
    <!-- KPIs -->
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px;">
      ${kpi('Check-ins MTD',   fmtNum(totalCI),   'across all locations','✅','#10b981')}
      ${kpi('Drops MTD',       String(totalDrops), 'across all locations','⚡','#6366f1')}
      ${kpi('Avg Show Rate',   avgShow+'%',        'reserv → check-in',  '📈','#f59e0b')}
      ${kpi('Revenue MTD',     fmtMoney(totalRev), 'paid drops only',    '💰','#0ea5e9')}
      ${kpi('Live Right Now',  liveNow+' drops',   activeCount+' active locations','🔴','#ef4444')}
    </div>

    <div style="display:grid;grid-template-columns:1fr 320px;gap:18px;margin-bottom:18px;">
      <!-- Regional performance -->
      <div style="background:#fff;border-radius:16px;border:1px solid #e5e7eb;padding:22px;">
        <div style="font-weight:800;font-size:0.92rem;margin-bottom:3px;">Regional Performance</div>
        <div style="font-size:0.75rem;color:#64748b;margin-bottom:18px;">Month-to-date check-ins by region</div>
        ${regData.map(r=>`
          <div style="margin-bottom:14px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
              <div style="display:flex;align-items:center;gap:8px;">
                <div style="width:9px;height:9px;border-radius:50%;background:${r.color};flex-shrink:0;"></div>
                <span style="font-weight:700;font-size:0.83rem;">${r.name}</span>
                <span style="font-size:0.7rem;color:#94a3b8;">${r.count} locations</span>
              </div>
              <div style="display:flex;align-items:center;gap:14px;">
                <span style="font-size:0.75rem;color:#64748b;">${r.show}% show</span>
                <span style="font-weight:800;font-size:0.88rem;">${fmtNum(r.ci)} check-ins</span>
              </div>
            </div>
            <div style="background:#f1f5f9;border-radius:4px;height:7px;overflow:hidden;">
              <div style="background:${r.color};height:100%;border-radius:4px;width:${Math.round(r.ci/maxCI*100)}%;"></div>
            </div>
          </div>
        `).join('')}

        <!-- Mini region cards -->
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:18px;padding-top:16px;border-top:1px solid #f1f5f9;">
          ${regData.map(r=>`
            <div onclick="go('locations',{regionFilter:'${r.id}',hierarchyView:'district'})" style="background:${r.color}10;border:1px solid ${r.color}30;border-radius:10px;padding:10px 8px;text-align:center;cursor:pointer;">
              <div style="font-size:0.68rem;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;color:${r.color};margin-bottom:4px;">${r.abbr}</div>
              <div style="font-weight:900;font-size:1rem;">${r.count}</div>
              <div style="font-size:0.62rem;color:#94a3b8;">locations</div>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- Top locations + attention needed -->
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div style="background:#fff;border-radius:16px;border:1px solid #e5e7eb;padding:20px;flex:1;">
          <div style="font-weight:800;font-size:0.88rem;margin-bottom:3px;">Top Locations</div>
          <div style="font-size:0.72rem;color:#64748b;margin-bottom:14px;">By check-ins this month</div>
          ${topLocs.map((l,i)=>`
            <div onclick="ss({locationDetail:'${l.id}'})" style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:${i<3?'1px solid #f8f9fb':''};cursor:pointer;">
              <div style="width:24px;height:24px;background:${i===0?'#fef3c7':i===1?'#f1f5f9':'#f8f9fb'};color:${i===0?'#92400e':'#64748b'};border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.72rem;flex-shrink:0;">#${i+1}</div>
              <div style="flex:1;min-width:0;">
                <div style="font-weight:700;font-size:0.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${l.name}</div>
                <div style="font-size:0.68rem;color:#94a3b8;">${l.city}, ${l.state}</div>
              </div>
              <div style="text-align:right;flex-shrink:0;">
                <div style="font-weight:800;font-size:0.88rem;">${fmtNum(l.mtdCheckins)}</div>
                <div style="font-size:0.65rem;color:#10b981;">${l.showRate}% show</div>
              </div>
            </div>
          `).join('')}
          <div onclick="go('analytics')" style="text-align:center;margin-top:10px;font-size:0.75rem;color:#6366f1;cursor:pointer;font-weight:700;">Full leaderboard →</div>
        </div>

        <!-- Needs attention -->
        ${attnLocs.length ? `
          <div style="background:#fff;border-radius:16px;border:1px solid #fca5a5;padding:18px;">
            <div style="font-weight:800;font-size:0.85rem;color:#dc2626;margin-bottom:10px;">⚠ Needs Attention</div>
            ${attnLocs.map(l=>`
              <div onclick="ss({locationDetail:'${l.id}'})" style="display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer;border-bottom:1px solid #fef2f2;">
                <div style="flex:1;">
                  <div style="font-weight:700;font-size:0.8rem;">${l.name}</div>
                  <div style="font-size:0.68rem;color:#94a3b8;">${l.city}, ${l.state}</div>
                </div>
                <div style="font-size:0.72rem;font-weight:700;color:#ef4444;">${l.status==='inactive'?'Inactive':l.showRate+'% show'}</div>
              </div>
            `).join('')}
          </div>
        `:``}
      </div>
    </div>

    <!-- Recent drops + location status -->
    <div style="display:grid;grid-template-columns:1fr 320px;gap:18px;">
      <div style="background:#fff;border-radius:16px;border:1px solid #e5e7eb;padding:22px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <div>
            <div style="font-weight:800;font-size:0.92rem;">Recent Corporate Drops</div>
            <div style="font-size:0.75rem;color:#64748b;">Pushed from corporate to locations</div>
          </div>
          <span onclick="go('drops')" style="font-size:0.75rem;color:#6366f1;cursor:pointer;font-weight:700;">View all →</span>
        </div>
        ${CORP_DROPS.slice(0,5).map(d=>`
          <div style="display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #f8f9fb;">
            <div style="flex:1;min-width:0;">
              <div style="font-weight:700;font-size:0.83rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${d.title}</div>
              <div style="font-size:0.7rem;color:#94a3b8;">${d.scopeDetail} · ${d.date}</div>
            </div>
            <div style="flex-shrink:0;">${badge(d.status)}</div>
            <div style="text-align:right;flex-shrink:0;min-width:48px;">
              <div style="font-weight:800;font-size:0.88rem;">${d.status==='ended'?d.totalCI:d.totalRes}</div>
              <div style="font-size:0.65rem;color:#94a3b8;">${d.status==='ended'?'checked in':'reserved'}</div>
            </div>
          </div>
        `).join('')}
      </div>

      <!-- Location status -->
      <div style="background:#fff;border-radius:16px;border:1px solid #e5e7eb;padding:22px;">
        <div style="font-weight:800;font-size:0.88rem;margin-bottom:3px;">Location Status</div>
        <div style="font-size:0.72rem;color:#64748b;margin-bottom:16px;">Across all 20 locations</div>
        ${statusBar('Active + Live Drop', LOCATIONS.filter(l=>l.status==='active'&&l.activeDrop).length, 20, '#10b981')}
        ${statusBar('Active · No Drop',   LOCATIONS.filter(l=>l.status==='active'&&!l.activeDrop).length, 20, '#6366f1')}
        ${statusBar('Seasonal',           LOCATIONS.filter(l=>l.tier==='seasonal').length, 20, '#0ea5e9')}
        ${statusBar('Inactive',           LOCATIONS.filter(l=>l.status==='inactive').length, 20, '#ef4444')}

        <div style="margin-top:18px;padding-top:14px;border-top:1px solid #f1f5f9;">
          <div style="font-size:0.72rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">Live right now</div>
          ${LOCATIONS.filter(l=>l.activeDrop).map(l=>`
            <div onclick="ss({locationDetail:'${l.id}'})" style="display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;">
              <div style="width:7px;height:7px;border-radius:50%;background:#10b981;flex-shrink:0;"></div>
              <span style="font-size:0.78rem;font-weight:600;">${l.name}</span>
              <span style="font-size:0.68rem;color:#94a3b8;margin-left:auto;">${l.city}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

function kpi(label, value, sub, icon, color) {
  return `
    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:18px 20px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div style="font-size:0.72rem;font-weight:700;color:#64748b;">${label}</div>
        <div style="font-size:1rem;">${icon}</div>
      </div>
      <div style="font-size:1.6rem;font-weight:900;letter-spacing:-0.03em;color:#0f172a;margin-bottom:3px;">${value}</div>
      <div style="font-size:0.68rem;color:#94a3b8;">${sub}</div>
    </div>
  `;
}

function statusBar(label, count, total, color) {
  return `
    <div style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
        <span style="font-size:0.78rem;font-weight:600;">${label}</span>
        <span style="font-size:0.78rem;font-weight:800;color:${color};">${count}</span>
      </div>
      <div style="background:#f1f5f9;border-radius:4px;height:6px;overflow:hidden;">
        <div style="background:${color};height:100%;width:${pct(count,total)}%;border-radius:4px;"></div>
      </div>
    </div>
  `;
}

// ─────────────────────────────────────────────────────────────
// LOCATIONS
// ─────────────────────────────────────────────────────────────
function rLocations() {
  if (S.hierarchyView === 'region') return rLocByRegion();
  if (S.hierarchyView === 'district') return rLocByDistrict();
  return rLocByCity();
}

function filterBar() {
  const regDistricts = S.regionFilter !== 'all' ? DISTRICTS.filter(d=>d.region===S.regionFilter) : [];
  return `
    <div style="display:flex;gap:10px;margin-bottom:20px;align-items:center;flex-wrap:wrap;">
      <select onchange="ss({regionFilter:this.value,districtFilter:'all'})" style="border:1px solid #e5e7eb;border-radius:8px;padding:8px 28px 8px 12px;font-size:0.82rem;font-weight:600;background:#fff;cursor:pointer;">
        <option value="all">All Regions</option>
        ${REGIONS.map(r=>`<option value="${r.id}" ${S.regionFilter===r.id?'selected':''}>${r.name}</option>`).join('')}
      </select>
      ${S.regionFilter!=='all'?`
        <select onchange="ss({districtFilter:this.value})" style="border:1px solid #e5e7eb;border-radius:8px;padding:8px 28px 8px 12px;font-size:0.82rem;font-weight:600;background:#fff;cursor:pointer;">
          <option value="all">All Districts</option>
          ${regDistricts.map(d=>`<option value="${d.id}" ${S.districtFilter===d.id?'selected':''}>${d.name}</option>`).join('')}
        </select>
      `:''}
      <div style="margin-left:auto;font-size:0.8rem;color:#64748b;">${filteredLocations().length} location${filteredLocations().length!==1?'s':''}</div>
      <button onclick="ss({pushModal:true,pushStep:1})" style="background:#0f172a;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-weight:700;font-size:0.78rem;cursor:pointer;">⚡ Push Drop</button>
    </div>
  `;
}

function rLocByRegion() {
  const regions = REGIONS.filter(r=> S.regionFilter==='all' || r.id===S.regionFilter);
  return filterBar() + regions.map(r=>{
    const locs = LOCATIONS.filter(l=>l.region===r.id && (S.districtFilter==='all'||l.district===S.districtFilter));
    if (!locs.length) return '';
    const ci = locs.reduce((a,l)=>a+l.mtdCheckins,0);
    const show = Math.round(locs.reduce((a,l)=>a+l.showRate,0)/locs.length);
    return `
      <div style="margin-bottom:22px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
          <div style="width:10px;height:10px;border-radius:50%;background:${r.color};flex-shrink:0;"></div>
          <span style="font-weight:800;font-size:1rem;">${r.name}</span>
          <span style="font-size:0.75rem;color:#94a3b8;">${locs.length} locations · ${fmtNum(ci)} check-ins · ${show}% avg show</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;">
          ${locs.map(l=>locationCard(l)).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function rLocByDistrict() {
  const dists = DISTRICTS.filter(d=>(S.regionFilter==='all'||d.region===S.regionFilter)&&(S.districtFilter==='all'||d.id===S.districtFilter));
  return filterBar() + dists.map(d=>{
    const locs = LOCATIONS.filter(l=>l.district===d.id);
    if (!locs.length) return '';
    const r = regionById(d.region);
    const ci = locs.reduce((a,l)=>a+l.mtdCheckins,0);
    return `
      <div style="margin-bottom:22px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
          <span style="background:${r?.color}18;color:${r?.color};font-size:0.7rem;font-weight:800;padding:3px 10px;border-radius:20px;">${r?.name}</span>
          <span style="font-weight:800;font-size:0.95rem;">${d.name}</span>
          <span style="font-size:0.72rem;color:#94a3b8;">${locs.length} locations · ${fmtNum(ci)} check-ins</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;">
          ${locs.map(l=>locationCard(l)).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function rLocByCity() {
  const locs = filteredLocations().sort((a,b)=>a.city.localeCompare(b.city));
  return filterBar() + `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;">${locs.map(l=>locationCard(l)).join('')}</div>`;
}

function locationCard(l) {
  const reg = regionById(l.region);
  return `
    <div onclick="ss({locationDetail:'${l.id}'})" style="background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:18px;cursor:pointer;transition:box-shadow 0.15s,transform 0.1s;" onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,0.09)';this.style.transform='translateY(-1px)'" onmouseout="this.style.boxShadow='none';this.style.transform='none'">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
        <div>
          <div style="font-weight:800;font-size:0.88rem;">${l.name}</div>
          <div style="font-size:0.72rem;color:#94a3b8;margin-top:2px;">${l.city}, ${l.state}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          ${badge(l.status)}
          ${l.activeDrop?`<span style="font-size:0.65rem;color:#10b981;font-weight:800;">● Live</span>`:''}
        </div>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;">
        <span style="background:${reg?.color}15;color:${reg?.color};font-size:0.65rem;font-weight:800;padding:2px 8px;border-radius:20px;">${reg?.abbr}</span>
        ${badge(l.tier)}
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding-top:10px;border-top:1px solid #f1f5f9;">
        <div><div style="font-size:0.65rem;color:#94a3b8;">Drops</div><div style="font-weight:900;font-size:1rem;">${l.mtdDrops}</div></div>
        <div><div style="font-size:0.65rem;color:#94a3b8;">Check-ins</div><div style="font-weight:900;font-size:1rem;">${fmtNum(l.mtdCheckins)}</div></div>
        <div><div style="font-size:0.65rem;color:#94a3b8;">Show Rate</div><div style="font-weight:900;font-size:1rem;color:${showColor(l.showRate)};">${l.showRate}%</div></div>
      </div>
      <div style="margin-top:8px;font-size:0.68rem;color:#94a3b8;">Mgr: <span style="color:#475569;font-weight:600;">${l.manager}</span></div>
    </div>
  `;
}

// Location detail modal
function locationDetail() {
  const l = LOCATIONS.find(x=>x.id===S.locationDetail);
  if (!l) return '';
  const reg = regionById(l.region);
  const dist = districtById(l.district);
  return `
    <div onclick="ss({locationDetail:null})" style="position:fixed;inset:0;background:rgba(15,23,42,0.45);z-index:100;display:flex;align-items:center;justify-content:center;">
      <div onclick="event.stopPropagation()" style="background:#fff;border-radius:20px;width:540px;max-height:82vh;overflow-y:auto;padding:30px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;">
          <div>
            <div style="font-weight:900;font-size:1.15rem;">${l.name}</div>
            <div style="font-size:0.78rem;color:#64748b;margin-top:3px;">${l.city}, ${l.state} · ${reg?.name} · ${dist?.name}</div>
          </div>
          <button onclick="ss({locationDetail:null})" style="background:#f1f5f9;border:none;border-radius:8px;width:30px;height:30px;font-size:0.9rem;cursor:pointer;color:#475569;">✕</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;">
          ${miniStat('Drops MTD', l.mtdDrops)}
          ${miniStat('Check-ins', fmtNum(l.mtdCheckins))}
          ${miniStat('Show Rate', l.showRate+'%', showColor(l.showRate))}
          ${miniStat('Revenue', fmtMoney(l.mtdRevenue))}
        </div>
        <div style="background:#f8f9fb;border-radius:12px;padding:16px;margin-bottom:18px;">
          <div style="font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:#94a3b8;margin-bottom:10px;">Location Details</div>
          ${infoRow('Manager', l.manager)}
          ${infoRow('Region', reg?.name||'—')}
          ${infoRow('District', dist?.name||'—')}
          ${infoRow('Tier', l.tier.charAt(0).toUpperCase()+l.tier.slice(1))}
          ${infoRow('Status', l.status.charAt(0).toUpperCase()+l.status.slice(1))}
          ${infoRow('Active Drop', l.activeDrop ? '● Live right now' : 'None')}
        </div>
        <div style="display:flex;gap:8px;">
          <button onclick="ss({pushModal:true,pushStep:1,locationDetail:null})" style="flex:1;background:#0f172a;color:#fff;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;">⚡ Push a Drop Here</button>
          <button onclick="ss({locationDetail:null})" style="flex:1;background:#f1f5f9;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;color:#475569;">Close</button>
        </div>
      </div>
    </div>
  `;
}

function miniStat(label, value, color) {
  return `<div style="background:#f8f9fb;border:1px solid #e5e7eb;border-radius:10px;padding:12px;text-align:center;"><div style="font-size:0.65rem;color:#94a3b8;margin-bottom:4px;">${label}</div><div style="font-weight:900;font-size:1.05rem;${color?'color:'+color+';':''}">${value}</div></div>`;
}

// ─────────────────────────────────────────────────────────────
// DROPS
// ─────────────────────────────────────────────────────────────
function rDrops() {
  const tabs = ['all','live','scheduled','ended'];
  const list = S.dropsTab==='all' ? CORP_DROPS : CORP_DROPS.filter(d=>d.status===S.dropsTab);
  return `
    <div style="display:flex;gap:6px;margin-bottom:20px;align-items:center;">
      ${tabs.map(t=>`
        <button onclick="ss({dropsTab:'${t}'})" style="background:${S.dropsTab===t?'#0f172a':'#fff'};color:${S.dropsTab===t?'#fff':'#475569'};border:1px solid ${S.dropsTab===t?'#0f172a':'#e5e7eb'};padding:7px 16px;border-radius:8px;font-weight:700;font-size:0.78rem;cursor:pointer;text-transform:capitalize;">${t==='all'?'All Drops ('+CORP_DROPS.length+')':t.charAt(0).toUpperCase()+t.slice(1)+' ('+CORP_DROPS.filter(d=>d.status===t).length+')'}</button>
      `).join('')}
      <button onclick="ss({pushModal:true,pushStep:1})" style="margin-left:auto;background:#0f172a;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-weight:700;font-size:0.8rem;cursor:pointer;">⚡ Push New Drop</button>
    </div>

    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:16px;overflow:hidden;">
      <table>
        <thead>
          <tr style="background:#f8f9fb;border-bottom:1px solid #e5e7eb;">
            ${['Drop Title','Scope','Type / Status','Cap','Reserved','Checked In','Show Rate'].map((h,i)=>`
              <th style="padding:11px 14px;text-align:${i>2?'right':'left'};font-size:0.68rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:#64748b;white-space:nowrap;">${h}</th>
            `).join('')}
          </tr>
        </thead>
        <tbody>
          ${list.map((d,i)=>{
            const showRate = d.totalRes>0&&d.totalCI>0 ? pct(d.totalCI,d.totalRes) : null;
            return `
              <tr style="border-bottom:1px solid #f8f9fb;${i%2?'background:#fafafa':''}">
                <td style="padding:13px 14px;">

                  <td style="padding:9px 0;font-weight:900;font-size:0.8rem;color:${i===0?'#d97706':i===1?'#9ca3af':i===2?'#cd7c2f':'#cbd5e1'};">${i+1}</td>
                  <td style="padding:9px 10px;">

                  <td style="padding:9px 10px;text-align:right;font-size:0.83rem;font-weight:600;">${l.mtdDrops}</td>

                  <td style="padding:9px 10px;text-align:right;font-size:0.83rem;font-weight:800;color:${showColor(l.showRate)};">${l.showRate}%</td>
                  <td style="padding:9px 10px;text-align:right;font-size:0.83rem;font-weight:600;">${fmtMoney(l.mtdRevenue)}</td>

        </div>
        <div>
          <label style="display:block;font-size:0.75rem;font-weight:800;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em;">Start Time</label>
          <input type="time" style="width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 14px;font-size:0.88rem;"/>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div>
          <label style="display:block;font-size:0.75rem;font-weight:800;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em;">Cap per Location</label>
          <input type="number" placeholder="e.g. 30" style="width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 14px;font-size:0.88rem;"/>
        </div>
        <div>
          <label style="display:block;font-size:0.75rem;font-weight:800;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em;">Price per Spot</label>
          <input type="text" placeholder="$0 for free" style="width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 14px;font-size:0.88rem;"/>
        </div>
      </div>
      <div>
        <label style="display:block;font-size:0.75rem;font-weight:800;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em;">Description</label>
        <textarea placeholder="Describe the experience customers will have..." style="width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 14px;font-size:0.88rem;height:76px;resize:none;font-family:inherit;"></textarea>
      </div>
      <div style="background:#f8f9fb;border-radius:10px;padding:14px;">
        <div style="font-size:0.75rem;font-weight:800;margin-bottom:8px;">Location Customization</div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          <label style="display:flex;align-items:center;gap:8px;font-size:0.82rem;cursor:pointer;"><input type="radio" name="custom" checked/> Allow locations to adjust title, description & image</label>
          <label style="display:flex;align-items:center;gap:8px;font-size:0.82rem;cursor:pointer;"><input type="radio" name="custom"/> Run exactly as defined — no changes</label>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:22px;">
      <button onclick="ss({pushModal:false})" style="flex:1;background:#f1f5f9;border:none;padding:12px;border-radius:10px;font-weight:700;cursor:pointer;color:#475569;">Cancel</button>
      <button onclick="ss({pushStep:2})" style="flex:2;background:#0f172a;color:#fff;border:none;padding:12px;border-radius:10px;font-weight:700;cursor:pointer;">Next: Select Scope →</button>
    </div>
  `;
}

function pushStep2() {
  const scopes = [
    { id:'all',      label:'All Locations',    sub:'All 20 locations across 5 regions', count:20 },
    { id:'region',   label:'By Region',        sub:'Push to one or more regions',       count:null },
    { id:'district', label:'By District',      sub:'Target specific districts',          count:null },
    { id:'custom',   label:'Custom Selection', sub:'Hand-pick individual locations',     count:null },
  ];
  return `
    <div style="margin-bottom:24px;">
      <div style="font-size:0.65rem;font-weight:800;color:#94a3b8;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;">Step 2 of 3</div>
      <div style="font-weight:900;font-size:1.2rem;">Select Scope</div>
      <div style="font-size:0.82rem;color:#64748b;margin-top:2px;">Where should this drop run?</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;">
      ${scopes.map(o=>`
        <div onclick="ss({pushTarget:'${o.id}'})" style="border:2px solid ${S.pushTarget===o.id?'#0f172a':'#e5e7eb'};border-radius:12px;padding:14px 16px;cursor:pointer;background:${S.pushTarget===o.id?'#f8f9fb':'#fff'};transition:all 0.12s;">
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:18px;height:18px;border-radius:50%;border:2px solid ${S.pushTarget===o.id?'#0f172a':'#cbd5e1'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">${S.pushTarget===o.id?`<div style="width:8px;height:8px;border-radius:50%;background:#0f172a;"></div>`:''}</div>
            <div style="flex:1;">
              <div style="font-weight:700;font-size:0.88rem;">${o.label} ${o.count?`<span style="color:#6366f1;">(${o.count})</span>`:''}</div>
              <div style="font-size:0.75rem;color:#64748b;">${o.sub}</div>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
    ${S.pushTarget==='region'?`
      <div style="margin-bottom:18px;">
        <div style="font-size:0.75rem;font-weight:800;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em;">Select Regions</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          ${REGIONS.map(r=>`<div style="border:2px solid ${r.color};border-radius:8px;padding:7px 14px;cursor:pointer;font-size:0.8rem;font-weight:700;color:${r.color};background:${r.color}10;">${r.name}</div>`).join('')}
        </div>
      </div>
    `:''}
    ${S.pushTarget==='district'?`
      <div style="margin-bottom:18px;">
        <div style="font-size:0.75rem;font-weight:800;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em;">Select Districts</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          ${DISTRICTS.map(d=>{const r=regionById(d.region);return `<div style="border:2px solid ${r?.color};border-radius:8px;padding:6px 12px;cursor:pointer;font-size:0.75rem;font-weight:700;color:${r?.color};background:${r?.color}10;">${d.name}<span style="opacity:0.6;margin-left:4px;">${r?.abbr}</span></div>`;}).join('')}
        </div>
      </div>
    `:''}
    ${S.pushTarget==='custom'?`
      <div style="margin-bottom:18px;">
        <div style="font-size:0.75rem;font-weight:800;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em;">Select Locations</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:180px;overflow-y:auto;border:1px solid #e5e7eb;border-radius:10px;padding:10px;">
          ${LOCATIONS.map(l=>{const r=regionById(l.region);return `<label style="display:flex;align-items:center;gap:8px;padding:5px;border-radius:7px;cursor:pointer;font-size:0.78rem;" onmouseover="this.style.background='#f8f9fb'" onmouseout="this.style.background='transparent'"><input type="checkbox"/><span style="font-weight:600;">${l.name}</span><span style="color:${r?.color};font-size:0.65rem;">${r?.abbr}</span></label>`;}).join('')}
        </div>
      </div>
    `:''}
    <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:13px;margin-bottom:18px;font-size:0.82rem;">
      <span style="font-weight:700;">Estimated reach: </span>
      <span style="color:#1d4ed8;font-weight:800;">${S.pushTarget==='all'?'20 locations · ~600 total cap (30/location)':'Select your scope above to see the reach estimate'}</span>
    </div>
    <div style="display:flex;gap:10px;">
      <button onclick="ss({pushStep:1})" style="flex:1;background:#f1f5f9;border:none;padding:12px;border-radius:10px;font-weight:700;cursor:pointer;color:#475569;">← Back</button>
      <button onclick="ss({pushStep:3})" style="flex:2;background:#0f172a;color:#fff;border:none;padding:12px;border-radius:10px;font-weight:700;cursor:pointer;">Next: Review & Push →</button>
    </div>
  `;
}

function pushStep3() {
  return `
    <div style="margin-bottom:24px;">
      <div style="font-size:0.65rem;font-weight:800;color:#94a3b8;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;">Step 3 of 3</div>
      <div style="font-weight:900;font-size:1.2rem;">Review & Push</div>
      <div style="font-size:0.82rem;color:#64748b;margin-top:2px;">Confirm details before sending to your locations.</div>
    </div>
    <div style="background:#f8f9fb;border-radius:14px;padding:18px;margin-bottom:18px;">
      <div style="font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:#94a3b8;margin-bottom:12px;">Drop Summary</div>
      ${infoRow('Title','Earth Day Repair Workshop')}
      ${infoRow('Type','Free experience / event')}
      ${infoRow('Date','April 22, 2026')}
      ${infoRow('Start Time','10:00 AM local time (each location)')}
      ${infoRow('Cap per Location','30 spots')}
      ${infoRow('Price','Free')}
      ${infoRow('Scope','All Locations — 20 locations')}
      ${infoRow('Estimated Total Cap','600 spots')}
      ${infoRow('Location Customization','Allowed within template')}
    </div>
    <div style="background:#fefce8;border:1px solid #fde68a;border-radius:10px;padding:14px;margin-bottom:18px;">
      <div style="font-weight:800;font-size:0.82rem;color:#92400e;margin-bottom:5px;">⚡ What happens when you push</div>
      <div style="font-size:0.78rem;color:#78350f;line-height:1.65;">Each location manager receives a notification and can confirm or customize within the parameters you set. Drops go live at each location only after the manager confirms. You'll see real-time confirmation status in your Drops dashboard.</div>
    </div>
    <div style="display:flex;gap:10px;">
      <button onclick="ss({pushStep:2})" style="flex:1;background:#f1f5f9;border:none;padding:12px;border-radius:10px;font-weight:700;cursor:pointer;color:#475569;">← Back</button>
      <button onclick="ss({pushModal:false,page:'drops'})" style="flex:2;background:#10b981;color:#fff;border:none;padding:12px;border-radius:10px;font-weight:800;cursor:pointer;font-size:0.9rem;">⚡ Push to All 20 Locations</button>
    </div>
  `;
}

// ─────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML = layout();
}
render();
</script>
</body>
</html>
