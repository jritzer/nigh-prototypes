*{margin:0;padding:0;box-sizing:border-box}
body{-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#D1D5DB;display:flex;justify-content:center;padding:24px 16px;min-height:100vh}
#app{width:375px;height:812px;border-radius:24px;border:1px solid #D1D5DB;box-shadow:0 8px 32px rgba(0,0,0,0.15);overflow:hidden;display:flex;flex-direction:column;background:#F9FAFB;position:relative}
#scr{flex:1;overflow-y:auto;position:relative}
#scr::-webkit-scrollbar{width:0}
#scr.feed-mode{scroll-snap-type:y mandatory;overflow-y:scroll}
.feed-card{scroll-snap-align:start;height:762px;position:relative;overflow:hidden}
.tb{display:flex;justify-content:space-around;align-items:center;background:#fff;border-top:1px solid #E5E7EB;padding:6px 0 10px;flex-shrink:0}
.tt{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;padding:4px 10px;min-width:50px;color:#9CA3AF;transition:color 0.15s;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:0.02em}
.tt.a{color:#0E4EF5;font-weight:700}
.card{background:#fff;border-radius:14px;border:1px solid #E5E7EB;overflow:hidden}
.cb{padding:14px}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal{background:#fff;border-radius:20px 20px 0 0;width:375px;max-height:80vh;overflow-y:auto;padding:20px 16px 32px}
.mh{width:36px;height:4px;border-radius:2px;background:#D1D5DB;margin:0 auto 16px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadeIn 0.2s ease-out}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.5)}70%{box-shadow:0 0 0 8px rgba(34,197,94,0)}}
.lp{animation:livePulse 2s infinite}
@keyframes bounceY{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
.by{animation:bounceY 1.4s ease-in-out infinite}
button,input,textarea,select{font-family:inherit}
button{cursor:pointer}
input:focus,textarea:focus{outline:none}
@keyframes niyaInnerPulse{0%,100%{filter:brightness(0.92)}50%{filter:brightness(1.22) drop-shadow(0 0 5px rgba(139,92,246,0.5))}}
.niya-dot{width:7px;height:7px;border-radius:50%;background:#8B5CF6;animation:dotBounce 1.4s ease-in-out infinite}
@keyframes dotBounce{0%,80%,100%{transform:scale(0.7);opacity:0.5}40%{transform:scale(1);opacity:1}}
.wave-bar{width:4px;border-radius:2px;background:#8B5CF6;animation:waveAnim 0.8s ease-in-out infinite;height:4px}
@keyframes waveAnim{0%,100%{height:4px;opacity:0.4}50%{height:22px;opacity:1}}
.slideUp{animation:slideUpAnim 0.25s ease-out}
@keyframes slideUpAnim{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>

}

// ── Helpers ────────────────────────────────────────────
function go(scr,x){S.scr=scr;if(x)Object.assign(S,x);S.modal=null;render();}
function modal(m){S.modal=m;render();}
function hdr(t,sub,back,right,hideNiya){
  return`<div style="background:#fff;padding:12px 16px;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99">
    <div style="display:flex;align-items:center;gap:10px">
      ${back?`<button onclick="${back}" style="background:none;border:none;padding:4px;display:flex;color:#374151">${ic('left',20)}</button>`:''}
      <div><div style="font-size:17px;font-weight:700;color:#111827;line-height:1.2">${t}</div>
      ${sub?`<div style="font-size:12px;color:#6B7280;margin-top:1px">${sub}</div>`:''}</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">${right||''}</div>
  </div>`;
}
function av(initials,size=36,gradient='135deg,#1B2A4A,#3B82F6'){return`<div style="width:${size}px;height:${size}px;border-radius:50%;background:linear-gradient(${gradient});display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*0.33)}px;font-weight:700;color:#fff;flex-shrink:0">${initials}</div>`;}

}

// ── FEED ───────────────────────────────────────────────
function renderFeed(){
  const cards=feedDrops.map((d,idx)=>{
    const isMine=!!d.myTicket;
    const soldOut=d.spotsLeft===0&&!isMine;
    const friendsOn=friendsList.filter(f=>f.hasTicket===d.id);
    const urgent=d.closesIn.includes('m')&&!d.closesIn.includes('h');
    // Vibrant brand gradients per card
    const bgGrad=idx===0
      ?'to bottom,#0a0a1a,#0d1b4a'
      :'to bottom,#0a0a1a,#1a0a2e';
    // Parse closes in for big H/M/S display
    const [hPart,mPart]=d.closesIn.includes('h')
      ?d.closesIn.split(' ')
      :[null,d.closesIn];

        </div>`:`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0.15"><div style="color:#fff">${ic('cam',60)}</div></div>`}

            <span style="font-size:18px;font-weight:400;color:#EC1977;line-height:1">08</span><span style="font-size:12px;font-weight:400;color:rgba(255,255,255,0.65)">s</span>

          </button>
          ${!followingList.find(f=>f.handle===d.host.handle)

            :`<div style="width:18px;height:18px;border-radius:50%;background:#22C55E;border:2px solid rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;margin-top:-9px;color:#fff">${ic('check',10)}</div>`}

        </div>
      </div>

      <!-- Bottom left: title + host -->
      <div style="position:absolute;left:16px;right:78px;bottom:66px;z-index:10">
        <div style="font-size:21px;font-weight:800;color:#fff;line-height:1.15;margin-bottom:10px;text-shadow:0 2px 8px rgba(0,0,0,0.5)">${d.title}</div>
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:8px">
          <span style="font-size:13px;font-weight:600;color:rgba(255,255,255,0.9)">${d.host.name}</span>
        </div>
        ${d.partners.length?`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">${d.partners.map(p=>`<span style="background:rgba(14,78,245,0.35);border:1px solid rgba(14,78,245,0.6);backdrop-filter:blur(4px);padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;color:#93C5FD">${p.name}</span>`).join('')}</div>`:''}
        ${friendsOn.length?`<div style="display:flex;align-items:center;gap:7px">

        </div>`:''}

      <!-- CTA button -->
      <div style="position:absolute;bottom:18px;left:16px;right:16px;z-index:10;display:flex;justify-content:center">
        ${isMine
          ?`<button onclick="go('ticketView',{ticketId:'${d.myTicket}'})" style="background:#0E4EF5;color:#fff;border:none;border-radius:24px;padding:10px 32px;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:4px -4px 0px rgba(0,0,0,0.3)">${ic('ticket',16)} View Your Ticket</button>`
          :soldOut
          ?`<button disabled style="background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);color:rgba(255,255,255,0.65);border:1px solid rgba(255,255,255,0.2);border-radius:24px;padding:10px 32px;font-size:14px;font-weight:700">Sold Out</button>`
          :`<button onclick="go('dropDetail',{drop:${idx}})" style="background:#0E4EF5;color:#fff;border:none;border-radius:24px;padding:10px 32px;font-size:14px;font-weight:700;letter-spacing:0.01em;box-shadow:4px -4px 0px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;gap:8px">Secure your Spot →</button>`}
      </div>

    </div>`;
  }).join('');
  return`<div style="height:100%">${cards}</div>`;
}

// ── DROP DETAIL ────────────────────────────────────────
function renderDropDetail(){
  const d=feedDrops[S.drop];
  const qty=S.orderQty;
  const total=d.price*qty;
  const friendsOn=friendsList.filter(f=>f.hasTicket===d.id);
  const isWindow=d.timing==='Arrival Window';

  // Date label
  const now=new Date();
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const todayStr=mo[now.getMonth()]+' '+now.getDate();
  const tom=new Date(now);tom.setDate(tom.getDate()+1);
  const tomStr=mo[tom.getMonth()]+' '+tom.getDate();
  const dateLabel=d.date===todayStr?'Today':d.date===tomStr?'Tomorrow':d.date;

  // Arrival instruction
  const arrivalLine=isWindow
    ?`Arrive between ${d.start} – ${d.endTime}`
    :`Starts at ${d.start}`;

  // Expand month abbreviation to full name
  const monthFull={Jan:'January',Feb:'February',Mar:'March',Apr:'April',May:'May',Jun:'June',Jul:'July',Aug:'August',Sep:'September',Oct:'October',Nov:'November',Dec:'December'};
  const fullDate=d.date.replace(/^(\w+)/,m=>monthFull[m]||m);

  // Ticket selector label
  const pplLabel=qty===1?'Just Me':qty===2?'Me + 1':`Me + ${qty-1}`;

  // Timer parsing
  const [hPart,mPart]=d.closesIn.includes('h')?d.closesIn.split(' '):[null,d.closesIn];
  const hrs=hPart?hPart.replace('h',''):'00';
  const mins=mPart?mPart.replace('m',''):'00';

  return`
  <!-- Sticky header + timer -->
  <div style="position:sticky;top:0;z-index:99">
    <div style="background:#0a0a0a;padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.08)">
      <button onclick="go('feed')" style="background:none;border:none;padding:4px;display:flex;color:rgba(255,255,255,0.8)">${ic('left',20)}</button>
      <div>
        <div style="font-size:17px;font-weight:700;color:#fff">Drop Details</div>
      </div>
    </div>
    <div style="background:#111;padding:8px 16px;display:flex;align-items:center;justify-content:center;gap:2px">
      <span style="font-size:9px;font-weight:700;color:rgba(255,255,255,0.60);letter-spacing:0.08em;margin-right:6px">TIME REMAINING TO BUY</span>
      ${d.closesIn.includes('h')?`<span style="font-size:18px;font-weight:400;color:#EC1977;line-height:1">${hrs}</span><span style="font-size:12px;font-weight:400;color:rgba(255,255,255,0.65);margin-right:5px">h</span>`:''}
      <span style="font-size:18px;font-weight:400;color:#EC1977;line-height:1">${mins}</span><span style="font-size:12px;font-weight:400;color:rgba(255,255,255,0.65);margin-right:5px">m</span>
      <span style="font-size:18px;font-weight:400;color:#EC1977;line-height:1">08</span><span style="font-size:12px;font-weight:400;color:rgba(255,255,255,0.65)">s</span>
    </div>
  </div>

  <!-- Scrollable content -->
  <div style="background:#0a0a0a;padding:22px 16px 150px">

    <!-- Attribution row: Hosted by + Partnering with -->
    <div style="font-size:12px;color:rgba(255,255,255,0.60);margin-bottom:4px">Hosted by <em style="color:rgba(255,255,255,0.7)">${d.host.name}</em></div>
    ${d.partners.length?`<div style="font-size:12px;color:rgba(255,255,255,0.60);margin-bottom:8px">Partnering with <em style="color:rgba(255,255,255,0.7)">${d.partners.map(p=>p.name).join(' & ')}</em></div>`:'<div style="margin-bottom:8px"></div>'}

    <!-- Title + price -->
    <div style="font-size:26px;font-weight:800;color:#fff;line-height:1.2;margin-bottom:10px">${d.title}</div>
    <div style="margin-bottom:20px">
      ${d.price===0
        ?`<span style="font-size:22px;font-weight:700;color:#22C55E">Free</span>`
        :`<span style="font-size:24px;font-weight:700;color:#22C55E">$${d.price}</span><span style="font-size:14px;color:rgba(255,255,255,0.60);margin-left:4px">per spot</span>`}
    </div>

    <!-- Date / Time pill — level 1 priority -->
    <div style="background:#1c1c1c;border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:16px;margin-bottom:12px">
      <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:6px">
        <span style="font-size:18px;font-weight:700;color:#fff">${dateLabel}</span>
        <span style="font-size:16px;font-weight:300;color:#fff">${fullDate}</span>
      </div>
      <div style="font-size:15px;font-weight:300;color:#fff">${arrivalLine}</div>
    </div>

    <!-- Venue row (tappable → profile/map) -->
    <button onclick="go('proProfile',{proHandle:'${d.host.handle}'})" style="width:100%;background:#1c1c1c;border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;text-align:left;margin-bottom:14px">
      <div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#0E4EF5,#6226E9);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0">${d.host.short.charAt(0)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:700;color:#fff;margin-bottom:2px">${d.host.name}</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.60);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.host.addr}</div>
      </div>
      <div style="color:rgba(255,255,255,0.55);flex-shrink:0">${ic('map',20)}</div>
    </button>

    <!-- Friends going — no box -->

// ── TRANSFER HELPERS ────────────────────────────────────
function doTransfer(tId,subIdx,friend){
  if(!S.subTicketOverrides)S.subTicketOverrides={};
  var now=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  S.subTicketOverrides[tId+'_'+subIdx]={status:'pending',invitee:friend,invitedAt:'Mar 4 · '+now};
  S.transferPhase=null;S.transferSelectedFriend=null;
  if(!S.ticketSubIdx)S.ticketSubIdx={};
  S.ticketSubIdx[tId]=subIdx;
  go('ticketView',{ticketId:tId,confirmNew:false});
}
function cancelTransfer(tId,subIdx){
  if(!S.subTicketOverrides)S.subTicketOverrides={};
  delete S.subTicketOverrides[tId+'_'+subIdx];
  render();
}

      <div style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0">${hostInitials}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex:1">
        <div><div style="font-size:13px;font-weight:700;color:#fff">${tk.host}</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.55);margin-top:1px">${tk.addr}</div></div>
        <button onclick="openMaps('${tk.addr}');event.stopPropagation()" style="background:none;border:none;padding:6px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.55);cursor:pointer;flex-shrink:0;transition:color 0.2s;margin-left:auto" onmouseover="this.style.color='rgba(255,255,255,0.85)'" onmouseout="this.style.color='rgba(255,255,255,0.55)'">
          ${ic('map',18)}
        </button>
      </div>
    </div>
    <div style="font-size:12px;color:rgba(255,255,255,0.55);margin-top:24px;margin-bottom:${extra?'4':'0'}px">${holderLine}</div>
    ${extra}`;

  const tapHintFront=`<div style="position:absolute;bottom:8px;left:20px;right:20px;text-align:center;font-size:10px;color:rgba(255,255,255,0.34);display:flex;align-items:center;justify-content:center;gap:4px">${ic('flip',10)} Tap for details</div>`;

  // ── Build front per state ──
  let stateBlock='', holderLine='', holderExtra='';
  if(isOwnerTicket){
    stateBlock=(!checkedIn ? qrBlock.replace('PLACEHOLDER_QR_LABEL',tk.orderId) : checkedInBlock);
    holderLine=`${checkedIn?'Experienced by':'Reserved for'} <span style="color:#fff;font-weight:600">${currentUser.name}</span>`;
    holderExtra=dropFriends.length?`<div style="font-size:12px;color:rgba(255,255,255,0.55)">with <span style="color:#fff;font-weight:600">${dropFriends.map(f=>f.name).join(', ')}</span></div>`:'';
  } else if(subStatus==='available'){
    stateBlock=qrBlock.replace('PLACEHOLDER_QR_LABEL',tk.orderId+'-'+(subIdx+1));
    holderLine=`<span style="color:rgba(255,255,255,0.44)">Unassigned \u00b7 Spot ${subIdx+1} of ${subCount}</span>`;
  } else if(subStatus==='pending'){
    stateBlock=pendingBlock;
    holderLine=`<span style="color:rgba(255,255,255,0.44)">Pending \u00b7 Spot ${subIdx+1} of ${subCount}</span>`;
  } else if(subStatus==='transferred'){
    stateBlock=transferredBlock;
    holderLine=`Reserved for <span style="color:#fff;font-weight:600">${subTransferTo?subTransferTo.name:'\u2014'}</span>`;
  }

  const frontInner=cardTop+stateBlock+cardVenue(holderLine,'');

  const ticketFront=`
    <div style="background:linear-gradient(135deg,#6226E9,#0E4EF5,#41EFF9);border-radius:26px;padding:2px;box-shadow:0 0 50px rgba(98,38,233,0.4),0 0 100px rgba(14,78,245,0.15)">
      <div style="background:#0B0B1A;border-radius:24px;padding:20px;height:540px;position:relative;overflow:hidden">
        <div style="position:absolute;top:-60px;right:-50px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(98,38,233,0.18),transparent 70%);pointer-events:none"></div>
        <div style="position:absolute;bottom:-50px;left:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(14,78,245,0.14),transparent 70%);pointer-events:none"></div>
        <div>${frontInner}</div>
        ${tapHintFront}
      </div>
    </div>`;

  // ── Shared back sections (all tickets get these) ──
  const termsList=['All sales are final \u2014 no refunds or exchanges. One person per spot.','Must arrive within the arrival window \u2014 late arrivals may result in loss of spot at the host\'s discretion.','Contact the host directly with questions. Nigh is a booking system and can\'t modify a host\'s drop.',...(tk.age21?['Valid ID required at check-in.']:[])];
  const sharedBack=`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:10px">
      <div style="font-size:16px;font-weight:800;color:#fff;flex:1;line-height:1.25">${tk.title}</div>
      <div style="color:rgba(255,255,255,0.40);flex-shrink:0;margin-top:2px">${ic('flip',18)}</div>
    </div>
    <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.55);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:7px">About this Drop</div>
    <div style="font-size:12px;color:rgba(255,255,255,0.80);line-height:1.65;margin-bottom:18px">${dropDesc||'No description available.'}</div>
    <div style="border-top:1px solid rgba(255,255,255,0.1);margin-bottom:14px"></div>
    <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.55);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px">Terms</div>
    ${termsList.map(t=>`<div style="display:flex;gap:7px;align-items:flex-start;margin-bottom:6px"><div style="width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,0.50);margin-top:5px;flex-shrink:0"></div><span style="font-size:11px;color:rgba(255,255,255,0.75);line-height:1.5">${t}</span></div>`).join('')}`;

  const tapHintBack=`<div style="position:absolute;bottom:8px;left:20px;right:20px;text-align:center;font-size:10px;color:rgba(255,255,255,0.50);display:flex;align-items:center;justify-content:center;gap:4px">${ic('flip',10)} Tap to flip to the front</div>`;

  // ── Back: owner ticket ──
  let backInner='';
  if(isOwnerTicket){
    // Transfer history rows for spots 2-N
    const historyRows=subTickets.slice(1).map((st,i)=>{
      const si2=i+1;
      const stOv=(S.subTicketOverrides||{})[tk.id+'_'+si2]||{};
      const stStatus=stOv.status||st.status||'available';
      const stTo=stOv.transferTo||st.transferTo||null;
      const stInvitee=stOv.invitee||st.invitee||null;
      const stAccepted=stOv.acceptedAt||st.acceptedAt||'';
      const stInvited=stOv.invitedAt||st.invitedAt||'';
      let badgeColor,badgeText,detail;
      if(stStatus==='transferred'){badgeColor='rgba(65,239,249,0.15)';badgeText='#41EFF9';detail='Transferred \u00b7 '+stAccepted;badgeLabel='Accepted';}
      else if(stStatus==='pending'){badgeColor='rgba(245,166,35,0.15)';badgeText='#F5A623';detail=(stInvitee?stInvitee.name||stInvitee.phone:'')+' \u00b7 Invited '+stInvited;badgeLabel='Pending';}
      else{badgeColor='rgba(255,255,255,0.08)';badgeText='rgba(255,255,255,0.44)';detail='Not yet transferred';badgeLabel='Available';}
      return `<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.07)">
        <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.55);width:46px;flex-shrink:0">Spot ${si2+1}</div>
        <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:${badgeColor};color:${badgeText};flex-shrink:0">${badgeLabel}</span>
        <div style="font-size:11px;color:rgba(255,255,255,0.55);flex:1;text-align:right">${detail}</div>
      </div>`;
    }).join('');

    backInner=sharedBack+`
      <div style="border-top:1px solid rgba(255,255,255,0.1);margin:16px 0"></div>
      ${[[tk.qty+' Spots \u00b7 '+tk.orderId,subtotal===0?'Free':'$'+subtotal.toFixed(2),false],...(tax>0?[['Sales Tax (8.85%)','$'+tax.toFixed(2),false]]:[]),['Total',subtotal===0?'Free':'$'+receiptTotal.toFixed(2),true]].map(([l,v,bold])=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.08)"><span style="font-size:${bold?'13':'11'}px;${bold?'font-weight:700;':''}color:${bold?'#fff':'rgba(255,255,255,0.65)'}">${l}</span><span style="font-size:${bold?'13':'11'}px;font-weight:${bold?'700':'600'};color:#fff">${v}</span></div>`).join('')}
      <div style="display:flex;align-items:center;gap:8px;margin-top:12px;padding:10px 12px;background:rgba(255,255,255,0.07);border-radius:10px;border:1px solid rgba(255,255,255,0.1)">
        <div style="width:32px;height:20px;background:#1A1F71;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff;flex-shrink:0;letter-spacing:0.02em">VISA</div>
        <span style="font-size:12px;color:rgba(255,255,255,0.75)">Visa \u00b7\u00b7\u00b7\u00b7 4821</span>
        <span style="font-size:11px;color:rgba(255,255,255,0.55);margin-left:auto">Apple Pay</span>
      </div>
      ${subCount>1?`
      <div style="border-top:1px solid rgba(255,255,255,0.1);margin:18px 0 12px"></div>
      <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.55);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px">Transfer Summary</div>
      ${historyRows}`:''}`;

  } else {
    // ── Back: non-owner tickets ──
    const transferDetail=subStatus==='transferred'
      ?`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.08)"><span style="font-size:11px;color:rgba(255,255,255,0.65)">Transferred to</span><span style="font-size:11px;font-weight:600;color:#fff">${subTransferTo?subTransferTo.name:'\u2014'}</span></div><div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.08)"><span style="font-size:11px;color:rgba(255,255,255,0.65)">Accepted</span><span style="font-size:11px;font-weight:600;color:#41EFF9">${subAcceptedAt}</span></div>`
      :subStatus==='pending'
      ?`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.08)"><span style="font-size:11px;color:rgba(255,255,255,0.65)">Invited</span><span style="font-size:11px;font-weight:600;color:#F5A623">${subInvitee?subInvitee.name||subInvitee.phone:'\u2014'}</span></div><div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.08)"><span style="font-size:11px;color:rgba(255,255,255,0.65)">Sent</span><span style="font-size:11px;font-weight:600;color:#fff">${subInvitedAt}</span></div><div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.08)"><span style="font-size:11px;color:rgba(255,255,255,0.65)">Status</span><span style="font-size:11px;font-weight:600;color:#F5A623">Awaiting acceptance</span></div>`
      :`<div style="padding:8px 0;font-size:11px;color:rgba(255,255,255,0.50)">Not yet transferred \u2014 QR is live and scannable.</div>`;

    backInner=sharedBack+`
      <div style="border-top:1px solid rgba(255,255,255,0.1);margin:16px 0"></div>
      <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.55);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px">Spot ${subIdx+1} of ${subCount}</div>
      <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.08)"><span style="font-size:11px;color:rgba(255,255,255,0.65)">Purchased by</span><span style="font-size:11px;font-weight:600;color:#fff">${currentUser.name}</span></div>
      ${transferDetail}`;
  }

  const ticketBack=`
    <div style="background:linear-gradient(135deg,#6226E9,#0E4EF5,#41EFF9);border-radius:26px;padding:2px;box-shadow:0 0 50px rgba(98,38,233,0.4)">
      <div style="background:#0B0B1A;border-radius:24px;padding:20px;height:540px;position:relative;overflow:hidden">
        <div style="overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:50px">${backInner}</div>
        ${tapHintBack}
      </div>
    </div>`;

  // ── Below-card action button ──
  const actionBtn=!flipped&&!isOwnerTicket&&subStatus==='available'
    ?`<button onclick="go('transferTicket',{ticketId:'${tk.id}',transferSubIdx:${subIdx},transferPhase:'select',transferSelectedFriend:null})" style="width:100%;background:linear-gradient(135deg,#0E4EF5,#6226E9);border:none;border-radius:14px;padding:13px;font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;margin-top:12px">${ic('userPlus',15)} Transfer Ticket</button>`
    :!flipped&&!isOwnerTicket&&subStatus==='pending'
    ?`<button onclick="cancelTransfer('${tk.id}',${subIdx})" style="width:100%;background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.28);border-radius:14px;padding:13px;font-size:13px;font-weight:700;color:#F5A623;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;margin-top:12px">${ic('x',15)} Cancel Invite</button>`
    :!flipped&&isOwnerTicket
    ?`<button onclick="S.checkedIn['${tk.id}']=!S.checkedIn['${tk.id}'];render()" style="width:100%;background:none;border:1px dashed rgba(255,255,255,0.15);border-radius:10px;padding:7px;font-size:10px;color:rgba(255,255,255,0.44);cursor:pointer;margin-top:10px">${checkedIn?'\u21ba Undo check-in (prototype)':'Simulate Check-in (prototype)'}</button>`
    :'';

  // Nav row
  const dots=subCount>1?`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding:0 4px">
      <button onclick="if(!S.ticketSubIdx)S.ticketSubIdx={};S.ticketSubIdx['${tk.id}']=${subIdx-1};S.ticketFlip={};render()"
        ${subIdx===0?'disabled':''} style="width:36px;height:36px;border-radius:50%;background:${subIdx===0?'rgba(255,255,255,0.06)':'rgba(255,255,255,0.12)'};border:none;display:flex;align-items:center;justify-content:center;color:${subIdx===0?'rgba(255,255,255,0.20)':'#fff'};cursor:${subIdx===0?'default':'pointer'}">
        ${ic('left',16)}
      </button>
      <div style="display:flex;align-items:center;gap:7px">
        ${subTickets.map((_,i)=>`<div onclick="if(!S.ticketSubIdx)S.ticketSubIdx={};S.ticketSubIdx['${tk.id}']=${i};S.ticketFlip={};render()" style="width:${i===subIdx?20:7}px;height:7px;border-radius:4px;background:${i===subIdx?'#0E4EF5':'rgba(255,255,255,0.22)'};cursor:pointer"></div>`).join('')}
      </div>
      <button onclick="if(!S.ticketSubIdx)S.ticketSubIdx={};S.ticketSubIdx['${tk.id}']=${subIdx+1};S.ticketFlip={};render()"
        ${subIdx===subCount-1?'disabled':''} style="width:36px;height:36px;border-radius:50%;background:${subIdx===subCount-1?'rgba(255,255,255,0.06)':'rgba(14,78,245,0.25)'};border:none;display:flex;align-items:center;justify-content:center;color:${subIdx===subCount-1?'rgba(255,255,255,0.20)':'#41EFF9'};cursor:${subIdx===subCount-1?'default':'pointer'}">
        ${ic('right',16)}
      </button>
    </div>`:''

  return`
  <div style="position:sticky;top:0;z-index:99;background:#0a0a0a;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.08)">
    <div style="display:flex;align-items:center;gap:10px">
      <button onclick="${backNav}" style="background:none;border:none;padding:4px;color:#fff;display:flex;align-items:center">${ic('left',20)}</button>
      <div style="font-size:17px;font-weight:700;color:#fff">${isNew?'Your Ticket':'Ticket'}</div>
    </div>
    ${subCount>1?`<div style="font-size:12px;color:rgba(255,255,255,0.50);font-weight:600">Spot ${subIdx+1} of ${subCount}</div>`:''}
  </div>
  <div style="background:#0a0a0a;min-height:100%;padding:16px 16px 32px">
    ${confirmBanner}
    <div
      ontouchstart="S._ts=event.touches[0].clientX"
      ontouchend="var dx=event.changedTouches[0].clientX-S._ts;if(dx<-50&&${subIdx}<${subCount-1}){if(!S.ticketSubIdx)S.ticketSubIdx={};S.ticketSubIdx['${tk.id}']=${subIdx+1};S.ticketFlip={};render();}else if(dx>50&&${subIdx}>0){if(!S.ticketSubIdx)S.ticketSubIdx={};S.ticketSubIdx['${tk.id}']=${subIdx-1};S.ticketFlip={};render();}"
      onclick="S.ticketFlip['${flipKey}']=!S.ticketFlip['${flipKey}'];render()"
      style="cursor:pointer" class="fi">
      ${!flipped?ticketFront:ticketBack}
    </div>
    ${actionBtn}
    ${dots}
  </div>`;
}


// ── TICKET COLLECTION ──────────────────────────────────
function renderTicketCollection(){
  const active=myTickets.filter(t=>t.status==='Active');
  const past=myTickets.filter(t=>t.status==='Completed'||t.status==='Ended');

  const activeCard=(tk)=>{
    const siDrop=feedDrops.find(f=>f.id===tk.dropId)||{};
    const si=tk.startsIn||siDrop.startsIn||'';
    const priceLabel=tk.price===0?'Free':'$'+(tk.price*(tk.qty||1)).toFixed(0);
    const priceColor='#4ADE80';
    return`
    <div onclick="go('ticketView',{ticketId:'${tk.id}',confirmNew:false})" style="cursor:pointer;background:linear-gradient(135deg,#6226E9,#0E4EF5,#41EFF9);border-radius:20px;padding:2px;margin-bottom:12px;box-shadow:0 0 30px rgba(98,38,233,0.3),0 0 60px rgba(14,78,245,0.1)">
      <div style="background:#0B0B1A;border-radius:18px;padding:16px 16px 14px;position:relative;overflow:hidden">
        <div style="position:absolute;top:-20px;right:-20px;width:70px;height:70px;border-radius:50%;background:radial-gradient(circle,rgba(65,239,249,0.07),transparent)"></div>
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
          <div style="font-size:14px;font-weight:700;color:#fff;flex:1;margin-right:10px;line-height:1.3">${tk.title}</div>
          <span style="font-size:10px;font-weight:700;padding:3px 9px;border-radius:8px;background:rgba(65,239,249,0.15);color:#41EFF9;flex-shrink:0;white-space:nowrap">Active</span>
        </div>
        <div style="font-size:11px;color:rgba(255,255,255,0.60);margin-bottom:5px">${tk.host} · ${tk.date} · ${tk.time}</div>
        <div style="font-size:11px;color:#41EFF9;margin-bottom:12px;${si?'':'visibility:hidden'}">${si?'Starts in '+si:'–'}</div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:13px;font-weight:700;color:${priceColor}">${priceLabel}${tk.qty>1?' · '+tk.qty+' spots':''}</span>
          <div style="display:flex;align-items:center;gap:5px;color:rgba(255,255,255,0.55);font-size:11px;font-weight:600">${ic('qr',13)} ${tk.qty>1?'View Tickets':'View Ticket'}</div>
        </div>
      </div>
    </div>`;
  };

  const pastCard=(tk)=>{
    const pricePast=tk.price===0?'Free':'$'+(tk.price*(tk.qty||1)).toFixed(0);
    return`
    <div onclick="go('ticketView',{ticketId:'${tk.id}',confirmNew:false})" style="cursor:pointer;background:linear-gradient(135deg,rgba(98,38,233,0.36),rgba(14,78,245,0.36),rgba(65,239,249,0.36));border-radius:20px;padding:2px;margin-bottom:10px">
      <div style="background:#0e0e1c;border-radius:18px;padding:16px 16px 14px;position:relative;overflow:hidden">
        <div style="position:absolute;top:-20px;right:-20px;width:70px;height:70px;border-radius:50%;background:radial-gradient(circle,rgba(65,239,249,0.05),transparent)"></div>
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
          <div style="font-size:14px;font-weight:700;color:rgba(255,255,255,0.88);flex:1;margin-right:10px;line-height:1.3">${tk.title}</div>
          <span style="font-size:10px;font-weight:700;padding:3px 9px;border-radius:8px;background:rgba(74,222,128,0.12);color:#4ADE80;flex-shrink:0;white-space:nowrap">${ic('check',9)} Attended</span>
        </div>
        <div style="font-size:11px;color:rgba(255,255,255,0.55);margin-bottom:5px">${tk.host} · ${tk.date} · ${tk.time}</div>
        <div style="font-size:11px;margin-bottom:12px;visibility:hidden">–</div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:13px;font-weight:700;color:rgba(255,255,255,0.50)">${pricePast}${tk.qty>1?' · '+tk.qty+' spots':''}</span>
          <div style="display:flex;align-items:center;gap:5px;color:rgba(255,255,255,0.38);font-size:11px;font-weight:600"><span style="display:inline-flex;transform:rotate(-35deg)">${ic('ticket',12)}</span> View Ticket</div>
        </div>
      </div>
    </div>`};

  return`
  <!-- Dark sticky header -->
  <div style="position:sticky;top:0;z-index:99;background:#0a0a0a;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.08)">
    <div style="font-size:17px;font-weight:700;color:#fff">My Tickets</div>
    ${active.length?`<span style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.50)">${active.length} Active</span>`:''}
  </div>
  <div style="background:#0a0a0a;min-height:100%;padding:16px 16px 32px">
    ${active.length?`
      <div style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.44);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.08em">Current</div>
      ${active.map(activeCard).join('')}`:''}
    ${past.length?`
      <div style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.44);margin:${active.length?'16px':'0'} 0 10px;text-transform:uppercase;letter-spacing:0.08em">Past</div>
      ${past.map(pastCard).join('')}`:''}
    ${!active.length&&!past.length?`

// ── TRANSFER TICKET ─────────────────────────────────────
function renderTransferTicket(){
  const tId=S.ticketId;
  const tk=myTickets.find(t=>t.id===tId)||myTickets[0];
  const subIdx=S.transferSubIdx||0;
  const subCount=(tk.subTickets||[]).length;
  const phase=S.transferPhase||'select';
  const sel=S.transferSelectedFriend;
  const q=(S.transferSearch||'').toLowerCase().trim();

  // ── Confirm phase ──
  if(phase==='confirm'&&sel){
    return`
    <div style="position:sticky;top:0;z-index:99;background:#0a0a0a;padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.08)">
      <button onclick="S.transferPhase='select';render()" style="background:none;border:none;padding:4px;color:#fff;display:flex;align-items:center">${ic('left',20)}</button>
      <div style="font-size:17px;font-weight:700;color:#fff">Confirm Transfer</div>
    </div>
    <div style="background:#0a0a0a;min-height:100%;padding:24px 16px 32px">
      <div style="text-align:center;margin-bottom:24px">
        <div style="width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,#6226E9,#0E4EF5);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;margin:0 auto 14px">${sel.av||(sel.name||sel.phone||'?').charAt(0)}</div>
        <div style="font-size:19px;font-weight:700;color:#fff;margin-bottom:4px">${sel.name||sel.phone}</div>
        ${sel.uname?`<div style="font-size:12px;color:rgba(255,255,255,0.50)">${sel.uname}</div>`:''}
        ${sel.phone&&sel.name&&!sel.uname?`<div style="font-size:12px;color:rgba(255,255,255,0.50)">${sel.phone}</div>`:''}
      </div>
      <div style="background:#1c1c1c;border-radius:14px;padding:14px 16px;margin-bottom:16px">
        <div style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.44);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px">Transferring</div>
        <div style="font-size:14px;font-weight:700;color:#fff">${tk.title}</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.50);margin-top:3px">Spot ${subIdx+1} of ${subCount} \u00b7 ${tk.orderId}</div>
      </div>
      <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 14px;margin-bottom:28px">
        <div style="font-size:11px;color:rgba(255,255,255,0.60);line-height:1.6">After sending, the QR for this spot is locked until ${sel.name||'the recipient'} accepts via Nigh. You can cancel the invite at any time before they accept.</div>
      </div>
      <button onclick="doTransfer('${tId}',${subIdx},{name:'${(sel.name||'').replace(/'/g,"\\'")}',uname:'${(sel.uname||'').replace(/'/g,"\\'")}',av:'${(sel.av||'').replace(/'/g,"\\'")}',phone:'${(sel.phone||'').replace(/'/g,"\\'")}'  })" style="width:100%;background:linear-gradient(135deg,#0E4EF5,#6226E9);border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;margin-bottom:10px">Send Invite</button>
      <button onclick="S.transferPhase='select';S.transferSelectedFriend=null;render()" style="width:100%;background:none;border:none;padding:10px;font-size:13px;color:rgba(255,255,255,0.44);cursor:pointer">Go back</button>
    </div>`;
  }

  // ── Select phase ──
  // Filter helpers
  const matchQ=(name,phone,uname)=>{
    if(!q)return true;
    return (name||'').toLowerCase().includes(q)||(phone||'').includes(q)||(uname||'').toLowerCase().includes(q);
  };

  const friendRow=(f,isPhone)=>`
    <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;background:#1c1c1c;border-radius:14px;margin-bottom:8px">
      <div style="width:42px;height:42px;border-radius:50%;background:${isPhone?'rgba(255,255,255,0.10)':'linear-gradient(135deg,#6226E9,#0E4EF5)'};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:${isPhone?'rgba(255,255,255,0.60)':'#fff'};flex-shrink:0">${f.av}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px">
          <div style="font-size:13px;font-weight:600;color:#fff">${f.name}</div>
          ${!isPhone?`<span style="font-size:9px;font-weight:700;padding:1px 6px;border-radius:5px;background:rgba(14,78,245,0.2);color:#41EFF9">Nigh</span>`:''}
        </div>
        <div style="font-size:11px;color:rgba(255,255,255,0.50);margin-top:1px">${isPhone?f.phone:f.uname}</div>
      </div>
      <button onclick="S.transferPhase='confirm';S.transferSelectedFriend={name:'${f.name}',uname:'${f.uname||''}',av:'${f.av}',phone:'${f.phone||''}'};render()" style="padding:8px 16px;background:linear-gradient(135deg,#0E4EF5,#6226E9);border:none;border-radius:10px;font-size:12px;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0">Invite</button>
    </div>`;

  const recentsFiltered=recentTransfers.filter(f=>matchQ(f.name,f.phone,f.uname));
  const nighFriends=friendsList.filter(f=>f.hasTicket!==tk.dropId&&matchQ(f.name,'',f.uname));
  const phoneCts=phoneContacts.filter(f=>matchQ(f.name,f.phone,''));
  const alreadyGoing=friendsList.filter(f=>f.hasTicket===tk.dropId&&matchQ(f.name,'',f.uname));

  const noResults=!recentsFiltered.length&&!nighFriends.length&&!phoneCts.length;

  return`
  <div style="position:sticky;top:0;z-index:99;background:#0a0a0a;padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.08)">
    <button onclick="S.transferPhase=null;S.transferSelectedFriend=null;S.transferSearch='';go('ticketView',{ticketId:'${tId}',confirmNew:false})" style="background:none;border:none;padding:4px;color:#fff;display:flex;align-items:center">${ic('left',20)}</button>
    <div>
      <div style="font-size:17px;font-weight:700;color:#fff">Transfer Ticket</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.50);margin-top:1px">Spot ${subIdx+1} of ${subCount} \u00b7 ${tk.title}</div>
    </div>
  </div>
  <div style="background:#0a0a0a;min-height:100%;padding:14px 16px 40px">

    <!-- Search bar -->
    <div style="position:relative;margin-bottom:20px">
      <div style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.35);pointer-events:none">${ic('search',16)}</div>
      <input
        id="xferSearch"
        type="text"
        placeholder="Name or mobile number"
        value="${S.transferSearch||''}"
        oninput="S.transferSearch=this.value;render();document.getElementById('xferSearch')&&document.getElementById('xferSearch').focus()"
        style="width:100%;background:#1c1c1c;border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:12px 12px 12px 40px;font-size:14px;color:#fff;outline:none;box-sizing:border-box"/>
    </div>

    ${noResults?`
      <div style="text-align:center;padding:48px 16px;color:rgba(255,255,255,0.30)">
        <div style="margin-bottom:8px">${ic('search',32)}</div>
        <div style="font-size:14px;font-weight:500">No results for "${q}"</div>
        ${q.match(/^\d/)?`<div style="font-size:12px;margin-top:6px">Looks like a number \u2014 try the full 10-digit format</div>`:''}
      </div>
    `:``}

    <!-- Recents -->
    ${!q&&recentsFiltered.length?`
    <div style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.44);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px">Recents</div>
    ${recentsFiltered.map(f=>friendRow(f,f.type==='phone')).join('')}`:''}

    <!-- Friends on Nigh -->
    ${nighFriends.length?`
    <div style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.44);text-transform:uppercase;letter-spacing:0.08em;margin:${(!q&&recentsFiltered.length)?'16px':0} 0 10px">Friends on Nigh</div>
    ${nighFriends.map(f=>friendRow(f,false)).join('')}`:''}

    <!-- Phone Contacts -->
    ${phoneCts.length?`
    <div style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.44);text-transform:uppercase;letter-spacing:0.08em;margin:${nighFriends.length?'16px':'0'} 0 10px">Phone Contacts</div>
    ${phoneCts.map(f=>friendRow(f,true)).join('')}`:''}

    <!-- Already going -->
    ${alreadyGoing.length&&!q?`
    <div style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.28);text-transform:uppercase;letter-spacing:0.08em;margin:16px 0 10px">Already Attending</div>
    ${alreadyGoing.map(f=>`<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,0.03);border-radius:14px;margin-bottom:8px">
      <div style="width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:rgba(255,255,255,0.30);flex-shrink:0">${f.av}</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:600;color:rgba(255,255,255,0.35)">${f.name}</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.25)">${f.uname} \u00b7 Already has a spot</div></div>
    </div>`).join('')}`:''}

  </div>`;
}


// ── INBOX ──────────────────────────────────────────────
function openInboxMessage(id){
  const msg=inboxMessages.find(m=>m.id===id);
  if(!msg)return;
  msg.unread=false;
  S.modal='inbox-'+id;
  render();
}
function renderInbox(){
  const unread=inboxMessages.filter(m=>m.unread).length;
  const avatarStyle={
    nigh:'background:linear-gradient(135deg,rgba(98,38,233,0.9),rgba(14,78,245,0.9));border-radius:12px',
    alert:'background:linear-gradient(135deg,rgba(245,166,35,0.85),rgba(236,25,119,0.85));border-radius:12px',
    friend:'background:rgba(65,239,249,0.25);border:1px solid rgba(65,239,249,0.35);border-radius:12px',
  };
  return`
  <div style="background:#0B0B1A;min-height:762px;display:flex;flex-direction:column">
    <div style="background:#0B0B1A;padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:99">
      <div style="font-size:28px;font-weight:800;color:#fff">Inbox</div>
      ${unread>0?`<div style="font-size:12px;color:rgba(255,255,255,0.60);margin-top:2px">${unread} unread</div>`:''}
    </div>
    <div style="padding:8px 0">
      ${inboxMessages.map(msg=>{
        const av=avatarStyle[msg.type]||avatarStyle.nigh;
        const avatarContent=msg.type==='nigh'
          ?`<svg width="20" height="20" viewBox="0 0 24 24" stroke="#fff" stroke-width="2" fill="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>`
          :msg.type==='alert'
          ?`<svg width="20" height="20" viewBox="0 0 24 24" stroke="#fff" stroke-width="2" fill="none"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>`
          :`<span style="font-size:13px;font-weight:700;color:#41EFF9">${msg.subtitle.split(' ')[0].charAt(0)}${msg.subtitle.split(' ')[1]?msg.subtitle.split(' ')[1].charAt(0):''}</span>`;
        return`
        <div onclick="openInboxMessage(${msg.id})" style="padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;display:flex;gap:12px;align-items:flex-start;-webkit-tap-highlight-color:rgba(255,255,255,0.05)">
          <div style="width:48px;height:48px;flex-shrink:0;display:flex;align-items:center;justify-content:center;${av}">${avatarContent}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:2px">${msg.title}</div>
            ${msg.author?`<div style="font-size:12px;color:#fff;margin-bottom:1px">${msg.author}</div>`:''}
            <div style="font-size:12px;color:#fff;margin-bottom:1px">${msg.subtitle}</div>
            ${msg.description?`<div style="font-size:12px;color:#fff;margin-bottom:2px">${msg.description}</div>`:''}
            <div style="font-size:11px;color:rgba(255,255,255,0.60);margin-top:2px">${msg.time}</div>
          </div>
          <div style="flex-shrink:0;width:12px;display:flex;justify-content:center;padding-top:4px">
            ${msg.unread?`<div style="width:8px;height:8px;border-radius:50%;background:#0E4EF5"></div>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── NIYA CONCIERGE ─────────────────────────────────────
const niyaConvData=[
  {from:'niya',text:"Hi Alex 👋 What can I help you find or figure out?"},
  {from:'user',text:"Find me something for date night this Saturday under $50."},
  {from:'niya',text:"Great taste! Whole Foods Chef's Table is a perfect match — 5-course tasting menu with local wines, $45/person, this Saturday March 5. Only 3 spots left, and Maya Torres is already going!"},
  {from:'user',text:"Nice! Is it good for a first date?"},
  {from:'niya',text:"Definitely. It's one of the most popular date-night drops in Boulder — intimate setting, chef-guided dinner, smart casual. Want me to grab 2 spots for you?"},
  {from:'user',text:"Yes please!"},
  {from:'niya',text:"Done! 2 spots reserved at Whole Foods Chef's Table · $90 total. Check your Tickets tab to view your ticket. Enjoy your date night! 🥂",action:'ticket'},
];

  const step=S.niyaStep;

  const ctxSrc=S.niyaScr||'feed';
  const ctxLabel=niyaContextLabels[ctxSrc]||'';
  const backLabel=ctxLabel?'Ask Niya — '+ctxLabel:'Ask Niya';
  const backAction="S.scr='"+(ctxSrc)+"';S.niyaStep=0;S.niyaListening=false;render()";
  const prompts=(niyaContextPrompts[ctxSrc]||niyaContextPrompts.feed);

  return `${hdr(backLabel,'Your AI concierge',backAction,'',true)}
  <div style="padding:14px 16px;display:flex;flex-direction:column;gap:0">

    <!-- Conversation bubbles -->
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px">
      ${visibleConv.map((m,i)=>{
        const isN=m.from==='niya';
        return `<div class="slideUp" style="display:flex;gap:8px;align-items:flex-end;${isN?'':'flex-direction:row-reverse'}">
          ${isN?niyaAvatar(30):''}
          <div style="max-width:78%;background:${isN?'#EDE9FE':'#1B2A4A'};border-radius:${isN?'14px 14px 14px 4px':'14px 14px 4px 14px'};padding:10px 12px">
            <div style="font-size:13px;color:${isN?'#4C1D95':'#fff'};line-height:1.45">${m.text}</div>
          </div>
        </div>`;
      }).join('')}
      ${step<niyaConvData.length&&!isReady?`<div style="display:flex;gap:8px;align-items:center">${niyaAvatar(30)}<div style="background:#EDE9FE;border-radius:14px;padding:8px 12px;display:flex;gap:5px">
        <div class="niya-dot" style="animation-delay:0s"></div>
        <div class="niya-dot" style="animation-delay:0.2s"></div>
        <div class="niya-dot" style="animation-delay:0.4s"></div>
      </div></div>`:''}
    </div>

    ${step===0&&prompts?`<div style="margin-bottom:14px">
      <div style="font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">Try asking</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${prompts.map((p,i)=>`<button onclick="S.niyaStep=${i===0?1:i<2?1:2};render()" style="text-align:left;background:#F5F3FF;border:1px solid #DDD6FE;border-radius:10px;padding:9px 12px;font-size:12px;color:#4C1D95;font-weight:500;width:100%;cursor:pointer">${p}</button>`).join('')}
      </div>
    </div>`:''}

    <!-- Voice / action input -->
    <div style="background:#fff;border-radius:16px;border:1px solid #E5E7EB;padding:14px;text-align:center">
      ${isListening
        ?`<div style="display:flex;justify-content:center;margin-bottom:10px">${niyaWave(true)}</div>
        <div style="font-size:12px;font-weight:600;color:#7C3AED;margin-bottom:10px">Listening...</div>
        <button onclick="S.niyaListening=false;S.niyaStep=Math.min(S.niyaStep+1,niyaConvData.length-1);render()" style="background:#EF4444;color:#fff;border:none;border-radius:50%;width:56px;height:56px;display:flex;align-items:center;justify-content:center;margin:0 auto">${ic('x',22)}</button>`
        :`<div style="font-size:12px;color:#6B7280;margin-bottom:10px">${isReady?'Anything else I can help with?':'Tap to ask Niya'}</div>
        ${isReady
          ?`<div style="display:flex;gap:8px;align-items:center;justify-content:center">
              <button onclick="S.niyaListening=true;render()" style="background:none;border:none;padding:0;cursor:pointer;border-radius:50%;overflow:hidden;width:48px;height:48px;flex-shrink:0"><img src="niya_icon.svg" style="width:48px;height:48px;object-fit:cover;display:block;border-radius:50%;animation:niyaInnerPulse 2.5s ease-in-out infinite"/></button>
              <button onclick="go('ticketCollection')" style="background:#0E4EF5;color:#fff;border:none;border-radius:12px;padding:13px 22px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px;flex:1;justify-content:center">${ic('ticket',16)} View Tickets</button>
            </div>`
          :`<button onclick="S.niyaListening=true;render()" style="background:none;border:none;padding:0;cursor:pointer;border-radius:50%;overflow:hidden;width:64px;height:64px;display:block;margin:0 auto"><img src="niya_icon.svg" style="width:64px;height:64px;object-fit:cover;display:block;border-radius:50%;animation:niyaInnerPulse 2.5s ease-in-out infinite"/></button>
           <div style="display:flex;justify-content:center;gap:14px;margin-top:10px">
             <button onclick="S.niyaStep=Math.min(S.niyaStep+1,niyaConvData.length-1);render()" style="background:none;border:none;color:#7C3AED;font-size:11px;font-weight:600;cursor:pointer">Next →</button>
             <span style="color:#D1D5DB">|</span>
             <button onclick="S.niyaStep=niyaConvData.length-1;render()" style="background:none;border:none;color:#7C3AED;font-size:11px;font-weight:600;cursor:pointer">Skip ⇒</button>

      detailHtml=`

    } else if(msg.type==='friend'){
      detailHtml=`
        <div style="font-size:14px;color:#fff;line-height:1.6;margin-bottom:8px">${msg.detail.friend} ${msg.detail.action} <strong>${msg.detail.drop}</strong></div>

        <div style="font-size:14px;color:#fff;line-height:1.6">${msg.detail.message}</div>`;
    }
    mr.innerHTML=`<div class="modal-bg" onclick="modal(null)"><div class="modal fi" onclick="event.stopPropagation()" style="background:#0B0B1A;border-top:1px solid rgba(255,255,255,0.1)"><div class="mh" style="background:rgba(255,255,255,0.2)"></div>

    mr.innerHTML=`<div class="modal-bg" onclick="modal(null)"><div class="modal fi" onclick="event.stopPropagation()"><div class="mh"></div>

    </div></div>`;return;

  mr.innerHTML='';

// ── RENDER ─────────────────────────────────────────────
function render(){
  const scrEl=document.getElementById('scr');
  const onFeed=S.scr==='feed';
  scrEl.className=onFeed?'feed-mode':'';
  let html='';
  switch(S.scr){
    case 'onboarding': html=renderOnboarding();break;
    case 'feed': html=renderFeed();break;
    case 'dropDetail': html=renderDropDetail();break;
    case 'placeOrder': html=renderPlaceOrder();break;
    case 'ticketView': html=renderTicketView();break;
    case 'ticketCollection': html=renderTicketCollection();break;
    case 'transferTicket': html=renderTransferTicket();break;
    case 'inbox': html=renderInbox();break;
    case 'proProfile': html=renderProProfile();break;
    case 'menu': html=renderMenu();break;
    case 'niya': html=renderNiya();break;
    default: html=renderFeed();
  }
  scrEl.innerHTML=html;
  if(onFeed){
    scrEl.scrollTop=S.drop*762;
  } else {
    scrEl.scrollTop=0;
  }
  renderTB();
  renderModal();
}

render();
</script>
