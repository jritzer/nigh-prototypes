// ── HELPERS ───────────────────────────────────────────────────────────────────
function locById(id){return cfg().locations.find(l=>l.id===id);}
function orgMode(){const c=cfg();if(c.locations.length===1)return'single';if(c.hier.length<=1)return'multi';return'enterprise';}
function dropTypeInfo(typeId){return cfg().dropTypes.find(t=>t.id===typeId)||{id:typeId,label:typeId,icon:'&#127381;',bg:'#f1f5f9',c:'#475569'};}
function badge(status){
  const map={live:'#dcfce7:#16a34a:Live',scheduled:'#fef9c3:#854d0e:Scheduled',draft:'#f1f5f9:#64748b:Draft',ended:'#fee2e2:#b91c1c:Ended',active:'#dcfce7:#16a34a:Active'};
  const [bg,color,label]=(map[status]||'#f1f5f9:#64748b:—').split(':');
  return `<span style="background:${bg};color:${color};font-size:0.68rem;font-weight:700;padding:3px 8px;border-radius:20px;">${label}</span>`;
}
function dropBadge(typeId){
  const t=dropTypeInfo(typeId);
  return `<span style="background:${t.bg};color:${t.c};font-size:0.68rem;font-weight:800;padding:3px 8px;border-radius:20px;">${t.icon} ${t.label}</span>`;
}
function timingBadge(timing){
  if(!timing) return '';
  const map={'pre-game':{bg:'#eff6ff',c:'#1d4ed8',l:'Pre-Game'},'in-game':{bg:'#dcfce7',c:'#15803d',l:'In-Game'},'post-game':{bg:'#fef9c3',c:'#92400e',l:'Post-Game'}};
  const t=map[timing]||{bg:'#f1f5f9',c:'#475569',l:timing};
  return `<span style="background:${t.bg};color:${t.c};font-size:0.65rem;font-weight:800;padding:2px 7px;border-radius:20px;">${t.l}</span>`;
}
function dayBadge(dayId){
  if(!dayId||!cfg().days) return '';
  const d=cfg().days.find(x=>x.id===dayId);
  if(!d) return '';
  const wk=cfg().weekends.find(w=>w.id===d.weekend);
  return `<span style="background:${wk?wk.color+'20':'#f1f5f9'};color:${wk?wk.color:'#475569'};font-size:0.65rem;font-weight:800;padding:2px 7px;border-radius:20px;">${d.date} ${d.short}</span>`;
}
function pct(a,b){return b>0?Math.round(a/b*100):0;}
function fmtMoney(n){return '$'+n.toLocaleString();}
function fmtNum(n){return n>=1000?(n/1000).toFixed(1)+'K':String(n);}
function showColor(p){return p>=80?'#16a34a':p>=60?'#ca8a04':'#dc2626';}
function infoRow(l,v){return `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f1f5f9;"><span style="font-size:0.78rem;color:#64748b;">${l}</span><span style="font-size:0.78rem;font-weight:700;color:#0f172a;">${v}</span></div>`;}
function getFilteredDrops(){
  let drops=cfg().drops;
  if(S.timing) drops=drops.filter(d=>d.timing===S.timing);
  if(S.weekend){
    const days=(cfg().days||[]).filter(d=>d.weekend===S.weekend).map(d=>d.id);
    drops=drops.filter(d=>days.includes(d.day));
  }
  if(S.day) drops=drops.filter(d=>d.day===S.day);
  if(S.t1){
    const lIds=cfg().locations.filter(l=>l.t1===S.t1).map(l=>l.id);
    drops=drops.filter(d=>lIds.includes(d.locId));
  }
  return drops;
}

  // Festival (Coachella) topbar

    const weekends=c.weekends||[];

      ${days.map(d=>`<button onclick="ss({day:S.day==='${d.id}'?null:'${d.id}'})" style="padding:4px 11px;border-radius:20px;border:1px solid ${S.day===d.id?'#E8502A':'#e5e7eb'};background:${S.day===d.id?'#E8502A18':'transparent'};color:${S.day===d.id?'#E8502A':'#64748b'};font-size:0.72rem;font-weight:${S.day===d.id?'700':'500'};cursor:pointer;">${d.short} ${d.date}</button>`).join('')}

      <select onchange="ss({t1:this.value||null})" style="padding:6px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:0.78rem;color:#0f172a;background:#fff;cursor:pointer;">
        <option value="">All Zones</option>
        ${t1vals.map(v=>`<option value="${v}" ${S.t1===v?'selected':''}>${v}</option>`).join('')}
      </select>
      <div style="width:1px;height:24px;background:#e5e7eb;"></div>
      ${(c.timings||[]).map(t=>`<button onclick="ss({timing:S.timing==='${t}'?null:'${t}'})" style="padding:4px 11px;border-radius:20px;border:1px solid ${S.timing===t?c.color:'#e5e7eb'};background:${S.timing===t?c.color+'18':'transparent'};color:${S.timing===t?c.color:'#64748b'};font-size:0.72rem;font-weight:${S.timing===t?'700':'500'};cursor:pointer;text-transform:capitalize;">${t}</button>`).join('')}
      <div style="background:#002244;border-radius:10px;padding:5px 14px;display:flex;align-items:center;gap:10px;margin-left:4px;">
        <span style="color:${g.homeColor||'#FB4F14'};font-size:0.78rem;font-weight:900;">${g.homeTeam||'Home'} ${g.homeScore??'—'}</span>
        <span style="color:rgba(255,255,255,0.4);font-size:0.7rem;font-weight:700;">${g.quarter||'Q'} · ${g.timeLeft||'—'}</span>
        <span style="color:${g.awayColor||'#64748b'};font-size:0.78rem;font-weight:900;">${g.awayScore??'—'} ${g.awayTeam||'Away'}</span>
      </div>
      <div style="flex:1;"></div>
      <span style="background:#dcfce7;color:#15803d;font-size:0.7rem;font-weight:700;padding:4px 10px;border-radius:20px;">${liveDrops} Live</span>
    </div>`;

  // Single-location / Web Pro — no hierarchy to filter, skip topbar
  if(orgMode()==='single') return '';

  // Default topbar (Best Buy, Chipotle, Disney)
  const t1vals=[...new Set(c.locations.map(l=>l.t1).filter(Boolean))];
  const t2vals=S.t1?[...new Set(c.locations.filter(l=>l.t1===S.t1).map(l=>l.t2).filter(Boolean))]:[];

      <option value="">All ${c.hier[0]}s</option>
      ${t1vals.map(v=>`<option value="${v}" ${S.t1===v?'selected':''}>${v}</option>`).join('')}

    ${c.hier[1]&&t2vals.length?`<select onchange="ss({t2:this.value||null})" style="padding:6px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:0.78rem;color:#0f172a;background:#fff;cursor:pointer;"><option value="">All ${c.hier[1]}s</option>${t2vals.map(v=>`<option value="${v}" ${S.t2===v?'selected':''}>${v}</option>`).join('')}</select>`:''}

    <div style="flex:1;"></div>
    <span style="background:#dcfce7;color:#15803d;font-size:0.7rem;font-weight:700;padding:4px 10px;border-radius:20px;">${liveDrops} Live</span>
  </div>`;
}

function renderPage(){
  const p=S.page;
  if(p==='dashboard')   return rDashboard();
  if(p==='locations')   return rLocations();
  if(p==='drops')       return rDrops();
  if(p==='customers')   return rCustomers();
  if(p==='collections') return rCollections();
  if(p==='analytics')   return rAnalytics();
  if(p==='users')       return rUsers();
  if(p==='setup')       return rSetup();
  if(p==='partners')    return rPartners();
  if(p==='billing')     return rBilling();
  if(p==='settings')    return rSettings();
  if(p==='activity')    return rActivity();
  if(p==='inbox')       return rInbox();
  return '<div style="padding:32px;">Not found</div>';
}

// ── KPI HELPERS ───────────────────────────────────────────────────────────────
function kpi(label,value,sub,color){
  return `<div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:20px 22px;">
    <div style="font-size:0.72rem;color:#64748b;font-weight:600;margin-bottom:6px;">${label}</div>
    <div style="font-size:1.9rem;font-weight:900;color:${color||'#0f172a'};">${value}</div>
    ${sub?`<div style="font-size:0.7rem;color:#94a3b8;margin-top:4px;">${sub}</div>`:''}
  </div>`;
}
function miniStat(label,val,color){
  return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f8fafc;">
    <span style="font-size:0.78rem;color:#475569;">${label}</span>
    <span style="font-size:0.82rem;font-weight:800;color:${color||'#0f172a'};">${val}</span>
  </div>`;
}
function bar(pct,color,h){h=h||8;return `<div style="background:#f1f5f9;border-radius:4px;height:${h}px;overflow:hidden;"><div style="background:${color};height:100%;width:${Math.min(pct,100)}%;border-radius:4px;transition:width 0.3s;"></div></div>`;}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function rDashboard(){
  const c=cfg();
  const mode=orgMode();
  const drops=c.drops;
  const locs=c.locations;
  const live=drops.filter(d=>d.status==='live');
  const sched=drops.filter(d=>d.status==='scheduled');
  const totalRes=drops.reduce((s,d)=>s+(d.res||0),0);
  const totalCi=drops.reduce((s,d)=>s+(d.ci||0),0);
  const avgSr=live.length?Math.round(live.reduce((s,d)=>s+d.sr,0)/live.length):0;

  // Top locations by check-ins
  const topLocs=locs.map(l=>{
    const lDrops=drops.filter(d=>d.locId===l.id);
    const ci=lDrops.reduce((s,d)=>s+(d.ci||0),0);
    const res=lDrops.reduce((s,d)=>s+(d.res||0),0);
    return {...l,ci,res};
  }).sort((a,b)=>b.ci-a.ci).slice(0,5);

  // Drop type breakdown
  const typeBreakdown=c.dropTypes.map(t=>{
    const td=drops.filter(d=>d.type===t.id);
    const tci=td.reduce((s,d)=>s+(d.ci||0),0);
    return {...t,count:td.length,ci:tci,live:td.filter(d=>d.status==='live').length};
  });

  // Hierarchy breakdown for top tier
  const t1groups=[...new Set(locs.map(l=>l.t1))];

  // Calculate total followers and growth across all locations
  const totalFollowers=locs.reduce((s,l)=>s+(l.followers||0),0);
  const totalFollowersGrowth=locs.reduce((s,l)=>s+(l.followersGrowth||0),0);

  return `<div style="padding:28px 32px;">
    <div style="margin-bottom:22px;">
      <div style="font-size:1.3rem;font-weight:900;color:#0f172a;">${c.name}</div>
      <div style="font-size:0.82rem;color:#64748b;margin-top:3px;">${c.plan.replace(/^Web /,'')} &middot; ${locs.length} ${locs.length===1?c.locLabel:c.locsLabel}</div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:24px;">
      ${kpi('Live Drops',live.length,`${sched.length} scheduled`,c.color)}
      ${kpi('Total Reservations',fmtNum(totalRes),`across ${drops.length} drops`,'#0f172a')}
      ${kpi('Total Check-ins',fmtNum(totalCi),`${avgSr}% avg show rate`,'#0f172a')}
      ${mode!=='single'?kpi('Active Locations',locs.filter(l=>l.status==='active').length,`${t1groups.length} ${c.hier[0].toLowerCase()}s`,'#0f172a'):''}
      ${kpi('Followers',fmtNum(totalFollowers),`+${totalFollowersGrowth} across all locations`,'#7C3AED')}
    </div>

    <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:18px;margin-bottom:18px;">
      <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;overflow:hidden;">
        <div style="padding:16px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;">
          <div style="font-size:0.9rem;font-weight:800;color:#0f172a;">Live Drops</div>
          <button onclick="go('drops')" style="font-size:0.72rem;color:${c.color};font-weight:700;background:none;border:none;cursor:pointer;">View All &rarr;</button>
        </div>
        ${live.slice(0,5).map(d=>{
          const loc=locById(d.locId);
          const sr=pct(d.ci,d.res);
          const dt=dropTypeInfo(d.type);
          return `<div style="padding:12px 20px;border-bottom:1px solid #f8fafc;display:flex;align-items:center;gap:12px;">
            <div style="flex:1;min-width:0;">
              <div style="font-size:0.82rem;font-weight:700;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${d.title}</div>
              <div style="display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap;">

                ${d.timing?timingBadge(d.timing):''}
                ${d.day?dayBadge(d.day):''}
                <span style="font-size:0.7rem;color:#94a3b8;">${loc?loc.name:'—'}</span>
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0;">
              <div style="font-size:0.88rem;font-weight:900;color:${showColor(sr)};">${sr}%</div>
              <div style="font-size:0.65rem;color:#94a3b8;">${d.ci}/${d.res}</div>
            </div>
          </div>`;
        }).join('')}
      </div>

      <div style="display:flex;flex-direction:column;gap:14px;">
        <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:16px 20px;">
          <div style="font-size:0.82rem;font-weight:800;color:#0f172a;margin-bottom:12px;">Drop Types</div>
          ${typeBreakdown.map(t=>`<div style="margin-bottom:8px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
              <span style="font-size:0.75rem;color:#475569;">${t.icon} ${t.label}</span>
              <span style="font-size:0.75rem;font-weight:700;color:${t.c};">${t.live} live &middot; ${t.ci} ci</span>
            </div>
            ${bar(t.count?t.ci/Math.max(...typeBreakdown.map(x=>x.ci))*100:0,t.c)}
          </div>`).join('')}
        </div>

        ${mode!=='single'?`
        <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:16px 20px;">
          <div style="font-size:0.82rem;font-weight:800;color:#0f172a;margin-bottom:10px;">Top ${c.hier[0]}s by Check-ins</div>
          ${t1groups.map(t1=>{

          </div>`;

      </div>
    </div>

  </div>`;
}

// ── LOCATIONS ─────────────────────────────────────────────────────────────────
function rLocations(){
  const c=cfg();
  // Single-location org: skip the list entirely, go straight to their one location's profile
  if(orgMode()==='single'){
    return locationDetail(c.locations[0]);
  }
  const locs=c.locations.filter(l=>{
    if(S.t1 && l.t1!==S.t1) return false;
    if(S.t2 && l.t2!==S.t2) return false;
    return true;
  });
  if(S.locationDetail){
    const l=c.locations.find(x=>x.id===S.locationDetail);
    if(l) return locationDetail(l);
  }
  const groups=[...new Set(locs.map(l=>l.t1))];
  return `<div style="padding:28px 32px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <div>
        <div style="font-size:1.3rem;font-weight:900;color:#0f172a;">${c.locsLabel}</div>
        <div style="font-size:0.78rem;color:#64748b;margin-top:2px;">${locs.length} of ${c.locations.length} ${c.locsLabel.toLowerCase()} shown</div>
      </div>
      <button onclick="ss({addLocModal:true})" style="padding:8px 16px;border:1px solid #e5e7eb;border-radius:8px;font-weight:700;font-size:0.78rem;background:#fff;cursor:pointer;color:#374151;">+ Add ${c.locLabel}</button>
    </div>
    ${groups.map(g=>{
      const glocs=locs.filter(l=>l.t1===g);
      const gDrops=c.drops.filter(d=>glocs.some(l=>l.id===d.locId));
      const gci=gDrops.reduce((s,d)=>s+(d.ci||0),0);
      const gres=gDrops.reduce((s,d)=>s+(d.res||0),0);
      const gsr=pct(gci,gres);
      const t2groups=[...new Set(glocs.map(l=>l.t2).filter(Boolean))];
      return `<div style="margin-bottom:24px;">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
          <div style="font-size:0.9rem;font-weight:800;color:#0f172a;">${g}</div>
          <span style="font-size:0.7rem;color:#94a3b8;">${glocs.length} ${c.locsLabel.toLowerCase()}</span>
          <span style="margin-left:auto;font-size:0.72rem;font-weight:700;color:${showColor(gsr)};">${gsr}% show rate &middot; ${gci} check-ins</span>
        </div>
        ${(t2groups.length?t2groups:[null]).map(t2=>{
          const t2locs=t2?glocs.filter(l=>l.t2===t2):glocs;
          const t2Header=t2?`<div style="font-size:0.72rem;font-weight:700;color:#64748b;padding:6px 0 4px;letter-spacing:0.04em;text-transform:uppercase;">${t2}</div>`:'';
          return t2Header+`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:${t2?'12px':'0'};">
            ${t2locs.map(l=>{
              const lDrops=c.drops.filter(d=>d.locId===l.id);
              const lci=lDrops.reduce((s,d)=>s+(d.ci||0),0);
              const lres=lDrops.reduce((s,d)=>s+(d.res||0),0);
              const lsr=pct(lci,lres);
              const liveCt=lDrops.filter(d=>d.status==='live').length;
              return `<div onclick="ss({locationDetail:'${l.id}'})" style="background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:14px 16px;cursor:pointer;transition:all 0.12s;" onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,0.08)';this.style.borderColor='${c.color}50'" onmouseout="this.style.boxShadow='';this.style.borderColor='#e5e7eb'">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;">
                  <div style="font-size:0.8rem;font-weight:700;color:#0f172a;line-height:1.3;">${l.name}</div>
                  ${badge(l.status)}
                </div>
                <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center;">
                  <div style="font-size:0.7rem;color:#94a3b8;">${l.city}, ${l.state}</div>
                  ${l.multiVenue===true?`<span style="font-size:0.62rem;font-weight:700;background:#FEF3C7;color:#B45309;padding:3px 8px;border-radius:12px;">Multi-venue</span>`:''}
                </div>
                <div style="display:flex;gap:12px;margin-bottom:8px;">
                  <div><div style="font-size:1rem;font-weight:900;color:${c.color};">${lci}</div><div style="font-size:0.62rem;color:#94a3b8;">check-ins</div></div>
                  <div><div style="font-size:1rem;font-weight:900;color:#0f172a;">${liveCt}</div><div style="font-size:0.62rem;color:#94a3b8;">live drops</div></div>
                  <div><div style="font-size:1rem;font-weight:900;color:${showColor(lsr)};">${lsr}%</div><div style="font-size:0.62rem;color:#94a3b8;">show rate</div></div>
                  <div><div style="font-size:1rem;font-weight:900;color:#7C3AED;">${l.followers||0}</div><div style="font-size:0.62rem;color:#94a3b8;">followers</div></div>
                </div>
                ${l.followersGrowth?`<div style="font-size:0.65rem;color:#a78bfa;">+${l.followersGrowth} this month</div>`:''}
                ${bar(lsr,c.color,5)}
              </div>`;
            }).join('')}
          </div>`;
        }).join('')}
      </div>`;
    }).join('')}
  </div>`;
}

    {id:'klaviyo',   label:'Klaviyo',   color:'#15B79E',logo:'📧'},

        </div>
      </div>
    </div>

  return `<div style="padding:28px 32px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">

      <button onclick="ss({showNewColl:true,collStep:1})" style="background:${c.color};color:#fff;border:none;padding:9px 20px;border-radius:10px;font-weight:700;font-size:0.78rem;cursor:pointer;">+ New Collection</button>

          <div style="font-size:0.9rem;font-weight:800;color:#0f172a;margin-bottom:5px;">${col.name}</div>

            <div style="text-align:center;background:#f8fafc;border-radius:8px;padding:8px 4px;">
              <div style="font-size:0.95rem;font-weight:900;color:#0f172a;">${col.drops}</div>
              <div style="font-size:0.6rem;color:#94a3b8;">drops</div>

              <div style="font-size:0.95rem;font-weight:900;color:${c.color};">${fmtNum(col.enrolled)}</div>
              <div style="font-size:0.6rem;color:#94a3b8;">guests</div>
            </div>
            <div style="text-align:center;background:#f8fafc;border-radius:8px;padding:8px 4px;">

      <div onclick="ss({showNewColl:true,collStep:1})" style="background:transparent;border-radius:14px;border:2px dashed #e5e7eb;padding:18px 20px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:180px;transition:border-color 0.1s;" onmouseover="this.style.borderColor='${c.color}'" onmouseout="this.style.borderColor='#e5e7eb'">

    </div>

// ── ANALYTICS ─────────────────────────────────────────────────────────────────

  const totalRes=drops.reduce((s,d)=>s+(d.res||0),0);
  const avgSr=pct(totalCi,totalRes);
  const t1groups=[...new Set(locs.map(l=>l.t1))];
  const weeks=['Feb 3','Feb 10','Feb 17','Feb 24','Mar 3','Mar 10','Mar 17','Mar 24','Mar 31'];
  const ciData=[42,58,63,71,85,79,94,108,totalCi];
  const maxCi=Math.max(...ciData);
  return `<div style="padding:28px 32px;">
    <div style="font-size:1.3rem;font-weight:900;color:#0f172a;margin-bottom:6px;">Analytics</div>
    <div style="font-size:0.78rem;color:#64748b;margin-bottom:20px;">Last 30 days · All ${c.locsLabel.toLowerCase()}</div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;">
      ${kpi('Check-ins',fmtNum(totalCi),'total this period',c.color)}
      ${kpi('Reservations',fmtNum(totalRes),'total this period','#0f172a')}
      ${kpi('Show Rate',avgSr+'%','avg across all drops','#0f172a')}
      ${kpi('Peak Bookings','3–5 PM','most popular window','#0f172a')}
    </div>

    <div style="display:grid;grid-template-columns:2fr 1fr;gap:18px;margin-bottom:18px;">
      <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:18px 22px;">
        <div style="font-size:0.85rem;font-weight:800;color:#0f172a;margin-bottom:14px;">Weekly Check-ins</div>
        <div style="display:flex;align-items:flex-end;gap:8px;height:100px;">
          ${ciData.map((v,i)=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
            <div style="width:100%;background:${i===ciData.length-1?c.color:c.color+'70'};border-radius:4px 4px 0 0;height:${Math.round(v/maxCi*80)+8}px;transition:height 0.3s;"></div>
            <div style="font-size:0.55rem;color:#94a3b8;white-space:nowrap;">${weeks[i].split(' ')[1]}</div>
          </div>`).join('')}
        </div>
      </div>
      <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:18px 22px;">
        <div style="font-size:0.85rem;font-weight:800;color:#0f172a;margin-bottom:14px;">By Drop Type</div>
        ${c.dropTypes.map(t=>{
          const td=drops.filter(d=>d.type===t.id);
          const tci=td.reduce((s,d)=>s+(d.ci||0),0);
          const pctOfTotal=totalCi?Math.round(tci/totalCi*100):0;
          return `<div style="margin-bottom:9px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:3px;">
              <span style="font-size:0.73rem;color:#475569;">${t.icon} ${t.label}</span>
              <span style="font-size:0.73rem;font-weight:700;color:${t.c};">${pctOfTotal}%</span>
            </div>
            ${bar(pctOfTotal,t.c,6)}
          </div>`;
        }).join('')}
      </div>
    </div>

    <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;overflow:hidden;">
      <div style="padding:14px 20px;border-bottom:1px solid #f1f5f9;font-size:0.85rem;font-weight:800;color:#0f172a;">${c.hier[0]} Performance</div>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);">

        ${t1groups.map((g,gi)=>{
          const gLocs=locs.filter(l=>l.t1===g);
          const gDrops=drops.filter(d=>gLocs.some(l=>l.id===d.locId));
          const gci=gDrops.reduce((s,d)=>s+(d.ci||0),0);
          const gres=gDrops.reduce((s,d)=>s+(d.res||0),0);
          const gsr=pct(gci,gres);
          const glive=gDrops.filter(d=>d.status==='live').length;
          return `<div style="padding:10px 14px;font-size:0.75rem;font-weight:700;color:#64748b;border-bottom:1px solid #f8fafc;">${gi+1}</div>
            <div style="padding:10px 14px;font-size:0.8rem;font-weight:700;color:#0f172a;border-bottom:1px solid #f8fafc;">${g}</div>
            <div style="padding:10px 14px;font-size:0.8rem;font-weight:700;color:${c.color};text-align:center;border-bottom:1px solid #f8fafc;">${gci}</div>
            <div style="padding:10px 14px;font-size:0.8rem;font-weight:700;color:${showColor(gsr)};text-align:center;border-bottom:1px solid #f8fafc;">${gsr}%</div>

        }).join('')}
      </div>
    </div>
  </div>`;
}

      <div style="display:grid;grid-template-columns:1fr auto auto;padding:10px 20px;border-bottom:1px solid #f1f5f9;font-size:0.68rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.04em;">

      &#128179; <strong>Payout settings:</strong> Payouts are processed automatically on the 1st of each month to your connected bank account. To update your bank account or payout schedule, contact <span style="font-weight:700;">enterprise@nigh.com</span>

        <div style="font-size:2.2rem;font-weight:900;color:#0f172a;margin-bottom:4px;">${fmtMoney(monthly)}<span style="font-size:1rem;color:#94a3b8;font-weight:500;">/mo</span></div>
        <div style="font-size:0.78rem;color:#94a3b8;margin-bottom:18px;">${locs.length} ${c.locsLabel.toLowerCase()} &times; ${fmtMoney(c.ppl)}/location/mo</div>
        ${infoRow('Next billing date','May 1, 2026')}
        ${infoRow('Payment method','Visa ending ···· 4242')}
        ${infoRow('Billing contact','billing@'+c.short.toLowerCase().replace(/\s/g,'')+'.com')}
        <div style="margin-top:16px;display:flex;gap:8px;">
          <button style="padding:8px 16px;background:${c.color};color:#fff;border:none;border-radius:8px;font-weight:700;font-size:0.75rem;cursor:pointer;">Update Payment</button>
          <button style="padding:8px 16px;background:#fff;color:#475569;border:1px solid #e5e7eb;border-radius:8px;font-weight:600;font-size:0.75rem;cursor:pointer;">Change Plan</button>
        </div>
      </div>
      <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:22px 24px;">
        <div style="font-size:0.85rem;font-weight:800;color:#0f172a;margin-bottom:14px;">Usage Breakdown</div>
        ${locs.map(l=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f8fafc;">

          <span style="font-size:0.73rem;font-weight:700;color:#0f172a;flex-shrink:0;">${fmtMoney(c.ppl)}</span>

          <span style="font-size:0.78rem;font-weight:800;color:#0f172a;">Total</span>
          <span style="font-size:0.78rem;font-weight:900;color:${c.color};">${fmtMoney(monthly)}/mo</span>
        </div>
      </div>
    </div>
    <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;overflow:hidden;">
      <div style="padding:14px 20px;border-bottom:1px solid #f1f5f9;font-size:0.88rem;font-weight:800;color:#0f172a;">Invoice History</div>
      <div style="display:grid;grid-template-columns:1fr auto auto;padding:10px 20px;border-bottom:1px solid #f1f5f9;font-size:0.68rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.04em;">
        <div>Invoice</div><div style="margin-right:24px;">Amount</div><div>Status</div>
      </div>
      ${invoices.map(inv=>`<div style="display:grid;grid-template-columns:1fr auto auto;align-items:center;padding:12px 20px;border-bottom:1px solid #f8fafc;">
        <div>
          <div style="font-size:0.8rem;font-weight:700;color:#0f172a;">${inv.id}</div>
          <div style="font-size:0.7rem;color:#94a3b8;">${inv.date}</div>

  return `<div style="padding:28px 32px;max-width:960px;">
    <div style="font-size:1.3rem;font-weight:900;color:#0f172a;margin-bottom:22px;">Finance</div>

// ── SETUP / CONFIGURE ────────────────────────────────────────────────────────
function rSetup(){
  const c=cfg();
  const tiers=c.hier||[];
  const geoTierEntries=Object.entries(c.geoTiers||{});
  const dropTypes=c.dropTypes||[];
  const t1vals=[...new Set(c.locations.map(l=>l.t1))];
  const t2vals=[...new Set(c.locations.filter(l=>l.t2).map(l=>l.t2))];

  function sectionHd(title,sub){return `<div style="margin-bottom:14px;"><div style="font-size:0.95rem;font-weight:900;color:#0f172a;">${title}</div>${sub?`<div style="font-size:0.73rem;color:#94a3b8;margin-top:3px;">${sub}</div>`:''}</div>`;}
  function card(content,extra=''){return `<div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:20px 22px;margin-bottom:14px;${extra}">${content}</div>`;}
  function toggle(on){return `<div onclick="this.dataset.on=this.dataset.on==='1'?'0':'1';this.style.background=this.dataset.on==='1'?'${c.color}':'#e5e7eb'" data-on="${on?'1':'0'}" style="width:38px;height:22px;border-radius:11px;background:${on?c.color:'#e5e7eb'};cursor:pointer;position:relative;flex-shrink:0;transition:background 0.2s;"><div style="width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:2px;${on?'right:2px':'left:2px'};transition:all 0.2s;"></div></div>`;}
  function editBtn(){return `<button style="padding:4px 12px;background:#f1f5f9;color:#475569;border:none;border-radius:7px;font-size:0.7rem;font-weight:600;cursor:pointer;">Edit</button>`;}

  // ── 1. Location Hierarchy ──
  const hierHTML=card(`
    ${sectionHd('Location Hierarchy','Define the tiers that organize your locations — rename them to match your org structure.')}
    <div style="display:flex;flex-direction:column;gap:0;">
      ${tiers.map((t,i)=>`
        <div style="display:flex;align-items:center;gap:12px;padding:12px 0;${i<tiers.length-1?'border-bottom:1px dashed #f1f5f9':''}">
          <div style="width:24px;height:24px;border-radius:50%;background:${c.color}18;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:900;color:${c.color};flex-shrink:0;">T${i+1}</div>
          <div style="flex:1;">
            <div style="font-size:0.75rem;font-weight:700;color:#0f172a;margin-bottom:2px;">Tier ${i+1} &mdash; <span style="color:${c.color};">${t}</span></div>
            <div style="font-size:0.68rem;color:#94a3b8;">${i===0?t1vals.slice(0,3).join(', ')+(t1vals.length>3?` +${t1vals.length-3} more`:''):i===1?t2vals.slice(0,3).join(', ')+(t2vals.length>3?` +${t2vals.length-3} more`:''):c.locLabel+' (individual locations)'}</div>
          </div>
          ${editBtn()}
          <div style="display:flex;flex-direction:column;gap:2px;cursor:grab;opacity:0.3;">${'<div style="width:16px;height:2px;background:#94a3b8;border-radius:2px;"></div>'.repeat(3)}</div>
        </div>`).join('')}
      <div style="padding:12px 0 2px;">
        <div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px dashed #f1f5f9;">
          <div style="width:24px;height:24px;border-radius:50%;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:900;color:#94a3b8;flex-shrink:0;">&#8627;</div>
          <div style="flex:1;">
            <div style="font-size:0.75rem;font-weight:700;color:#0f172a;margin-bottom:2px;">Individual Location &mdash; <span style="color:${c.color};">${c.locLabel}</span></div>
            <div style="font-size:0.68rem;color:#94a3b8;">${c.locations.length} ${c.locsLabel.toLowerCase()} total</div>
          </div>
          ${editBtn()}
        </div>
      </div>
    </div>
    <div style="margin-top:10px;display:flex;gap:8px;">
      <button style="padding:7px 14px;background:${c.color};color:#fff;border:none;border-radius:8px;font-size:0.73rem;font-weight:700;cursor:pointer;">+ Add Tier</button>
      <button style="padding:7px 14px;background:#f1f5f9;color:#64748b;border:none;border-radius:8px;font-size:0.73rem;font-weight:600;cursor:pointer;">Preview Hierarchy</button>
    </div>`);

  // ── 2. Geo Tiers ──
  const maxR=geoTierEntries.length;

      ${geoTierEntries.map(([key,gt],i)=>{

    <button style="padding:7px 14px;background:${c.color};color:#fff;border:none;border-radius:8px;font-size:0.73rem;font-weight:700;cursor:pointer;">+ Add Geo Tier</button>`);

      ${dropTypes.map((dt,i)=>`
        <div style="display:flex;align-items:center;gap:12px;padding:11px 0;${i<dropTypes.length-1?'border-bottom:1px solid #f8fafc':''}">

  // ── 4. Location Attributes ──

    {label:'Status',       desc:'Active, inactive, or coming soon',            on:true},
    {label:'Square Footage',desc:'Physical size of the space',                on:false},
    {label:'Operating Hours',desc:'When the location is open',                on:false},
    {label:'Manager Name', desc:'Assigned location manager contact',           on:false},
    {label:'POS Terminal ID',desc:'Link to point-of-sale system',             on:false},

  const attrHTML=card(`

      ${stdAttrs.map((a,i)=>`

          <div>
            <div style="font-size:0.75rem;font-weight:700;color:#0f172a;">${a.label}</div>
            <div style="font-size:0.65rem;color:#94a3b8;">${a.desc}</div>
          </div>
          ${toggle(a.on)}
        </div>`).join('')}
    </div>
    <div style="padding:12px 0 2px;display:flex;gap:8px;">
      <button style="padding:7px 14px;background:${c.color};color:#fff;border:none;border-radius:8px;font-size:0.73rem;font-weight:700;cursor:pointer;">+ Custom Field</button>
    </div>`);

    <div style="display:flex;align-items:center;gap:0;margin-bottom:18px;flex-wrap:wrap;">
      <div style="padding:8px 14px;background:#f8fafc;border-radius:10px;font-size:0.72rem;font-weight:700;color:#64748b;border:1px solid #e5e7eb;">Draft</div>
      ${approvalRoles.map((role,i)=>`
        <div style="display:flex;align-items:center;">
          <div style="width:24px;height:2px;background:${approvalOn[i]?c.color:'#e5e7eb'};"></div>
          <div style="padding:8px 12px;border-radius:10px;border:2px solid ${approvalOn[i]?c.color:'#e5e7eb'};background:${approvalOn[i]?c.color+'12':'#fff'};font-size:0.68rem;font-weight:700;color:${approvalOn[i]?c.color:'#94a3b8'};white-space:nowrap;">${role}</div>
        </div>`).join('')}

        <div style="width:24px;height:2px;background:${c.color};"></div>
        <div style="padding:8px 14px;background:${c.color};border-radius:10px;font-size:0.72rem;font-weight:700;color:#fff;border:2px solid ${c.color};">&#128640; Live</div>

    {icon:'&#43;',   label:'Manual Entry',  desc:'Add locations one at a time directly in the platform',                action:'Add Location',    color:'#475569',bg:'#f8fafc'},

    <div style="background:#f8fafc;border-radius:12px;padding:14px 16px;margin-bottom:14px;">
      ${infoRow('Type',`${selType.icon} ${selType.label}`)}
      ${infoRow(c.locLabel,selLoc?selLoc.name:'—')}

  }

  return `<div style="position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:2000;display:flex;align-items:center;justify-content:center;" onclick="if(event.target===this)ss({showPush:false})">
    <div style="background:#fff;border-radius:18px;width:480px;max-height:85vh;overflow-y:auto;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.25);" onclick="event.stopPropagation()">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
        <div style="font-size:1rem;font-weight:900;color:#0f172a;">Create Drop</div>

      ${body}
      <div style="display:flex;justify-content:space-between;margin-top:20px;">
        ${step>1?`<button onclick="ss({pushStep:${step-1}})" style="padding:9px 20px;border-radius:10px;border:1px solid #e5e7eb;background:#fff;color:#475569;font-weight:700;font-size:0.78rem;cursor:pointer;">&larr; Back</button>`:'<div></div>'}
        ${step<4?`<button onclick="ss({pushStep:${step+1}})" style="padding:9px 22px;border-radius:10px;background:${c.color};color:#fff;border:none;font-weight:700;font-size:0.78rem;cursor:pointer;">Next &rarr;</button>`:`<button onclick="ss({showPush:false})" style="padding:9px 22px;border-radius:10px;background:${c.color};color:#fff;border:none;font-weight:700;font-size:0.78rem;cursor:pointer;">&#128640; Create Drop</button>`}
      </div>
    </div>
  </div>`;
}

          </button>`).join('')}

  } else if(step===2){

          return `<label style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:2px solid ${isSel?c.color:'#e5e7eb'};border-radius:10px;background:${isSel?c.color+'08':'#fff'};cursor:pointer;">
            <input type="checkbox" ${isSel?'checked':''} onchange="(function(id){var a=S.collDrops||[];a=a.includes(id)?a.filter(x=>x!==id):[...a,id];ss({collDrops:a})})('${d.id}')" style="accent-color:${c.color};width:14px;height:14px;flex-shrink:0;">
            <div style="flex:1;min-width:0;">
              <div style="font-size:0.78rem;font-weight:700;color:#0f172a;">${dt.icon} ${d.title}</div>
              <div style="font-size:0.65rem;color:#94a3b8;margin-top:1px;">${loc?loc.name:'—'} · <span style="color:${d.status==='live'?'#16a34a':d.status==='upcoming'?'#d97706':'#94a3b8'};font-weight:700;">${d.status}</span></div>

          <div style="font-size:2rem;margin-bottom:8px;">📭</div>

          <div style="font-size:0.72rem;margin-top:4px;">Create some drops first, then bundle them into a collection.</div>

      ${drops.length?`<div style="margin-top:10px;padding:8px 12px;background:#f8fafc;border-radius:8px;font-size:0.72rem;color:#64748b;">${selDrops.length} drop${selDrops.length!==1?'s':''} selected</div>`:''}
    </div>`;

    const selBundle=S.collBundleType||'bundle';
    const bt=bundleTypes.find(b=>b.id===selBundle)||bundleTypes[0];
    const selDrops=S.collDrops||[];
    body=`<div>
      <div style="font-size:0.82rem;font-weight:700;color:#0f172a;margin-bottom:12px;">Ready to Publish</div>
      <div style="background:#f8fafc;border-radius:12px;padding:14px 16px;margin-bottom:14px;">
        ${infoRow('Type',`${bt.icon} ${bt.label}`)}
        ${infoRow('Drops',selDrops.length?`${selDrops.length} selected`:'None selected')}
        ${infoRow('Visibility','All guests · App & Web')}
        ${infoRow('Status','Active on publish')}
      </div>
      <div style="background:#fef9c3;border:1px solid #fde68a;border-radius:12px;padding:12px 16px;margin-bottom:12px;">
        <div style="font-size:0.7rem;font-weight:800;color:#92400e;margin-bottom:5px;">&#128161; What happens when you publish this collection</div>
        <div style="font-size:0.73rem;color:#78350f;line-height:1.6;">Guests browsing the Nigh app will see this collection on your brand page. They can browse all drops in the bundle and claim any available ones. Partners tagged on drops will also see engagement via shared analytics.</div>
      </div>
      <div style="background:${c.color}12;border-radius:10px;padding:9px 14px;font-size:0.73rem;color:${c.color};font-weight:600;">&#128204; ${bt.icon} ${bt.label} · ${selDrops.length} drop${selDrops.length!==1?'s':''} · Ready to go live</div>

  return `<div style="position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:2000;display:flex;align-items:center;justify-content:center;" onclick="if(event.target===this)ss({showNewColl:false})">
    <div style="background:#fff;border-radius:18px;width:480px;max-height:85vh;overflow-y:auto;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.25);" onclick="event.stopPropagation()">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">

      </div>
      ${progressBar}
      ${body}
      <div style="display:flex;justify-content:space-between;margin-top:20px;">
        ${step>1?`<button onclick="ss({collStep:${step-1}})" style="padding:9px 20px;border-radius:10px;border:1px solid #e5e7eb;background:#fff;color:#475569;font-weight:700;font-size:0.78rem;cursor:pointer;">&larr; Back</button>`:'<div></div>'}
        ${step<3?`<button onclick="ss({collStep:${step+1}})" style="padding:9px 22px;border-radius:10px;background:${c.color};color:#fff;border:none;font-weight:700;font-size:0.78rem;cursor:pointer;">Next &rarr;</button>`:`<button onclick="ss({showNewColl:false,collStep:1,collDrops:[],collBundleType:null})" style="padding:9px 22px;border-radius:10px;background:${c.color};color:#fff;border:none;font-weight:700;font-size:0.78rem;cursor:pointer;">&#128640; Publish Collection</button>`}

function addBizModal(){
  const c=cfg();
  const step=S.addBizStep||1;
  const path=S.addBizPath;
  const mode=orgMode();

  const overlay=`position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px`;
  const modal=`background:#fff;border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,0.2)`;
  const hdr=`padding:22px 24px 0;display:flex;align-items:flex-start;justify-content:space-between`;
  const body=`padding:20px 24px 24px`;
  const closeBtn=`<button onclick="ss({addBizModal:false,addBizStep:1,addBizPath:null})" style="background:none;border:none;font-size:1.3rem;color:#9CA3AF;cursor:pointer;line-height:1;flex-shrink:0;margin-top:-2px;">&#215;</button>`;
  const pill=(n,tot)=>`<div style="display:flex;gap:4px;margin-top:4px;">${Array.from({length:tot},(_,i)=>`<div style="height:3px;border-radius:2px;flex:1;background:${i<n?c.color:'#E5E7EB'}"></div>`).join('')}</div>`;
  const optCard=(icon,title,desc,onclick,accent)=>`<button onclick="${onclick}" style="width:100%;text-align:left;border:2px solid #E5E7EB;border-radius:12px;padding:16px;background:#fff;cursor:pointer;transition:all 0.15s;display:flex;align-items:flex-start;gap:14px;margin-bottom:10px;" onmouseover="this.style.borderColor='${accent||c.color}';this.style.background='${accent?accent+'10':c.color+'0a'}'" onmouseout="this.style.borderColor='#E5E7EB';this.style.background='#fff'">
    <span style="font-size:1.6rem;flex-shrink:0;margin-top:2px;">${icon}</span>
    <div><div style="font-size:0.88rem;font-weight:700;color:#111827;margin-bottom:3px;">${title}</div><div style="font-size:0.78rem;color:#6B7280;line-height:1.45;">${desc}</div></div>
  </button>`;

  // ── STEP 1: Location vs Different Business ──
  if(step===1){
    return `<div style="${overlay}"><div style="${modal}">
      <div style="${hdr}"><div><div style="font-size:1rem;font-weight:800;color:#111827;">Add a location or business</div>${pill(1,3)}</div>${closeBtn}</div>
      <div style="${body}">
        <p style="font-size:0.82rem;color:#6B7280;margin-bottom:18px;">What are you adding to your account?</p>
        ${optCard('📍',`New location of ${c.short}`,'Same brand, another spot — stays in this account. Your Locations tab will appear and the account upgrades to multi-location.',"ss({addBizStep:2,addBizPath:'location'})")}
        ${optCard('🏢','A different business','Different name, concept, or industry — we\'ll create a separate account linked to your login so you can switch between them.',"ss({addBizStep:2,addBizPath:'separate'})",'#7C3AED')}
      </div>
    </div></div>`;
  }

  // ── PATH: NEW LOCATION ──
  if(path==='location'){
    // Step 2: Location details
    if(step===2) return `<div style="${overlay}"><div style="${modal}">
      <div style="${hdr}"><div><div style="font-size:1rem;font-weight:800;color:#111827;">New location details</div>${pill(2,3)}</div>${closeBtn}</div>
      <div style="${body}">
        <div style="font-size:0.78rem;color:#6B7280;margin-bottom:16px;">This location will be added to <strong>${c.short}</strong> and appear in your Locations tab.</div>
        <div style="display:flex;flex-direction:column;gap:12px;">
          <div><label style="font-size:0.75rem;font-weight:600;color:#374151;display:block;margin-bottom:4px;">Location Name</label>
            <input id="nb-locname" class="inp" placeholder="e.g. ${c.short} — Downtown" style="width:100%;padding:9px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:0.82rem;outline:none;" onfocus="this.style.borderColor='${c.color}'" onblur="this.style.borderColor='#E5E7EB'"/></div>
          <div><label style="font-size:0.75rem;font-weight:600;color:#374151;display:block;margin-bottom:4px;">Street Address</label>
            <input class="inp" placeholder="123 Main St" style="width:100%;padding:9px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:0.82rem;outline:none;" onfocus="this.style.borderColor='${c.color}'" onblur="this.style.borderColor='#E5E7EB'"/></div>
          <div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;">
            <div><label style="font-size:0.75rem;font-weight:600;color:#374151;display:block;margin-bottom:4px;">City</label><input class="inp" placeholder="${c.locations[0].city}" style="width:100%;padding:9px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:0.82rem;outline:none;" onfocus="this.style.borderColor='${c.color}'" onblur="this.style.borderColor='#E5E7EB'"/></div>
            <div><label style="font-size:0.75rem;font-weight:600;color:#374151;display:block;margin-bottom:4px;">State</label><input class="inp" placeholder="${c.locations[0].state}" style="width:100%;padding:9px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:0.82rem;outline:none;" onfocus="this.style.borderColor='${c.color}'" onblur="this.style.borderColor='#E5E7EB'"/></div>
            <div><label style="font-size:0.75rem;font-weight:600;color:#374151;display:block;margin-bottom:4px;">Zip</label><input class="inp" placeholder="80202" style="width:100%;padding:9px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:0.82rem;outline:none;" onfocus="this.style.borderColor='${c.color}'" onblur="this.style.borderColor='#E5E7EB'"/></div>
          </div>
          <div style="border:1.5px solid #E5E7EB;border-radius:8px;padding:12px 14px;">
            <div style="font-size:0.75rem;font-weight:600;color:#374151;margin-bottom:8px;">Drop Types &amp; Settings</div>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.78rem;color:#374151;margin-bottom:6px;"><input type="radio" name="loctypes" checked style="accent-color:${c.color}"/> Inherit same drop types as ${c.short}</label>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.78rem;color:#374151;"><input type="radio" name="loctypes" style="accent-color:${c.color}"/> Set up custom drop types for this location</label>
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:20px;">
          <button onclick="ss({addBizStep:1})" style="background:none;border:1.5px solid #E5E7EB;border-radius:8px;padding:9px 16px;font-size:0.8rem;font-weight:600;color:#374151;cursor:pointer;">&#8592; Back</button>
          <button onclick="ss({addBizStep:3})" style="background:${c.color};border:none;border-radius:8px;padding:9px 18px;font-size:0.8rem;font-weight:700;color:#fff;cursor:pointer;">Review &amp; Confirm &#8594;</button>
        </div>
      </div>
    </div></div>`;

    // Step 3: Confirm location + show what changes
    if(step===3) return `<div style="${overlay}"><div style="${modal}">
      <div style="${hdr}"><div><div style="font-size:1rem;font-weight:800;color:#111827;">Confirm new location</div>${pill(3,3)}</div>${closeBtn}</div>
      <div style="${body}">
        <div style="background:#F0FDF4;border:1.5px solid #BBF7D0;border-radius:10px;padding:14px 16px;margin-bottom:18px;">
          <div style="font-size:0.8rem;font-weight:700;color:#166534;margin-bottom:6px;">&#10003; Your account is upgrading to multi-location</div>
          <div style="font-size:0.75rem;color:#166534;line-height:1.55;">The new location will appear immediately. Your account and plan will update to reflect the expanded scope.</div>
        </div>
        <div style="font-size:0.78rem;font-weight:700;color:#374151;margin-bottom:10px;">What's changing</div>
        ${[
          ['&#128205;','A <strong>Locations</strong> tab appears in your sidebar','Manage and switch between all your locations'],
          ['&#128101;','Team members can be <strong>assigned to specific locations</strong>','Location Manager role becomes available'],
          ['&#128202;','Analytics shows <strong>per-location breakdowns</strong>','Compare performance across locations'],
          ['&#128179;','Billing updates to <strong>multi-location pricing</strong>','Contact Nigh to confirm your plan'],
        ].map(([icon,title,sub])=>`<div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #F1F5F9;">
          <span style="font-size:1rem;flex-shrink:0;margin-top:1px;">${icon}</span>
          <div><div style="font-size:0.78rem;font-weight:500;color:#111827;">${title}</div><div style="font-size:0.72rem;color:#9CA3AF;margin-top:2px;">${sub}</div></div>
        </div>`).join('')}
        <div style="display:flex;justify-content:space-between;margin-top:20px;">
          <button onclick="ss({addBizStep:2})" style="background:none;border:1.5px solid #E5E7EB;border-radius:8px;padding:9px 16px;font-size:0.8rem;font-weight:600;color:#374151;cursor:pointer;">&#8592; Back</button>
          <button onclick="ss({addBizModal:false,addBizStep:1,addBizPath:null})" style="background:${c.color};border:none;border-radius:8px;padding:9px 18px;font-size:0.8rem;font-weight:700;color:#fff;cursor:pointer;">&#10003; Add Location</button>
        </div>
      </div>
    </div></div>`;
  }

  // ── PATH: SEPARATE BUSINESS ──
  if(path==='separate'){
    // Step 2: Business details
    if(step===2) return `<div style="${overlay}"><div style="${modal}">
      <div style="${hdr}"><div><div style="font-size:1rem;font-weight:800;color:#111827;">About the new business</div>${pill(2,3)}</div>${closeBtn}</div>
      <div style="${body}">
        <div style="font-size:0.78rem;color:#6B7280;margin-bottom:16px;">This will create a <strong>fully independent account</strong> linked to your login. Separate billing, branding, and team.</div>
        <div style="display:flex;flex-direction:column;gap:12px;">
          <div><label style="font-size:0.75rem;font-weight:600;color:#374151;display:block;margin-bottom:4px;">Business Name</label>
            <input class="inp" placeholder="e.g. My New Business" style="width:100%;padding:9px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:0.82rem;outline:none;" onfocus="this.style.borderColor='#7C3AED'" onblur="this.style.borderColor='#E5E7EB'"/></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            <div><label style="font-size:0.75rem;font-weight:600;color:#374151;display:block;margin-bottom:4px;">Category</label>
              <select style="width:100%;padding:9px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:0.82rem;outline:none;background:#fff;">
                <option>Food &amp; Drink</option><option>Retail</option><option>Health &amp; Fitness</option><option>Entertainment</option><option>Events &amp; Pop-Ups</option><option>Beauty &amp; Wellness</option><option>Other</option>
              </select></div>
            <div><label style="font-size:0.75rem;font-weight:600;color:#374151;display:block;margin-bottom:4px;">City, State</label>
              <input class="inp" placeholder="Denver, CO" style="width:100%;padding:9px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:0.82rem;outline:none;" onfocus="this.style.borderColor='#7C3AED'" onblur="this.style.borderColor='#E5E7EB'"/></div>
          </div>
          <div><label style="font-size:0.75rem;font-weight:600;color:#374151;display:block;margin-bottom:4px;">Business Type</label>
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
              ${['Single Location','Multi-Location','Will Expand'].map(t=>`<label style="display:flex;align-items:center;gap:5px;font-size:0.75rem;color:#374151;background:#F9FAFB;border:1.5px solid #E5E7EB;border-radius:6px;padding:6px 10px;cursor:pointer;"><input type="radio" name="biztype" style="accent-color:#7C3AED"/> ${t}</label>`).join('')}
            </div>
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:20px;">
          <button onclick="ss({addBizStep:1})" style="background:none;border:1.5px solid #E5E7EB;border-radius:8px;padding:9px 16px;font-size:0.8rem;font-weight:600;color:#374151;cursor:pointer;">&#8592; Back</button>
          <button onclick="ss({addBizStep:3})" style="background:#7C3AED;border:none;border-radius:8px;padding:9px 18px;font-size:0.8rem;font-weight:700;color:#fff;cursor:pointer;">Review &amp; Confirm &#8594;</button>
        </div>
      </div>
    </div></div>`;

    // Step 3: Confirm separate account
    if(step===3) return `<div style="${overlay}"><div style="${modal}">
      <div style="${hdr}"><div><div style="font-size:1rem;font-weight:800;color:#111827;">Creating a new business account</div>${pill(3,3)}</div>${closeBtn}</div>
      <div style="${body}">
        <div style="background:#F5F3FF;border:1.5px solid #DDD6FE;border-radius:10px;padding:14px 16px;margin-bottom:18px;">
          <div style="font-size:0.8rem;font-weight:700;color:#5B21B6;margin-bottom:6px;">&#127968; A fully independent account will be created</div>
          <div style="font-size:0.75rem;color:#5B21B6;line-height:1.55;">Your login gives you access to both businesses. Switch between them anytime from the account switcher in the sidebar.</div>
        </div>
        <div style="font-size:0.78rem;font-weight:700;color:#374151;margin-bottom:10px;">What's included</div>
        ${[
          ['&#127381;','<strong>Separate brand identity</strong>','Independent handle, profile, and drop types'],
          ['&#128101;','<strong>Separate team</strong>','Invite staff specific to this business — no crossover'],
          ['&#128179;','<strong>Separate billing</strong>','Choose a plan independently of your other account'],
          ['&#128259;','<strong>Switch anytime</strong>','Use the account switcher in the top of the sidebar to move between businesses'],
        ].map(([icon,title,sub])=>`<div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #F1F5F9;">
          <span style="font-size:1rem;flex-shrink:0;margin-top:1px;">${icon}</span>
          <div><div style="font-size:0.78rem;font-weight:500;color:#111827;">${title}</div><div style="font-size:0.72rem;color:#9CA3AF;margin-top:2px;">${sub}</div></div>
        </div>`).join('')}
        <div style="background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:10px 12px;margin-top:14px;font-size:0.72rem;color:#92400E;">
          &#9888; A Nigh team member will reach out within 24 hours to complete setup and confirm your plan.
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:20px;">
          <button onclick="ss({addBizStep:2})" style="background:none;border:1.5px solid #E5E7EB;border-radius:8px;padding:9px 16px;font-size:0.8rem;font-weight:600;color:#374151;cursor:pointer;">&#8592; Back</button>
          <button onclick="ss({addBizModal:false,addBizStep:1,addBizPath:null})" style="background:#7C3AED;border:none;border-radius:8px;padding:9px 18px;font-size:0.8rem;font-weight:700;color:#fff;cursor:pointer;">&#10003; Create Business</button>
        </div>
      </div>
    </div></div>`;
  }

  return '';
}

function render(){ document.getElementById('app').innerHTML = layout(); }
render();
</script>
</body>
</html>
