const GP_CAP_W=5;
let gpWeb=[
  {id:'GW01',dropId:'D01',rtype:'handle',recipient:'@maya',qty:2,status:'Pending'},
  {id:'GW02',dropId:'D01',rtype:'phone',recipient:'+1 (303) 555-0148',qty:1,status:'CheckedIn'},
  {id:'GW03',dropId:'D02',rtype:'guest',recipient:'Riley Johnson',qty:1,status:'Redeemed'},
];
let _gwSeq=3;
function gpwFor(id){return gpWeb.filter(p=>p.dropId===id);}
function gpwActive(id){return gpwFor(id).filter(p=>['Pending','Redeemed','CheckedIn'].includes(p.status));}
function gpwUsed(id){return gpwActive(id).reduce((n,p)=>n+p.qty,0);}
function gpwChecked(id){return gpwFor(id).filter(p=>p.status==='CheckedIn').reduce((n,p)=>n+p.qty,0);}
function gpwRemaining(id){return Math.max(0,GP_CAP_W-gpwUsed(id));}
function gpwCheckIn(id){const p=gpWeb.find(x=>x.id===id);if(p)p.status='CheckedIn';render();}
function gpwUndo(id){const p=gpWeb.find(x=>x.id===id);if(p)p.status='Redeemed';render();}
function gpwSend(){const id=S.locationDetail;const rem=gpwRemaining(id);const r=(S.gwRecip||'').trim();if(!r)return;const q=Math.min(parseInt(S.gwQty||1),Math.min(4,rem));if(q<1)return;const disp=(S.gwType==='handle')?('@'+r.replace(/^@/,'')):r;_gwSeq++;gpWeb.push({id:'GW'+String(_gwSeq).padStart(2,'0'),dropId:id,rtype:S.gwType||'handle',recipient:disp,qty:q,status:'Pending'});S.gwRecip='';S.gwQty=1;ss({dropModal:'guestpasses'});}
function gpwResolve(){const p=gpWeb.find(x=>x.id===S.gwActId);if(p)p.status=(S.gwActType==='cancel')?'Cancelled':'Retracted';S.gwActId=null;S.gwActType=null;ss({dropModal:'guestpasses'});}

// Orgs with no entry are pure location-based (identity IS the place, not a brand)
const BRAND_TYPES={
  bestbuy:'multi',  chipotle:'single',
  disney:'single',               vailresorts:'single',
  topgolf:'single', flatirons:'single',nike:'single',    redbull:'single',
  bigRedf:'multi',   landrys:'multi',
};
const CURRENT_USER='josh';
function ownerOrgs(){return(OWNER_ORGS[CURRENT_USER]||[]).map(k=>CONFIGS[k]).filter(Boolean);}
function isOwnerOrg(){return(OWNER_ORGS[CURRENT_USER]||[]).includes(S.config);}

function locById(id){return cfg().locations.find(l=>l.id===id);}
function dropLocLabel(d){const l=locById(d.locId);if(l)return l.name;const venues=cfg().savedVenues||[];const venue=venues.find(v=>v.id===d.venueId);if(venue){const zone=(venue.zones||[]).find(z=>z.id===d.zoneId);return zone?`${venue.name} \u2014 ${zone.name}`:venue.name;}if(d.venueAddr)return d.venueAddr;return '\u2014';}
function orgMode(){const c=cfg();if(c.orgType==='brand')return'brand';if(c.locations.length===1)return'single';if(c.hier.length<=1)return'multi';return'enterprise';}

// ── VERIFICATION MODEL ───────────────────────────────────────────────────────
// Person verification (ID scan + selfies) is global to the logged-in user across all orgs.
// Entity verification (documents + EIN + domain) is per-org for business/org accounts.
// Cascade: person verification alone satisfies non-entity accounts (creators).
// Entity accounts need both person + entity verification to be fully verified.
let userVerified=true;
const isVerified=()=>userVerified===true;
const isBusinessVerified=()=>cfg().businessVerified===true;
const isEntity=()=>cfg().entity===true;
const isFullyVerified=()=>isVerified()&&(!isEntity()||isBusinessVerified());

// Verification badges: circle checkmark = Identity badge (a verified real person); shield checkmark = Verified badge (an authentic host account/entity)
function _vSvg(sz){return `<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" fill="#0E4EF5"/><path d="M8 12.5l2.5 2.5 5.5-5.5" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;}
function _vbSvg(sz){return `<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none"><path d="M12 2L4 6v5c0 5.25 3.4 10.15 8 11.25C16.6 21.15 20 16.25 20 11V6l-8-4z" fill="#0E4EF5"/><path d="M8.5 12.5l2.5 2.5 4.5-4.5" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;}
function verificationBadge(sz){if(!isVerified()&&!isBusinessVerified())return '';return isEntity()&&isBusinessVerified()?_vbSvg(sz||14):isVerified()?_vSvg(sz||14):'';}

function orgAvatar(c,sz,r){
  sz=sz||44; r=r||Math.round(sz*.22);
  const bg=c.grad||c.color||'#334155';
  const domain=c.website?(c.website+'').replace(/^https?:\/\//,'').split('/')[0]:null;
  const url=c.logoUrl||(domain?`https://logo.clearbit.com/${domain}`:null);
  const init=(c.short||c.name||'?').charAt(0);
  const fz=Math.round(sz*.38);
  if(!url)return`<div style="width:${sz}px;height:${sz}px;border-radius:${r}px;flex-shrink:0;background:${bg};display:flex;align-items:center;justify-content:center;font-size:${fz}px;font-weight:900;color:#fff">${init}</div>`;
  const pad=Math.max(4,Math.round(sz*.12));
  return`<div style="width:${sz}px;height:${sz}px;border-radius:${r}px;flex-shrink:0;position:relative;background:${bg};display:flex;align-items:center;justify-content:center;font-size:${fz}px;font-weight:900;color:#fff"><img src="${url}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:${pad}px;background:#fff;border-radius:${r}px;" onerror="this.style.display='none'"></div>`;
}

function acctLogoImg(website,color,name,size){
  size=size||56;
  const r=Math.round(size*0.18);
  const domain=website?(website+'').replace(/^https?:\/\//,'').split('/')[0]:null;
  const init=(name||'?').charAt(0).toUpperCase();
  const fz=Math.round(size*0.38);
  const fallback=`<div style="width:${size}px;height:${size}px;border-radius:${r}px;background:${color||'#334155'};display:flex;align-items:center;justify-content:center;font-size:${fz}px;font-weight:900;color:#fff;flex-shrink:0;">${init}</div>`;
  if(!domain) return fallback;
  return `<div style="width:${size}px;height:${size}px;border-radius:${r}px;background:#fff;border:1px solid #e5e7eb;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;">
    <img src="https://logo.clearbit.com/${domain}" style="width:80%;height:80%;object-fit:contain;" onerror="this.parentElement.innerHTML='<div style=\\'width:100%;height:100%;background:${color||'#334155'};display:flex;align-items:center;justify-content:center;font-size:${fz}px;font-weight:900;color:#fff;\\'>${init}</div>'">
  </div>`;
}

// Returns the nav label for the Brand/Location page based on what the org actually has.
// Examples: 'Brand', 'Location', 'Locations', 'Brand/Location', 'Brand/Locations', 'Brands/Locations'
function orgNavLabel(){
  const c=cfg();
  if(c.orgType==='brand') return 'Brand'; // brand orgs — no locations, venues live under Drops
  const bt=BRAND_TYPES[c.key]||null;      // 'single', 'multi', or null (pure place)
  const lc=(c.locations||[]).length;
  const bp=bt==='multi'?'Brands':bt==='single'?'Brand':null;
  const lp=lc===1?(c.locLabel||'Location'):lc>1?(c.locsLabel||'Locations'):null;
  if(bp&&lp) return bp+'/'+lp;
  return lp||bp||'Profile';
}
function dropTypeInfo(typeId){return cfg().dropTypes.find(t=>t.id===typeId)||{id:typeId,label:typeId,icon:'&#127381;',bg:'#f1f5f9',c:'#475569'};}
function badge(status){
  const map={live:'#dcfce7:#16a34a:Live',scheduled:'#fef9c3:#854d0e:Scheduled',draft:'#f1f5f9:#64748b:Draft',ended:'#f1f5f9:#64748b:Ended',active:'#dcfce7:#16a34a:Active',paused:'#fffbeb:#b45309:Paused',cancelled:'#fef2f2:#b91c1c:Cancelled'};
  const [bg,color,label]=(map[status]||'#f1f5f9:#64748b:—').split(':');
  return `<span style="background:${bg};color:${color};font-size:0.68rem;font-weight:700;padding:3px 8px;border-radius:20px;">${label}</span>`;
}
function dropBadge(typeId){
  const t=dropTypeInfo(typeId);
  return `<span style="background:${t.bg};color:${t.c};font-size:0.68rem;font-weight:800;padding:3px 8px;border-radius:20px;">${t.icon} ${t.label}</span>`;
}
function timingBadge(timing){
  if(!timing) return '';
  const map={'pre-game':{bg:'#eff6ff',c:'#1d4ed8',l:'Pre-Game'},'in-game':{bg:'#dcfce7',c:'#15803d',l:'In-Game'},'post-game':{bg:'#fef9c3',c:'#92400e',l:'Post-Game'},'Arrival Window':{bg:'#fff7ed',c:'#c2410c',l:'Arrival Window'}};
  const t=map[timing]||{bg:'#f1f5f9',c:'#475569',l:timing};
  return `<span style="background:${t.bg};color:${t.c};font-size:0.65rem;font-weight:800;padding:2px 7px;border-radius:20px;">${t.l}</span>`;
}
function dayBadge(dayId){
  if(!dayId||!cfg().days) return '';
  const d=cfg().days.find(x=>x.id===dayId);
  if(!d) return '';
  const wk=cfg().weekends.find(w=>w.id===d.weekend);
  return `<span style="background:${wk?wk.color+'20':'#f1f5f9'};color:${wk?wk.color:'#475569'};font-size:0.65rem;font-weight:800;padding:2px 7px;border-radius:20px;">${d.date} ${d.short}</span>`;
}
function pct(a,b){return b>0?Math.round(a/b*100):0;}
function fmtMoney(n){return '$'+n.toLocaleString();}
function fmtNum(n){return n>=1000?(n/1000).toFixed(1)+'K':String(n);}
function hAt(h){return h?(h.startsWith('@')?h:'@'+h):'';}  // safe handle display — prevents @@
function showColor(p){return p>=80?'#16a34a':p>=60?'#ca8a04':'#dc2626';}
function infoRow(l,v){return `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f1f5f9;"><span style="font-size:0.78rem;color:#64748b;">${l}</span><span style="font-size:0.78rem;font-weight:700;color:#0f172a;">${v}</span></div>`;}
function getFilteredDrops(){
  let drops=cfg().drops;
  if(S.timing) drops=drops.filter(d=>d.timing===S.timing);
  if(S.weekend){
    const days=(cfg().days||[]).filter(d=>d.weekend===S.weekend).map(d=>d.id);
    drops=drops.filter(d=>days.includes(d.day));
  }
  if(S.day) drops=drops.filter(d=>d.day===S.day);
  if(S.t1){
    const lIds=cfg().locations.filter(l=>l.t1===S.t1).map(l=>l.id);
    drops=drops.filter(d=>lIds.includes(d.locId));
  }
  return drops;
}

function topbar(){
  const c=cfg();
  const liveDrops=c.drops.filter(d=>d.status==='live').length;

  // Festival (Coachella) topbar
  if(c.special==='festival'){
    const weekends=c.weekends||[];
    const days=(c.days||[]).filter(d=>!S.weekend||d.weekend===S.weekend);
    return `<div style="padding:10px 24px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      ${weekends.map(w=>`<button onclick="ss({weekend:S.weekend==='${w.id}'?null:'${w.id}',day:null})" style="padding:5px 14px;border-radius:20px;border:2px solid ${S.weekend===w.id?w.color:'#e5e7eb'};background:${S.weekend===w.id?w.color+'18':'transparent'};color:${S.weekend===w.id?w.color:'#64748b'};font-size:0.75rem;font-weight:700;cursor:pointer;">${w.label} <span style="opacity:0.7;font-size:0.65rem;">${w.dates}</span></button>`).join('')}
      <div style="width:1px;height:24px;background:#e5e7eb;"></div>
      ${days.map(d=>`<button onclick="ss({day:S.day==='${d.id}'?null:'${d.id}'})" style="padding:4px 11px;border-radius:20px;border:1px solid ${S.day===d.id?'#E8502A':'#e5e7eb'};background:${S.day===d.id?'#E8502A18':'transparent'};color:${S.day===d.id?'#E8502A':'#64748b'};font-size:0.72rem;font-weight:${S.day===d.id?'700':'500'};cursor:pointer;">${d.short} ${d.date}</button>`).join('')}
      <div style="flex:1;"></div>
      <span style="background:#dcfce7;color:#15803d;font-size:0.7rem;font-weight:700;padding:4px 10px;border-radius:20px;">${liveDrops} Live</span>
      ${inboxBtn()}
    </div>`;
  }

  // Game-day (Broncos) topbar
  if(c.special==='gameday'){
    const g=c.game||{};
    const isBrandGD=c.orgType==='brand';
    const zoneOpts=isBrandGD
      ? (c.savedVenues||[]).flatMap(v=>(v.zones||[]).map(z=>z.name))
      : [...new Set(c.locations.map(l=>l.t1))];
    return `<div style="padding:10px 24px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      ${zoneOpts.length>0?`<select onchange="ss({t1:this.value||null})" style="padding:6px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:0.78rem;color:#0f172a;background:#fff;cursor:pointer;">
        <option value="">All Zones</option>
        ${zoneOpts.map(v=>`<option value="${v}" ${S.t1===v?'selected':''}>${v}</option>`).join('')}
      </select>`:''}
      <div style="flex:1;"></div>
      <span style="background:#dcfce7;color:#15803d;font-size:0.7rem;font-weight:700;padding:4px 10px;border-radius:20px;">${liveDrops} Live</span>
      ${inboxBtn()}
    </div>`;
  }

  // Single-location or brand org — minimal topbar with just live count + inbox
  if(orgMode()==='single'||orgMode()==='brand') return `<div style="padding:10px 24px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:10px;">
    <div style="flex:1;"></div>
    <span style="background:#dcfce7;color:#15803d;font-size:0.7rem;font-weight:700;padding:4px 10px;border-radius:20px;">${liveDrops} Live</span>
    ${inboxBtn()}
  </div>`;

  // Default topbar (Best Buy, Chipotle, Disney)
  const t1vals=[...new Set(c.locations.map(l=>l.t1).filter(Boolean))];
  const t2vals=S.t1?[...new Set(c.locations.filter(l=>l.t1===S.t1).map(l=>l.t2).filter(Boolean))]:[];
  const acctFW=acctFilterWidget(c);
  const acctSel=S.acctFilter||[];
  return `<div style="padding:10px 24px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
    ${c.hier[0]?`<select onchange="ss({t1:this.value||null,t2:null})" style="padding:6px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:0.78rem;color:#0f172a;background:#fff;cursor:pointer;">
      <option value="">All ${c.hier[0]}s</option>
      ${t1vals.map(v=>`<option value="${v}" ${S.t1===v?'selected':''}>${v}</option>`).join('')}
    </select>`:''}
    ${c.hier[1]&&t2vals.length?`<select onchange="ss({t2:this.value||null})" style="padding:6px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:0.78rem;color:#0f172a;background:#fff;cursor:pointer;"><option value="">All ${c.hier[1]}s</option>${t2vals.map(v=>`<option value="${v}" ${S.t2===v?'selected':''}>${v}</option>`).join('')}</select>`:''}
    ${acctFW.btn}
    ${S.t1||S.t2||S.timing||S.weekend||S.day||acctSel.length>0?`<button onclick="ss({t1:null,t2:null,timing:null,weekend:null,day:null,acctFilter:[]})" style="padding:5px 12px;border-radius:8px;border:1px solid #e5e7eb;background:#f8fafc;color:#64748b;font-size:0.72rem;font-weight:600;cursor:pointer;">Clear Filters</button>`:''}
    <div style="flex:1;"></div>
    <span style="background:#dcfce7;color:#15803d;font-size:0.7rem;font-weight:700;padding:4px 10px;border-radius:20px;">${liveDrops} Live</span>
    ${inboxBtn()}
    ${acctFW.modal}
  </div>`;
}

function renderPage(){
  const p=S.page;
  if(p==='dashboard')   return rDashboard();
  if(p==='locations')   return rLocations();
  if(p==='drops')       return rDrops();
  if(p==='customers')   return rCustomers();
  if(p==='followers')   return rFollowers();
  if(p==='collections') return rCollections();
  if(p==='analytics')   return rAnalytics();
  if(p==='users')       return rUsers();
  if(p==='setup')       return rSettings(); // Configure → Settings
  if(p==='partners')    return rPartners();
  if(p==='payouts')     return rPayouts();
  if(p==='billing')     return rBillingPage();
  if(p==='qr')          return rQRPage();
  if(p==='organization') return rOrganization();
  if(p==='settings')    return rSettings();
  if(p==='activity')    return rActivity();

  return '<div style="padding:32px;">Not found</div>';
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function rDashboard(){
  const c=cfg();
  const mode=orgMode();
  const drops=c.drops;
  const locs=c.locations;
  const live=drops.filter(d=>d.status==='live');
  const sched=drops.filter(d=>d.status==='scheduled');
  const totalRes=drops.reduce((s,d)=>s+(d.res||0),0);
  const totalCi=drops.reduce((s,d)=>s+(d.ci||0),0);
  const avgSr=live.length?Math.round(live.reduce((s,d)=>s+d.sr,0)/live.length):0;

  // Top locations by check-ins
  const topLocs=locs.map(l=>{
    const lDrops=drops.filter(d=>d.locId===l.id);
    const ci=lDrops.reduce((s,d)=>s+(d.ci||0),0);
    const res=lDrops.reduce((s,d)=>s+(d.res||0),0);
    return {...l,ci,res};
  }).sort((a,b)=>b.ci-a.ci).slice(0,5);

  // Drop type breakdown
  const typeBreakdown=c.dropTypes.map(t=>{
    const td=drops.filter(d=>d.type===t.id);
    const tci=td.reduce((s,d)=>s+(d.ci||0),0);
    return {...t,count:td.length,ci:tci,live:td.filter(d=>d.status==='live').length};

      ${kpi('Followers',fmtNum(totalFollowers),mode==='brand'?`+${totalFollowersGrowth} this month`:`+${totalFollowersGrowth} across all locations`,'#7C3AED')}

    ${locs.length===0?'':(()=>{
      const huLocs=locs.filter(l=>l.type!=='hq');

      const todayHU=todayHUs.length>0?todayHUs[0].hu:null;
      const huCount=todayHUs.length;
      const noHuCount=huLocs.length-huCount;
      return `<div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:16px 20px;margin-bottom:18px;">

          <div style="width:38px;height:38px;border-radius:10px;background:#f0f4ff;display:flex;align-items:center;justify-content:center;flex-shrink:0;">

              ${huLocs.length>1&&noHuCount>0?`<span style="font-size:0.62rem;font-weight:700;color:#f59e0b;background:#fef3c7;padding:2px 7px;border-radius:10px;">${noHuCount} without</span>`:''}

          ${todayHUs.map(h=>{const loc=huLocs.find(l=>l.id===h.locId);return loc?'<span style="font-size:0.62rem;font-weight:700;background:'+c.color+'12;color:'+c.color+';padding:2px 8px;border-radius:12px;">'+hAt(loc.handle)+(h.hu.sent?' &#10003;':'')+'</span>':'';}).join('')}

    <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:18px;margin-bottom:18px;">

    return locationDetail(c.locations[0]);

  // Brand Org: single account — go directly to brand profile (no list step)

              <span style="font-size:0.65rem;color:#94a3b8;">›</span>

        // Single brand: logo + name + handle only — same grid width as location cards
        : `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">

function getHeadsUp(locId,dateStr){return headsUpSchedule[locId+'_'+dateStr]||null;}
// Get all Heads Up entries for a given date across multiple locIds
function getHeadsUpMulti(locIds,dateStr){return locIds.map(id=>({locId:id,hu:headsUpSchedule[id+'_'+dateStr]||null})).filter(x=>x.hu);}
function dateToStr(d){return d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();}
function dropSeed(d){let h=0;for(let i=0;i<(d.id||'').length;i++)h=(h*31+d.id.charCodeAt(i))>>>0;return h;}
function dropDate(d){
  const seed=dropSeed(d);
  const offsets={live:[-1,0,0,0,1],scheduled:[2,3,5,7,9,12,14,18,21],ended:[-14,-10,-7,-5,-3],draft:[1,2,4]};
  const arr=offsets[d.status]||offsets.scheduled;
  const off=arr[seed%arr.length];
  const dt=new Date(TODAY);dt.setDate(dt.getDate()+off);
  return dt;
}
function dropTime(d){const seed=dropSeed(d);return TIMES[seed%TIMES.length];}
function parseTimeMins(t){const[tp,per]=t.split(' ');const[h,m]=tp.split(':').map(Number);let hr=h;if(per==='PM'&&h!==12)hr+=12;if(per==='AM'&&h===12)hr=0;return hr*60+(m||0);}
function minsToTime(mins){const h24=Math.floor(mins/60)%24;const m=mins%60;const per=h24>=12?'PM':'AM';const h12=h24%12||12;return h12+':'+(m<10?'0':'')+m+' '+per;}
function broadcastCutoff(d){const c=cfg();const cutoff=c.broadcastCutoffMins||15;const base=d.endTime||dropTime(d);return minsToTime(parseTimeMins(base)-cutoff);}
function broadcastCutoffDate(d){
  const dt=dropDate(d);
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return days[dt.getDay()]+', '+months[dt.getMonth()]+' '+dt.getDate()+' at '+broadcastCutoff(d);
}
function broadcastOpenDate(d){
  const c=cfg();const leadHrs=c.broadcastLeadHrs||24;
  const dt=new Date(dropDate(d).getTime()-leadHrs*3600000);
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return days[dt.getDay()]+', '+months[dt.getMonth()]+' '+dt.getDate()+' at '+dropTime(d);
}
function dropCountdown(d){
  const dt=dropDate(d);
  const diffMs=dt-TODAY;
  const diffMins=Math.round(diffMs/60000);
  const diffHrs=Math.round(diffMs/3600000);
  const diffDays=Math.round(diffMs/86400000);
  if(diffMins<=0) return 'Going live soon';
  if(diffHrs<1) return 'In '+diffMins+' min';
  if(diffDays<1) return 'In '+diffHrs+' hr'+(diffHrs!==1?'s':'');
  if(diffDays===1) return 'Tomorrow';
  return 'In '+diffDays+' days';
}
function fmtDropDate(d){
  const dt=dropDate(d);
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return days[dt.getDay()]+', '+months[dt.getMonth()]+' '+dt.getDate();
}

  // ── Venues sub-tab ──

                  ${vLive.length>0?`<span style="font-size:0.72rem;font-weight:700;background:#dcfce7;color:#15803d;padding:4px 12px;border-radius:20px;">${vLive.length} Live Drop${vLive.length!==1?'s':''}</span>`:''}
                  ${vSched.length>0?`<span style="font-size:0.72rem;font-weight:700;background:${c.color}15;color:${c.color};padding:4px 12px;border-radius:20px;">${vSched.length} Scheduled</span>`:''}

            ${zones.length===0

                    return `<div style="background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:16px 20px;">

                          <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;">

                          </div>

                          ${zTotal>0?`<span style="font-size:0.65rem;color:#94a3b8;font-weight:600;">${zTotal} drop${zTotal!==1?'s':''}</span>`:''}

                    <span style="font-size:1rem;color:#cbd5e1;">›</span>
                  </div>
                </div>
              </div>`;
            }).join('')}
          </div>`
      }
    </div>`;
  }

  // ── Drops tab (default) ──
  const acctSel=S.acctFilter||[];
  let drops=getFilteredDrops();
  if(acctSel.length>0) drops=drops.filter(d=>acctSel.includes(d.locId));
  const filterStatus=S.dropStatusFilter||null;
  if(filterStatus) drops=drops.filter(d=>d.status===filterStatus);
  // Sort: live first (broadcast closing soonest), then scheduled (starting soonest), then ended (most recently ended)
  const statusOrder={live:0,scheduled:1,paused:2,ended:3,draft:4,cancelled:5};
  drops.sort((a,b)=>{
    const so=(statusOrder[a.status]||0)-(statusOrder[b.status]||0);
    if(so!==0) return so;
    if(a.status==='ended') return dropDate(b)-dropDate(a); // most recent ended first
    return dropDate(a)-dropDate(b); // live: soonest to close; scheduled: soonest to start
  });

  if(S.locationDetail){
    const d=c.drops.find(x=>x.id===S.locationDetail);
    if(d) return dropDetail(d);
  }

  const live=c.drops.filter(d=>d.status==='live').length;
  const sched=c.drops.filter(d=>d.status==='scheduled').length;
  const pausedCount=c.drops.filter(d=>d.status==='paused').length;
  const view=S.dropView||'list';

  const statusColors={live:'#16a34a',scheduled:c.color,paused:'#d97706',ended:'#94a3b8',draft:'#f59e0b',cancelled:'#94a3b8'};

  // ── shared header ──
  const header=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">

        <div style="font-size:1.3rem;font-weight:900;color:#0f172a;">Drops</div>

      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="display:flex;background:#f1f5f9;border-radius:9px;padding:3px;">
          <button onclick="ss({dropView:'list'})" style="padding:5px 14px;border:none;border-radius:7px;font-size:0.75rem;font-weight:700;cursor:pointer;background:${view==='list'?'#fff':'transparent'};color:${view==='list'?'#0f172a':'#94a3b8'};box-shadow:${view==='list'?'0 1px 4px rgba(0,0,0,0.1)':'none'};transition:all 0.1s;">List</button>
          <button onclick="ss({dropView:'calendar'})" style="padding:5px 14px;border:none;border-radius:7px;font-size:0.75rem;font-weight:700;cursor:pointer;background:${view==='calendar'?'#fff':'transparent'};color:${view==='calendar'?'#0f172a':'#94a3b8'};box-shadow:${view==='calendar'?'0 1px 4px rgba(0,0,0,0.1)':'none'};transition:all 0.1s;">Calendar</button>

      </div>

  // ── list view ──
  if(view==='list'){
    return `<div style="padding:28px 32px;">
      ${tabBar}

      <div style="display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap;">
        ${['live','scheduled','paused','ended'].map(st=>`<button onclick="ss({dropStatusFilter:S.dropStatusFilter==='${st}'?null:'${st}'})" style="padding:5px 12px;border-radius:20px;border:1px solid ${filterStatus===st?c.color:'#e5e7eb'};background:${filterStatus===st?c.color+'18':'transparent'};color:${filterStatus===st?c.color:'#64748b'};font-size:0.72rem;font-weight:600;cursor:pointer;text-transform:capitalize;">${st}</button>`).join('')}

        ${drops.length===0?`<div style="background:#fff;border-radius:12px;border:1px dashed #e5e7eb;padding:40px;text-align:center;color:#94a3b8;font-size:0.82rem;">No drops match your filters.</div><br>`:''}
        ${drops.map(d=>{
          const loc=locById(d.locId);
          const sr=pct(d.ci,d.res);

              <div style="font-size:0.72rem;font-weight:800;color:${statusColors[d.status]||'#94a3b8'};text-transform:uppercase;letter-spacing:0.04em;">${dateStr.split(',')[0]}</div>

              <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;">

                ${badge(d.status)}
                ${d.status==='live'&&d.res>=d.cap?`<span style="font-size:0.68rem;font-weight:700;color:#dc2626;background:#fef2f2;border:1px solid #fecaca;border-radius:20px;padding:2px 9px;">Sold Out</span>`:''}
                ${d.status==='live'&&d.res<d.cap&&(d.cap-d.res)<=5?`<span style="font-size:0.68rem;font-weight:700;color:#d97706;background:#fffbeb;border:1px solid #fde68a;border-radius:20px;padding:2px 9px;">${d.cap-d.res} spot${d.cap-d.res===1?'':'s'} left</span>`:''}

              </div>`:''}
              ${d.status==='live'?`<div style="margin-top:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                <div style="display:inline-flex;align-items:center;gap:5px;background:#dcfce7;border-radius:20px;padding:3px 10px;">
                  <span style="font-size:0.62rem;">📡</span>
                  <span style="font-size:0.68rem;font-weight:700;color:#15803d;">Broadcasting until ${broadcastCutoff(d)}</span>
                </div>
              </div>`:''}
              ${d.status==='paused'?`<div style="margin-top:5px;display:inline-flex;align-items:center;gap:5px;background:#fffbeb;border:1px solid #fde68a;border-radius:20px;padding:3px 10px;">
                <span style="font-size:0.62rem;">⏸</span>
                <span style="font-size:0.68rem;font-weight:700;color:#b45309;">Broadcast paused</span>
              </div>`:''}
              ${d.status==='ended'?`<div style="margin-top:5px;display:inline-flex;align-items:center;gap:5px;background:#f1f5f9;border-radius:20px;padding:3px 10px;">
                <span style="font-size:0.62rem;">⏹</span>
                <span style="font-size:0.68rem;font-weight:700;color:#94a3b8;">Ended</span>
              </div>`:''}
              ${d.status==='draft'?`<div style="margin-top:5px;display:inline-flex;align-items:center;gap:5px;background:#fef9c3;border-radius:20px;padding:3px 10px;">
                <span style="font-size:0.62rem;">✏️</span>
                <span style="font-size:0.68rem;font-weight:700;color:#a16207;">Draft</span>
              </div>`:''}

                <div style="font-size:0.6rem;color:#94a3b8;">reserv.</div>
                ${(d.status==='live'||d.status==='paused'||d.status==='ended')?bar(capPct,c.color,4):''}
              </div>
              <div style="text-align:center;">
                <div style="font-size:0.88rem;font-weight:900;color:${(d.status==='live'||d.status==='paused'||d.status==='ended')?'#0f172a':'#94a3b8'};">${(d.status==='live'||d.status==='paused'||d.status==='ended')?d.ci:'—'}</div>
                <div style="font-size:0.6rem;color:#94a3b8;">check-ins</div>
              </div>
              <div style="text-align:center;">
                <div style="font-size:0.88rem;font-weight:900;color:${(d.status==='live'||d.status==='paused'||d.status==='ended')?showColor(sr):'#94a3b8'};">${(d.status==='live'||d.status==='paused'||d.status==='ended')?sr+'%':'—'}</div>
                <div style="font-size:0.6rem;color:#94a3b8;">show rate</div>
              </div>
              <div style="text-align:center;">
                <div style="font-size:0.88rem;font-weight:900;color:#0f172a;">${d.price>0?'$'+d.price:'Free'}</div>
                <div style="font-size:0.6rem;color:#94a3b8;">price</div>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  // ── calendar view ──
  const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAY_NAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const cm=S.calMonth, cy=S.calYear;
  const firstDay=new Date(cy,cm,1).getDay();
  const daysInMonth=new Date(cy,cm+1,0).getDate();
  const prevMonth=()=>cm===0?ss({calMonth:11,calYear:cy-1}):ss({calMonth:cm-1});
  const nextMonth=()=>cm===11?ss({calMonth:0,calYear:cy+1}):ss({calMonth:cm+1});

  // map drops to their calendar date
  const allDrops=getFilteredDrops();
  const dropsByDay={};
  allDrops.forEach(d=>{
    const dt=dropDate(d);
    if(dt.getFullYear()===cy && dt.getMonth()===cm){
      const day=dt.getDate();
      if(!dropsByDay[day]) dropsByDay[day]=[];
      dropsByDay[day].push(d);
    }
  });

  const today=TODAY;
  const isToday=(day)=>today.getFullYear()===cy&&today.getMonth()===cm&&today.getDate()===day;

  // build grid cells (pad with empty days before month start)
  const cells=[];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  while(cells.length%7!==0) cells.push(null);

  const calGrid=cells.map(day=>{
    if(!day) return `<div style="background:#fafafa;border-right:1px solid #f1f5f9;border-bottom:1px solid #f1f5f9;min-height:110px;"></div>`;

    const todaySty=isToday(day)?`background:${c.color};color:#fff;`:'color:#374151;';

    const firstLoc=c.locations[0]||null;

    return `<div style="background:#fff;border-right:1px solid #e5e7eb;border-bottom:1px solid #e5e7eb;min-height:110px;padding:5px 4px 4px 4px;box-sizing:border-box;overflow:hidden;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;">

              <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#0E4EF5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 19-9v18L3 13"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>
              <span style="font-size:0.56rem;font-weight:700;color:#0E4EF5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${hu.sent?'Sent':'Scheduled'}</span>
           </div>`
          :firstLoc?`<div onclick="ss({headsUpModal:true,headsUpDate:'${dayStr}',headsUpLocId:'${firstLoc.id}',headsUpText:'',headsUpNiya:false})" style="display:flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:4px;border:1px dashed #d1d5db;cursor:pointer;color:#d1d5db;" title="Add Heads Up">
              <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
           </div>`:''}
      </div>
      ${dayDrops.slice(0,3).map(d=>`
        <div onclick="ss({locationDetail:'${d.id}'})" style="background:${statusColors[d.status]||'#94a3b8'}1a;border-left:2px solid ${statusColors[d.status]||'#94a3b8'};border-radius:0 3px 3px 0;padding:2px 4px;margin-bottom:2px;cursor:pointer;max-width:100%;overflow:hidden;" title="${d.title}">
          <div style="font-size:0.6rem;font-weight:700;color:${statusColors[d.status]||'#94a3b8'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;">${dropTime(d)}</div>
          <div style="font-size:0.63rem;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;line-height:1.3;">${d.title}</div>
        </div>`).join('')}
      ${dayDrops.length>3?`<div style="font-size:0.6rem;color:#64748b;font-weight:600;padding:0 4px;margin-top:1px;">+${dayDrops.length-3} more</div>`:''}
    </div>`;
  }).join('');

  return `<div style="padding:28px 32px;">
    ${tabBar}
    ${header}
    <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;overflow:hidden;">
      <!-- Calendar nav -->
      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #f1f5f9;">
        <button onclick="ss(S.calMonth===0?{calMonth:11,calYear:S.calYear-1}:{calMonth:S.calMonth-1})" style="padding:6px 12px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;cursor:pointer;font-size:0.8rem;font-weight:700;color:#374151;">&larr;</button>
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="font-size:1rem;font-weight:800;color:#0f172a;">${MONTH_NAMES[cm]} ${cy}</div>
          ${(cm!==new Date().getMonth()||cy!==new Date().getFullYear())?`<button onclick="ss({calMonth:new Date().getMonth(),calYear:new Date().getFullYear()})" style="padding:3px 10px;border:1px solid #e5e7eb;border-radius:20px;background:#fff;cursor:pointer;font-size:0.7rem;font-weight:700;color:#64748b;">Today</button>`:''}
        </div>
        <button onclick="ss(S.calMonth===11?{calMonth:0,calYear:S.calYear+1}:{calMonth:S.calMonth+1})" style="padding:6px 12px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;cursor:pointer;font-size:0.8rem;font-weight:700;color:#374151;">&rarr;</button>
      </div>
      <!-- Day headers -->
      <div style="display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid #f1f5f9;">
        ${DAY_NAMES.map(d=>`<div style="padding:8px;text-align:center;font-size:0.7rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.05em;">${d}</div>`).join('')}
      </div>
      <!-- Grid -->
      <div style="display:grid;grid-template-columns:repeat(7,1fr);border-left:1px solid #e5e7eb;border-top:1px solid #e5e7eb;">${calGrid}</div>
      <!-- Legend -->
      <div style="padding:10px 20px;border-top:1px solid #f1f5f9;display:flex;gap:16px;">
        ${Object.entries(statusColors).map(([st,col])=>`<div style="display:flex;align-items:center;gap:5px;"><div style="width:10px;height:10px;border-radius:2px;background:${col};"></div><span style="font-size:0.68rem;font-weight:600;color:#64748b;text-transform:capitalize;">${st}</span></div>`).join('')}
      </div>
    </div>
  </div>`;
}

            <button onclick="ss({guestBlocked:[...(S.guestBlocked||[]),'${g.email}'],guestBlockConfirm:null,guestDetailGuest:null})" style="padding:8px 16px;border:none;border-radius:8px;background:#dc2626;color:#fff;font-size:0.75rem;font-weight:700;cursor:pointer;">Yes, Block Guest</button>
          </div>
        </div>`:`

          <button onclick="ss({guestBlockConfirm:'${g.email}'})" style="padding:9px 18px;border:none;border-radius:10px;background:#fff;color:#dc2626;font-size:0.78rem;font-weight:700;cursor:pointer;">Block Guest</button>
        </div>`}
      </div>`;

    // ── ORDERS TAB ──
    const ordersTab=recentDrops.length>0?`
      <div style="padding:14px 20px;">
        ${recentDrops.map(d=>`
        <div style="border:1px solid #f1f5f9;border-radius:12px;padding:14px 16px;margin-bottom:8px;">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;">
            <div>
              <div style="font-size:0.82rem;font-weight:800;color:#0f172a;">${d.name}</div>
              <div style="font-size:0.63rem;color:#94a3b8;margin-top:1px;">${d.date}${d.loc?' · @'+d.loc:''} · ${d.orderId}</div>
            </div>
            <span style="background:${d.status==='Checked In'?'#dcfce7':'#dbeafe'};color:${d.status==='Checked In'?'#16a34a':'#1d4ed8'};font-size:0.6rem;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;">${d.status==='Checked In'?'Completed':'Reserved'}</span>
          </div>
          <div style="font-size:0.72rem;color:#64748b;margin-bottom:10px;">${d.ticket}${d.transferred?` · <span style="color:#b45309;font-weight:600;">Transferred from ${d.transferredFrom}</span>`:''}</div>
          <button onclick="event.stopPropagation();ss({page:'billing',financeTab:'orders',guestDetailGuest:null,guestDetailTab:null})" style="font-size:0.7rem;font-weight:700;color:${c.color};background:none;border:1px solid ${c.color}40;border-radius:6px;padding:5px 12px;cursor:pointer;">View Order →</button>
        </div>`).join('')}
      </div>`
    :`<div style="padding:48px 24px;text-align:center;color:#94a3b8;font-size:0.78rem;">No orders yet</div>`;

    // ── COMMUNICATIONS TAB ──
    const commsTab=`
      <div style="padding:14px 20px 0;">
        <button onclick="event.stopPropagation()" style="width:100%;padding:10px 14px;border:1px dashed #d1d5db;border-radius:10px;background:#f8fafc;color:#64748b;font-size:0.75rem;font-weight:700;cursor:pointer;text-align:left;">✏️ &nbsp;New Message to ${g.name.split(' ')[0]}…</button>
      </div>
      ${gComms.length>0?`
      <div style="padding:8px 20px 16px;">
        ${gComms.map((m,mi,arr)=>`
        <div style="display:flex;gap:12px;padding:11px 0;${mi<arr.length-1?'border-bottom:1px solid #f8fafc':''}">
          <div style="width:32px;height:32px;border-radius:9px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:0.88rem;flex-shrink:0;margin-top:1px;">${chIcon[m.ch]||'📨'}</div>
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
              <span style="font-size:0.75rem;font-weight:700;color:#0f172a;">${m.type}</span>
              <span style="${stBadge[m.st]||''};font-size:0.6rem;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;">${m.st}</span>
            </div>
            ${m.ctx?`<div style="font-size:0.63rem;font-weight:600;color:${c.color};margin-top:1px;">${m.ctx}</div>`:''}
            <div style="font-size:0.69rem;color:#64748b;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${m.msg}</div>
            <div style="font-size:0.61rem;color:#94a3b8;margin-top:2px;">${m.ch} · ${m.date}, ${m.time}</div>
          </div>
        </div>`).join('')}
      </div>`:`<div style="padding:48px 24px;text-align:center;color:#94a3b8;font-size:0.78rem;">No communications yet</div>`}`;

    return `<div onclick="ss({guestDetailGuest:null,guestMenu:null,guestDropIdx:null,guestBlockConfirm:null,guestDetailTab:null})" style="position:fixed;inset:0;background:rgba(15,23,42,0.55);z-index:300;display:flex;align-items:center;justify-content:center;">
      <div onclick="event.stopPropagation()" style="background:#fff;border-radius:20px;width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.22);">
        <!-- Header -->
        <div style="padding:16px 24px 0;display:flex;justify-content:flex-end;">
          <button onclick="ss({guestDetailGuest:null,guestDropIdx:null,guestBlockConfirm:null,guestDetailTab:null})" style="background:#f1f5f9;border:none;border-radius:8px;width:30px;height:30px;font-size:0.85rem;cursor:pointer;color:#475569;display:flex;align-items:center;justify-content:center;">✕</button>
        </div>
        <div style="padding:4px 24px 18px;text-align:center;border-bottom:1px solid #f1f5f9;">
          <div style="width:60px;height:60px;border-radius:50%;background:${isBlocked?'#fee2e2':c.color+'20'};display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:900;color:${isBlocked?'#dc2626':c.color};margin:0 auto 10px;">${initials}</div>
          <div style="font-size:1rem;font-weight:900;color:${isBlocked?'#94a3b8':'#0f172a'};margin-bottom:5px;display:flex;align-items:center;justify-content:center;gap:7px;">
            ${g.name}
            ${isBlocked?'<span style="background:#fee2e2;color:#dc2626;font-size:0.6rem;font-weight:800;padding:2px 8px;border-radius:20px;">Blocked</span>':''}
          </div>
          <div style="display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:14px;">
            <span style="font-size:0.71rem;color:#64748b;">@${g.email.split('@')[0]}</span>
            <span style="font-size:0.71rem;color:#64748b;">${g.phone||'—'}</span>
            <span style="font-size:0.71rem;color:#64748b;">${g.email}</span>
          </div>
          <div style="display:inline-flex;gap:0;border:1px solid #f1f5f9;border-radius:12px;overflow:hidden;">
            <div style="padding:8px 20px;border-right:1px solid #f1f5f9;text-align:center;">
              <div style="font-size:1.15rem;font-weight:900;color:#0f172a;">${g.visits}</div>
              <div style="font-size:0.58rem;color:#94a3b8;text-transform:uppercase;letter-spacing:0.05em;margin-top:1px;">Drops</div>
            </div>
            <div style="padding:8px 20px;text-align:center;">
              <div style="font-size:1.15rem;font-weight:900;color:${c.color};">${g.ci}</div>
              <div style="font-size:0.58rem;color:#94a3b8;text-transform:uppercase;letter-spacing:0.05em;margin-top:1px;">Check-ins</div>
            </div>
          </div>

        <!-- Tabs -->
        <div style="display:flex;border-bottom:1px solid #f1f5f9;position:sticky;top:0;background:#fff;z-index:1;">
          ${gdTabBtn('overview','Overview')}
          ${gdTabBtn('orders','Orders')}
          ${gdTabBtn('comms','Communications')}
        </div>
        <!-- Content -->
        ${gdTab==='overview'?overviewTab:gdTab==='orders'?ordersTab:commsTab}
      </div>
    </div>`;
  }

  // ══════════════════════════════════════════════════════════════════════
  // VIEW A — SOLO ORG (single location, no enterprise grouping)
  // ══════════════════════════════════════════════════════════════════════
  if(!isEnterprise){
    const soloHandle = locOrgs[0]?.handle||c.handle;
    const soloFollowers = locOrgs[0]?.followers||followersCount;
    const tab = S.guestTab||'drop';
    const tabs=[
      {id:'drop',      label:'Drop Guests',          count:dropGuests.length},
      {id:'followers', label:`Following @${soloHandle}`, count:soloFollowers},
      {id:'all',       label:'All Contacts',          count:dropGuests.length+crmContacts.length},
    ];
    const visGuests = tab==='followers' ? dropGuests.filter(g=>g.follower) : dropGuests;
    const showDrop  = tab!=='all' || true;
    const showCrm   = tab==='all';
    const secLabel  = tab==='followers' ? `Following @${soloHandle}` : 'Drop Guests';
    const secSub    = tab==='followers' ? `Receiving drop notifications from @${soloHandle}` : 'Checked in to at least one drop';
    const secColor  = tab==='followers' ? '#7C3AED' : c.color;

    return `<div style="padding:28px 32px;">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;">
        <div>
          <div style="font-size:1.3rem;font-weight:900;color:#0f172a;margin-bottom:4px;">Guests</div>
          <div style="font-size:0.78rem;color:#64748b;">Drop guests, followers &amp; CRM contacts for @${soloHandle}</div>
        </div>
        <button onclick="ss({crmModal:true,crmStep:1})" style="padding:9px 18px;background:${c.color};color:#fff;border:none;border-radius:10px;font-weight:700;font-size:0.78rem;cursor:pointer;">+ Import / Sync CRM</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px;">
        ${kpi('Drop Guests',dropGuests.length,'checked in to at least one drop',c.color)}
        <div onclick="ss({guestTab:'followers'})" style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:20px 22px;cursor:pointer;transition:border-color 0.15s;" onmouseover="this.style.borderColor='#DDD6FE'" onmouseout="this.style.borderColor='#e5e7eb'">
          <div style="font-size:0.72rem;color:#64748b;font-weight:600;margin-bottom:6px;">Following @${soloHandle}</div>
          <div style="font-size:1.9rem;font-weight:900;color:#7C3AED;">${soloFollowers}</div>
          <div style="font-size:0.7rem;color:#94a3b8;margin-top:4px;">subscribed to drop notifications · <span style="color:#7C3AED;font-weight:700;">View followers →</span></div>
        </div>
        ${kpi('Total Contacts',dropGuests.length+crmContacts.length,'across all sources','#0f172a')}
      </div>
      <div style="display:flex;gap:6px;margin-bottom:16px;">
        ${tabs.map(t=>`<button onclick="ss({guestTab:'${t.id}'})" style="padding:7px 16px;border-radius:8px;border:1px solid ${tab===t.id?c.color:'#e5e7eb'};background:${tab===t.id?c.color+'12':'#fff'};color:${tab===t.id?c.color:'#475569'};font-weight:700;font-size:0.78rem;cursor:pointer;">${t.label} <span style="font-size:0.68rem;opacity:0.75;">(${t.count})</span></button>`).join('')}
      </div>
      <div style="background:#fff;border-radius:14px;border:1px solid ${tab==='followers'?'#DDD6FE':'#e5e7eb'};overflow:hidden;${showCrm?'margin-bottom:16px;':''}">
        <div style="padding:12px 20px;border-bottom:1px solid ${tab==='followers'?'#EDE9FE':'#f1f5f9'};display:flex;align-items:center;gap:10px;${tab==='followers'?'background:#faf5ff;':''}">
          <span style="width:8px;height:8px;border-radius:50%;background:${secColor};display:inline-block;flex-shrink:0;"></span>
          <div style="font-size:0.82rem;font-weight:800;color:#0f172a;flex:1;">${secLabel}</div>
          <div style="font-size:0.7rem;color:#94a3b8;">${secSub}</div>
        </div>
        ${tab==='followers'?`
          ${(()=>{
            const guestFollowers=dropGuests.filter(g=>g.follower);
            return `${guestFollowers.length>0?`
              <div style="padding:8px 20px 5px;background:#f8fafc;border-bottom:1px solid #f1f5f9;"><span style="font-size:0.62rem;font-weight:800;color:#7C3AED;text-transform:uppercase;letter-spacing:0.07em;">Also Attended Drops</span></div>
              <div style="display:grid;grid-template-columns:2fr 1fr 1fr auto;padding:8px 20px;border-bottom:1px solid #f1f5f9;background:#f8fafc;">
                <span style="font-size:0.65rem;font-weight:700;color:#94a3b8;text-transform:uppercase;">Guest</span>
                <span style="font-size:0.65rem;font-weight:700;color:#94a3b8;text-transform:uppercase;text-align:center;">Drops</span>
                <span style="font-size:0.65rem;font-weight:700;color:#94a3b8;text-transform:uppercase;text-align:center;">Check-ins</span>
                <span></span>
              </div>
              ${guestFollowers.map(g=>guestRow(g,'2fr 1fr 1fr auto','')).join('')}
            `:''}
            ${nonGuestFollowers.length>0?`
              <div style="padding:10px 20px 6px;${guestFollowers.length>0?'border-top:1px solid #f1f5f9;':''}background:#faf5ff;">
                <span style="font-size:0.62rem;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:0.07em;">Followers Only · ${nonGuestFollowers.length} shown</span>
              </div>
              <div style="display:flex;flex-wrap:wrap;gap:16px;padding:14px 20px 18px;">
                ${nonGuestFollowers.map(f=>followerBubble(f,'#7C3AED')).join('')}
              </div>
            `:''}
            ${guestFollowers.length===0&&nonGuestFollowers.length===0?`<div style="padding:28px;text-align:center;color:#94a3b8;font-size:0.78rem;">No followers yet</div>`:''}`;
          })()}
        `:`
        <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;padding:8px 20px;border-bottom:1px solid #f1f5f9;background:#f8fafc;">
          <span style="font-size:0.65rem;font-weight:700;color:#94a3b8;text-transform:uppercase;">Guest</span>
          <span style="font-size:0.65rem;font-weight:700;color:#94a3b8;text-transform:uppercase;">Following</span>
          <span style="font-size:0.65rem;font-weight:700;color:#94a3b8;text-transform:uppercase;text-align:center;">Drops</span>
          <span style="font-size:0.65rem;font-weight:700;color:#94a3b8;text-transform:uppercase;text-align:center;">Check-ins</span>
          <span></span>
        </div>
        ${visGuests.map(g=>guestRow(g,'2fr 1fr 1fr 1fr auto',
          g.follower?`<span style="background:#EDE9FE;color:#7C3AED;font-size:0.6rem;font-weight:800;padding:3px 8px;border-radius:20px;display:inline-block;white-space:nowrap;">@${soloHandle}</span>`:''
        )).join('')}
        ${visGuests.length===0?`<div style="padding:28px;text-align:center;color:#94a3b8;font-size:0.78rem;">No guests in this segment yet</div>`:''}`}
      </div>
      ${showCrm?crmSection():''}
      ${guestDetailModalFn(dropGuests,c,locOrgs)}
    </div>`;
  }

  // ══════════════════════════════════════════════════════════════════════
  // VIEW B — ENTERPRISE: PORTFOLIO (deduped across all location handles)
  // ══════════════════════════════════════════════════════════════════════
  if(guestView==='portfolio' || !locFilter){
    const tab = (S.guestTab==='followers'||!S.guestTab)?'all':S.guestTab;

    // Account filter — uses shared topbar acctFilter state
    const selLocs = S.acctFilter||[];
    const locFilteredGuests = selLocs.length>0 ? dropGuests.filter(g=>g.locs&&g.locs.some(l=>selLocs.includes(l.id))) : dropGuests;
    const selLocHandles = selLocs.length>0 ? [...(hqLoc&&selLocs.includes(hqLoc.id)?[(hqLoc.handle&&hqLoc.handle.startsWith('@')?hqLoc.handle:'@'+(hqLoc.handle||''))]:[]),...locOrgs.filter(l=>selLocs.includes(l.id)).map(l=>(l.handle&&l.handle.startsWith('@')?l.handle:'@'+(l.handle||'')))] : [];

    function locHandleBadges(locs){
      if(!locs||locs.length===0) return '';
      const show = locs.slice(0,2);
      const extra = locs.length-2;
      return show.map(l=>`<span style="background:${c.color}12;color:${c.color};font-size:0.6rem;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap;">${hAt(l.handle)}</span>`).join('')
        +(extra>0?`<span style="background:#f1f5f9;color:#64748b;font-size:0.6rem;font-weight:700;padding:2px 7px;border-radius:20px;">+${extra}</span>`:'');
    }


    const tabs=[
      {id:'all',       label:'All Guests',             count:locFilteredGuests.length},
      {id:'contacts',  label:'All Contacts',            count:locFilteredGuests.length+crmContacts.length},
    ];

    const showCrm = tab==='contacts';
    const visGuests = locFilteredGuests;

    const guestSubtitle = selLocs.length===0 ? 'Unique guests across all accounts'
      : selLocs.length===1 ? `Showing guests for <strong style="color:${c.color};">${selLocHandles[0]}</strong>`
      : `Showing guests across <strong style="color:${c.color};">${selLocs.length} accounts</strong>`;

    return `<div style="padding:28px 32px;" onclick="if(S.guestMenu)ss({guestMenu:null})">
      <!-- Header -->
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;">
        <div>
          <div style="font-size:1.3rem;font-weight:900;color:#0f172a;margin-bottom:4px;">Guests</div>
          <div style="font-size:0.78rem;color:#64748b;">${guestSubtitle}</div>
        </div>
        <button onclick="ss({crmModal:true,crmStep:1})" style="padding:9px 18px;background:${c.color};color:#fff;border:none;border-radius:10px;font-weight:700;font-size:0.78rem;cursor:pointer;">+ Import / Sync CRM</button>
      </div>

      <!-- KPIs -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px;">
        ${kpi('Guests',locFilteredGuests.length,selLocs.length===1?`for ${selLocHandles[0]}`:selLocs.length>1?`across ${selLocs.length} accounts`:'across all accounts',c.color)}
        ${kpi('Followers',fmtNum(portfolioFollowers),selLocs.length>0?`following filtered accounts`:'across all handles','#7C3AED')}
        ${kpi('Total Contacts',locFilteredGuests.length+crmContacts.length,selLocs.length>0?'guests + sync\'d (filtered)':'guests + sync\'d','#0f172a')}
      </div>

      <!-- Tabs -->
      <div style="display:flex;gap:6px;margin-bottom:16px;">
        ${tabs.map(t=>`<button onclick="ss({guestTab:'${t.id}'})" style="padding:7px 16px;border-radius:8px;border:1px solid ${tab===t.id?c.color:'#e5e7eb'};background:${tab===t.id?c.color+'12':'#fff'};color:${tab===t.id?c.color:'#475569'};font-weight:700;font-size:0.78rem;cursor:pointer;">${t.label} <span style="font-size:0.68rem;opacity:0.75;">(${t.count})</span></button>`).join('')}
      </div>

      <!-- Guest table -->
      ${!showCrm?`
      <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;overflow:hidden;margin-bottom:0;">
        <div style="padding:12px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:10px;">
          <span style="width:8px;height:8px;border-radius:50%;background:${c.color};display:inline-block;flex-shrink:0;"></span>
          <div style="font-size:0.82rem;font-weight:800;color:#0f172a;flex:1;">All Guests</div>
        </div>
        <div style="display:grid;grid-template-columns:2.5fr 1fr 1fr auto;padding:8px 20px;border-bottom:1px solid #f1f5f9;background:#f8fafc;">
          <span style="font-size:0.65rem;font-weight:700;color:#94a3b8;text-transform:uppercase;">Guest</span>
          <span style="font-size:0.65rem;font-weight:700;color:#94a3b8;text-transform:uppercase;display:block;text-align:center;">Drops</span>
          <span style="font-size:0.65rem;font-weight:700;color:#94a3b8;text-transform:uppercase;display:block;text-align:center;">Check-ins</span>
          <span></span>
        </div>
        ${visGuests.map(g=>guestRow(g,'2.5fr 1fr 1fr auto','')).join('')}
        ${visGuests.length===0?`<div style="padding:28px;text-align:center;color:#94a3b8;font-size:0.78rem;">No guests in this segment</div>`:''}
      </div>`:''}
      ${showCrm?`
      <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;overflow:hidden;margin-bottom:16px;">
        <div style="padding:12px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:10px;">
          <span style="width:8px;height:8px;border-radius:50%;background:${c.color};display:inline-block;flex-shrink:0;"></span>
          <div style="font-size:0.82rem;font-weight:800;color:#0f172a;flex:1;">Drop Guests</div>
          <div style="font-size:0.7rem;color:#94a3b8;">Have attended at least one drop across all accounts</div>
        </div>
        <div style="display:grid;grid-template-columns:2.5fr 1fr 1fr auto;padding:8px 20px;border-bottom:1px solid #f1f5f9;background:#f8fafc;">
          <span style="font-size:0.65rem;font-weight:700;color:#94a3b8;text-transform:uppercase;">Guest</span>
          <span style="font-size:0.65rem;font-weight:700;color:#94a3b8;text-transform:uppercase;text-align:center;">Drops</span>
          <span style="font-size:0.65rem;font-weight:700;color:#94a3b8;text-transform:uppercase;text-align:center;">Check-ins</span>
          <span></span>
        </div>
        ${locFilteredGuests.map(g=>guestRow(g,'2.5fr 1fr 1fr auto','')).join('')}
      </div>
      ${crmSection()}`:''}

      ${guestDetailModalFn(dropGuests,c,locOrgs)}
    </div>`;
  }

  // ══════════════════════════════════════════════════════════════════════
  // VIEW C — ENTERPRISE: BY LOCATION (scoped to one handle)
  // ══════════════════════════════════════════════════════════════════════
  const loc = activeLoc || locOrgs[0];
  const locHandle = loc?.handle||c.handle;
  const locFollowers = loc?.followers||0;
  const locGuests = dropGuests.filter(g=>!g.locs||g.locs.length===0||g.locs.some(l=>l.id===loc?.id));

  const tab = S.guestTab||'drop';
  const tabs=[
    {id:'drop',      label:'Drop Guests',              count:locGuests.length},
    {id:'followers', label:`Following @${locHandle}`,  count:locFollowers},
    {id:'all',       label:'All Contacts',              count:locGuests.length+crmContacts.length},
  ];

function collQR(id){
  // Deterministic pseudo-QR SVG seeded by collection id
  const size=21,cell=8,w=size*cell;
  let seed=0; for(let i=0;i<id.length;i++) seed=(seed*31+id.charCodeAt(i))&0xffff;
  // Finder pattern positions (top-left, top-right, bottom-left)
  const fp=new Set();
  const addFinder=(ro,co)=>{for(let r=0;r<7;r++) for(let c=0;c<7;c++) if(r===0||r===6||c===0||c===6||(r>=2&&r<=4&&c>=2&&c<=4)) fp.add((ro+r)*size+(co+c));};
  addFinder(0,0); addFinder(0,14); addFinder(14,0);
  // Separator rows/cols (always white)
  const sep=new Set();
  for(let i=0;i<8;i++){sep.add(7*size+i);sep.add(i*size+7);sep.add(7*size+13+i);sep.add(i*size+13);sep.add((13+i)*size+7);sep.add(13*size+i);}
  const rects=[];
  for(let r=0;r<size;r++) for(let c=0;c<size;c++){
    const idx=r*size+c;
    let on=fp.has(idx)?true:sep.has(idx)?false:((seed=(seed*1664525+1013904223)&0xffffffff)&1)===1;
    if(on) rects.push(`<rect x="${c*cell}" y="${r*cell}" width="${cell}" height="${cell}" fill="#0f172a"/>`);
  }
  return `<svg viewBox="0 0 ${w} ${w}" width="136" height="136" xmlns="http://www.w3.org/2000/svg" style="display:block;"><rect width="${w}" height="${w}" fill="#fff"/>${rects.join('')}</svg>`;
}

// ── ANALYTICS ─────────────────────────────────────────────────────────────────
function rAnalytics(){
  const c=cfg();
  const acctSel=S.acctFilter||[];
  const allLocs=c.locations||[];
  const locs=acctSel.length>0?allLocs.filter(l=>acctSel.includes(l.id)):allLocs;
  const drops=(acctSel.length>0?c.drops.filter(d=>acctSel.includes(d.locId)):c.drops)||[];
  const totalCi=drops.reduce((s,d)=>s+(d.ci||0),0);
  const totalRes=drops.reduce((s,d)=>s+(d.res||0),0);
  const avgSr=pct(totalCi,totalRes);
  const t1groups=[...new Set(locs.map(l=>l.t1))];
  const weeks=['Feb 3','Feb 10','Feb 17','Feb 24','Mar 3','Mar 10','Mar 17','Mar 24','Mar 31'];
  const ciData=[42,58,63,71,85,79,94,108,totalCi];
  const maxCi=Math.max(...ciData);
  return `<div style="padding:28px 32px;">
    <div style="font-size:1.3rem;font-weight:900;color:#0f172a;margin-bottom:6px;">Analytics</div>
    <div style="font-size:0.78rem;color:#64748b;margin-bottom:20px;">Last 30 days · ${acctSel.length>0?`<strong style="color:${c.color};">${acctSel.length} account${acctSel.length>1?'s':''} filtered</strong>`:`All ${c.locsLabel.toLowerCase()}`}</div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;">
      ${kpi('Check-ins',fmtNum(totalCi),'total this period',c.color)}
      ${kpi('Reservations',fmtNum(totalRes),'total this period','#0f172a')}
      ${kpi('Show Rate',avgSr+'%','avg across all drops','#0f172a')}
      ${kpi('Peak Bookings','3–5 PM','most popular window','#0f172a')}
    </div>

    <div style="display:grid;grid-template-columns:2fr 1fr;gap:18px;margin-bottom:18px;">
      <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:18px 22px;">
        <div style="font-size:0.85rem;font-weight:800;color:#0f172a;margin-bottom:14px;">Weekly Check-ins</div>
        <div style="display:flex;align-items:flex-end;gap:8px;height:100px;">
          ${ciData.map((v,i)=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
            <div style="width:100%;background:${i===ciData.length-1?c.color:c.color+'70'};border-radius:4px 4px 0 0;height:${Math.round(v/maxCi*80)+8}px;transition:height 0.3s;"></div>
            <div style="font-size:0.55rem;color:#94a3b8;white-space:nowrap;">${weeks[i].split(' ')[1]}</div>
          </div>`).join('')}
        </div>
      </div>
      <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:18px 22px;">
        <div style="font-size:0.85rem;font-weight:800;color:#0f172a;margin-bottom:14px;">By Drop Type</div>
        ${c.dropTypes.map(t=>{
          const td=drops.filter(d=>d.type===t.id);
          const tci=td.reduce((s,d)=>s+(d.ci||0),0);
          const pctOfTotal=totalCi?Math.round(tci/totalCi*100):0;
          return `<div style="margin-bottom:9px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:3px;">
              <span style="font-size:0.73rem;color:#475569;">${t.icon} ${t.label}</span>
              <span style="font-size:0.73rem;font-weight:700;color:${t.c};">${pctOfTotal}%</span>
            </div>
            ${bar(pctOfTotal,t.c,6)}
          </div>`;
        }).join('')}
      </div>
    </div>

    ${c.hier.length===0?'':
    `<div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;overflow:hidden;">
      <div style="padding:14px 20px;border-bottom:1px solid #f1f5f9;font-size:0.85rem;font-weight:800;color:#0f172a;">${c.hier[0]} Performance</div>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);">
        ${['#',c.hier[0],'Check-ins','Show Rate','Live Drops'].map((h,i)=>`<div style="padding:9px 14px;font-size:0.68rem;font-weight:700;color:#94a3b8;text-transform:uppercase;background:#f8fafc;border-bottom:1px solid #f1f5f9;${i>0?'text-align:center;':''}">${h}</div>`).join('')}
        ${t1groups.map((g,gi)=>{
          const gLocs=locs.filter(l=>l.t1===g);
          const gDrops=drops.filter(d=>gLocs.some(l=>l.id===d.locId));
          const gci=gDrops.reduce((s,d)=>s+(d.ci||0),0);
          const gres=gDrops.reduce((s,d)=>s+(d.res||0),0);
          const gsr=pct(gci,gres);
          const glive=gDrops.filter(d=>d.status==='live').length;
          return `<div style="padding:10px 14px;font-size:0.75rem;font-weight:700;color:#64748b;border-bottom:1px solid #f8fafc;">${gi+1}</div>
            <div style="padding:10px 14px;font-size:0.8rem;font-weight:700;color:#0f172a;border-bottom:1px solid #f8fafc;">${g}</div>
            <div style="padding:10px 14px;font-size:0.8rem;font-weight:700;color:${c.color};text-align:center;border-bottom:1px solid #f8fafc;">${gci}</div>
            <div style="padding:10px 14px;font-size:0.8rem;font-weight:700;color:${showColor(gsr)};text-align:center;border-bottom:1px solid #f8fafc;">${gsr}%</div>
            <div style="padding:10px 14px;font-size:0.8rem;font-weight:700;color:#0f172a;text-align:center;border-bottom:1px solid #f8fafc;">${glive}</div>`;
        }).join('')}
      </div>
    </div>`}
  </div>`;
}

        <div style="width:24px;height:24px;border-radius:50%;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:900;color:#94a3b8;flex-shrink:0;">&#8627;</div>
        <div style="flex:1;">
          <div style="font-size:0.75rem;font-weight:700;color:#0f172a;margin-bottom:2px;">Drop Zones <span style="color:${c.color};">(within each venue)</span></div>

        ${editBtn()}
      </div>
    </div>
    <div style="margin-top:10px;display:flex;gap:8px;">
      <button onclick="ss({page:'drops',dropsTab:'venues'})" style="padding:7px 14px;background:${c.color};color:#fff;border:none;border-radius:8px;font-size:0.73rem;font-weight:700;cursor:pointer;">Manage Locations &amp; Zones</button>

  // ── 3. Drop Types ──
  const dtHTML=card(`
    ${sectionHd('Drop Types','Customize the categories available when creating a drop. Each type gets its own label, icon, and color in the UI.')}
    <div style="display:flex;flex-direction:column;gap:0;">
      ${dropTypes.map((dt,i)=>`
        <div style="display:flex;align-items:center;gap:12px;padding:11px 0;${i<dropTypes.length-1?'border-bottom:1px solid #f8fafc':''}">

          <div style="flex:1;">

    <div style="margin-top:12px;">
      <button style="padding:7px 14px;background:${c.color};color:#fff;border:none;border-radius:8px;font-size:0.73rem;font-weight:700;cursor:pointer;">+ Add Drop Type</button>

  // ── 4. Location Attributes (place orgs) / Zone Attributes (brand orgs) ──
  const stdAttrs=[

    {label:'Operating Hours',desc:'When the location is open',                on:false},
    {label:'Manager Name', desc:'Assigned location manager contact',           on:false},
    {label:'POS Terminal ID',desc:'Link to point-of-sale system',             on:false},
  ];
  const zoneAttrs=[
    {label:'Location Pin',    desc:'Physical location description within the venue', on:true},
    {label:'Zone Description',desc:'What guests will find or experience at this zone', on:true},
    {label:'Capacity',        desc:'Max guests per drop at this zone',               on:true},
    {label:'Zone Type',       desc:'Category (entrance, lounge, stage, bar, etc.)',  on:false},
    {label:'Accessibility',   desc:'Wheelchair/ADA accessible flag',                 on:false},
    {label:'Operating Hours', desc:'When the zone is staffed/active',                on:false},
    {label:'Staff Contact',   desc:'Zone lead phone or radio channel',               on:false},
    {label:'Notes',           desc:'Internal notes visible to team only',            on:false},
  ];
  const attrHTML=card(`
    ${sectionHd(isBrand?'Drop Zone Attributes':'Location Attributes',isBrand?'Choose which data fields are tracked for each drop zone. Toggle standard fields or add custom ones.':'Choose which data fields are tracked for each location. Toggle standard fields or add custom ones.')}

      ${(isBrand?zoneAttrs:stdAttrs).map((a,i)=>`
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;${i%2===0?'border-right:1px solid #f8fafc':''};border-bottom:1px solid #f8fafc;gap:10px;">

            <div style="font-size:0.75rem;font-weight:700;color:#0f172a;">${a.label}</div>

    <div style="padding:12px 0 2px;display:flex;gap:8px;">

  // ── 5. Drop Approval Flow ──
  const approvalRoles=['Admin','Manager'];

  const approvalHTML=card(`
    ${sectionHd('Drop Approval Workflow','Define who must approve a drop before it goes live. Each enabled step adds a review gate in the publishing chain.')}
    <div style="display:flex;align-items:center;gap:0;margin-bottom:18px;flex-wrap:wrap;">
      <div style="padding:8px 14px;background:#f8fafc;border-radius:10px;font-size:0.72rem;font-weight:700;color:#64748b;border:1px solid #e5e7eb;">Draft</div>
      ${approvalRoles.map((role,i)=>`
        <div style="display:flex;align-items:center;">
          <div style="width:24px;height:2px;background:${approvalOn[i]?c.color:'#e5e7eb'};"></div>
          <div style="padding:8px 12px;border-radius:10px;border:2px solid ${approvalOn[i]?c.color:'#e5e7eb'};background:${approvalOn[i]?c.color+'12':'#fff'};font-size:0.68rem;font-weight:700;color:${approvalOn[i]?c.color:'#94a3b8'};white-space:nowrap;">${role}</div>
        </div>`).join('')}
      <div style="display:flex;align-items:center;">
        <div style="width:24px;height:2px;background:${c.color};"></div>
        <div style="padding:8px 14px;background:${c.color};border-radius:10px;font-size:0.72rem;font-weight:700;color:#fff;border:2px solid ${c.color};">&#128640; Live</div>
