// ── HELPERS ───────────────────────────────────────────────────────────────────
function locById(id){return cfg().locations.find(l=>l.id===id);}
function dropTypeInfo(typeId){return cfg().dropTypes.find(t=>t.id===typeId)||{id:typeId,label:typeId,icon:'&#127381;',bg:'#f1f5f9',c:'#475569'};}
function badge(status){
  const map={live:'#dcfce7:#16a34a:Live',scheduled:'#fef9c3:#854d0e:Scheduled',draft:'#f1f5f9:#64748b:Draft',ended:'#fee2e2:#b91c1c:Ended',active:'#dcfce7:#16a34a:Active'};
  const [bg,color,label]=(map[status]||'#f1f5f9:#64748b:—').split(':');
  return `<span style="background:${bg};color:${color};font-size:0.68rem;font-weight:700;padding:3px 8px;border-radius:20px;">${label}</span>`;
}
function dropBadge(typeId){
  const t=dropTypeInfo(typeId);
  return `<span style="background:${t.bg};color:${t.c};font-size:0.68rem;font-weight:800;padding:3px 8px;border-radius:20px;">${t.icon} ${t.label}</span>`;
}
function timingBadge(timing){
  if(!timing) return '';
  const map={'pre-game':{bg:'#eff6ff',c:'#1d4ed8',l:'Pre-Game'},'in-game':{bg:'#dcfce7',c:'#15803d',l:'In-Game'},'post-game':{bg:'#fef9c3',c:'#92400e',l:'Post-Game'}};
  const t=map[timing]||{bg:'#f1f5f9',c:'#475569',l:timing};
  return `<span style="background:${t.bg};color:${t.c};font-size:0.65rem;font-weight:800;padding:2px 7px;border-radius:20px;">${t.l}</span>`;
}
function dayBadge(dayId){
  if(!dayId||!cfg().days) return '';
  const d=cfg().days.find(x=>x.id===dayId);
  if(!d) return '';
  const wk=cfg().weekends.find(w=>w.id===d.weekend);
  return `<span style="background:${wk?wk.color+'20':'#f1f5f9'};color:${wk?wk.color:'#475569'};font-size:0.65rem;font-weight:800;padding:2px 7px;border-radius:20px;">${d.date} ${d.short}</span>`;
}
function pct(a,b){return b>0?Math.round(a/b*100):0;}
function fmtMoney(n){return '$'+n.toLocaleString();}
function fmtNum(n){return n>=1000?(n/1000).toFixed(1)+'K':String(n);}
function showColor(p){return p>=80?'#16a34a':p>=60?'#ca8a04':'#dc2626';}
function infoRow(l,v){return `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f1f5f9;"><span style="font-size:0.78rem;color:#64748b;">${l}</span><span style="font-size:0.78rem;font-weight:700;color:#0f172a;">${v}</span></div>`;}
function getFilteredDrops(){
  let drops=cfg().drops;
  if(S.timing) drops=drops.filter(d=>d.timing===S.timing);
  if(S.weekend){
    const days=(cfg().days||[]).filter(d=>d.weekend===S.weekend).map(d=>d.id);
    drops=drops.filter(d=>days.includes(d.day));
  }
  if(S.day) drops=drops.filter(d=>d.day===S.day);
  if(S.t1){
    const lIds=cfg().locations.filter(l=>l.t1===S.t1).map(l=>l.id);
    drops=drops.filter(d=>lIds.includes(d.locId));
  }
  return drops;
}

      <div style="flex:1;"></div>
      <span style="background:#dcfce7;color:#15803d;font-size:0.7rem;font-weight:700;padding:4px 10px;border-radius:20px;">${liveDrops} Live</span>
      <button onclick="ss({showPush:true,pushStep:1})" style="background:${c.color};color:#fff;border:none;padding:8px 18px;border-radius:10px;font-weight:700;font-size:0.78rem;cursor:pointer;">+ Push Drop</button>
    </div>`;
  }

  // Game-day (Broncos) topbar
  if(c.special==='gameday'){
    const g=c.game||{};
    const t1vals=[...new Set(c.locations.map(l=>l.t1))];
    return `<div style="padding:10px 24px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <select onchange="ss({t1:this.value||null})" style="padding:6px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:0.78rem;color:#0f172a;background:#fff;cursor:pointer;">
        <option value="">All Zones</option>
        ${t1vals.map(v=>`<option value="${v}" ${S.t1===v?'selected':''}>${v}</option>`).join('')}
      </select>
      <div style="width:1px;height:24px;background:#e5e7eb;"></div>
      ${(c.timings||[]).map(t=>`<button onclick="ss({timing:S.timing==='${t}'?null:'${t}'})" style="padding:4px 11px;border-radius:20px;border:1px solid ${S.timing===t?c.color:'#e5e7eb'};background:${S.timing===t?c.color+'18':'transparent'};color:${S.timing===t?c.color:'#64748b'};font-size:0.72rem;font-weight:${S.timing===t?'700':'500'};cursor:pointer;text-transform:capitalize;">${t}</button>`).join('')}
      <div style="background:#002244;border-radius:10px;padding:5px 14px;display:flex;align-items:center;gap:10px;margin-left:4px;">
        <span style="color:${g.homeColor||'#FB4F14'};font-size:0.78rem;font-weight:900;">${g.homeTeam||'Home'} ${g.homeScore??'—'}</span>
        <span style="color:rgba(255,255,255,0.4);font-size:0.7rem;font-weight:700;">${g.quarter||'Q'} · ${g.timeLeft||'—'}</span>
        <span style="color:${g.awayColor||'#64748b'};font-size:0.78rem;font-weight:900;">${g.awayScore??'—'} ${g.awayTeam||'Away'}</span>
      </div>
      <div style="flex:1;"></div>
      <span style="background:#dcfce7;color:#15803d;font-size:0.7rem;font-weight:700;padding:4px 10px;border-radius:20px;">${liveDrops} Live</span>
      <button onclick="ss({showPush:true,pushStep:1})" style="background:${c.color};color:#fff;border:none;padding:8px 18px;border-radius:10px;font-weight:700;font-size:0.78rem;cursor:pointer;">+ Push Drop</button>
    </div>`;
  }

  // Default topbar (Best Buy, Chipotle, Disney)
  const t1vals=[...new Set(c.locations.map(l=>l.t1))];
  const t2vals=S.t1?[...new Set(c.locations.filter(l=>l.t1===S.t1).map(l=>l.t2).filter(Boolean))]:[];
  return `<div style="padding:10px 24px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
    <select onchange="ss({t1:this.value||null,t2:null})" style="padding:6px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:0.78rem;color:#0f172a;background:#fff;cursor:pointer;">
      <option value="">All ${c.hier[0]}s</option>
      ${t1vals.map(v=>`<option value="${v}" ${S.t1===v?'selected':''}>${v}</option>`).join('')}
    </select>
    ${t2vals.length?`<select onchange="ss({t2:this.value||null})" style="padding:6px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:0.78rem;color:#0f172a;background:#fff;cursor:pointer;"><option value="">All ${c.hier[1]}s</option>${t2vals.map(v=>`<option value="${v}" ${S.t2===v?'selected':''}>${v}</option>`).join('')}</select>`:''}
    ${S.t1||S.t2||S.timing||S.weekend||S.day?`<button onclick="ss({t1:null,t2:null,timing:null,weekend:null,day:null})" style="padding:5px 12px;border-radius:8px;border:1px solid #e5e7eb;background:#f8fafc;color:#64748b;font-size:0.72rem;font-weight:600;cursor:pointer;">Clear Filters</button>`:''}
    <div style="flex:1;"></div>
    <span style="background:#dcfce7;color:#15803d;font-size:0.7rem;font-weight:700;padding:4px 10px;border-radius:20px;">${liveDrops} Live</span>
    <button onclick="ss({showPush:true,pushStep:1})" style="background:${c.color};color:#fff;border:none;padding:8px 18px;border-radius:10px;font-weight:700;font-size:0.78rem;cursor:pointer;">+ Push Drop</button>
  </div>`;
}

// ── ROUTER ─────────────────────────────────────────────────────────────────────
function renderPage(){
  const p=S.page;
  if(p==='dashboard')   return rDashboard();
  if(p==='locations')   return rLocations();
  if(p==='drops')       return rDrops();
  if(p==='customers')   return rCustomers();
  if(p==='collections') return rCollections();
  if(p==='analytics')   return rAnalytics();
  if(p==='users')       return rUsers();
  if(p==='partners')    return rPartners();
  if(p==='billing')     return rBilling();
  if(p==='settings')    return rSettings();
  return '<div style="padding:32px;">Not found</div>';
}

// ── KPI HELPERS ───────────────────────────────────────────────────────────────
function kpi(label,value,sub,color){
  return `<div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:20px 22px;">
    <div style="font-size:0.72rem;color:#64748b;font-weight:600;margin-bottom:6px;">${label}</div>
    <div style="font-size:1.9rem;font-weight:900;color:${color||'#0f172a'};">${value}</div>
    ${sub?`<div style="font-size:0.7rem;color:#94a3b8;margin-top:4px;">${sub}</div>`:''}
  </div>`;
}
function miniStat(label,val,color){
  return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f8fafc;">
    <span style="font-size:0.78rem;color:#475569;">${label}</span>
    <span style="font-size:0.82rem;font-weight:800;color:${color||'#0f172a'};">${val}</span>
  </div>`;
}
function bar(pct,color,h){h=h||8;return `<div style="background:#f1f5f9;border-radius:4px;height:${h}px;overflow:hidden;"><div style="background:${color};height:100%;width:${Math.min(pct,100)}%;border-radius:4px;transition:width 0.3s;"></div></div>`;}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function rDashboard(){
  const c=cfg();
  const drops=c.drops;
  const locs=c.locations;
  const live=drops.filter(d=>d.status==='live');
  const sched=drops.filter(d=>d.status==='scheduled');
  const totalRes=drops.reduce((s,d)=>s+(d.res||0),0);
  const totalCi=drops.reduce((s,d)=>s+(d.ci||0),0);
  const avgSr=live.length?Math.round(live.reduce((s,d)=>s+d.sr,0)/live.length):0;

  // Top locations by check-ins
  const topLocs=locs.map(l=>{
    const lDrops=drops.filter(d=>d.locId===l.id);
    const ci=lDrops.reduce((s,d)=>s+(d.ci||0),0);
    const res=lDrops.reduce((s,d)=>s+(d.res||0),0);
    return {...l,ci,res};
  }).sort((a,b)=>b.ci-a.ci).slice(0,5);

  // Drop type breakdown
  const typeBreakdown=c.dropTypes.map(t=>{
    const td=drops.filter(d=>d.type===t.id);
    const tci=td.reduce((s,d)=>s+(d.ci||0),0);
    return {...t,count:td.length,ci:tci,live:td.filter(d=>d.status==='live').length};
  });

  // Hierarchy breakdown for top tier
  const t1groups=[...new Set(locs.map(l=>l.t1))];

  return `<div style="padding:28px 32px;">
    <div style="margin-bottom:22px;">
      <div style="font-size:1.3rem;font-weight:900;color:#0f172a;">${c.name}</div>
      <div style="font-size:0.82rem;color:#64748b;margin-top:3px;">${c.plan} &middot; ${locs.length} ${c.locsLabel} &middot; ${fmtMoney(locs.length*c.ppl)}/mo</div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;">
      ${kpi('Live Drops',live.length,`${sched.length} scheduled`,c.color)}
      ${kpi('Total Reservations',fmtNum(totalRes),`across ${drops.length} drops`,'#0f172a')}
      ${kpi('Total Check-ins',fmtNum(totalCi),`${avgSr}% avg show rate`,'#0f172a')}
      ${kpi('Active Locations',locs.filter(l=>l.status==='active').length,`${t1groups.length} ${c.hier[0].toLowerCase()}s`,'#0f172a')}
    </div>

    <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:18px;margin-bottom:18px;">
      <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;overflow:hidden;">
        <div style="padding:16px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;">
          <div style="font-size:0.9rem;font-weight:800;color:#0f172a;">Live Drops</div>
          <button onclick="go('drops')" style="font-size:0.72rem;color:${c.color};font-weight:700;background:none;border:none;cursor:pointer;">View All &rarr;</button>
        </div>
        ${live.slice(0,5).map(d=>{
          const loc=locById(d.locId);
          const sr=pct(d.ci,d.res);
          const dt=dropTypeInfo(d.type);
          return `<div style="padding:12px 20px;border-bottom:1px solid #f8fafc;display:flex;align-items:center;gap:12px;">
            <div style="flex:1;min-width:0;">
              <div style="font-size:0.82rem;font-weight:700;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${d.title}</div>
              <div style="display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap;">
                ${dropBadge(d.type)}
                ${d.timing?timingBadge(d.timing):''}
                ${d.day?dayBadge(d.day):''}
                <span style="font-size:0.7rem;color:#94a3b8;">${loc?loc.name:'—'}</span>
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0;">
              <div style="font-size:0.88rem;font-weight:900;color:${showColor(sr)};">${sr}%</div>
              <div style="font-size:0.65rem;color:#94a3b8;">${d.ci}/${d.res}</div>
            </div>
          </div>`;
        }).join('')}
      </div>

      <div style="display:flex;flex-direction:column;gap:14px;">
        <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:16px 20px;">
          <div style="font-size:0.82rem;font-weight:800;color:#0f172a;margin-bottom:12px;">Drop Types</div>
          ${typeBreakdown.map(t=>`<div style="margin-bottom:8px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
              <span style="font-size:0.75rem;color:#475569;">${t.icon} ${t.label}</span>
              <span style="font-size:0.75rem;font-weight:700;color:${t.c};">${t.live} live &middot; ${t.ci} ci</span>
            </div>
            ${bar(t.count?t.ci/Math.max(...typeBreakdown.map(x=>x.ci))*100:0,t.c)}
          </div>`).join('')}
        </div>

        <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:16px 20px;">
          <div style="font-size:0.82rem;font-weight:800;color:#0f172a;margin-bottom:10px;">Top ${c.hier[0]}s by Check-ins</div>
          ${t1groups.map(t1=>{
            const t1drops=drops.filter(d=>{const l=locById(d.locId);return l&&l.t1===t1;});
            const t1ci=t1drops.reduce((s,d)=>s+(d.ci||0),0);
            const t1res=t1drops.reduce((s,d)=>s+(d.res||0),0);
            const t1sr=pct(t1ci,t1res);
            return `<div style="margin-bottom:8px;">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;">
                <span style="font-size:0.75rem;color:#475569;">${t1}</span>
                <span style="font-size:0.75rem;font-weight:700;color:${showColor(t1sr)};">${t1sr}% &middot; ${t1ci} ci</span>
              </div>
              ${bar(t1ci/Math.max(1,...t1groups.map(g=>{const gd=drops.filter(d=>{const l=locById(d.locId);return l&&l.t1===g;});return gd.reduce((s,d)=>s+(d.ci||0),0);}))*100,c.color)}
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>

    <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;overflow:hidden;">
      <div style="padding:14px 20px;border-bottom:1px solid #f1f5f9;font-size:0.82rem;font-weight:800;color:#0f172a;">Top ${c.locsLabel} by Check-ins</div>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:0;">
        ${topLocs.map((l,i)=>{
          const sr=pct(l.ci,l.res);
          return `<div style="padding:14px 16px;border-right:${i<4?'1px solid #f1f5f9':'none'};text-align:center;">
            <div style="font-size:1.4rem;font-weight:900;color:${c.color};">${l.ci}</div>
            <div style="font-size:0.62rem;color:#94a3b8;margin-top:2px;">check-ins</div>
            <div style="font-size:0.7rem;font-weight:700;color:#0f172a;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${l.name.replace(/.*\u2014\s*/,'')}</div>
            <div style="font-size:0.65rem;color:#94a3b8;">${l.city}</div>
            <div style="margin-top:6px;">${bar(sr,c.color,6)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

// ── LOCATIONS ─────────────────────────────────────────────────────────────────
function rLocations(){
  const c=cfg();
  const locs=c.locations.filter(l=>{
    if(S.t1 && l.t1!==S.t1) return false;
    if(S.t2 && l.t2!==S.t2) return false;
    return true;
  });
  if(S.locationDetail){
    const l=c.locations.find(x=>x.id===S.locationDetail);
    if(l) return locationDetail(l);
  }
  const groups=[...new Set(locs.map(l=>l.t1))];
  return `<div style="padding:28px 32px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <div>
        <div style="font-size:1.3rem;font-weight:900;color:#0f172a;">${c.locsLabel}</div>
        <div style="font-size:0.78rem;color:#64748b;margin-top:2px;">${locs.length} of ${c.locations.length} ${c.locsLabel.toLowerCase()} shown</div>
      </div>
    </div>
    ${groups.map(g=>{
      const glocs=locs.filter(l=>l.t1===g);
      const gDrops=c.drops.filter(d=>glocs.some(l=>l.id===d.locId));
      const gci=gDrops.reduce((s,d)=>s+(d.ci||0),0);
      const gres=gDrops.reduce((s,d)=>s+(d.res||0),0);
      const gsr=pct(gci,gres);
      const t2groups=[...new Set(glocs.map(l=>l.t2).filter(Boolean))];
      return `<div style="margin-bottom:24px;">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
          <div style="font-size:0.9rem;font-weight:800;color:#0f172a;">${g}</div>
          <span style="font-size:0.7rem;color:#94a3b8;">${glocs.length} ${c.locsLabel.toLowerCase()}</span>
          <span style="margin-left:auto;font-size:0.72rem;font-weight:700;color:${showColor(gsr)};">${gsr}% show rate &middot; ${gci} check-ins</span>
        </div>
        ${(t2groups.length?t2groups:[null]).map(t2=>{
          const t2locs=t2?glocs.filter(l=>l.t2===t2):glocs;
          const t2Header=t2?`<div style="font-size:0.72rem;font-weight:700;color:#64748b;padding:6px 0 4px;letter-spacing:0.04em;text-transform:uppercase;">${t2}</div>`:'';
          return t2Header+`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:${t2?'12px':'0'};">
            ${t2locs.map(l=>{
              const lDrops=c.drops.filter(d=>d.locId===l.id);
              const lci=lDrops.reduce((s,d)=>s+(d.ci||0),0);
              const lres=lDrops.reduce((s,d)=>s+(d.res||0),0);
              const lsr=pct(lci,lres);
              const liveCt=lDrops.filter(d=>d.status==='live').length;
              return `<div onclick="ss({locationDetail:'${l.id}'})" style="background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:14px 16px;cursor:pointer;transition:all 0.12s;" onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,0.08)';this.style.borderColor='${c.color}50'" onmouseout="this.style.boxShadow='';this.style.borderColor='#e5e7eb'">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;">
                  <div style="font-size:0.8rem;font-weight:700;color:#0f172a;line-height:1.3;">${l.name}</div>
                  ${badge(l.status)}
                </div>
                <div style="font-size:0.7rem;color:#94a3b8;margin-bottom:10px;">${l.city}, ${l.state}</div>
                <div style="display:flex;gap:12px;margin-bottom:8px;">
                  <div><div style="font-size:1rem;font-weight:900;color:${c.color};">${lci}</div><div style="font-size:0.62rem;color:#94a3b8;">check-ins</div></div>
                  <div><div style="font-size:1rem;font-weight:900;color:#0f172a;">${liveCt}</div><div style="font-size:0.62rem;color:#94a3b8;">live drops</div></div>
                  <div><div style="font-size:1rem;font-weight:900;color:${showColor(lsr)};">${lsr}%</div><div style="font-size:0.62rem;color:#94a3b8;">show rate</div></div>
                </div>
                ${bar(lsr,c.color,5)}
              </div>`;
            }).join('')}
          </div>`;
        }).join('')}
      </div>`;
    }).join('')}
  </div>`;
}

function locationDetail(l){
  const c=cfg();
  const lDrops=c.drops.filter(d=>d.locId===l.id);
  const lci=lDrops.reduce((s,d)=>s+(d.ci||0),0);
  const lres=lDrops.reduce((s,d)=>s+(d.res||0),0);
  const lsr=pct(lci,lres);
  return `<div style="padding:28px 32px;">
    <button onclick="ss({locationDetail:null})" style="display:flex;align-items:center;gap:6px;color:${c.color};font-size:0.78rem;font-weight:700;background:none;border:none;cursor:pointer;margin-bottom:16px;">&larr; Back to ${c.locsLabel}</button>
    <div style="display:grid;grid-template-columns:1fr 360px;gap:20px;">
      <div>
        <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:22px 24px;margin-bottom:16px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
            <div style="font-size:1.1rem;font-weight:900;color:#0f172a;">${l.name}</div>
            ${badge(l.status)}
          </div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;">
            <div style="text-align:center;background:#f8fafc;border-radius:10px;padding:12px 8px;">
              <div style="font-size:1.5rem;font-weight:900;color:${c.color};">${lci}</div>
              <div style="font-size:0.62rem;color:#94a3b8;margin-top:2px;">Check-ins</div>
            </div>
            <div style="text-align:center;background:#f8fafc;border-radius:10px;padding:12px 8px;">
              <div style="font-size:1.5rem;font-weight:900;color:#0f172a;">${lres}</div>
              <div style="font-size:0.62rem;color:#94a3b8;margin-top:2px;">Reservations</div>
            </div>
            <div style="text-align:center;background:#f8fafc;border-radius:10px;padding:12px 8px;">
              <div style="font-size:1.5rem;font-weight:900;color:${showColor(lsr)};">${lsr}%</div>
              <div style="font-size:0.62rem;color:#94a3b8;margin-top:2px;">Show Rate</div>
            </div>
            <div style="text-align:center;background:#f8fafc;border-radius:10px;padding:12px 8px;">
              <div style="font-size:1.5rem;font-weight:900;color:#0f172a;">${lDrops.length}</div>
              <div style="font-size:0.62rem;color:#94a3b8;margin-top:2px;">Drops</div>
            </div>
          </div>
          ${infoRow(c.hier[0],l.t1)}
          ${l.t2?infoRow(c.hier[1]||'District',l.t2):''}
          ${infoRow('City',l.city+', '+l.state)}
          ${infoRow('Capacity',l.cap+' guests')}
          ${infoRow('Est.',l.yr)}
        </div>
        <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;overflow:hidden;">
          <div style="padding:14px 20px;border-bottom:1px solid #f1f5f9;font-size:0.85rem;font-weight:800;color:#0f172a;">Drops at this ${c.locLabel}</div>
          ${lDrops.length===0?`<div style="padding:24px 20px;color:#94a3b8;font-size:0.78rem;">No drops yet.</div>`:''}
          ${lDrops.map(d=>{
            const sr=pct(d.ci,d.res);
            return `<div style="padding:12px 20px;border-bottom:1px solid #f8fafc;display:flex;align-items:center;gap:12px;">
              <div style="flex:1;min-width:0;">
                <div style="font-size:0.82rem;font-weight:700;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${d.title}</div>
                <div style="display:flex;align-items:center;gap:6px;margin-top:4px;">
                  ${dropBadge(d.type)}
                  ${badge(d.status)}
                  ${d.timing?timingBadge(d.timing):''}
                  ${d.day?dayBadge(d.day):''}
                </div>
              </div>
              <div style="text-align:right;flex-shrink:0;">
                <div style="font-size:0.88rem;font-weight:900;color:${showColor(sr)};">${sr}%</div>
                <div style="font-size:0.65rem;color:#94a3b8;">${d.ci} / ${d.res}</div>
              </div>
            </div>`;
          }).join('')}

// ── ANALYTICS ─────────────────────────────────────────────────────────────────
function rAnalytics(){
  const c=cfg();
  const drops=c.drops;
  const locs=c.locations;
  const totalCi=drops.reduce((s,d)=>s+(d.ci||0),0);
  const totalRes=drops.reduce((s,d)=>s+(d.res||0),0);
  const avgSr=pct(totalCi,totalRes);
  const t1groups=[...new Set(locs.map(l=>l.t1))];
  const weeks=['Feb 3','Feb 10','Feb 17','Feb 24','Mar 3','Mar 10','Mar 17','Mar 24','Mar 31'];
  const ciData=[42,58,63,71,85,79,94,108,totalCi];
  const maxCi=Math.max(...ciData);
  return `<div style="padding:28px 32px;">
    <div style="font-size:1.3rem;font-weight:900;color:#0f172a;margin-bottom:6px;">Analytics</div>
    <div style="font-size:0.78rem;color:#64748b;margin-bottom:20px;">Last 30 days · All ${c.locsLabel.toLowerCase()}</div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;">
      ${kpi('Check-ins',fmtNum(totalCi),'total this period',c.color)}
      ${kpi('Reservations',fmtNum(totalRes),'total this period','#0f172a')}
      ${kpi('Show Rate',avgSr+'%','avg across all drops','#0f172a')}
      ${kpi('Peak Bookings','3–5 PM','most popular window','#0f172a')}
    </div>

    <div style="display:grid;grid-template-columns:2fr 1fr;gap:18px;margin-bottom:18px;">
      <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:18px 22px;">
        <div style="font-size:0.85rem;font-weight:800;color:#0f172a;margin-bottom:14px;">Weekly Check-ins</div>
        <div style="display:flex;align-items:flex-end;gap:8px;height:100px;">
          ${ciData.map((v,i)=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
            <div style="width:100%;background:${i===ciData.length-1?c.color:c.color+'70'};border-radius:4px 4px 0 0;height:${Math.round(v/maxCi*80)+8}px;transition:height 0.3s;"></div>
            <div style="font-size:0.55rem;color:#94a3b8;white-space:nowrap;">${weeks[i].split(' ')[1]}</div>
          </div>`).join('')}
        </div>
      </div>
      <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:18px 22px;">
        <div style="font-size:0.85rem;font-weight:800;color:#0f172a;margin-bottom:14px;">By Drop Type</div>
        ${c.dropTypes.map(t=>{
          const td=drops.filter(d=>d.type===t.id);
          const tci=td.reduce((s,d)=>s+(d.ci||0),0);
          const pctOfTotal=totalCi?Math.round(tci/totalCi*100):0;
          return `<div style="margin-bottom:9px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:3px;">
              <span style="font-size:0.73rem;color:#475569;">${t.icon} ${t.label}</span>
              <span style="font-size:0.73rem;font-weight:700;color:${t.c};">${pctOfTotal}%</span>
            </div>
            ${bar(pctOfTotal,t.c,6)}
          </div>`;
        }).join('')}
      </div>
    </div>

    <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;overflow:hidden;">
      <div style="padding:14px 20px;border-bottom:1px solid #f1f5f9;font-size:0.85rem;font-weight:800;color:#0f172a;">${c.hier[0]} Performance</div>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);">
        ${['#',c.hier[0],'Check-ins','Show Rate','Live Drops'].map((h,i)=>`<div style="padding:9px 14px;font-size:0.68rem;font-weight:700;color:#94a3b8;text-transform:uppercase;background:#f8fafc;border-bottom:1px solid #f1f5f9;${i>0?'text-align:center;':''}">${h}</div>`).join('')}
        ${t1groups.map((g,gi)=>{
          const gLocs=locs.filter(l=>l.t1===g);
          const gDrops=drops.filter(d=>gLocs.some(l=>l.id===d.locId));
          const gci=gDrops.reduce((s,d)=>s+(d.ci||0),0);
          const gres=gDrops.reduce((s,d)=>s+(d.res||0),0);
          const gsr=pct(gci,gres);
          const glive=gDrops.filter(d=>d.status==='live').length;
          return `<div style="padding:10px 14px;font-size:0.75rem;font-weight:700;color:#64748b;border-bottom:1px solid #f8fafc;">${gi+1}</div>
            <div style="padding:10px 14px;font-size:0.8rem;font-weight:700;color:#0f172a;border-bottom:1px solid #f8fafc;">${g}</div>
            <div style="padding:10px 14px;font-size:0.8rem;font-weight:700;color:${c.color};text-align:center;border-bottom:1px solid #f8fafc;">${gci}</div>
            <div style="padding:10px 14px;font-size:0.8rem;font-weight:700;color:${showColor(gsr)};text-align:center;border-bottom:1px solid #f8fafc;">${gsr}%</div>
            <div style="padding:10px 14px;font-size:0.8rem;font-weight:700;color:#0f172a;text-align:center;border-bottom:1px solid #f8fafc;">${glive}</div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

    </div>

    <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;overflow:hidden;margin-bottom:18px;">
      <div style="padding:14px 20px;border-bottom:1px solid #f1f5f9;font-size:0.85rem;font-weight:800;color:#0f172a;">Partner Directory</div>
      <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 100px;padding:8px 20px;border-bottom:1px solid #f1f5f9;background:#f8fafc;">
        ${['Partner','Type','Status','Co-Drops','Since'].map(h=>`<span style="font-size:0.68rem;font-weight:700;color:#94a3b8;text-transform:uppercase;">${h}</span>`).join('')}
      </div>
      ${partners.map(p=>`<div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 100px;padding:12px 20px;border-bottom:1px solid #f8fafc;align-items:center;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:34px;height:34px;border-radius:8px;background:${c.color}15;display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:900;color:${c.color};flex-shrink:0;">${p.name.split(' ').map(w=>w[0]).slice(0,2).join('')}</div>
          <div style="font-size:0.82rem;font-weight:700;color:#0f172a;">${p.name}</div>
        </div>
        <span style="display:inline-block;background:${typeBgs[p.type]||'#f1f5f9'};color:${typeColors[p.type]||'#475569'};font-size:0.65rem;font-weight:800;padding:2px 8px;border-radius:20px;">${p.type}</span>
        <span style="display:inline-block;background:${statusBg[p.status]};color:${statusColor[p.status]};font-size:0.65rem;font-weight:800;padding:2px 8px;border-radius:20px;">${p.status}</span>
        <div style="font-size:0.82rem;font-weight:700;color:${p.drops>0?c.color:'#94a3b8'};">${p.drops>0?p.drops+' drops':'—'}</div>
        <div style="font-size:0.72rem;color:#94a3b8;">${p.since}</div>
      </div>`).join('')}
    </div>

    ${active.length?`<div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:18px 20px;">
      <div style="font-size:0.85rem;font-weight:800;color:#0f172a;margin-bottom:14px;">How Partners Work on Nigh</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
        <div style="background:#f8fafc;border-radius:10px;padding:14px;">
          <div style="font-size:1.2rem;margin-bottom:6px;">🤝</div>
          <div style="font-size:0.78rem;font-weight:800;color:#0f172a;margin-bottom:4px;">Tag on Drops</div>
          <div style="font-size:0.72rem;color:#64748b;line-height:1.5;">Co-promote any drop by tagging a partner brand. Their audience sees it too.</div>
        </div>
        <div style="background:#f8fafc;border-radius:10px;padding:14px;">
          <div style="font-size:1.2rem;margin-bottom:6px;">📦</div>
          <div style="font-size:0.78rem;font-weight:800;color:#0f172a;margin-bottom:4px;">Include in Collections</div>
          <div style="font-size:0.72rem;color:#64748b;line-height:1.5;">Partners can contribute drops to your Collections bundles as 3rd-party orgs.</div>
        </div>
        <div style="background:#f8fafc;border-radius:10px;padding:14px;">
          <div style="font-size:1.2rem;margin-bottom:6px;">📊</div>
          <div style="font-size:0.78rem;font-weight:800;color:#0f172a;margin-bottom:4px;">Shared Analytics</div>
          <div style="font-size:0.72rem;color:#64748b;line-height:1.5;">Partners see engagement on co-branded drops. You own the guest data.</div>
        </div>
      </div>
    </div>`:''}
  </div>`;
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function pushModal(){
  const c=cfg();
  const step=S.pushStep||1;
  const types=c.dropTypes;
  const locs=c.locations;
  const steps=['Type','Location','Details','Confirm'];
  const progressBar=`<div style="display:flex;align-items:center;gap:0;margin-bottom:22px;">
    ${steps.map((s,i)=>`<div style="display:flex;align-items:center;flex:1;">
      <div style="display:flex;flex-direction:column;align-items:center;flex:1;">
        <div style="width:26px;height:26px;border-radius:50%;background:${i<step?c.color:i===step-1?c.color:'#e5e7eb'};color:${i<step||i===step-1?'#fff':'#94a3b8'};font-size:0.7rem;font-weight:800;display:flex;align-items:center;justify-content:center;">${i<step-1?'✓':i+1}</div>
        <div style="font-size:0.6rem;color:${i===step-1?c.color:'#94a3b8'};font-weight:${i===step-1?'700':'500'};margin-top:4px;">${s}</div>
      </div>
      ${i<steps.length-1?`<div style="height:2px;background:${i<step-1?c.color:'#e5e7eb'};flex:1;margin-bottom:16px;"></div>`:''}
    </div>`).join('')}
  </div>`;

  let body='';
  if(step===1){
    body=`<div style="font-size:0.85rem;font-weight:700;color:#0f172a;margin-bottom:12px;">Select Drop Type</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      ${types.map(t=>`<button onclick="ss({pushType:'${t.id}',pushStep:2})" style="padding:14px 12px;border-radius:12px;border:2px solid ${S.pushType===t.id?t.c:'#e5e7eb'};background:${S.pushType===t.id?t.bg:'#fff'};cursor:pointer;text-align:left;">
        <div style="font-size:1.3rem;margin-bottom:6px;">${t.icon}</div>
        <div style="font-size:0.78rem;font-weight:700;color:${t.c};">${t.label}</div>
      </button>`).join('')}
    </div>`;
  } else if(step===2){
    const selLoc=S.pushLoc?locs.find(l=>l.id===S.pushLoc):null;
    body=`<div style="font-size:0.85rem;font-weight:700;color:#0f172a;margin-bottom:12px;">Select ${c.locLabel}</div>
    <div style="max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;">
      ${locs.map(l=>`<button onclick="ss({pushLoc:'${l.id}'})" style="padding:10px 14px;border-radius:10px;border:2px solid ${S.pushLoc===l.id?c.color:'#e5e7eb'};background:${S.pushLoc===l.id?c.color+'10':'#fff'};cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div style="font-size:0.78rem;font-weight:700;color:#0f172a;">${l.name}</div>
          <div style="font-size:0.65rem;color:#94a3b8;">${l.t1}${l.t2?' · '+l.t2:''} · ${l.city}</div>
        </div>
        ${S.pushLoc===l.id?`<span style="color:${c.color};font-size:0.8rem;">&#10003;</span>`:''}
      </button>`).join('')}
    </div>`;
  } else if(step===3){
    const selType=types.find(t=>t.id===S.pushType)||types[0];
    body=`<div style="font-size:0.85rem;font-weight:700;color:#0f172a;margin-bottom:12px;">Drop Details</div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div>
        <label style="font-size:0.72rem;font-weight:700;color:#475569;display:block;margin-bottom:4px;">Drop Title</label>
        <input id="push-title" placeholder="e.g. Flash Sale — 30% Off Today" style="width:100%;padding:9px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:0.8rem;color:#0f172a;" />
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div>
          <label style="font-size:0.72rem;font-weight:700;color:#475569;display:block;margin-bottom:4px;">Capacity</label>
          <input type="number" placeholder="100" style="width:100%;padding:9px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:0.8rem;" />
        </div>
        <div>
          <label style="font-size:0.72rem;font-weight:700;color:#475569;display:block;margin-bottom:4px;">Booking Window</label>
          <select style="width:100%;padding:9px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:0.78rem;background:#fff;">
            ${[1,2,3,4,6,12,24].map(h=>`<option value="${h}" ${h===d.bh?'selected':''}>${h} hr</option>`).join('')}
          </select>
        </div>
      </div>
      <div>
        <label style="font-size:0.72rem;font-weight:700;color:#475569;display:block;margin-bottom:4px;">Geo-fence Tier</label>
        <select style="width:100%;padding:9px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:0.78rem;background:#fff;">
          ${Object.entries(c.geoTiers).map(([k,gt])=>`<option value="${k}">${gt.label}</option>`).join('')}
        </select>
      </div>
    </div>`;
  } else {
    const selType=types.find(t=>t.id===S.pushType)||types[0];
    const selLoc=locs.find(l=>l.id===S.pushLoc);
    body=`<div style="font-size:0.85rem;font-weight:700;color:#0f172a;margin-bottom:14px;">Confirm &amp; Push</div>
    <div style="background:#f8fafc;border-radius:12px;padding:14px 16px;margin-bottom:16px;">
      ${infoRow('Type',`${selType.icon} ${selType.label}`)}
      ${infoRow(c.locLabel,selLoc?selLoc.name:'—')}
      ${infoRow('Status','Goes live immediately')}
    </div>
    <div style="background:${c.color}12;border-radius:12px;padding:12px 16px;font-size:0.78rem;color:${c.color};font-weight:600;">Guests within the geo-fence will receive a push notification.</div>`;
  }

  return `<div style="position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:2000;display:flex;align-items:center;justify-content:center;" onclick="if(event.target===this)ss({showPush:false})">
    <div style="background:#fff;border-radius:18px;width:480px;max-height:85vh;overflow-y:auto;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.25);" onclick="event.stopPropagation()">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
        <div style="font-size:1rem;font-weight:900;color:#0f172a;">Push Drop</div>
        <button onclick="ss({showPush:false})" style="background:#f1f5f9;border:none;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:0.8rem;color:#64748b;">✕</button>
      </div>
      ${progressBar}
      ${body}
      <div style="display:flex;justify-content:space-between;margin-top:20px;">
        ${step>1?`<button onclick="ss({pushStep:${step-1}})" style="padding:9px 20px;border-radius:10px;border:1px solid #e5e7eb;background:#fff;color:#475569;font-weight:700;font-size:0.78rem;cursor:pointer;">&larr; Back</button>`:'<div></div>'}
        ${step<4?`<button onclick="ss({pushStep:${step+1}})" style="padding:9px 22px;border-radius:10px;background:${c.color};color:#fff;border:none;font-weight:700;font-size:0.78rem;cursor:pointer;">Next &rarr;</button>`:`<button onclick="ss({showPush:false})" style="padding:9px 22px;border-radius:10px;background:${c.color};color:#fff;border:none;font-weight:700;font-size:0.78rem;cursor:pointer;">&#128640; Push Drop</button>`}
      </div>
    </div>
  </div>`;
}

function newCollModal(){
  const c=cfg();
  const step=S.collStep||1;
  const triggers=['First visit','After check-in','After reservation','Manual enrollment'];
  const steps=['Trigger','Sequence','Launch'];
  const progressBar=`<div style="display:flex;align-items:center;gap:0;margin-bottom:20px;">
    ${steps.map((s,i)=>`<div style="display:flex;align-items:center;flex:1;">
      <div style="display:flex;flex-direction:column;align-items:center;flex:1;">
        <div style="width:24px;height:24px;border-radius:50%;background:${i<step?c.color:i===step-1?c.color:'#e5e7eb'};color:${i<step||i===step-1?'#fff':'#94a3b8'};font-size:0.65rem;font-weight:800;display:flex;align-items:center;justify-content:center;">${i<step-1?'✓':i+1}</div>
        <div style="font-size:0.6rem;color:${i===step-1?c.color:'#94a3b8'};font-weight:${i===step-1?'700':'500'};margin-top:3px;">${s}</div>
      </div>
      ${i<steps.length-1?`<div style="height:2px;background:${i<step-1?c.color:'#e5e7eb'};flex:1;margin-bottom:14px;"></div>`:''}
    </div>`).join('')}
  </div>`;

  let body='';
  if(step===1){
    body=`<div>
      <label style="font-size:0.72rem;font-weight:700;color:#475569;display:block;margin-bottom:6px;">Collection Name</label>
      <input placeholder="e.g. VIP Loyalty Track" style="width:100%;padding:9px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:0.8rem;margin-bottom:14px;" />
      <label style="font-size:0.72rem;font-weight:700;color:#475569;display:block;margin-bottom:6px;">Enrollment Trigger</label>
      <div style="display:flex;flex-direction:column;gap:6px;">
        ${triggers.map((t,i)=>`<label style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid #e5e7eb;border-radius:10px;cursor:pointer;">
          <input type="radio" name="coll-trigger" ${i===0?'checked':''} style="accent-color:${c.color};">
          <span style="font-size:0.78rem;font-weight:600;color:#0f172a;">${t}</span>
        </label>`).join('')}
      </div>
    </div>`;
  } else if(step===2){
    body=`<div>
      <div style="font-size:0.82rem;font-weight:700;color:#0f172a;margin-bottom:12px;">Drop Sequence (up to 5)</div>
      ${[1,2,3].map(i=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#f8fafc;border-radius:10px;margin-bottom:8px;">
        <div style="width:22px;height:22px;border-radius:50%;background:${c.color};color:#fff;font-size:0.65rem;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${i}</div>
        <input placeholder="Drop ${i} title…" style="flex:1;padding:6px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:0.75rem;" />
        <select style="padding:6px 8px;border:1px solid #e5e7eb;border-radius:8px;font-size:0.72rem;background:#fff;">
          ${c.dropTypes.map(t=>`<option>${t.icon} ${t.label}</option>`).join('')}
        </select>
      </div>`).join('')}
      <button style="width:100%;padding:8px;border:1px dashed #e5e7eb;border-radius:10px;background:transparent;color:#94a3b8;font-size:0.75rem;font-weight:600;cursor:pointer;">+ Add Drop</button>
    </div>`;
  } else {
    body=`<div>
      <div style="font-size:0.82rem;font-weight:700;color:#0f172a;margin-bottom:12px;">Ready to Launch</div>
      <div style="background:#f8fafc;border-radius:12px;padding:14px 16px;margin-bottom:14px;">
        ${infoRow('Drops in Sequence','3')}
        ${infoRow('Trigger','First visit')}
        ${infoRow('Status','Activate now')}
      </div>
      <div style="background:${c.color}12;border-radius:12px;padding:12px 16px;font-size:0.78rem;color:${c.color};font-weight:600;">Guests will automatically enroll on their first visit to any ${c.locLabel.toLowerCase()}.</div>
    </div>`;
  }

  return `<div style="position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:2000;display:flex;align-items:center;justify-content:center;" onclick="if(event.target===this)ss({showNewColl:false})">
    <div style="background:#fff;border-radius:18px;width:460px;max-height:82vh;overflow-y:auto;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.25);" onclick="event.stopPropagation()">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div style="font-size:1rem;font-weight:900;color:#0f172a;">New Collection</div>
        <button onclick="ss({showNewColl:false})" style="background:#f1f5f9;border:none;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:0.8rem;color:#64748b;">✕</button>
      </div>
      ${progressBar}
      ${body}
      <div style="display:flex;justify-content:space-between;margin-top:20px;">
        ${step>1?`<button onclick="ss({collStep:${step-1}})" style="padding:9px 20px;border-radius:10px;border:1px solid #e5e7eb;background:#fff;color:#475569;font-weight:700;font-size:0.78rem;cursor:pointer;">&larr; Back</button>`:'<div></div>'}
        ${step<3?`<button onclick="ss({collStep:${step+1}})" style="padding:9px 22px;border-radius:10px;background:${c.color};color:#fff;border:none;font-weight:700;font-size:0.78rem;cursor:pointer;">Next &rarr;</button>`:`<button onclick="ss({showNewColl:false})" style="padding:9px 22px;border-radius:10px;background:${c.color};color:#fff;border:none;font-weight:700;font-size:0.78rem;cursor:pointer;">&#128640; Launch</button>`}
      </div>
    </div>
  </div>`;
}

function render(){ document.getElementById('app').innerHTML = layout(); }
render();
</script>
