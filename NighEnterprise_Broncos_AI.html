  const map={active:'background:#dcfce7;color:#16a34a',inactive:'background:#fee2e2;color:#dc2626',live:'background:#dbeafe;color:#1d4ed8',upcoming:'background:#fef3c7;color:#d97706',ended:'background:#f1f5f9;color:#94a3b8',confirmed:'background:#dcfce7;color:#16a34a',pending:'background:#fef3c7;color:#d97706'};

  if(type==='broncos-owned') return `<span style="background:#fff3ec;color:#c2410c;font-size:0.65rem;font-weight:800;padding:2px 8px;border-radius:20px;border:1px solid #fed7aa;white-space:nowrap;">🐴 Broncos</span>`;

}

}

}

function renderPage(){
  if(S.locationDetail){ return locationDetail(S.locationDetail); }
  if(S.collectionDetail){ return collectionDetailPanel(S.collectionDetail); }
  switch(S.page){
    case 'dashboard':   return rDashboard();
    case 'locations':   return rLocations();
    case 'drops':       return rDrops();
    case 'collections': return rCollections();
    case 'customers':   return rCustomers();
    case 'analytics':   return rAnalytics();
    case 'users':       return rUsers();
    case 'billing':     return rBilling();
    case 'settings':    return rSettings();
    default:            return rDashboard();
  }
}

function kpi(label,val,sub,color){
  return `<div style="background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:18px 20px;">
    <div style="font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#94a3b8;margin-bottom:6px;">${label}</div>
    <div style="font-size:1.55rem;font-weight:900;color:${color||'#0f172a'};">${val}</div>
    ${sub?`<div style="font-size:0.72rem;color:#64748b;margin-top:4px;">${sub}</div>`:''}

}
function statusBar(label,val,total,color){
  const p=pct(val,total);
  return `<div style="margin-bottom:10px;">
    <div style="display:flex;justify-content:space-between;font-size:0.72rem;margin-bottom:4px;"><span style="color:#475569;font-weight:600;">${label}</span><span style="font-weight:800;">${val} <span style="color:#94a3b8;font-weight:400;">/ ${total}</span></span></div>
    <div style="height:6px;border-radius:4px;background:#f1f5f9;"><div style="height:100%;width:${p}%;background:${color};border-radius:4px;"></div></div>
  </div>`;
}
function miniStat(l,v,c){ return `<div style="background:#f8f9fb;border-radius:10px;padding:12px 14px;"><div style="font-size:0.62rem;color:#94a3b8;margin-bottom:4px;">${l}</div><div style="font-weight:900;font-size:1rem;color:${c||'#0f172a'};">${v}</div></div>`; }

    <!-- Top locations + live drops -->

  return `

      <select onchange="ss({zoneFilter:this.value})" style="border:1px solid #e5e7eb;border-radius:8px;padding:7px 28px 7px 10px;font-size:0.78rem;font-weight:600;background:#fff;cursor:pointer;">

function rLocByZone(){
  return ZONES.map(z=>{

    return `
      <div style="margin-bottom:24px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
          <div style="width:10px;height:10px;border-radius:50%;background:${z.color};flex-shrink:0;"></div>

        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;">
          ${ls.map(l=>locationCard(l)).join('')}

function rLocByLocation(){
  const ls = filteredLocations();
  return `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;">
      ${ls.map(l=>locationCard(l)).join('')}

}

function rDrops(){
  const tabs=['all','pre-game','in-game','post-game','ended'];

function rAnalytics(){
  const drops=CORP_DROPS.filter(d=>d.status!=='draft');
  const sorted=[...drops].sort((a,b)=>(b.checkins||0)-(a.checkins||0));
  const zoneStats=ZONES.map(z=>{
    const zDrops=drops.filter(d=>d.scope===z.name||d.scope==='All Zones');
    const totalCI=zDrops.reduce((s,d)=>s+(d.checkins||0),0);
    const totalRes=zDrops.reduce((s,d)=>s+(d.res||0),0);
    return {...z,dropCount:zDrops.length,checkins:totalCI,res:totalRes,conv:totalRes>0?Math.round(totalCI/totalRes*100):0};
  }).sort((a,b)=>b.checkins-a.checkins);
  return `<div style="padding:28px 32px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;">
      <div>
        <div style="font-size:1.3rem;font-weight:800;color:#0f172a;">Analytics</div>
        <div style="font-size:0.82rem;color:#64748b;margin-top:2px;">Season &middot; ${drops.length} active drops &middot; ${fmtNum(drops.reduce((s,d)=>s+(d.checkins||0),0))} total check-ins</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button onclick="ss({hierarchyView:'zone'})" style="padding:8px 16px;border-radius:8px;border:none;font-weight:700;font-size:0.78rem;cursor:pointer;background:${S.hierarchyView==='zone'?'#FB4F14':'#f1f5f9'};color:${S.hierarchyView==='zone'?'#fff':'#475569'};">By Zone</button>
        <button onclick="ss({hierarchyView:'location'})" style="padding:8px 16px;border-radius:8px;border:none;font-weight:700;font-size:0.78rem;cursor:pointer;background:${S.hierarchyView==='location'?'#FB4F14':'#f1f5f9'};color:${S.hierarchyView==='location'?'#fff':'#475569'};">By Drop</button>
      </div>
    </div>
    ${S.hierarchyView==='zone'?rAnalyticsByZone(zoneStats,sorted):`
    <div style="display:grid;grid-template-columns:1fr 280px;gap:20px;">
      <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;overflow:hidden;">
        <div style="padding:14px 18px;background:#f8f9fb;border-bottom:1px solid #e5e7eb;display:grid;grid-template-columns:2fr 1fr 1fr 1fr 80px 80px;gap:8px;">
          ${['Drop','Timing','Scope','Type','Check-ins','Conv %'].map(h=>`<div style="font-size:0.7rem;font-weight:700;color:#64748b;text-transform:uppercase;">${h}</div>`).join('')}
        </div>
        ${sorted.map((d,i)=>{
          const conv=d.res>0?pct(d.checkins,d.res):0;
          return `<div style="padding:12px 18px;border-bottom:1px solid #f1f5f9;background:${i%2?'#fafafa':'#fff'};display:grid;grid-template-columns:2fr 1fr 1fr 1fr 80px 80px;gap:8px;align-items:center;">
            <div>
              <div style="font-weight:700;font-size:0.82rem;color:#0f172a;">${d.title}</div>
              <div style="font-size:0.7rem;color:#64748b;margin-top:2px;">${d.checkins} check-ins &middot; ${d.res} reserved</div>
            </div>
            <div>${timingBadge(d.timing)}</div>
            <div style="font-size:0.75rem;color:#475569;">${d.scope}</div>

  </div>`;
}

          <div style="font-weight:700;font-size:0.82rem;">${inv.desc}</div>
          <div style="font-size:0.72rem;color:#64748b;margin-top:2px;">${inv.date}</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="font-weight:800;font-size:0.9rem;">${fmtMoney(inv.amt)}</div>
          <span style="background:#dcfce7;color:#16a34a;font-size:0.7rem;font-weight:700;padding:3px 8px;border-radius:20px;">${inv.status}</span>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
}

// ── SETTINGS ───────────────────────────────────────────────────────────────
function rSettings(){
  function sCard(title,content){
    return `<div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:20px 24px;margin-bottom:16px;">
      <div style="font-size:0.9rem;font-weight:800;color:#0f172a;margin-bottom:14px;">${title}</div>
      ${content}
    </div>`;
  }
  function sRow(label,val,sub){
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f1f5f9;">
      <div><div style="font-size:0.82rem;font-weight:600;color:#0f172a;">${label}</div>${sub?`<div style="font-size:0.7rem;color:#94a3b8;margin-top:1px;">${sub}</div>`:''}</div>
      <div style="font-size:0.82rem;font-weight:700;color:#475569;">${val}</div>
    </div>`;
  }
  return `<div style="padding:28px 32px;">
    <div style="font-size:1.3rem;font-weight:800;color:#0f172a;margin-bottom:22px;">Settings</div>
    ${sCard('Venue Settings',
      sRow('Venue Name','Denver Broncos')+
      sRow('Stadium','Empower Field at Mile High')+
      sRow('Capacity','76,125 seats')+
      sRow('Primary Color','<span style="display:inline-flex;align-items:center;gap:6px;"><span style="width:14px;height:14px;border-radius:3px;background:#FB4F14;display:inline-block;"></span>#FB4F14 Broncos Orange</span>')+
      sRow('Secondary Color','<span style="display:inline-flex;align-items:center;gap:6px;"><span style="width:14px;height:14px;border-radius:3px;background:#002244;display:inline-block;"></span>#002244 Navy Blue</span>')+
      sRow('Timezone','Mountain Time (MT)')
    )}
    ${sCard('Drop Policies',
      sRow('Max Simultaneous Drops','10 per zone','Across all game timing windows')+
      sRow('Min Geo-Fence Radius','~100 ft (Concession tier)','Tightest pinpoint accuracy')+
      sRow('Default Broadcast Window','3 hours','Adjustable per drop')+
      sRow('Auto-expire after game','Enabled','Drops auto-close post-game +2 hrs')+
      sRow('Sponsor drop approval','Required','All partner drops need venue review')
    )}
    ${sCard('Hierarchy: Team &rarr; Venue &rarr; Zone &rarr; Location',`
      <div style="display:flex;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;margin-bottom:10px;">
        ${['Denver Broncos (Team)','Empower Field (Venue)','7 Zones','20 Locations'].map((l,i)=>`<div style="flex:1;padding:10px 12px;background:${i%2?'#f8f9fb':'#fff'};border-right:1px solid #e5e7eb;text-align:center;">
          <div style="font-size:0.68rem;font-weight:800;color:#64748b;text-transform:uppercase;">${['Level 1','Level 2','Level 3','Level 4'][i]}</div>
          <div style="font-size:0.78rem;font-weight:700;color:#0f172a;margin-top:3px;">${l}</div>
        </div>`).join('')}
      </div>
    `)}
    ${sCard('Geo-Fence Tiers',
      Object.entries(GEO_TIERS).map(([k,v])=>sRow(v.short,v.label)).join('')
    )}
    ${sCard('Game Timing Windows',
      Object.entries(GAME_TIMING).map(([k,v])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f1f5f9;">
        <div style="display:flex;align-items:center;gap:8px;">
          ${timingBadge(k)}
          <span style="font-size:0.78rem;color:#475569;">${v.label}</span>
        </div>
        <div style="width:10px;height:10px;border-radius:50%;background:${v.color};"></div>
      </div>`).join('')
    )}
    ${sCard('Alerts &amp; Notifications',
      sRow('Check-in spike alerts','Enabled','Notify when zone check-ins +30% in 15 min')+
      sRow('Capacity warnings','Enabled','Alert at 85% and 95% of drop cap')+
      sRow('Game timing reminders','Enabled','15 min before each timing window')+
      sRow('Partner drop pending','Enabled','New sponsor drops awaiting approval')
    )}
  </div>`;
}

// ── NEW COLLECTION MODAL ────────────────────────────────────────────────────
function newCollModal(){
  const step=S.newCollStep||1;
  const steps=['Details','Geo-Fence','Review'];
  return `<div style="position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:1000;display:flex;align-items:center;justify-content:center;" onclick="if(event.target===this)ss({showNewColl:false,newCollStep:1})">
    <div style="background:#fff;border-radius:18px;width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.25);" onclick="event.stopPropagation()">
      <div style="background:linear-gradient(135deg,#002244 0%,#FB4F14 100%);padding:20px 24px;border-radius:18px 18px 0 0;">
        <div style="color:#fff;font-size:1.1rem;font-weight:800;">New Collection</div>
        <div style="display:flex;gap:6px;margin-top:14px;">
          ${steps.map((s,i)=>`<div style="flex:1;">
            <div style="height:4px;border-radius:2px;background:${i+1<=step?'#fff':'rgba(255,255,255,0.3)'};margin-bottom:5px;"></div>
            <div style="font-size:0.65rem;font-weight:700;color:${i+1<=step?'#fff':'rgba(255,255,255,0.5)'};">Step ${i+1}: ${s}</div>
          </div>`).join('')}
        </div>
      </div>
      <div style="padding:24px;">
        ${step===1?`
          <div style="margin-bottom:16px;">
            <label style="font-size:0.78rem;font-weight:700;color:#0f172a;display:block;margin-bottom:6px;">Collection Name</label>
            <input placeholder="e.g. Game Day Specials Week 14" style="width:100%;border:1px solid #e5e7eb;border-radius:8px;padding:10px 12px;font-size:0.85rem;box-sizing:border-box;">
          </div>
          <div style="margin-bottom:16px;">
            <label style="font-size:0.78rem;font-weight:700;color:#0f172a;display:block;margin-bottom:6px;">Collection Type</label>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
              ${[{v:'venue',l:'Venue-Wide',s:'All zones and partner drops',e:'&#127967;'},{v:'zone',l:'Zone-Specific',s:'Single zone collection',e:'&#128506;'}].map(t=>`<div style="border:2px solid ${S.newCollType===t.v?'#FB4F14':'#e5e7eb'};border-radius:10px;padding:12px;cursor:pointer;background:${S.newCollType===t.v?'#fff8f5':'#fff'};" onclick="ss({newCollType:'${t.v}'})">
                <div style="font-size:1.2rem;">${t.e}</div>
                <div style="font-weight:700;font-size:0.82rem;margin-top:4px;">${t.l}</div>
                <div style="font-size:0.7rem;color:#64748b;">${t.s}</div>
              </div>`).join('')}
            </div>
          </div>
          <div style="margin-bottom:16px;">
            <label style="font-size:0.78rem;font-weight:700;color:#0f172a;display:block;margin-bottom:6px;">Game Timing Window</label>
            <div style="display:flex;flex-direction:column;gap:8px;">
              ${Object.entries(GAME_TIMING).map(([k,v])=>`<label style="display:flex;align-items:center;gap:10px;border:2px solid ${S.newCollTiming===k?v.color:'#e5e7eb'};border-radius:8px;padding:10px 12px;cursor:pointer;background:${S.newCollTiming===k?v.color+'10':'#fff'};">
                <input type="radio" name="collTiming" ${S.newCollTiming===k?'checked':''} onclick="ss({newCollTiming:'${k}'})">
                ${timingBadge(k)}
                <span style="font-size:0.78rem;color:#475569;">${v.label}</span>
              </label>`).join('')}
            </div>
          </div>
        `:''}
        ${step===2?`
          <div style="margin-bottom:16px;">
            <label style="font-size:0.78rem;font-weight:700;color:#0f172a;display:block;margin-bottom:6px;">Geo-Fence Tier</label>
            <div style="display:flex;flex-direction:column;gap:8px;">
              ${Object.entries(GEO_TIERS).map(([k,v])=>`<label style="display:flex;align-items:center;gap:10px;border:2px solid ${S.newCollGeo===k?'#FB4F14':'#e5e7eb'};border-radius:8px;padding:10px 12px;cursor:pointer;background:${S.newCollGeo===k?'#fff8f5':'#fff'};">
                <input type="radio" name="collGeo" ${S.newCollGeo===k?'checked':''} onclick="ss({newCollGeo:'${k}'})">
                <div>
                  <div style="font-weight:700;font-size:0.82rem;color:#0f172a;">${v.short}</div>
                  <div style="font-size:0.7rem;color:#64748b;">${v.label}</div>
                </div>
              </label>`).join('')}
            </div>
          </div>
        `:''}
        ${step===3?`
          <div style="background:#f8f9fb;border-radius:10px;padding:16px;margin-bottom:16px;">
            <div style="font-weight:800;font-size:0.85rem;color:#0f172a;margin-bottom:10px;">Collection Summary</div>
            ${infoRow('Type',S.newCollType==='venue'?'Venue-Wide':'Zone-Specific')}
            ${infoRow('Game Timing',S.newCollTiming?GAME_TIMING[S.newCollTiming].short:'Not set')}
            ${infoRow('Geo-Fence',S.newCollGeo?GEO_TIERS[S.newCollGeo].short:'Not set')}
          </div>
          <div style="background:#fff3ec;border:1px solid #fed7aa;border-radius:10px;padding:12px 14px;font-size:0.78rem;color:#9a3412;">
            This collection will be active for the selected game timing window and geo-fence range. Drops can be added after creation.
          </div>
        `:''}
        <div style="display:flex;gap:10px;margin-top:20px;">
          ${step>1?`<button onclick="ss({newCollStep:${step-1}})" style="flex:1;background:#f1f5f9;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;color:#475569;">Back</button>`:''}
          ${step<3?`<button onclick="ss({newCollStep:${step+1}})" style="flex:2;background:#FB4F14;color:#fff;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;">Next: ${steps[step]}</button>`:`<button onclick="ss({showNewColl:false,newCollStep:1})" style="flex:2;background:#002244;color:#fff;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;">Create Collection</button>`}
          <button onclick="ss({showNewColl:false,newCollStep:1})" style="flex:1;background:#f1f5f9;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;color:#94a3b8;">Cancel</button>
        </div>
      </div>
    </div>
  </div>`;
}

// ── PUSH MODAL ──────────────────────────────────────────────────────────────
function pushModal(){
  const step=S.pushStep||1;
  return `<div style="position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:1000;display:flex;align-items:center;justify-content:center;" onclick="if(event.target===this)ss({showPush:false,pushStep:1})">
    <div style="background:#fff;border-radius:18px;width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.25);" onclick="event.stopPropagation()">
      <div style="background:#FB4F14;padding:20px 24px;border-radius:18px 18px 0 0;display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="color:#fff;font-size:1.1rem;font-weight:800;">Create Drop</div>
          <div style="color:rgba(255,255,255,0.8);font-size:0.78rem;margin-top:2px;">Step ${step} of 3</div>
        </div>
        <button onclick="ss({showPush:false,pushStep:1})" style="background:rgba(255,255,255,0.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:1rem;">X</button>
      </div>
      <div style="padding:24px;">
        ${step===1?pushStep1():step===2?pushStep2():pushStep3()}
        <div style="display:flex;gap:10px;margin-top:20px;">
          ${step>1?`<button onclick="ss({pushStep:${step-1}})" style="flex:1;background:#f1f5f9;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;color:#475569;">Back</button>`:''}
          ${step<3?`<button onclick="ss({pushStep:${step+1}})" style="flex:2;background:#FB4F14;color:#fff;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;">Next</button>`:`<button onclick="ss({showPush:false,pushStep:1})" style="flex:2;background:#002244;color:#fff;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;">Send Push</button>`}
          ${step===1?`<button onclick="ss({showPush:false,pushStep:1})" style="flex:1;background:#f1f5f9;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:0.82rem;cursor:pointer;color:#94a3b8;">Cancel</button>`:''}
        </div>
      </div>
    </div>
  </div>`;
}

function pushStep1(){
  return `<div>
    <div style="font-size:0.85rem;font-weight:800;color:#0f172a;margin-bottom:12px;">Select a Drop to Push</div>
    <div style="display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto;">
      ${CORP_DROPS.filter(d=>d.status==='live').map(d=>`<div style="border:2px solid ${S.pushDrop===d.id?'#FB4F14':'#e5e7eb'};border-radius:10px;padding:12px 14px;cursor:pointer;background:${S.pushDrop===d.id?'#fff8f5':'#fff'};" onclick="ss({pushDrop:'${d.id}'})">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div style="font-weight:700;font-size:0.82rem;color:#0f172a;">${d.title}</div>
          ${timingBadge(d.timing)}
        </div>
        <div style="font-size:0.7rem;color:#64748b;margin-top:4px;">${d.scope} &middot; ${d.checkins} check-ins so far</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function pushStep2(){
  const scopes=['All Zones','Field Level','Club Level','Lower Concourse','Upper Concourse','Suite Level','Plaza &amp; Entry'];
  return `<div>
    <div style="font-size:0.85rem;font-weight:800;color:#0f172a;margin-bottom:4px;">Notification Scope</div>
    <div style="font-size:0.75rem;color:#64748b;margin-bottom:12px;">Which fans receive this push notification?</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;">
      ${scopes.map(sc=>`<div onclick="ss({pushScope:'${sc}'})" style="padding:8px 14px;border-radius:20px;border:2px solid ${S.pushScope===sc?'#FB4F14':'#e5e7eb'};background:${S.pushScope===sc?'#fff8f5':'#fff'};font-size:0.78rem;font-weight:700;cursor:pointer;color:${S.pushScope===sc?'#FB4F14':'#475569'};">${sc}</div>`).join('')}
    </div>
    <div style="font-size:0.85rem;font-weight:800;color:#0f172a;margin-bottom:8px;">Game Timing</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${Object.entries(GAME_TIMING).map(([k,v])=>`<label style="display:flex;align-items:center;gap:10px;border:2px solid ${S.pushTiming===k?v.color:'#e5e7eb'};border-radius:8px;padding:9px 12px;cursor:pointer;background:${S.pushTiming===k?v.color+'10':'#fff'};">
        <input type="radio" name="pushTiming" ${S.pushTiming===k?'checked':''} onclick="ss({pushTiming:'${k}'})">
        ${timingBadge(k)}
        <span style="font-size:0.75rem;color:#475569;">${v.label}</span>
      </label>`).join('')}
    </div>
  </div>`;
}

function pushStep3(){
  const drop=CORP_DROPS.find(d=>d.id===S.pushDrop);
  return `<div>
    <div style="font-size:0.85rem;font-weight:800;color:#0f172a;margin-bottom:12px;">Preview &amp; Confirm</div>
    <div style="background:#0f172a;border-radius:16px;padding:16px;margin-bottom:16px;">
      <div style="background:#1e293b;border-radius:12px;padding:16px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <div style="width:36px;height:36px;border-radius:8px;background:#FB4F14;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:0.9rem;">DEN</div>
          <div>
            <div style="color:#fff;font-size:0.78rem;font-weight:700;">Denver Broncos &middot; Nigh</div>
            <div style="color:#94a3b8;font-size:0.7rem;">now</div>
          </div>
        </div>
        <div style="color:#fff;font-weight:800;font-size:0.88rem;margin-bottom:4px;">${drop?drop.title:'Drop Selected'}</div>
        <div style="color:#cbd5e1;font-size:0.78rem;">${S.pushScope||'All Zones'} &middot; Tap to redeem</div>
      </div>
    </div>
    <div style="background:#f8f9fb;border-radius:10px;padding:14px 16px;">
      ${infoRow('Drop',drop?drop.title:'Not selected')}
      ${infoRow('Scope',S.pushScope||'Not set')}
      ${infoRow('Timing',S.pushTiming?GAME_TIMING[S.pushTiming].short:'Not set')}
      ${infoRow('Est. Reach','~'+(S.pushScope==='All Zones'?'76,000':S.pushScope==='Suite Level'?'4,200':S.pushScope==='Field Level'?'3,800':'12,000')+' fans')}
    </div>
  </div>`;
}

// ── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('app').innerHTML=`
    ${layout()}
    ${S.showNewColl?newCollModal():''}
    ${S.showPush?pushModal():''}
  `;
}

window.ss=function(patch){Object.assign(S,patch);render();};
window.go=function(page){S.page=page;render();};
window.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
