<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Nigh · Drops &amp; Flows Concept</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;overflow:hidden;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}
select,button,input{font-family:inherit;}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';

const COLOR='#003082', ACCENT='#FFE000', GRAD='linear-gradient(180deg,#001040 0%,#003082 100%)';

const DROP_TYPES=[
  {id:'flash-sale',    label:'Flash Sale',      icon:'&#9889;', bg:'#fef3c7',c:'#92400e'},
  {id:'product-launch',label:'Product Launch',  icon:'&#128230;',bg:'#eff6ff',c:'#1d4ed8'},
  {id:'event',         label:'In-Store Event',  icon:'&#127919;',bg:'#f3e8ff',c:'#5b21b6'},
  {id:'vip-member',    label:'VIP Member Drop', icon:'&#11088;', bg:'#fef9c3',c:'#713f12'},
];

const DROPS=[
  {id:'D01',title:'Flash Sale — Apple Products 30% Off',   type:'flash-sale',    status:'live',      locName:'Denver Tech Center',region:'West',  cap:200,res:183,ci:165,sr:90,bh:4},
  {id:'D02',title:'Samsung Galaxy S25 Launch Event',        type:'product-launch',status:'live',      locName:'Chicago Michigan',   region:'Central',cap:150,res:141,ci:128,sr:91,bh:6},
  {id:'D03',title:'Totaltech VIP Early Access Drop',        type:'vip-member',    status:'live',      locName:'NYC Fifth Ave',       region:'East',   cap:80, res:80, ci:72, sr:90,bh:3},
  {id:'D04',title:'In-Store Gaming Tournament',             type:'event',         status:'live',      locName:'Minneapolis Lake St', region:'Central',cap:100,res:88, ci:79, sr:90,bh:5},
  {id:'D05',title:'Smart TV Flash Sale — All Sizes',        type:'flash-sale',    status:'live',      locName:'Richfield HQ Store',  region:'Central',cap:180,res:162,ci:148,sr:91,bh:3},
  {id:'D06',title:'PlayStation 5 Pro Bundle Launch',        type:'product-launch',status:'scheduled', locName:'Phoenix Mesa',        region:'West',   cap:120,res:74, ci:0,  sr:0, bh:4},
  {id:'D07',title:'Totaltech Member Laptop Trade-In',       type:'vip-member',    status:'live',      locName:'Boston Fenway',       region:'East',   cap:60, res:57, ci:51, sr:89,bh:3},
  {id:'D08',title:'Smart Home Demo Day',                    type:'event',         status:'scheduled', locName:'Miami Brickell',      region:'East',   cap:90, res:55, ci:0,  sr:0, bh:5},
  {id:'D09',title:'Beat the Weekend Flash Sale',            type:'flash-sale',    status:'ended',     locName:'Las Vegas Blvd',      region:'West',   cap:240,res:240,ci:218,sr:91,bh:4},
  {id:'D10',title:'Geek Squad VIP Member Event',            type:'vip-member',    status:'ended',     locName:'Houston Galleria',    region:'Central',cap:70, res:66, ci:59, sr:89,bh:3},
];

const FLOWS=[
  {id:'F01',name:'New Member Welcome',    icon:'&#127381;',desc:'3-drop onboarding sequence triggered on first visit',       drops:3,enrolled:412,ci:374,status:'active', trigger:'First visit to any store',    lastEdit:'2d ago'},
  {id:'F02',name:'Totaltech VIP Track',   icon:'&#11088;', desc:'Exclusive drops for Totaltech members — early access & perks',drops:4,enrolled:189,ci:171,status:'active', trigger:'Totaltech membership scan',   lastEdit:'5d ago'},
  {id:'F03',name:'Lapsed Member Win-Back',icon:'&#128257;',desc:'Re-engage guests with 30+ days since last check-in',          drops:2,enrolled:203,ci:141,status:'active', trigger:'30 days since last check-in', lastEdit:'1w ago'},
  {id:'F04',name:'Launch Hype Sequence',  icon:'&#128640;',desc:'Build excitement before a major product launch event',        drops:3,enrolled:0,  ci:0,  status:'draft',  trigger:'Manual enrollment',          lastEdit:'Just now'},
  {id:'F05',name:'Weekend Flash Series',  icon:'&#9889;',  desc:'Friday–Sunday flash sale cadence across West region',         drops:3,enrolled:318,ci:287,status:'paused', trigger:'Friday check-in at West store',lastEdit:'3d ago'},
];

const S={tab:'drops',dropType:null,dropStatus:null,dropDetail:null,flowDetail:null,showPushModal:false,pushStep:1,pushType:null,pushLoc:null,showFlowModal:false,flowStep:1};
function ss(p){Object.assign(S,p);render();}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function pct(a,b){return b>0?Math.round(a/b*100):0;}
function fmtNum(n){return n>=1000?(n/1000).toFixed(1)+'K':String(n);}
function showColor(p){return p>=80?'#16a34a':p>=60?'#ca8a04':'#dc2626';}
function bar(p,color,h){h=h||6;return `<div style="background:#f1f5f9;border-radius:4px;height:${h}px;overflow:hidden;"><div style="background:${color};height:100%;width:${Math.min(p,100)}%;border-radius:4px;"></div></div>`;}
function infoRow(l,v){return `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f1f5f9;"><span style="font-size:0.78rem;color:#64748b;">${l}</span><span style="font-size:0.78rem;font-weight:700;color:#0f172a;">${v}</span></div>`;}

function badge(status){
  const m={live:'#dcfce7:#16a34a:Live',scheduled:'#fef9c3:#854d0e:Scheduled',draft:'#f1f5f9:#64748b:Draft',ended:'#fee2e2:#b91c1c:Ended',active:'#dcfce7:#16a34a:Active',paused:'#fef9c3:#854d0e:Paused'};
  const [bg,c,l]=(m[status]||'#f1f5f9:#64748b:—').split(':');
  return `<span style="background:${bg};color:${c};font-size:0.65rem;font-weight:700;padding:3px 8px;border-radius:20px;">${l}</span>`;
}
function dropTypeBadge(id){
  const t=DROP_TYPES.find(x=>x.id===id)||{label:id,icon:'•',bg:'#f1f5f9',c:'#475569'};
  return `<span style="background:${t.bg};color:${t.c};font-size:0.65rem;font-weight:800;padding:3px 8px;border-radius:20px;">${t.icon} ${t.label}</span>`;
}

// ── SIDEBAR ──────────────────────────────────────────────────────────────────
function nighBug(sz){sz=sz||22;return `<svg viewBox="0 0 100 100" width="${sz}" height="${sz}" xmlns="http://www.w3.org/2000/svg"><ellipse cx="50" cy="50" rx="46" ry="46" fill="#0E4EF5"/><ellipse cx="50" cy="50" rx="30" ry="38" fill="#fff"/><circle cx="50" cy="36" r="10" fill="#0E4EF5"/><ellipse cx="35" cy="52" rx="8" ry="6" fill="#0E4EF5"/><ellipse cx="65" cy="52" rx="8" ry="6" fill="#0E4EF5"/><ellipse cx="50" cy="62" rx="14" ry="12" fill="#0E4EF5"/><line x1="24" y1="44" x2="8" y2="34" stroke="#0E4EF5" stroke-width="4" stroke-linecap="round"/><line x1="24" y1="54" x2="6" y2="54" stroke="#0E4EF5" stroke-width="4" stroke-linecap="round"/><line x1="24" y1="64" x2="8" y2="72" stroke="#0E4EF5" stroke-width="4" stroke-linecap="round"/><line x1="76" y1="44" x2="92" y2="34" stroke="#0E4EF5" stroke-width="4" stroke-linecap="round"/><line x1="76" y1="54" x2="94" y2="54" stroke="#0E4EF5" stroke-width="4" stroke-linecap="round"/><line x1="76" y1="64" x2="92" y2="72" stroke="#0E4EF5" stroke-width="4" stroke-linecap="round"/></svg>`;}

function sidebar(){
  const navItems=[
    {id:'dashboard', label:'Dashboard', icon:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>`},
    {id:'locations', label:'Stores',     icon:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`},
    {id:'drops',     label:'Drops',      icon:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`, active:true},
    {id:'customers', label:'Guests',     icon:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`},
    {id:'analytics', label:'Analytics',  icon:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`},
    {id:'team',      label:'Team',       icon:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="23" y1="11" x2="17" y2="11"/><line x1="20" y1="8" x2="20" y2="14"/></svg>`},
    {id:'billing',   label:'Billing',    icon:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>`},
    {id:'settings',  label:'Settings',   icon:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`},
  ];
  return `<div style="width:210px;min-width:210px;background:${GRAD};display:flex;flex-direction:column;padding:18px 0;overflow-y:auto;flex-shrink:0;">
    <div style="padding:0 16px 18px;border-bottom:1px solid rgba(255,255,255,0.12);margin-bottom:14px;display:flex;align-items:center;gap:10px;">
      ${nighBug(26)}
      <div>
        <div style="color:#fff;font-weight:900;font-size:0.88rem;line-height:1.2;">Best Buy</div>
        <div style="color:rgba(255,255,255,0.5);font-size:0.6rem;margin-top:2px;">Enterprise Retail Pro</div>
      </div>
    </div>
    ${navItems.map(n=>`<button style="width:100%;display:flex;align-items:center;gap:10px;padding:9px 16px;background:${n.active?'rgba(255,255,255,0.18)':'transparent'};border:none;border-left:3px solid ${n.active?'#FFE000':'transparent'};color:${n.active?'#fff':'rgba(255,255,255,0.55)'};font-size:0.77rem;font-weight:${n.active?'700':'500'};cursor:pointer;text-align:left;">
      <span style="opacity:0.85;flex-shrink:0;">${n.icon}</span>${n.label}
    </button>`).join('')}
    <div style="flex:1;"></div>
    <div style="padding:14px 16px;border-top:1px solid rgba(255,255,255,0.1);margin-top:8px;font-size:0.6rem;color:rgba(255,255,255,0.35);text-align:center;">Powered by Nigh</div>
  </div>`;
}

// ── TOPBAR ───────────────────────────────────────────────────────────────────
function topbar(){
  const live=DROPS.filter(d=>d.status==='live').length;
  const regions=[...new Set(DROPS.map(d=>d.region))];
  return `<div style="padding:10px 24px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:10px;">
    <select style="padding:6px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:0.78rem;color:#0f172a;background:#fff;cursor:pointer;">
      <option>All Regions</option>
      ${regions.map(r=>`<option>${r}</option>`).join('')}
    </select>
    <select style="padding:6px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:0.78rem;color:#0f172a;background:#fff;cursor:pointer;">
      <option>All Districts</option>
      <option>Colorado</option><option>Southwest</option><option>Illinois</option><option>Minnesota</option><option>Texas</option><option>New York</option><option>New England</option><option>Florida</option>
    </select>
    <div style="flex:1;"></div>
    <span style="background:#dcfce7;color:#15803d;font-size:0.7rem;font-weight:700;padding:4px 10px;border-radius:20px;">${live} Live</span>
    <button onclick="ss({showPushModal:true,pushStep:1})" style="background:${COLOR};color:#fff;border:none;padding:8px 18px;border-radius:10px;font-weight:700;font-size:0.78rem;cursor:pointer;">+ Push Drop</button>
  </div>`;
}

// ── SUB-NAV TABS ─────────────────────────────────────────────────────────────
function subNav(){
  const liveDrops=DROPS.filter(d=>d.status==='live').length;
  const activeFlows=FLOWS.filter(f=>f.status==='active').length;
  const tabs=[
    {id:'drops', label:'Drops', count:liveDrops,  countLabel:'live'},
    {id:'flows', label:'Flows', count:activeFlows, countLabel:'active'},
  ];
  return `<div style="display:flex;align-items:center;gap:0;padding:0 28px;background:#fff;border-bottom:1px solid #e5e7eb;">
    ${tabs.map(t=>`<button onclick="ss({tab:'${t.id}',dropDetail:null,flowDetail:null})" style="display:flex;align-items:center;gap:7px;padding:13px 18px;border:none;border-bottom:2px solid ${S.tab===t.id?COLOR:'transparent'};background:transparent;color:${S.tab===t.id?COLOR:'#64748b'};font-size:0.82rem;font-weight:${S.tab===t.id?'800':'500'};cursor:pointer;transition:all 0.1s;margin-bottom:-1px;">
      ${t.label}
      <span style="background:${S.tab===t.id?COLOR+'18':'#f1f5f9'};color:${S.tab===t.id?COLOR:'#94a3b8'};font-size:0.62rem;font-weight:800;padding:2px 7px;border-radius:20px;">${t.count} ${t.countLabel}</span>
    </button>`).join('')}
  </div>`;
}

// ── DROPS TAB ────────────────────────────────────────────────────────────────
function dropsTab(){
  if(S.dropDetail){
    const d=DROPS.find(x=>x.id===S.dropDetail);
    if(d) return dropDetail(d);
  }

  let drops=DROPS;
  if(S.dropType)   drops=drops.filter(d=>d.type===S.dropType);
  if(S.dropStatus) drops=drops.filter(d=>d.status===S.dropStatus);

  const totalCi=drops.reduce((s,d)=>s+(d.ci||0),0);
  const totalRes=drops.reduce((s,d)=>s+(d.res||0),0);

  return `<div style="padding:22px 28px;">
    <!-- Filter bar -->
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:18px;flex-wrap:wrap;">
      <button onclick="ss({dropType:null})" style="padding:5px 13px;border-radius:20px;border:1px solid ${!S.dropType?COLOR:'#e5e7eb'};background:${!S.dropType?COLOR+'15':'transparent'};color:${!S.dropType?COLOR:'#64748b'};font-size:0.72rem;font-weight:${!S.dropType?'700':'500'};cursor:pointer;">All Types</button>
      ${DROP_TYPES.map(t=>`<button onclick="ss({dropType:S.dropType==='${t.id}'?null:'${t.id}'})" style="padding:5px 13px;border-radius:20px;border:1px solid ${S.dropType===t.id?t.c:'#e5e7eb'};background:${S.dropType===t.id?t.bg:'transparent'};color:${S.dropType===t.id?t.c:'#64748b'};font-size:0.72rem;font-weight:${S.dropType===t.id?'700':'500'};cursor:pointer;">${t.icon} ${t.label}</button>`).join('')}
      <div style="width:1px;height:18px;background:#e5e7eb;margin:0 2px;"></div>
      ${['live','scheduled','ended'].map(st=>`<button onclick="ss({dropStatus:S.dropStatus==='${st}'?null:'${st}'})" style="padding:5px 13px;border-radius:20px;border:1px solid ${S.dropStatus===st?COLOR:'#e5e7eb'};background:${S.dropStatus===st?COLOR+'15':'transparent'};color:${S.dropStatus===st?COLOR:'#64748b'};font-size:0.72rem;font-weight:${S.dropStatus===st?'700':'500'};cursor:pointer;text-transform:capitalize;">${st}</button>`).join('')}
      ${S.dropType||S.dropStatus?`<button onclick="ss({dropType:null,dropStatus:null})" style="padding:5px 10px;border-radius:20px;border:1px solid #fee2e2;background:#fee2e2;color:#b91c1c;font-size:0.7rem;font-weight:600;cursor:pointer;">✕ Clear</button>`:''}
      <div style="flex:1;"></div>
      <span style="font-size:0.72rem;color:#94a3b8;">${drops.length} drops &middot; ${fmtNum(totalCi)} check-ins</span>
    </div>

    <!-- Drop list -->
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${drops.length===0?`<div style="background:#fff;border:1px dashed #e5e7eb;border-radius:12px;padding:40px;text-align:center;color:#94a3b8;font-size:0.82rem;">No drops match your filters.</div>`:''}
      ${drops.map(d=>{
        const sr=pct(d.ci,d.res);
        const capPct=pct(d.res,d.cap);
        return `<div onclick="ss({dropDetail:'${d.id}'})" style="background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:14px 18px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all 0.12s;" onmouseover="this.style.borderColor='${COLOR}60';this.style.boxShadow='0 2px 12px rgba(0,0,0,0.07)'" onmouseout="this.style.borderColor='#e5e7eb';this.style.boxShadow=''">
          <!-- Status stripe -->
          <div style="width:3px;height:44px;border-radius:2px;background:${d.status==='live'?'#16a34a':d.status==='scheduled'?'#ca8a04':'#e5e7eb'};flex-shrink:0;"></div>
          <!-- Main content -->
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;">
              <span style="font-size:0.85rem;font-weight:700;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:340px;">${d.title}</span>
              ${badge(d.status)}
            </div>
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
              ${dropTypeBadge(d.type)}
              <span style="font-size:0.7rem;color:#94a3b8;">&#x2022;</span>
              <span style="font-size:0.7rem;color:#94a3b8;">${d.locName}</span>
              <span style="font-size:0.7rem;color:#94a3b8;">&#x2022;</span>
              <span style="font-size:0.7rem;color:#94a3b8;">${d.region} Region</span>
            </div>
          </div>
          <!-- Stats -->
          <div style="display:grid;grid-template-columns:56px 56px 64px;gap:6px;flex-shrink:0;text-align:center;">
            <div>
              <div style="font-size:0.88rem;font-weight:900;color:#0f172a;">${d.res}</div>
              <div style="font-size:0.58rem;color:#94a3b8;margin-top:1px;">reserv.</div>
              ${bar(capPct,COLOR,3)}
            </div>
            <div>
              <div style="font-size:0.88rem;font-weight:900;color:#0f172a;">${d.ci}</div>
              <div style="font-size:0.58rem;color:#94a3b8;margin-top:1px;">check-ins</div>
            </div>
            <div>
              <div style="font-size:0.88rem;font-weight:900;color:${d.status==='live'?showColor(sr):'#cbd5e1'};">${d.status==='live'?sr+'%':'—'}</div>
              <div style="font-size:0.58rem;color:#94a3b8;margin-top:1px;">show rate</div>
            </div>
          </div>
          <div style="color:#cbd5e1;font-size:0.9rem;flex-shrink:0;">›</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function dropDetail(d){
  const sr=pct(d.ci,d.res);
  const capPct=pct(d.res,d.cap);
  return `<div style="padding:22px 28px;">
    <button onclick="ss({dropDetail:null})" style="display:flex;align-items:center;gap:5px;color:${COLOR};font-size:0.78rem;font-weight:700;background:none;border:none;cursor:pointer;margin-bottom:18px;">&larr; Back to Drops</button>
    <div style="display:grid;grid-template-columns:1fr 300px;gap:20px;">
      <div>
        <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:22px 24px;margin-bottom:14px;">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px;">
            <div style="font-size:1.1rem;font-weight:900;color:#0f172a;line-height:1.3;">${d.title}</div>
            ${badge(d.status)}
          </div>
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:18px;">${dropTypeBadge(d.type)}<span style="font-size:0.72rem;color:#94a3b8;">${d.locName} &middot; ${d.region} Region</span></div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;">
            <div style="background:#f8fafc;border-radius:10px;padding:12px;text-align:center;"><div style="font-size:1.4rem;font-weight:900;color:#0f172a;">${d.cap}</div><div style="font-size:0.62rem;color:#94a3b8;">capacity</div></div>
            <div style="background:#f8fafc;border-radius:10px;padding:12px;text-align:center;"><div style="font-size:1.4rem;font-weight:900;color:${COLOR};">${d.res}</div><div style="font-size:0.62rem;color:#94a3b8;">reserved</div>${bar(capPct,COLOR,4)}</div>

// ── FLOWS TAB ────────────────────────────────────────────────────────────────
function flowsTab(){

    const f=FLOWS.find(x=>x.id===S.flowDetail);
    if(f) return flowDetail(f);
  }
  const totalEnrolled=FLOWS.reduce((s,f)=>s+f.enrolled,0);
  const totalCi=FLOWS.reduce((s,f)=>s+f.ci,0);
  const activeCount=FLOWS.filter(f=>f.status==='active').length;

  return `<div style="padding:22px 28px;">
    <!-- Summary row -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px;">
      ${[
        {label:'Active Flows',     val:activeCount,        sub:`of ${FLOWS.length} total`,     color:COLOR},
        {label:'Guests Enrolled',  val:fmtNum(totalEnrolled),sub:'across all flows',           color:'#0f172a'},
        {label:'Avg Show Rate',    val:pct(totalCi,totalEnrolled)+'%',sub:'across active flows',color:'#0f172a'},
      ].map(k=>`<div style="background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:16px 20px;">
        <div style="font-size:0.7rem;color:#64748b;font-weight:600;margin-bottom:5px;">${k.label}</div>
        <div style="font-size:1.8rem;font-weight:900;color:${k.color};">${k.val}</div>

            <div style="font-size:1.5rem;line-height:1;">${f.icon}</div>
            <span style="background:${statusBg};color:${statusColor};font-size:0.62rem;font-weight:800;padding:3px 8px;border-radius:20px;text-transform:capitalize;">${f.status}</span>
          </div>
          <div style="font-size:0.9rem;font-weight:800;color:#0f172a;margin-bottom:4px;">${f.name}</div>
          <div style="font-size:0.72rem;color:#64748b;line-height:1.4;margin-bottom:14px;flex:1;">${f.desc}</div>

          <!-- Trigger pill -->
          <div style="display:flex;align-items:center;gap:6px;background:#f8fafc;border-radius:8px;padding:6px 10px;margin-bottom:14px;">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            <span style="font-size:0.68rem;color:#64748b;font-weight:600;">${f.trigger}</span>
          </div>

          <!-- Stats row -->
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;">
            <div style="text-align:center;background:#f8fafc;border-radius:8px;padding:7px 4px;">
              <div style="font-size:0.9rem;font-weight:900;color:#0f172a;">${f.drops}</div>
              <div style="font-size:0.58rem;color:#94a3b8;margin-top:1px;">drops</div>

            <div style="text-align:center;background:#f8fafc;border-radius:8px;padding:7px 4px;">
              <div style="font-size:0.9rem;font-weight:900;color:${COLOR};">${fmtNum(f.enrolled)}</div>
              <div style="font-size:0.58rem;color:#94a3b8;margin-top:1px;">enrolled</div>
            </div>
            <div style="text-align:center;background:#f8fafc;border-radius:8px;padding:7px 4px;">
              <div style="font-size:0.9rem;font-weight:900;color:${f.enrolled?showColor(sr):'#94a3b8'};">${f.enrolled?sr+'%':'—'}</div>
              <div style="font-size:0.58rem;color:#94a3b8;margin-top:1px;">show rate</div>

  </div>`;
}

// ── NEW FLOW MODAL ────────────────────────────────────────────────────────────
function flowModal(){
  const step=S.flowStep||1;
  const steps=['Trigger','Sequence','Launch'];
  const triggers=[
    {id:'first-visit',  label:'First Visit',      desc:'Guest checks in to any store for the first time',       icon:'&#127381;'},
    {id:'post-checkin', label:'After Check-in',    desc:'Guest completes a check-in on any drop',                icon:'&#10003;'},
    {id:'vip-scan',     label:'VIP Member Scan',   desc:'Totaltech member scans their membership badge',         icon:'&#11088;'},
    {id:'manual',       label:'Manual Enrollment', desc:'Add guests to this flow manually from the Guests page', icon:'&#128100;'},
  ];
  const progressBar=`<div style="display:flex;align-items:center;margin-bottom:22px;">
    ${steps.map((s,i)=>`<div style="display:flex;align-items:center;flex:1;">
      <div style="display:flex;flex-direction:column;align-items:center;flex:1;">
        <div style="width:26px;height:26px;border-radius:50%;background:${i<step?COLOR:i===step-1?COLOR:'#e5e7eb'};color:${i<=step-1?'#fff':'#94a3b8'};font-size:0.7rem;font-weight:800;display:flex;align-items:center;justify-content:center;">${i<step-1?'✓':i+1}</div>
        <div style="font-size:0.62rem;color:${i===step-1?COLOR:'#94a3b8'};font-weight:${i===step-1?'700':'500'};margin-top:4px;">${s}</div>

      ${i<steps.length-1?`<div style="height:2px;background:${i<step-1?COLOR:'#e5e7eb'};flex:1;margin-bottom:16px;"></div>`:''}
    </div>`).join('')}

    body=`<div>

        ${triggers.map((t,i)=>`<label style="display:flex;align-items:center;gap:12px;padding:11px 14px;border:1.5px solid ${i===0?COLOR:'#e5e7eb'};border-radius:11px;cursor:pointer;background:${i===0?COLOR+'08':'#fff'};">
          <input type="radio" name="flow-trigger" ${i===0?'checked':''} style="accent-color:${COLOR};flex-shrink:0;" />

          <div><div style="font-size:0.8rem;font-weight:700;color:#0f172a;">${t.label}</div><div style="font-size:0.68rem;color:#94a3b8;margin-top:2px;">${t.desc}</div></div>
        </label>`).join('')}
      </div>
    </div>`;
  } else if(step===2){
    body=`<div>
      <div style="font-size:0.82rem;font-weight:700;color:#0f172a;margin-bottom:12px;">Build Drop Sequence <span style="font-size:0.72rem;font-weight:500;color:#94a3b8;">(up to 5 drops)</span></div>
      ${[1,2,3].map(i=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:0;flex-shrink:0;">
          <div style="width:24px;height:24px;border-radius:50%;background:${COLOR};color:#fff;font-size:0.65rem;font-weight:900;display:flex;align-items:center;justify-content:center;">${i}</div>
          ${i<3?`<div style="width:2px;height:12px;background:#e5e7eb;"></div>`:''}
        </div>
        <div style="flex:1;background:#f8fafc;border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:8px;">
          <input placeholder="Drop ${i} title…" style="flex:1;border:none;background:transparent;font-size:0.75rem;color:#0f172a;outline:none;" />
          <select style="padding:4px 8px;border:1px solid #e5e7eb;border-radius:7px;font-size:0.7rem;background:#fff;">
            ${DROP_TYPES.map(t=>`<option>${t.icon} ${t.label}</option>`).join('')}
          </select>
        </div>
      </div>`).join('')}
      <button style="width:100%;padding:8px;border:1.5px dashed #e5e7eb;border-radius:10px;background:transparent;color:#94a3b8;font-size:0.73rem;font-weight:600;cursor:pointer;margin-top:4px;">+ Add Drop</button>
    </div>`;
  } else {
    body=`<div>
      <div style="font-size:0.82rem;font-weight:700;color:#0f172a;margin-bottom:12px;">Ready to Activate</div>
      <div style="background:#f8fafc;border-radius:12px;padding:14px 16px;margin-bottom:14px;">

        ${infoRow('Trigger','First Visit')}
        ${infoRow('Drops in Sequence','3')}
        ${infoRow('Status','Activate on launch')}

        <span style="font-size:0.75rem;color:${COLOR};font-weight:600;line-height:1.5;">Guests will automatically enroll when they trigger the condition. You can pause or edit this flow at any time.</span>
      </div>

    ${steps.map((s,i)=>`<div style="display:flex;align-items:center;flex:1;">
      <div style="display:flex;flex-direction:column;align-items:center;flex:1;">
        <div style="width:24px;height:24px;border-radius:50%;background:${i<step?COLOR:i===step-1?COLOR:'#e5e7eb'};color:${i<=step-1?'#fff':'#94a3b8'};font-size:0.68rem;font-weight:800;display:flex;align-items:center;justify-content:center;">${i<step-1?'✓':i+1}</div>
        <div style="font-size:0.6rem;color:${i===step-1?COLOR:'#94a3b8'};font-weight:${i===step-1?'700':'500'};margin-top:3px;">${s}</div>
      </div>
      ${i<steps.length-1?`<div style="height:2px;background:${i<step-1?COLOR:'#e5e7eb'};flex:1;margin-bottom:14px;"></div>`:''}
    </div>`).join('')}
  </div>`;

  let body='';
  if(step===1){
    body=`<div style="font-size:0.82rem;font-weight:700;color:#0f172a;margin-bottom:10px;">Drop Type</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;">
      ${DROP_TYPES.map(t=>`<button onclick="ss({pushType:'${t.id}',pushStep:2})" style="padding:14px 12px;border-radius:12px;border:2px solid ${S.pushType===t.id?t.c:'#e5e7eb'};background:${S.pushType===t.id?t.bg:'#fff'};cursor:pointer;text-align:left;">
        <div style="font-size:1.2rem;margin-bottom:6px;">${t.icon}</div>
        <div style="font-size:0.77rem;font-weight:700;color:${t.c};">${t.label}</div>
      </button>`).join('')}
    </div>`;
  } else if(step===2){
    const locs=['Denver Tech Center','Chicago Michigan','NYC Fifth Ave','Minneapolis Lake St','Boston Fenway'];
    body=`<div style="font-size:0.82rem;font-weight:700;color:#0f172a;margin-bottom:10px;">Select Store</div>
    <div style="display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto;">
      ${locs.map((l,i)=>`<button onclick="ss({pushLoc:'${i}'})" style="padding:10px 14px;border-radius:10px;border:2px solid ${S.pushLoc==i?COLOR:'#e5e7eb'};background:${S.pushLoc==i?COLOR+'10':'#fff'};cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:0.78rem;font-weight:600;color:#0f172a;">${l}</span>
        ${S.pushLoc==i?`<span style="color:${COLOR};">&#10003;</span>`:''}
      </button>`).join('')}
    </div>`;
  } else {
    const selType=DROP_TYPES.find(t=>t.id===S.pushType)||DROP_TYPES[0];
    const locs=['Denver Tech Center','Chicago Michigan','NYC Fifth Ave','Minneapolis Lake St','Boston Fenway'];
    body=`<div style="font-size:0.82rem;font-weight:700;color:#0f172a;margin-bottom:12px;">Confirm Push</div>
    <div style="background:#f8fafc;border-radius:12px;padding:14px 16px;">
      ${infoRow('Type',`${selType.icon} ${selType.label}`)}
      ${infoRow('Store',S.pushLoc!=null?locs[S.pushLoc]:'—')}
      ${infoRow('Goes live','Immediately')}
    </div>`;
  }

  return `<div style="position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:2000;display:flex;align-items:center;justify-content:center;" onclick="if(event.target===this)ss({showPushModal:false})">
    <div style="background:#fff;border-radius:18px;width:420px;padding:24px 26px;box-shadow:0 20px 60px rgba(0,0,0,0.22);" onclick="event.stopPropagation()">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div style="font-size:1rem;font-weight:900;color:#0f172a;">Push Drop</div>
        <button onclick="ss({showPushModal:false})" style="background:#f1f5f9;border:none;border-radius:8px;padding:5px 10px;cursor:pointer;font-size:0.78rem;color:#64748b;">✕</button>
      </div>
      ${progressBar}
      ${body}
      <div style="display:flex;justify-content:space-between;margin-top:20px;">
        ${step>1?`<button onclick="ss({pushStep:${step-1}})" style="padding:9px 18px;border-radius:10px;border:1px solid #e5e7eb;background:#fff;color:#475569;font-weight:700;font-size:0.78rem;cursor:pointer;">&larr; Back</button>`:'<div></div>'}
        ${step<3
          ?`<button onclick="ss({pushStep:${step+1}})" style="padding:9px 20px;border-radius:10px;background:${COLOR};color:#fff;border:none;font-weight:700;font-size:0.78rem;cursor:pointer;">Next &rarr;</button>`
          :`<button onclick="ss({showPushModal:false})" style="padding:9px 20px;border-radius:10px;background:${COLOR};color:#fff;border:none;font-weight:700;font-size:0.78rem;cursor:pointer;">&#128640; Push Drop</button>`}
      </div>
    </div>
  </div>`;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const mainContent=S.tab==='drops'?dropsTab():flowsTab();
  document.getElementById('app').innerHTML=`
    <div style="display:flex;height:100vh;overflow:hidden;">
      ${sidebar()}
      <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
        ${topbar()}
        ${subNav()}
        <div style="flex:1;overflow-y:auto;">${mainContent}</div>
      </div>
    </div>
    ${S.showPushModal?pushModal():''}
    ${S.showFlowModal?flowModal():''}
  `;
}
render();
</script>
</body>
</html>
