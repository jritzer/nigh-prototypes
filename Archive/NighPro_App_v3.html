*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#E5E7EB;display:flex;justify-content:center;padding:24px 16px;min-height:100vh}
#app{width:375px;height:812px;border-radius:24px;border:1px solid #D1D5DB;box-shadow:0 8px 32px rgba(0,0,0,0.12);overflow:hidden;display:flex;flex-direction:column;background:#F9FAFB;position:relative}
#scr{flex:1;overflow-y:auto}
#scr::-webkit-scrollbar{width:0}
button,input,textarea,select{font-family:inherit}
button{cursor:pointer}
@keyframes scanLine{0%,100%{top:15%}50%{top:75%}}
.scanL{animation:scanLine 2s ease-in-out infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadeIn 0.25s ease-out}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.4)}70%{box-shadow:0 0 0 6px rgba(34,197,94,0)}}
.livePulse{animation:livePulse 2s ease-in-out infinite}
.card{background:#fff;border-radius:14px;border:1px solid #E5E7EB;overflow:hidden}
.cb{padding:14px}
.bg{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px}
.bg-s{font-size:10px;padding:2px 7px}
.bg .dt{width:6px;height:6px;border-radius:50%}
.bg-live{background:#DCFCE7;color:#166534}.bg-live .dt{background:#22C55E}
.bg-sold{background:#FEF3C7;color:#92400E}.bg-sold .dt{background:#F59E0B}
.bg-draft{background:#F3F4F6;color:#4B5563}.bg-draft .dt{background:#9CA3AF}
.bg-ended{background:#F3F4F6;color:#6B7280}.bg-ended .dt{background:#9CA3AF}
.bg-ci{background:#DCFCE7;color:#166534}.bg-ci .dt{background:#22C55E}
.bg-res{background:#DBEAFE;color:#1E40AF}.bg-res .dt{background:#3B82F6}
.bg-ns{background:#FEE2E2;color:#991B1B}.bg-ns .dt{background:#EF4444}
.bg-sched{background:#EDE9FE;color:#5B21B6}.bg-sched .dt{background:#8B5CF6}
.bg-cancel{background:#FEF3C7;color:#92400E}.bg-cancel .dt{background:#F59E0B}
.tb{display:flex;justify-content:space-around;align-items:center;background:#fff;border-top:1px solid #E5E7EB;padding:6px 0 10px;flex-shrink:0}
.tt{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;padding:4px 10px;min-width:50px;color:#9CA3AF;transition:color 0.15s;font-size:10px;font-weight:500}
.tt.a{color:#3B82F6;font-weight:600}
/* Modal overlay */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal{background:#fff;border-radius:20px 20px 0 0;width:375px;max-height:70vh;overflow-y:auto;padding:20px 16px 30px}
.modal-handle{width:36px;height:4px;border-radius:2px;background:#D1D5DB;margin:0 auto 16px}

// ── Helpers ──
function badge(st,sm){
  const m={'Live':'bg-live','Live - Sold Out':'bg-sold','Draft':'bg-draft','Ended':'bg-ended','Scheduled':'bg-sched','Checked-In':'bg-ci','Reserved':'bg-res','No-Show':'bg-ns','Canceled':'bg-cancel'};
  return `<span class="bg ${m[st]||'bg-draft'}${sm?' bg-s':''}""><span class="dt"></span>${st}</span>`;
}
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function sameDay(a,b){return a.toDateString()===b.toDateString()}
function dayKey(d){return d.toISOString().slice(0,10)}
function guestStatus(g){
  const tix=g.tickets;
  if(tix.length===1)return tix[0].status;
  const ci=tix.filter(t=>t.status==='Checked-In').length;
  if(ci===tix.length)return 'Checked-In';
  if(ci>0)return `${ci}/${tix.length} Checked In`;
  if(tix.some(t=>t.status==='No-Show'))return 'No-Show';
  return 'Reserved';
}
function mc(l,v,sub,icn,col,bgc){
  return `<div style="background:#fff;border-radius:12px;padding:14px;border:1px solid #E5E7EB;flex:1 1 45%;min-width:130px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><div style="font-size:11px;color:#6B7280;font-weight:500;margin-bottom:3px">${l}</div>
      <div style="font-size:20px;font-weight:700;color:#111827">${v}</div>
      ${sub?`<div style="font-size:10px;color:${col||'#0D9488'};margin-top:2px">${sub}</div>`:''}</div>
      <div style="width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:${bgc||'#EFF6FF'};color:${col||'#3B82F6'}">${ic(icn,16)}</div>
    </div></div>`;
}
function hdr(title,sub,back,right){
  return `<div style="background:#fff;padding:12px 16px;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99">

    </div>${right||''}</div>`;
}

}

// ═══════════ GUESTS ═══════════
function renderGuests(){
  const liveDrop=drops.find(d=>d.status==='Live')||drops[0];
  const currentDrop=S.guestDrop==='all'?null:liveDrop;
  const filters=['All','Checked-In','Reserved','No-Show'];
  const gList=currentDrop?guests.filter(g=>g.drop===currentDrop.id):guests;
  const filtered=S.rFilter==='All'?gList:gList.filter(g=>{
    const st=guestStatus(g);
    if(S.rFilter==='Checked-In')return st.includes('Checked');
    return st===S.rFilter;
  });

  return `${hdr('Guests','')}
  <div style="padding:12px 16px">
    <div style="display:flex;gap:6px;margin-bottom:10px">
      <select onchange="S.guestDrop=this.value;S.rFilter='All';S.rSel=null;render()" style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid #E5E7EB;font-size:12px;color:#111827;background:#fff;font-weight:600">
        <option value="current" ${S.guestDrop==='current'?'selected':''}>Current Drop — ${liveDrop.title}</option>
        ${drops.filter(d=>d.status!=='Draft'&&d.id!==liveDrop.id).map(d=>`<option value="${d.id}">${d.title} — ${fmtDate(d.date)}</option>`).join('')}
        <option value="all" ${S.guestDrop==='all'?'selected':''}>All Drops</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:8px;background:#fff;border-radius:10px;border:1px solid #E5E7EB;padding:7px 10px;margin-bottom:10px">
      <span style="color:#9CA3AF">${ic('search',15)}</span>
      <input placeholder="Search by name or username..." style="flex:1;border:none;outline:none;font-size:12px;color:#111827;background:transparent"/>
    </div>
    <div style="display:flex;gap:5px;margin-bottom:12px;overflow-x:auto">
      ${filters.map(f=>{
        const cnt=f==='All'?gList.length:gList.filter(g=>{const st=guestStatus(g);return f==='Checked-In'?st.includes('Checked'):st===f}).length;
        return `<button onclick="S.rFilter='${f}';S.rSel=null;render()" style="padding:5px 12px;border-radius:18px;font-size:11px;font-weight:500;border:1px solid ${S.rFilter===f?'#3B82F6':'#E5E7EB'};background:${S.rFilter===f?'#EFF6FF':'#fff'};color:${S.rFilter===f?'#3B82F6':'#4B5563'};white-space:nowrap">${f} (${cnt})</button>`;
      }).join('')}
    </div>

    ${filtered.map(g=>{
      const st=guestStatus(g);
      const multi=g.tickets.length>1;
      const expanded=S.rSel===g.id;
      return `
      <div onclick="S.rSel=S.rSel==='${g.id}'?null:'${g.id}';render()" style="background:#fff;border-radius:10px;padding:10px 12px;border:1px solid ${expanded?'#3B82F6':'#E5E7EB'};margin-bottom:6px;cursor:pointer">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#3B82F6,#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0">${g.avatar}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;color:#111827">${g.name}</div>
            <div style="font-size:11px;color:#9CA3AF">${g.uname}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            ${multi?`<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:${st.includes('/')? '#FEF3C7':'#DCFCE7'};color:${st.includes('/')?'#92400E':'#166534'}">${st}</span>`
              :badge(g.tickets[0].status,true)}
            ${multi?`<div style="font-size:10px;color:#9CA3AF;margin-top:2px">${g.tickets.length} tickets</div>`:''}
          </div>
        </div>
        ${expanded?`
          <div class="fi" style="margin-top:8px;padding-top:8px;border-top:1px solid #F3F4F6">
            ${multi?`<div style="margin-bottom:8px">
              ${g.tickets.map(t=>`
                <div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:11px">
                  <span style="color:#6B7280">${t.tid}</span>
                  ${badge(t.status,true)}
                  <div style="display:flex;gap:4px">
                    ${t.status==='Reserved'?`<button onclick="event.stopPropagation()" style="padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;border:none;background:#0D9488;color:#fff">Check In</button>`:''}
                    ${t.status!=='Canceled'&&t.status!=='Checked-In'?`<button onclick="event.stopPropagation()" style="padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;border:1px solid #EF4444;background:#FEF2F2;color:#EF4444">Cancel</button>`:''}
                  </div>
                </div>
              `).join('')}
            </div>`:''}
            <div style="display:flex;gap:5px">
              ${!multi&&g.tickets[0].status==='Reserved'?`<button onclick="event.stopPropagation()" style="flex:1;padding:7px;border-radius:7px;font-size:11px;font-weight:600;border:none;background:#0D9488;color:#fff;display:flex;align-items:center;justify-content:center;gap:3px">${ic('check',13)} Check In</button>`:''}
              ${!multi&&g.tickets[0].status!=='Canceled'&&g.tickets[0].status!=='Checked-In'?`<button onclick="event.stopPropagation()" style="flex:1;padding:7px;border-radius:7px;font-size:11px;font-weight:600;border:1px solid #EF4444;background:#FEF2F2;color:#EF4444;display:flex;align-items:center;justify-content:center;gap:3px">${ic('x',13)} Cancel & Refund</button>`:''}
            </div>
          </div>
        `:''}
      </div>`;
    }).join('')}
  </div>`;
}

    {ic:'chart',l:'Analytics',d:'Performance & metrics',act:"S.menuSub='analytics';render()"},
    {ic:'dollar',l:'Payout',d:'Revenue & transactions',act:"S.menuSub='payout';render()"},
    {ic:'shield',l:'Pro Account',d:'Business profile & info',act:"S.menuSub='profile';render()"},
  ];
  const items2=[
    {ic:'user',l:'User Account',d:'Personal settings'},
    {ic:'msgCircle',l:'Send Feedback',d:'Help us improve'},
    {ic:'file',l:'Terms of Service'},
    {ic:'shield',l:'Privacy Policy'},
  ];
  return `${hdr('Menu',acct().name)}
  <div style="padding:14px 16px">
    ${items.map(m=>`<button onclick="${m.act}" style="width:100%;background:#fff;border-radius:10px;border:1px solid #E5E7EB;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px;text-align:left">
      <div style="width:36px;height:36px;border-radius:8px;background:#EFF6FF;display:flex;align-items:center;justify-content:center;color:#3B82F6">${ic(m.ic,18)}</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:600;color:#111827">${m.l}</div><div style="font-size:11px;color:#6B7280">${m.d}</div></div>
      <span style="color:#9CA3AF">${ic('right',16)}</span>
    </button>`).join('')}
    <div style="font-size:11px;font-weight:600;color:#9CA3AF;margin:14px 0 6px;text-transform:uppercase;letter-spacing:0.05em">Settings</div>
    ${items2.map(m=>`<div style="background:#fff;border-radius:10px;border:1px solid #E5E7EB;padding:11px 14px;margin-bottom:5px;display:flex;align-items:center;gap:10px">
      <span style="color:#6B7280">${ic(m.ic,16)}</span>
      <div style="flex:1;font-size:13px;font-weight:500;color:#374151">${m.l}</div>
      <span style="color:#D1D5DB">${ic('right',14)}</span>
    </div>`).join('')}
    <div style="text-align:center;margin-top:16px;font-size:11px;color:#9CA3AF">Nigh Pro v1.0</div>
  </div>`;
}

function renderAnalytics(){
  const bars=[{l:'Mon',v:12},{l:'Tue',v:28},{l:'Wed',v:8},{l:'Thu',v:35},{l:'Fri',v:42},{l:'Sat',v:18},{l:'Sun',v:5}];
  const mx=Math.max(...bars.map(b=>b.v));
  return `${hdr('Analytics','Last 7 days',"S.menuSub=null;render()")}
  <div style="padding:14px 16px">
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">
      ${mc('Reservations','148','+23%','users','#3B82F6','#EFF6FF')}
      ${mc('Check-In Rate','72%','108/148','check','#0D9488','#F0FDFA')}
      ${mc('Revenue','$2,340','After refunds','dollar','#3B82F6','#EFF6FF')}
      ${mc('No-Show Rate','8.1%','12 no-shows','alert','#F59E0B','#FFFBEB')}
    </div>
    <div class="card"><div class="cb">
      <div style="font-size:12px;font-weight:600;color:#1F2937;margin-bottom:12px">Reservations by Day</div>
      <div style="display:flex;gap:6px;align-items:flex-end;height:100px">
        ${bars.map((b,i)=>`<div style="flex:1;text-align:center"><div style="height:${(b.v/mx)*85}px;background:${i===4?'#3B82F6':'#DBEAFE'};border-radius:3px 3px 0 0;margin-bottom:4px;position:relative"><span style="position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:600;color:#4B5563">${b.v}</span></div><span style="font-size:9px;color:#6B7280">${b.l}</span></div>`).join('')}
      </div>
    </div></div>
  </div>`;
}

function renderProfile(){
  const a=acct();
  return `${hdr('Pro Account','Business Profile',"S.menuSub=null;render()")}
  <div style="padding:14px 16px">
    <div class="card"><div class="cb">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <div style="width:50px;height:50px;border-radius:12px;background:#1B2A4A;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700">${a.short.charAt(0)}</div>
        <div><div style="font-size:16px;font-weight:700;color:#111827">${a.name}</div><div style="font-size:12px;color:#6B7280">${a.role}</div></div>
      </div>
      ${[['Category',a.cat],['Sub-Category',a.subCat],['Address',a.addr]].map((r,i,arr)=>`
        <div style="display:flex;justify-content:space-between;padding:8px 0;${i<arr.length-1?'border-bottom:1px solid #F3F4F6':''}">
          <span style="font-size:12px;color:#6B7280">${r[0]}</span>
          <span style="font-size:12px;font-weight:500;color:#111827;text-align:right;max-width:60%">${r[1]}</span>
        </div>
      `).join('')}
      <div style="background:#FEF3C7;border-radius:8px;padding:7px 10px;margin-top:10px;font-size:10px;color:#92400E;display:flex;gap:5px">
        ${ic('alert',12)} Category managed by Nigh Support
      </div>
    </div></div>
  </div>`;
}

// ── Broadcast Modal ──
function renderModal(){
  const root=document.getElementById('modal-root');
  if(!S.showBroadcast){root.innerHTML='';return;}
  root.innerHTML=`
  <div class="modal-bg" onclick="S.showBroadcast=false;render()">
    <div class="modal fi" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
        <div style="width:36px;height:36px;border-radius:8px;background:#EFF6FF;display:flex;align-items:center;justify-content:center;color:#3B82F6">${ic('radio',18)}</div>
        <div>
          <div style="font-size:15px;font-weight:700;color:#111827">Broadcast Message</div>
          <div style="font-size:11px;color:#6B7280">Send to all ticket holders of this Drop</div>
        </div>
      </div>
      <div style="font-size:12px;color:#6B7280;margin-bottom:6px">This will notify <strong>8 guests</strong> via push notification.</div>
      <textarea placeholder="Type your message... (e.g. 'Venue moved to back patio entrance')" rows="4" style="width:100%;padding:12px;border-radius:10px;border:1px solid #E5E7EB;font-size:13px;color:#111827;background:#F9FAFB;outline:none;resize:vertical;font-family:inherit;box-sizing:border-box;margin-bottom:12px"></textarea>
      <div style="display:flex;gap:8px">
        <button onclick="S.showBroadcast=false;render()" style="flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid #D1D5DB;background:#fff;color:#374151">Cancel</button>
        <button onclick="S.showBroadcast=false;render()" style="flex:2;padding:12px;border-radius:10px;font-size:13px;font-weight:600;border:none;background:#3B82F6;color:#fff;display:flex;align-items:center;justify-content:center;gap:5px">${ic('send',15)} Send Broadcast</button>
      </div>
    </div>
  </div>`;
}

// ── Main ──
function render(){
  const c=document.getElementById('scr');
  const map={home:renderHome,create:renderCreate,liveview:renderLive2,checkin:renderCheckIn,guests:renderGuests,menu:renderMenu};
  c.innerHTML=(map[S.scr]||renderHome)();
  renderTB();renderModal();c.scrollTop=0;
}
render();
</script>
