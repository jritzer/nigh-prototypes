<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nigh Drops 2026 · Cover</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{width:1600px;height:960px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',Roboto,sans-serif;background:#0a0a14}

    .cover{width:1600px;height:960px;position:relative;display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-end;padding:80px 96px}

    /* Background */
    .bg-gradient{position:absolute;inset:0;background:radial-gradient(ellipse at 70% 40%, rgba(98,38,233,0.35) 0%, transparent 55%), radial-gradient(ellipse at 20% 80%, rgba(14,78,245,0.25) 0%, transparent 50%), radial-gradient(ellipse at 90% 90%, rgba(65,239,249,0.12) 0%, transparent 40%), #0a0a14}
    .bg-grid{position:absolute;inset:0;opacity:0.04;background-image:linear-gradient(rgba(255,255,255,1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,1) 1px, transparent 1px);background-size:80px 80px}
    .bg-glow{position:absolute;top:-200px;right:-100px;width:900px;height:900px;border-radius:50%;background:radial-gradient(circle, rgba(98,38,233,0.20) 0%, transparent 70%);pointer-events:none}

    /* Logo mark large */
    .logo-mark{position:absolute;top:80px;right:96px;opacity:0.08}

    /* Content */
    .content{position:relative;z-index:1}
    .eyebrow{font-size:13px;font-weight:700;color:rgba(255,255,255,0.40);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:20px;display:flex;align-items:center;gap:10px}
    .eyebrow-line{width:32px;height:1.5px;background:rgba(255,255,255,0.25)}
    .title{font-size:80px;font-weight:800;color:#fff;letter-spacing:-0.03em;line-height:1;margin-bottom:10px}
    .title span{color:#6226E9}
    .subtitle{font-size:28px;font-weight:600;color:rgba(255,255,255,0.40);letter-spacing:-0.01em;margin-bottom:48px}

    /* Tags */
    .tags{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:56px}
    .tag{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:0.04em}
    .tag-purple{background:rgba(98,38,233,0.20);border:1px solid rgba(98,38,233,0.40);color:#a78bfa}
    .tag-blue{background:rgba(14,78,245,0.20);border:1px solid rgba(14,78,245,0.40);color:#60a5fa}
    .tag-teal{background:rgba(65,239,249,0.10);border:1px solid rgba(65,239,249,0.25);color:#41EFF9}

    /* Meta row */
    .meta{display:flex;align-items:center;gap:32px}
    .meta-item{display:flex;flex-direction:column;gap:3px}
    .meta-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.30);text-transform:uppercase;letter-spacing:0.10em}
    .meta-value{font-size:14px;font-weight:600;color:rgba(255,255,255,0.65)}
    .meta-sep{width:1px;height:36px;background:rgba(255,255,255,0.10)}

    /* Brand lockup top-left */
    .brand{position:absolute;top:80px;left:96px;display:flex;align-items:center;gap:14px;z-index:1}
    .brand-wordmark{font-size:20px;font-weight:700;color:#0E4EF5;letter-spacing:-0.01em}

    /* Decorative pill */
    .pill{position:absolute;top:80px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:7px 20px;font-size:11px;font-weight:600;color:rgba(255,255,255,0.35);letter-spacing:0.06em;text-transform:uppercase;z-index:1}
  </style>
</head>
