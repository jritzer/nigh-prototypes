<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nigh Inbox</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0B0B1A;
  color: #fff;
}

#app {
  width: 375px;
  height: 812px;
  background: #0B0B1A;
  display: flex;
  flex-direction: column;
  margin: 24px auto;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

#header {
  padding: 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
}

#header h1 {
  font-size: 28px;
  font-weight: 800;
  color: #fff;
}

#feed {
  flex: 1;
  overflow-y: auto;
  padding: 12px 0;
}

#feed::-webkit-scrollbar {
  width: 4px;
}

#feed::-webkit-scrollbar-track {
  background: transparent;
}

#feed::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
}

.message {
  padding: 14px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
  transition: background 0.2s;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.message:active {
  background: rgba(255,255,255,0.02);
}

.message-avatar {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
}

.message-nigh {
  background: linear-gradient(135deg, rgba(98,38,233,0.2), rgba(14,78,245,0.2));
  border: 1px solid rgba(98,38,233,0.3);
}

.message-alert {
  background: linear-gradient(135deg, rgba(245,166,35,0.2), rgba(236,25,119,0.2));
  border: 1px solid rgba(245,166,35,0.3);
}

.message-friend {
  background: rgba(65,239,249,0.15);
  border: 1px solid rgba(65,239,249,0.2);
}

.message-content {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.message-title {
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  word-break: break-word;
}

.message-subtitle {
  font-size: 12px;
  color: #fff;
  word-break: break-word;
}

.message-time {
  font-size: 11px;
  color: rgba(255,255,255,0.60);
  margin-top: 2px;
}

.message-right {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.unread-indicator {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #0E4EF5;
}

.empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: rgba(255,255,255,0.60);
  font-size: 14px;
}

.modal-bg {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  z-index: 200;
}

.modal {
  background: #0B0B1A;
  border-radius: 20px 20px 0 0;
  width: 375px;
  max-height: 80vh;
  overflow-y: auto;
  padding: 20px 16px 32px;
  animation: slideUp 0.3s ease-out;
}

@keyframes slideUp {
  from {
    transform: translateY(100%);
  }
  to {
    transform: translateY(0);
  }
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.modal-title {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
}

.modal-close {
  background: none;
  border: none;
  color: rgba(255,255,255,0.60);
  font-size: 24px;
  cursor: pointer;
  padding: 0 8px;
}

.modal-content {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.modal-section {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.modal-label {
  font-size: 11px;
  font-weight: 700;
  color: rgba(255,255,255,0.70);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.modal-text {
  font-size: 14px;
  color: #fff;
  line-height: 1.6;
}

.video-thumbnail {
  width: 100%;
  aspect-ratio: 16/9;
  background: linear-gradient(135deg, rgba(98,38,233,0.2), rgba(14,78,245,0.2));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 8px;
  border: 1px solid rgba(98,38,233,0.3);
}

.play-icon {
  width: 48px;
  height: 48px;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <h1>Inbox</h1>
  </div>
  <div id="feed"></div>
</div>

<div id="modal-container"></div>

<script>
// Icons
const I = {
  play: '<polygon points="5 3 19 12 5 21 5 3"/>',
  bell: '<path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>',
  users: '<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>',
  ticket: '<path d="M2 9a2 2 0 012-2h16a2 2 0 012 2v2a2 2 0 000 4v2a2 2 0 01-2 2H4a2 2 0 01-2-2v-2a2 2 0 000-4V9z"/>',
  x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
};

function ic(n, s = 20) {
  return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">${I[n] || ''}</svg>`;
}

// Sample messages data
const messages = [
  {
    id: 1,
    type: 'nigh',
    title: 'Nigh Culture: What We\'re Building',
    author: 'The Nigh Team',
    subtitle: 'Short video',
    time: 'Now',
    unread: true,
    avatar: '▶',
    detail: {
      category: 'Culture & Values',
      description: 'Learn about Nigh\'s mission to bring people together for meaningful moments. This video shares our core values and the experiences we\'re creating.',
      duration: '3 minutes',
      thumbnail: true
    }
  },
  {
    id: 2,
    type: 'alert',
    title: 'Nike Air Max Day Access',
    subtitle: 'Nike Boulder · Starts in 2h',
    description: 'Don\'t miss this exclusive early access to the Air Max Day collection.',
    time: '12 min ago',
    unread: true,
    avatar: '🔔',
    detail: {
      drop: 'Nike Air Max Day Access',
      status: 'Starting soon',
      location: '1800 29th St, Boulder, CO',
      time: 'Starts in 2 hours at 2:00 PM',
      message: 'Don\'t miss this exclusive early access to the Air Max Day collection.'
    }
  },
  {
    id: 3,
    type: 'friend',
    title: 'Alex Rivera got a ticket',
    subtitle: 'Whole Foods Chef\'s Table · Mar 5',
    description: '5-course tasting menu with seasonal organic ingredients',
    time: '35 min ago',
    unread: false,
    avatar: 'AR',
    detail: {
      friend: 'Alex Rivera',
      action: 'just got a ticket to',
      drop: 'Whole Foods Chef\'s Table',
      date: 'Wednesday, March 5 · 6:30 PM - 8:00 PM',
      message: 'Alex is going to experience a 5-course tasting menu with seasonal organic ingredients.'
    }
  },
  {
    id: 4,
    type: 'nigh',
    title: 'Training: How to Use Nigh Drops',
    author: 'The Nigh Team',
    subtitle: 'Quick tutorial',
    time: '2 hours ago',
    unread: false,
    avatar: '▶',
    detail: {
      category: 'How-To Training',
      description: 'Get started with Nigh. This tutorial walks you through discovering drops, getting tickets, and checking in at experiences.',
      duration: '5 minutes',
      thumbnail: true
    }
  },
  {
    id: 5,
    type: 'friend',
    title: 'Jordan Lee checked in',
    subtitle: 'Nike Air Max Day Access · Today',
    description: 'Early access to the newest Air Max releases',
    time: '4 hours ago',
    unread: false,
    avatar: 'JL',
    detail: {
      friend: 'Jordan Lee',
      action: 'just checked in to',
      drop: 'Nike Air Max Day Access',
      date: 'Today at 2:00 PM',
      message: 'Jordan is now at the Nike Boulder exclusive event. They\'re experiencing early access to the newest Air Max releases.'
    }
  },
  {
    id: 6,
    type: 'alert',
    title: 'Whole Foods Chef\'s Table',
    subtitle: 'Whole Foods Market · Available now',
    description: 'Reserve now before spots fill up.',
    time: '1 day ago',
    unread: false,
    avatar: '🔔',
    detail: {
      drop: 'Whole Foods Chef\'s Table',
      status: 'Spots available',
      location: '2905 Pearl St, Boulder, CO',
      time: 'Arrival Window: 6:30 PM - 8:00 PM',
      message: 'Spots are still available for this 5-course tasting menu experience. Book now before they fill up.'
    }
  },
  {
    id: 7,
    type: 'nigh',
    title: 'Nigh Updates: What\'s New',
    author: 'The Nigh Team',
    subtitle: 'Monthly update',
    time: '2 days ago',
    unread: false,
    avatar: '▶',
    detail: {
      category: 'Product Updates',
      description: 'See what\'s new in Nigh this month. We\'ve been busy building features to make discovering and sharing experiences easier than ever.',
      duration: '4 minutes',
      thumbnail: true
    }
  }
];

// State
let state = {
  messages: messages,
  selectedMessage: null
};

function formatTime(timeStr) {
  return timeStr;
}

function renderFeed() {
  const feed = document.getElementById('feed');
  feed.innerHTML = state.messages.map(msg => {
    const unreadClass = msg.unread ? 'unread-indicator' : '';
    const avatarClass = msg.type === 'nigh' ? 'message-nigh' : msg.type === 'alert' ? 'message-alert' : 'message-friend';

    return `
      <div class="message" onclick="openMessage(${msg.id})">
        <div class="message-avatar ${avatarClass}">${msg.avatar}</div>
        <div class="message-content">
          <div class="message-title">${msg.title}</div>
          ${msg.author ? `<div class="message-subtitle">${msg.author}</div>` : ''}
          <div class="message-subtitle">${msg.subtitle}</div>
          ${msg.description ? `<div class="message-subtitle">${msg.description}</div>` : ''}
          <div class="message-time">${formatTime(msg.time)}</div>
        </div>
        <div class="message-right">
          ${msg.unread ? '<div class="unread-indicator"></div>' : ''}
        </div>
      </div>
    `;
  }).join('');
}

function openMessage(id) {
  const msg = state.messages.find(m => m.id === id);
  if (!msg) return;

  state.selectedMessage = msg;

  // Mark as read
  msg.unread = false;
  renderFeed();

  // Show modal
  let modalContent = '';

  if (msg.type === 'nigh') {
    modalContent = `
      <div class="modal-content">
        <div class="video-thumbnail">
          <div class="play-icon">${ic('play', 32)}</div>
        </div>
        <div class="modal-text">${msg.detail.category}</div>
        <div class="modal-text">${msg.detail.description}</div>
      </div>
    `;
  } else if (msg.type === 'alert') {
    modalContent = `
      <div class="modal-content">
        <div class="modal-text">${msg.detail.status}</div>
        <div class="modal-text">${msg.detail.location}</div>
        <div class="modal-text">${msg.detail.time}</div>
        <div class="modal-text">${msg.detail.message}</div>
      </div>
    `;
  } else if (msg.type === 'friend') {
    modalContent = `
      <div class="modal-content">
        <div class="modal-text">${msg.detail.friend} ${msg.detail.action} <strong>${msg.detail.drop}</strong></div>
        <div class="modal-text">${msg.detail.date}</div>
        <div class="modal-text">${msg.detail.message}</div>
      </div>
    `;
  }

  const container = document.getElementById('modal-container');
  container.innerHTML = `
    <div class="modal-bg" onclick="closeMessage(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <div class="modal-title">${msg.title}</div>
          <button class="modal-close" onclick="closeMessage()">${ic('x', 20)}</button>
        </div>
        ${modalContent}
      </div>
    </div>
  `;
}

function closeMessage(event) {
  if (event && event.target.id !== 'modal-container') return;
  document.getElementById('modal-container').innerHTML = '';
  state.selectedMessage = null;
}

// Initial render
renderFeed();
</script>

</body>
</html>
