// Helpers
function bg(st,sm){const m={'Live':'bg-live','Draft':'bg-draft','Ended':'bg-ended','Scheduled':'bg-sched','Paused':'bg-paused','Checked In':'bg-ci','Reserved':'bg-res','No-Show':'bg-ns'};
  return `<span class="bg ${m[st]||'bg-draft'}${sm?' bg-s':''}""><span class="dt"></span>${st}</span>`;}
function fmtD(d){return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function sameD(a,b){return a.toDateString()===b.toDateString()}
function dk(d){return d.toISOString().slice(0,10)}
function fmtVenue(v){return v.replace(/,?\s*\d{5}(-\d{4})?\s*$/,'');}
function gSt(g){const t=g.tickets;if(t.length===1)return t[0].status;const ci=t.filter(x=>x.status==='Checked In').length;if(ci===t.length)return'Checked In';if(ci>0)return`${ci}/${t.length} In`;if(t.some(x=>x.status==='No-Show'))return'No-Show';return'Reserved';}
function mc(l,v,sub,icn,col,bgc){return `<div style="background:#fff;border-radius:12px;padding:14px;border:1px solid #E5E7EB;flex:1 1 45%;min-width:130px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:11px;color:#6B7280;font-weight:500;margin-bottom:3px">${l}</div><div style="font-size:20px;font-weight:700;color:#111827">${v}</div>${sub?`<div style="font-size:10px;color:${col||'#0D9488'};margin-top:2px">${sub}</div>`:''}</div><div style="width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:${bgc||'#EEF2FF'};color:${col||'#0E4EF5'}">${ic(icn,16)}</div></div></div>`;}
function hdr(t,sub,back,right){return `<div style="background:#fff;padding:12px 16px;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99"><div style="display:flex;align-items:center;gap:10px">${back?`<button onclick="${back}" style="background:none;border:none;padding:4px;display:flex;color:#374151">${ic('left',20)}</button>`:''}<div><div style="font-size:17px;font-weight:700;color:#111827;line-height:1.2">${t}</div>${sub?`<div style="font-size:12px;color:#6B7280;margin-top:1px">${sub}</div>`:''}</div></div>${right||''}</div>`;}

    /* Empty state */
    const hasAnything=live||scheduled.length||ended.length||dayDrafts.length;

    if(!hasAnything){

    const dayHasActiveDrop=dd.some(d=>d.status!=='Draft'&&d.status!=='Ended');

    return emptyHtml+liveHtml+schedHtml+endedHtml+createHtml+draftHtml;

  </div>`;
}

  return `${hdr('Create Drop',`Step ${S.cStep}/4 — ${steps[S.cStep-1]}`,S.cStep>1?"S.cStep--;render()":"go('home')")}

    `<button onclick="modal('dropmenu')" style="background:none;border:none;color:#4B5563;padding:4px">${ic('more',20)}</button>`)}

}

// ═══ GUESTS ═══
function renderG(){
  const live=drops.find(d=>d.status==='Live')||drops[0];
  const cur=S.guestDrop==='all'?null:live;
  const fl=['All','Checked In','Reserved','No-Show'];
  const gl=cur?guests.filter(g=>g.drop===cur.id):guests;
  const fg=S.rFilter==='All'?gl:gl.filter(g=>{const st=gSt(g);return S.rFilter==='Checked In'?st.includes('Checked')||st.includes('In'):st===S.rFilter;});

  return `${hdr('Guests','')}
  <div style="padding:12px 16px">
    <select onchange="S.guestDrop=this.value;S.rFilter='All';S.rSel=null;render()" style="width:100%;padding:8px 10px;border-radius:8px;border:1px solid #E5E7EB;font-size:12px;color:#111827;background:#fff;font-weight:600;margin-bottom:8px">
      <option value="current" ${S.guestDrop==='current'?'selected':''}>Current: ${live.title}</option>
      ${drops.filter(d=>d.status!=='Draft'&&d.id!==live.id).map(d=>`<option value="${d.id}">${d.title} — ${fmtD(d.date)}</option>`).join('')}
      <option value="all" ${S.guestDrop==='all'?'selected':''}>All Guests</option>
    </select>
    <div style="display:flex;align-items:center;gap:8px;background:#fff;border-radius:10px;border:1px solid #E5E7EB;padding:7px 10px;margin-bottom:8px"><span style="color:#9CA3AF">${ic('search',15)}</span><input placeholder="Search by name or username..." style="flex:1;border:none;outline:none;font-size:12px;color:#111827;background:transparent"/></div>
    <button onclick="S.modal='csv-import';S.importStep=1;render()" style="width:100%;background:none;border:1px solid #E5E7EB;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;color:#0E4EF5;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:6px">${ic('upload',14)} Import Customers</button>
    <div style="display:flex;gap:5px;margin-bottom:10px;overflow-x:auto">${fl.map(f=>{const cnt=f==='All'?gl.length:gl.filter(g=>{const st=gSt(g);return f==='Checked In'?st.includes('Checked')||st.includes('In'):st===f}).length;return`<button onclick="S.rFilter='${f}';S.rSel=null;render()" style="padding:5px 12px;border-radius:18px;font-size:11px;font-weight:500;border:1px solid ${S.rFilter===f?'#0E4EF5':'#E5E7EB'};background:${S.rFilter===f?'#EEF2FF':'#fff'};color:${S.rFilter===f?'#0E4EF5':'#4B5563'};white-space:nowrap">${f} (${cnt})</button>`;}).join('')}</div>
    ${fg.map(g=>{const st=gSt(g);const multi=g.tickets.length>1;const exp=S.rSel===g.id;
      return `<div onclick="S.rSel=S.rSel==='${g.id}'?null:'${g.id}';render()" style="background:#fff;border-radius:10px;padding:10px 12px;border:1px solid ${exp?'#0E4EF5':'#E5E7EB'};margin-bottom:6px;cursor:pointer">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#0E4EF5,#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0">${g.av}</div>
          <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:#111827">${g.name}</div><div style="font-size:11px;color:#9CA3AF">${g.uname}</div></div>
          <div style="text-align:right;flex-shrink:0">
            ${multi?`<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:${st.includes('/')? '#FEF3C7':'#DCFCE7'};color:${st.includes('/')?'#92400E':'#166534'}">${st}</span>`
              :bg(g.tickets[0].status,true)}
            ${multi?`<div style="font-size:10px;color:#9CA3AF;margin-top:2px">${g.tickets.length} spots</div>`:''}
          </div>
        </div>
        ${exp?`<div class="fi" style="margin-top:8px;padding-top:8px;border-top:1px solid #F3F4F6">
          ${multi?`<div style="margin-bottom:8px">${g.tickets.map(t=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:11px"><span style="color:#6B7280">${t.tid}</span>${bg(t.status,true)}<div style="display:flex;gap:4px">${t.status==='Reserved'?`<button onclick="event.stopPropagation()" style="padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;border:none;background:#0D9488;color:#fff">Check In</button>`:''}<button onclick="event.stopPropagation()" style="padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;border:1px solid #EF4444;background:#FEF2F2;color:#EF4444">Cancel</button></div></div>`).join('')}</div>`:''}
          ${!multi?`<div style="display:flex;gap:5px">
            ${g.tickets[0].status==='Reserved'?`<button onclick="event.stopPropagation()" style="flex:1;padding:7px;border-radius:7px;font-size:11px;font-weight:600;border:none;background:#0D9488;color:#fff;display:flex;align-items:center;justify-content:center;gap:3px">${ic('check',13)} Check In</button>`:''}
            <button onclick="event.stopPropagation()" style="flex:1;padding:7px;border-radius:7px;font-size:11px;font-weight:600;border:1px solid #EF4444;background:#FEF2F2;color:#EF4444;display:flex;align-items:center;justify-content:center;gap:3px">${ic('x',13)} Cancel & Refund</button></div>`:''}
        </div>`:''}</div>`;}).join('')}
  </div>`;
}

// ═══ MENU ═══
function renderMenu(){
  if(S.menuSub==='team')return renderTeam();
  if(S.menuSub==='payout')return renderPayout();
  if(S.menuSub==='analytics')return renderAnalytics();
  if(S.menuSub==='profile')return renderProfile();
  if(S.menuSub==='subscription')return renderSubscription();
  if(S.menuSub==='partners')return renderPartners();
  if(S.menuSub==='customers')return renderCustomers();
  if(S.menuSub==='settings')return renderSettings();
  if(S.menuSub==='userAccount')return renderUserAccount();
  if(S.menuSub==='feedback')return renderFeedback();
  if(S.menuSub==='tos')return renderToS();
  if(S.menuSub==='privacy')return renderPrivacy();
  const userRole=team.find(t=>t.name==='Josh Ritzer')?.role||'Team Member';
  const canManagePartners=['Super Admin','Admin','Manager'].includes(userRole);
  const items=[
    {ic:'userPlus',l:'Team',d:'Manage staff & roles',act:"S.menuSub='team';render()"},
    {ic:'store',l:'Location',d:'Profile & account',act:"S.menuSub='profile';render()"},
    {ic:'users',l:'Guests',d:'View and import your customers',act:"S.menuSub='customers';render()"},
    {ic:'chart',l:'Analytics',d:'Performance & metrics',act:"S.menuSub='analytics';render()"},
    {ic:'dollar',l:'Payouts',d:'Revenue & transactions',act:"S.menuSub='payout';render()"},
    {ic:'billing',l:'Billing',d:'Plan, billing & usage',act:"S.menuSub='subscription';render()"},

      <div style="font-size:12px;color:#6B7280;margin-bottom:6px">This will notify <strong>8 guests</strong> via push notification.</div>
      <textarea placeholder="e.g. 'Venue moved to back patio entrance'" rows="4" style="width:100%;padding:12px;border-radius:10px;border:1px solid #E5E7EB;font-size:13px;color:#111827;background:#F9FAFB;outline:none;resize:vertical;font-family:inherit;box-sizing:border-box;margin-bottom:12px"></textarea>
      <div style="display:flex;gap:8px"><button onclick="modal(null)" style="flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid #D1D5DB;background:#fff;color:#374151">Cancel</button><button onclick="modal(null)" style="flex:2;padding:12px;border-radius:10px;font-size:13px;font-weight:600;border:none;background:#0E4EF5;color:#fff;display:flex;align-items:center;justify-content:center;gap:5px">${ic('send',15)} Send</button></div>
    </div></div>`;
  }
  else if(S.modal&&S.modal.startsWith('share')){
    const idx=parseInt(S.modal.split('-')[1])||0;const d=drops[idx];
    mr.innerHTML=`<div class="modal-bg" onclick="modal(null)"><div class="modal fi" onclick="event.stopPropagation()"><div class="mh"></div>
      <div style="font-size:15px;font-weight:700;color:#111827;margin-bottom:4px">Share Drop</div>
      <div style="font-size:12px;color:#6B7280;margin-bottom:14px">${d.title}</div>
      <div style="display:flex;align-items:center;gap:8px;background:#F3F4F6;border-radius:10px;padding:10px 14px;margin-bottom:14px">
        <span style="font-size:13px;color:#374151;flex:1;font-weight:500">nigh.com/${d.slug}</span>
        <button style="padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;border:none;background:#0E4EF5;color:#fff">Copy</button>
      </div>
      <div style="display:flex;gap:8px;justify-content:center">
        ${['SMS','Email','Instagram','More'].map(s=>`<button style="width:60px;padding:10px 0;border-radius:10px;border:1px solid #E5E7EB;background:#fff;font-size:10px;color:#374151;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:32px;height:32px;border-radius:50%;background:#F3F4F6;display:flex;align-items:center;justify-content:center;color:#6B7280">${ic(s==='SMS'?'msgCircle':s==='Email'?'send':s==='Instagram'?'cam':'share',16)}</div>${s}</button>`).join('')}
      </div>
    </div></div>`;
  }
  else if(S.modal==='history'){
    mr.innerHTML=`<div class="modal-bg" onclick="modal(null)"><div class="modal fi" onclick="event.stopPropagation()"><div class="mh"></div>
      <div style="font-size:15px;font-weight:700;color:#111827;margin-bottom:14px">Drop History</div>
      ${[
        {time:'Mar 5, 11:02 AM',who:'Josh Ritzer',act:'Published drop'},
        {time:'Mar 5, 10:58 AM',who:'Josh Ritzer',act:'Updated description'},
        {time:'Mar 5, 10:46 AM',who:'System',act:'@shedeurs declined partner invite'},
        {time:'Mar 5, 10:45 AM',who:'Josh Ritzer',act:'Invited @shedeurs as partner'},
        {time:'Mar 5, 10:42 AM',who:'Josh Ritzer',act:'Invited @titosvodka as partner'},
        {time:'Mar 5, 10:40 AM',who:"Tito's Vodka",act:'Accepted partner invite'},
        {time:'Mar 4, 3:30 PM',who:'Maria Santos',act:'Updated capacity: 6 → 8'},
        {time:'Mar 4, 2:15 PM',who:'Josh Ritzer',act:'Created drop'},
      ].map((h,i,a)=>`
        <div style="display:flex;gap:10px;padding:10px 0;${i<a.length-1?'border-bottom:1px solid #F3F4F6':''}">
          <div style="width:8px;display:flex;flex-direction:column;align-items:center;padding-top:4px"><div style="width:8px;height:8px;border-radius:50%;background:${i===0?'#0E4EF5':'#D1D5DB'}"></div>${i<a.length-1?'<div style="width:1px;flex:1;background:#E5E7EB;margin-top:4px"></div>':''}</div>
          <div><div style="font-size:12px;font-weight:600;color:#111827">${h.act}</div><div style="font-size:11px;color:#9CA3AF;margin-top:2px">${h.who} — ${h.time}</div></div>
        </div>
      `).join('')}
    </div></div>`;
  }
  else if(S.modal==='invite-partner'){
    const d=drops[S.drop||0];const rem=acct().maxPartners-d.partners.length;
    mr.innerHTML=`<div class="modal-bg" onclick="modal(null)"><div class="modal fi" onclick="event.stopPropagation()"><div class="mh"></div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div style="width:36px;height:36px;border-radius:8px;background:#EEF2FF;display:flex;align-items:center;justify-content:center;color:#0E4EF5">${ic('userPlus',18)}</div><div><div style="font-size:15px;font-weight:700;color:#111827">Invite Partner</div><div style="font-size:11px;color:#6B7280">${rem} slot${rem!==1?'s':''} remaining of ${acct().maxPartners}</div></div></div>
      <div style="background:#EEF2FF;border-radius:8px;padding:8px 10px;margin:10px 0;font-size:11px;color:#0E4EF5;line-height:1.5">Partners won't appear on the public drop until they accept your invite.</div>
      <div style="margin-bottom:10px"><label style="font-size:11px;font-weight:600;color:#374151;display:block;margin-bottom:5px">Nigh Handle or Name</label>
      <div style="display:flex;gap:6px"><input id="pinv" placeholder="e.g. @shedeurs or 303-555-0100" style="flex:1;padding:9px 10px;border-radius:8px;border:1px solid #E5E7EB;font-size:13px;background:#F9FAFB;outline:none"/></div></div>
      <div style="font-size:11px;font-weight:600;color:#374151;margin-bottom:7px">Quick Add from Previous Drops</div>
      ${partnersList.filter(p=>p.status==='Active').map(p=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F3F4F6">
        <div style="display:flex;align-items:center;gap:8px"><div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#1B2A4A,#0E4EF5);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff">${p.name.charAt(0)}</div><div><div style="font-size:12px;font-weight:600;color:#111827">${p.name}</div><div style="font-size:10px;color:#9CA3AF">${p.handle}</div></div></div>
        <button onclick="modal(null)" style="padding:5px 12px;border-radius:8px;font-size:11px;font-weight:600;border:none;background:#0E4EF5;color:#fff">Invite</button>
      </div>`).join('')}
      <div style="display:flex;gap:8px;margin-top:14px"><button onclick="modal(null)" style="flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid #D1D5DB;background:#fff;color:#374151">Cancel</button><button onclick="modal(null)" style="flex:2;padding:12px;border-radius:10px;font-size:13px;font-weight:600;border:none;background:#0E4EF5;color:#fff;display:flex;align-items:center;justify-content:center;gap:5px">${ic('send',15)} Send Invite</button></div>
    </div></div>`;
  }
  else{mr.innerHTML='';}
}

// ── Render ──
function renderInbox(){
  const filter=S.inboxFilter||'all';
  const typeMap={reservation:'all',headsup_reply:'messages',partner:'partners',checkin:'activity',alert:'activity',noshow:'activity'};
  const filtered=filter==='all'?proInbox:proInbox.filter(m=>typeMap[m.type]===filter);
  const unread=proInbox.filter(m=>m.unread).length;
  const filters=[{key:'all',label:'All'},{key:'activity',label:'Activity'},{key:'messages',label:'Messages'},{key:'partners',label:'Partners'}];
  const typeIcon={
    reservation:'<svg width="20" height="20" viewBox="0 0 24 24" stroke="#fff" stroke-width="2" fill="none"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/></svg>',
    headsup_reply:'<svg width="20" height="20" viewBox="0 0 24 24" stroke="#fff" stroke-width="2" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>',
    partner:'<svg width="20" height="20" viewBox="0 0 24 24" stroke="#fff" stroke-width="2" fill="none"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>',
    checkin:'<svg width="20" height="20" viewBox="0 0 24 24" stroke="#fff" stroke-width="2" fill="none"><polyline points="20 6 9 17 4 12"/></svg>',
    alert:'<svg width="20" height="20" viewBox="0 0 24 24" stroke="#fff" stroke-width="2" fill="none"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>',
    noshow:'<svg width="20" height="20" viewBox="0 0 24 24" stroke="#fff" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
  };
  return`
  <div style="background:#F9FAFB;min-height:100%">
    <div style="background:#fff;padding:16px 16px 0;border-bottom:1px solid #E5E7EB;position:sticky;top:0;z-index:99">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
        <div style="font-size:22px;font-weight:800;color:#111827">Inbox</div>
        ${unread>0?`<span style="font-size:11px;font-weight:600;color:#0E4EF5;background:#EEF2FF;padding:3px 10px;border-radius:20px">${unread} new</span>`:''}
      </div>
      <div style="display:flex;gap:6px;padding:10px 0 0;overflow-x:auto">
        ${filters.map(f=>`<button onclick="S.inboxFilter='${f.key}';render()" style="flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid ${filter===f.key?'#0E4EF5':'#E5E7EB'};background:${filter===f.key?'#0E4EF5':'#fff'};color:${filter===f.key?'#fff':'#6B7280'};cursor:pointer;font-family:inherit;margin-bottom:10px">${f.label}</button>`).join('')}
      </div>
    </div>
    <div>
      ${filtered.length===0?`<div style="text-align:center;padding:48px 24px;color:#9CA3AF;font-size:14px">Nothing here yet</div>`:''}
      ${filtered.map(msg=>`
        <div onclick="${msg.type==='partner'?"S.menuSub='partners';S.scr='menu';render()":msg.type==='checkin'||msg.type==='noshow'?"S.scr='checkin';render()":''}" style="background:#fff;margin:0;padding:14px 16px;border-bottom:1px solid #F3F4F6;display:flex;gap:12px;align-items:flex-start;cursor:pointer;${msg.unread?'border-left:3px solid #0E4EF5;':''}" >
          <div style="width:46px;height:46px;flex-shrink:0;border-radius:${msg.type==='partner'?'10px':'50%'};background:${msg.avColor};display:flex;align-items:center;justify-content:center;">
            ${msg.av?`<span style="font-size:13px;font-weight:700;color:#fff">${msg.av}</span>`:typeIcon[msg.type]||''}
          </div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
              <div style="font-size:13px;font-weight:${msg.unread?'700':'600'};color:#111827">${msg.title}</div>
              <div style="font-size:11px;color:#9CA3AF;flex-shrink:0;margin-left:8px">${msg.time}</div>
            </div>
            <div style="font-size:12px;color:#6B7280;line-height:1.45">${msg.body}</div>
            ${msg.drop?`<div style="margin-top:5px;font-size:11px;font-weight:600;color:#0E4EF5;display:flex;align-items:center;gap:3px">${ic('zap',11)} ${msg.drop}</div>`:''}
          </div>
          ${msg.unread?`<div style="width:8px;height:8px;border-radius:50%;background:#0E4EF5;flex-shrink:0;margin-top:4px"></div>`:''}
        </div>
      `).join('')}
    </div>
  </div>`;
}

function render(){
  const c=document.getElementById('scr');
  const m={home:renderHome,create:renderCreate,liveview:renderLive,checkin:renderCI,guests:renderG,menu:renderMenu,inbox:renderInbox};
  c.innerHTML=(m[S.scr]||renderHome)();
  renderTB();renderModal();c.scrollTop=0;
}
render();
</script>
