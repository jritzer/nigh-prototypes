<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nigh Pro — Mobile App Screens</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #F3F4F6; display: flex; justify-content: center;
    padding: 24px 16px; min-height: 100vh;
  }
  #app-wrapper {
    width: 375px; height: 812px; border-radius: 24px;
    border: 1px solid #E5E7EB; box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    overflow: hidden; display: flex; flex-direction: column; background: #F9FAFB;
    position: relative;
  }
  .screen { flex: 1; overflow-y: auto; }
  .screen::-webkit-scrollbar { width: 0; }
  button { font-family: inherit; }
  input, textarea { font-family: inherit; }

  /* Tab Bar */
  .tab-bar {
    display: flex; justify-content: space-around; align-items: center;
    background: #fff; border-top: 1px solid #E5E7EB; padding: 6px 0 10px;
    flex-shrink: 0;
  }
  .tab-btn {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    background: none; border: none; cursor: pointer; padding: 4px 12px;
    min-width: 56px; color: #9CA3AF; transition: color 0.15s;
  }
  .tab-btn.active { color: #3B82F6; }
  .tab-btn span { font-size: 10px; font-weight: 500; }
  .tab-btn.active span { font-weight: 600; }

  /* Header */
  .header {
    background: #fff; padding: 12px 16px; border-bottom: 1px solid #E5E7EB;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 99; flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-title { font-size: 17px; font-weight: 700; color: #111827; line-height: 1.2; }
  .header-sub { font-size: 12px; color: #6B7280; margin-top: 1px; }
  .back-btn {
    background: none; border: none; cursor: pointer; padding: 4px;
    display: flex; color: #374151;
  }

  /* Status badges */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px;
    letter-spacing: 0.01em;
  }
  .badge-sm { font-size: 10px; padding: 2px 8px; }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; }
  .badge-live { background: #DCFCE7; color: #166534; }
  .badge-live .badge-dot { background: #22C55E; }
  .badge-sold { background: #FEF3C7; color: #92400E; }
  .badge-sold .badge-dot { background: #F59E0B; }
  .badge-draft { background: #F3F4F6; color: #4B5563; }
  .badge-draft .badge-dot { background: #9CA3AF; }
  .badge-checkedin { background: #DCFCE7; color: #166534; }
  .badge-checkedin .badge-dot { background: #22C55E; }
  .badge-reserved { background: #DBEAFE; color: #1E40AF; }
  .badge-reserved .badge-dot { background: #3B82F6; }
  .badge-noshow { background: #FEE2E2; color: #991B1B; }
  .badge-noshow .badge-dot { background: #EF4444; }

  /* Utility */
  .flex { display: flex; }
  .gap-8 { gap: 8px; }
  .gap-10 { gap: 10px; }
  .gap-12 { gap: 12px; }
  .flex-1 { flex: 1; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .text-center { text-align: center; }
  .card {
    background: #fff; border-radius: 14px; border: 1px solid #E5E7EB;
    overflow: hidden;
  }
  .card-body { padding: 14px; }

  /* Animations */
  @keyframes scanLine {
    0%, 100% { top: 20%; }
    50% { top: 70%; }
  }
  .scan-line {
    animation: scanLine 2s ease-in-out infinite;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn 0.3s ease-out; }

  /* SVG icons inline */
  .icon { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2;
    fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .icon-sm { width: 16px; height: 16px; }
  .icon-lg { width: 24px; height: 24px; }
  .icon-xl { width: 48px; height: 48px; }
</style>
</head>
<body>

<div id="app-wrapper">
  <div class="screen" id="screen-container"></div>
  <div class="tab-bar" id="tab-bar"></div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────
let currentScreen = 'dashboard';
let selectedDrop = null;
let createStep = 1;
let checkinMode = 'scan';
let resFilter = 'All';
let selectedRes = null;
let formData = { title: '', description: '', timingMode: 'start', category: 'Food & Drink', capacity: '', price: '', venue: '' };

// ── Icons (SVG paths) ────────────────────────────────────────────────
const icons = {
  home: '<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><polyline points="9 22 9 12 15 12 15 22"/>',
  plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  qr: '<rect x="2" y="2" width="8" height="8" rx="1"/><rect x="14" y="2" width="8" height="8" rx="1"/><rect x="2" y="14" width="8" height="8" rx="1"/><path d="M14 14h2v2h-2z"/><path d="M20 14h2v2h-2z"/><path d="M14 20h2v2h-2z"/><path d="M20 20h2v2h-2z"/><path d="M17 17h2v2h-2z"/>',
  users: '<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>',
  chart: '<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>',
  clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
  mapPin: '<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>',
  dollar: '<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>',
  check: '<polyline points="20 6 9 17 4 12"/>',
  search: '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
  x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  arrowLeft: '<line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>',
  chevRight: '<polyline points="9 18 15 12 9 6"/>',
  bell: '<path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>',
  zap: '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10"/>',
  upload: '<polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/>',
  image: '<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>',
  calendar: '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
  send: '<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9"/>',
  alert: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',
  pause: '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>',
  camera: '<path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/>',
  more: '<circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/>',
  trending: '<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>',
};

function icon(name, size, cls) {
  const s = size || 20;
  const c = cls || '';
  return `<svg class="icon ${c}" width="${s}" height="${s}" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">${icons[name] || ''}</svg>`;
}

// ── Sample Data ──────────────────────────────────────────────────────
const drops = [
  { id:'D001', title:'Nike Air Max Day Access', type:'Appointment', timing:'Start Time',
    startTime:'2:00 PM', date:'Mar 5', capacity:8, reserved:8, checkedIn:5, noShow:1,
    price:'Free', status:'Live - Sold Out', category:'Retail', venue:'Nike Boulder' },
  { id:'D002', title:'Starbucks Secret Menu Tasting', type:'Event', timing:'Arrival Window',
    startTime:'5:00 - 7:00 PM', date:'Mar 5', capacity:50, reserved:38, checkedIn:22, noShow:0,
    price:'Free', status:'Live', category:'Food & Drink', venue:'Starbucks Pearl St' },
  { id:'D003', title:"Whole Foods Chef's Table", type:'Event', timing:'Start Time',
    startTime:'6:30 PM', date:'Mar 6', capacity:12, reserved:9, checkedIn:0, noShow:0,
    price:'$45', status:'Live', category:'Food & Drink', venue:'Whole Foods Boulder' },
  { id:'D004', title:'Williams-Sonoma Cooking Class', type:'Event', timing:'Start Time',
    startTime:'11:00 AM', date:'Mar 8', capacity:10, reserved:4, checkedIn:0, noShow:0,
    price:'$75', status:'Draft', category:'Food & Drink', venue:'Williams-Sonoma Flatiron' },
];

const reservations = [
  { id:'R001', phone:'(303) 555-0101', name:'Sarah M.', tickets:2, status:'Checked-In', payment:'Free', time:'2:03 PM' },
  { id:'R002', phone:'(303) 555-0142', name:'James K.', tickets:1, status:'Checked-In', payment:'Free', time:'2:05 PM' },
  { id:'R003', phone:'(303) 555-0188', name:'Alex R.', tickets:2, status:'Checked-In', payment:'Free', time:'2:08 PM' },
  { id:'R004', phone:'(303) 555-0234', name:'Maya T.', tickets:1, status:'Reserved', payment:'Pre-auth', time:'1:45 PM' },
  { id:'R005', phone:'(303) 555-0301', name:'Chris P.', tickets:1, status:'No-Show', payment:'Captured', time:'1:30 PM' },
  { id:'R006', phone:'(303) 555-0377', name:'Lin W.', tickets:1, status:'Reserved', payment:'Pre-auth', time:'1:52 PM' },
];

// ── Helpers ──────────────────────────────────────────────────────────
function badge(status, small) {
  const map = {
    'Live': 'badge-live', 'Live - Sold Out': 'badge-sold', 'Draft': 'badge-draft',
    'Checked-In': 'badge-checkedin', 'Reserved': 'badge-reserved', 'No-Show': 'badge-noshow'
  };
  const cls = map[status] || 'badge-draft';
  const sz = small ? ' badge-sm' : '';
  return `<span class="badge ${cls}${sz}"><span class="badge-dot"></span>${status}</span>`;
}

function metricCard(label, value, sub, iconName, color, bg) {
  return `
    <div style="background:#fff;border-radius:12px;padding:16px;border:1px solid #E5E7EB;flex:1 1 45%;min-width:140px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:12px;color:#6B7280;font-weight:500;margin-bottom:4px">${label}</div>
          <div style="font-size:22px;font-weight:700;color:#111827">${value}</div>
          ${sub ? `<div style="font-size:11px;color:${color || '#0D9488'};margin-top:2px">${sub}</div>` : ''}
        </div>
        <div style="width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:${bg || '#EFF6FF'};color:${color || '#3B82F6'}">
          ${icon(iconName, 18)}
        </div>
      </div>
    </div>`;
}

// ── Navigation ───────────────────────────────────────────────────────
function navigate(screen, drop) {
  currentScreen = screen;
  if (drop !== undefined) selectedDrop = drop;
  if (screen === 'create') createStep = 1;
  if (screen === 'checkin') checkinMode = 'scan';
  if (screen === 'reservations') { resFilter = 'All'; selectedRes = null; }
  render();
}

// ── Tab Bar ──────────────────────────────────────────────────────────
function renderTabBar() {
  const tabs = [
    { id:'dashboard', icon:'home', label:'Home' },
    { id:'create', icon:'plus', label:'Create' },
    { id:'checkin', icon:'qr', label:'Check-In' },
    { id:'reservations', icon:'users', label:'Guests' },
    { id:'analytics', icon:'chart', label:'Analytics' },
  ];
  const bar = document.getElementById('tab-bar');
  bar.style.display = currentScreen === 'liveview' ? 'none' : 'flex';
  bar.innerHTML = tabs.map(t => `
    <button class="tab-btn ${currentScreen === t.id ? 'active' : ''}" onclick="navigate('${t.id}')">
      ${icon(t.icon, 22)} <span>${t.label}</span>
    </button>
  `).join('');
}

// ═════════════════════════════════════════════════════════════════════
// SCREEN: DASHBOARD
// ═════════════════════════════════════════════════════════════════════
function renderDashboard() {
  const d = drops[0];
  const totalRes = drops.reduce((s,d) => s+d.reserved, 0);
  const totalCI = drops.reduce((s,d) => s+d.checkedIn, 0);

  return `
  <div style="background:#1B2A4A;padding:16px 16px 20px;color:#fff">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div>
        <div style="font-size:13px;opacity:0.7;font-weight:500">Good afternoon</div>
        <div style="font-size:20px;font-weight:700">Centro Boulder</div>
      </div>
      <div style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;color:#fff">
        ${icon('bell', 18)}
      </div>
    </div>
    <div style="display:flex;gap:12px">
      ${[['Active Drops','2'],['Reservations',totalRes],['Checked In',totalCI]].map(s =>
        `<div style="flex:1;background:rgba(255,255,255,0.1);border-radius:10px;padding:10px 12px;text-align:center">
          <div style="font-size:20px;font-weight:700">${s[1]}</div>
          <div style="font-size:10px;opacity:0.7;margin-top:2px">${s[0]}</div>
        </div>`
      ).join('')}
    </div>
  </div>
  <div style="padding:16px">
    <button onclick="navigate('create')" style="width:100%;background:#3B82F6;color:#fff;border:none;border-radius:12px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:15px;font-weight:600;margin-bottom:20px;box-shadow:0 2px 8px rgba(59,130,246,0.3)">
      ${icon('plus', 20)} Create New Drop
    </button>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:14px;font-weight:700;color:#1F2937">Active Now</span>
      <button onclick="navigate('reservations')" style="background:none;border:none;color:#3B82F6;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:2px">
        View All ${icon('chevRight', 14)}
      </button>
    </div>

    <div class="card" onclick="navigate('liveview', 0)" style="cursor:pointer;margin-bottom:20px">
      <div style="height:120px;background:linear-gradient(135deg,#1B2A4A 0%,#3B82F6 100%);display:flex;align-items:center;justify-content:center;position:relative;color:rgba(255,255,255,0.3)">
        ${icon('zap', 40)}
        <div style="position:absolute;top:10px;right:10px">${badge(d.status)}</div>
      </div>
      <div class="card-body">
        <div style="font-size:15px;font-weight:700;color:#111827;margin-bottom:4px">${d.title}</div>
        <div style="display:flex;gap:12px;font-size:12px;color:#6B7280;margin-bottom:10px">
          <span style="display:flex;align-items:center;gap:3px">${icon('clock',12)} ${d.date}, ${d.startTime}</span>
          <span style="display:flex;align-items:center;gap:3px">${icon('mapPin',12)} ${d.venue}</span>
        </div>
        <div style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;font-size:11px;color:#6B7280;margin-bottom:4px">
            <span>Capacity</span>
            <span style="font-weight:600;color:#F59E0B">${d.reserved}/${d.capacity} reserved</span>
          </div>
          <div style="height:6px;background:#E5E7EB;border-radius:3px">
            <div style="height:100%;border-radius:3px;width:${(d.reserved/d.capacity)*100}%;background:${d.reserved >= d.capacity ? '#F59E0B' : '#0D9488'};transition:width 0.3s"></div>
          </div>
        </div>
        <div style="display:flex;gap:16px;padding:8px 0 0;border-top:1px solid #F3F4F6">
          <div style="text-align:center;flex:1"><div style="font-size:18px;font-weight:700;color:#0D9488">${d.checkedIn}</div><div style="font-size:10px;color:#6B7280">Checked In</div></div>
          <div style="text-align:center;flex:1"><div style="font-size:18px;font-weight:700;color:#3B82F6">${d.reserved - d.checkedIn - d.noShow}</div><div style="font-size:10px;color:#6B7280">Pending</div></div>
          <div style="text-align:center;flex:1"><div style="font-size:18px;font-weight:700;color:#EF4444">${d.noShow}</div><div style="font-size:10px;color:#6B7280">No-Show</div></div>
        </div>
      </div>
    </div>

    <div style="font-size:14px;font-weight:700;color:#1F2937;margin-bottom:10px">All Drops</div>
    ${drops.map((drop, i) => `
      <div onclick="navigate('liveview', ${i})" style="background:#fff;border-radius:12px;padding:12px 14px;border:1px solid #E5E7EB;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer">
        <div style="width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#1B2A4A,#3B82F6);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:rgba(255,255,255,0.6)">
          ${icon('zap', 18)}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:#111827;margin-bottom:3px">${drop.title}</div>
          <div style="display:flex;gap:8px;align-items:center">
            <span style="font-size:11px;color:#6B7280">${drop.date}, ${drop.startTime}</span>
            ${badge(drop.status, true)}
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:14px;font-weight:700;color:#1F2937">${drop.reserved}/${drop.capacity}</div>
          <div style="font-size:10px;color:#6B7280">reserved</div>
        </div>
      </div>
    `).join('')}
  </div>`;
}

// ═════════════════════════════════════════════════════════════════════
// SCREEN: CREATE DROP
// ═════════════════════════════════════════════════════════════════════
function renderCreate() {
  const stepTitles = ['Basic Info','Timing & Venue','Pricing & Capacity','Review'];
  const categories = ['Food & Drink','Retail','Fitness','Beauty','Technology','Entertainment','Outdoor','Automotive','Books','Home & Kitchen'];

  let content = '';

  if (createStep === 1) {
    content = `
      <div style="margin-bottom:16px">
        <label style="font-size:12px;font-weight:600;color:#374151;margin-bottom:6px;display:block">Drop Title <span style="color:#EF4444">*</span></label>
        <input placeholder="e.g. Chef's Table Dinner" style="width:100%;padding:11px 14px;border-radius:10px;border:1px solid #E5E7EB;font-size:14px;color:#111827;background:#fff;outline:none;box-sizing:border-box" onfocus="this.style.borderColor='#3B82F6'" onblur="this.style.borderColor='#E5E7EB'"/>
      </div>
      <div style="margin-bottom:16px">
        <label style="font-size:12px;font-weight:600;color:#374151;margin-bottom:6px;display:block">Description <span style="color:#EF4444">*</span></label>
        <textarea placeholder="What makes this Drop special?" rows="4" style="width:100%;padding:11px 14px;border-radius:10px;border:1px solid #E5E7EB;font-size:14px;color:#111827;background:#fff;outline:none;resize:vertical;font-family:inherit;box-sizing:border-box"></textarea>
        <div style="font-size:11px;color:#9CA3AF;margin-top:4px;text-align:right">0/2000</div>
      </div>
      <div style="margin-bottom:16px">
        <label style="font-size:12px;font-weight:600;color:#374151;margin-bottom:6px;display:block">Cover Image <span style="color:#EF4444">*</span></label>
        <div style="border:2px dashed #D1D5DB;border-radius:12px;padding:30px 16px;text-align:center;cursor:pointer;background:#F9FAFB">
          <div style="color:#9CA3AF;margin-bottom:8px">${icon('upload', 28)}</div>
          <div style="font-size:13px;color:#6B7280;font-weight:500">Tap to upload photo or video</div>
          <div style="font-size:11px;color:#9CA3AF;margin-top:4px">JPG, PNG, MP4, MOV — Max 10MB</div>
        </div>
      </div>
      <div style="margin-bottom:16px">
        <label style="font-size:12px;font-weight:600;color:#374151;margin-bottom:6px;display:block">Category <span style="color:#EF4444">*</span></label>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${categories.map(cat => `
            <button onclick="formData.category='${cat}';render()" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid ${formData.category === cat ? '#3B82F6' : '#E5E7EB'};background:${formData.category === cat ? '#EFF6FF' : '#fff'};color:${formData.category === cat ? '#3B82F6' : '#4B5563'};cursor:pointer">${cat}</button>
          `).join('')}
        </div>
      </div>`;
  } else if (createStep === 2) {
    content = `
      <div style="margin-bottom:20px">
        <label style="font-size:12px;font-weight:600;color:#374151;margin-bottom:8px;display:block">Timing Mode <span style="color:#EF4444">*</span></label>

// ═════════════════════════════════════════════════════════════════════
// SCREEN: LIVE DROP VIEW
// ═════════════════════════════════════════════════════════════════════
function renderLiveView() {
  const d = drops[selectedDrop || 0];
  const remaining = d.capacity - d.reserved;
  const pct = d.reserved > 0 ? Math.round((d.checkedIn / d.reserved) * 100) : 0;
  const capPct = (d.reserved / d.capacity) * 100;
  const dashLen = (capPct / 100) * 213.6;

  return `
    <div class="header">
      <div class="header-left">
        <button class="back-btn" onclick="navigate('dashboard')">${icon('arrowLeft', 20)}</button>
        <div>
          <div class="header-title">${d.title}</div>
          <div class="header-sub">${d.venue}</div>
        </div>
      </div>
      <button style="background:none;border:none;cursor:pointer;padding:4px;color:#4B5563">${icon('more', 20)}</button>
    </div>
    <div style="padding:16px">
      <div class="card" style="margin-bottom:12px">
        <div class="card-body">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            ${badge(d.status)}
            <span style="font-size:12px;color:#6B7280">${d.timing}: ${d.date}, ${d.startTime}</span>
          </div>
          <div style="display:flex;gap:16px;align-items:center">
            <div style="position:relative;width:80px;height:80px">
              <svg width="80" height="80" viewBox="0 0 80 80">
                <circle cx="40" cy="40" r="34" fill="none" stroke="#E5E7EB" stroke-width="8"/>
                <circle cx="40" cy="40" r="34" fill="none" stroke="${remaining === 0 ? '#F59E0B' : '#0D9488'}" stroke-width="8" stroke-dasharray="${dashLen} 213.6" stroke-linecap="round" transform="rotate(-90 40 40)"/>
              </svg>
              <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center">
                <div style="font-size:18px;font-weight:700;color:#111827">${remaining}</div>
                <div style="font-size:9px;color:#6B7280">left</div>
              </div>
            </div>
            <div style="flex:1">
              ${[['Total Capacity', d.capacity, '#1F2937'],['Reserved', d.reserved, '#3B82F6'],['Checked In', d.checkedIn, '#0D9488'],['No-Shows', d.noShow, '#EF4444']].map(r =>
                `<div style="display:flex;justify-content:space-between;margin-bottom:6px">
                  <span style="font-size:12px;color:#6B7280">${r[0]}</span>
                  <span style="font-size:13px;font-weight:600;color:${r[2]}">${r[1]}</span>
                </div>`
              ).join('')}
            </div>
          </div>
        </div>
      </div>

      <div class="card" style="margin-bottom:12px">
        <div class="card-body">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <span style="font-size:13px;font-weight:600;color:#1F2937">Check-In Rate</span>
            <span style="font-size:18px;font-weight:700;color:#0D9488">${pct}%</span>
          </div>
          <div style="height:8px;background:#F3F4F6;border-radius:4px">
            <div style="height:100%;border-radius:4px;background:#0D9488;width:${pct}%;transition:width 0.3s"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:11px;color:#9CA3AF;margin-top:4px">
            <span>${d.checkedIn} checked in</span><span>${d.reserved} total</span>
          </div>
        </div>
      </div>

      ${d.price !== 'Free' ? `
        <div class="card" style="margin-bottom:12px"><div class="card-body">
          <span style="font-size:13px;font-weight:600;color:#1F2937;display:block;margin-bottom:10px">Revenue</span>
          <div style="display:flex;gap:10px">
            ${metricCard('Pre-authorized', '$' + (d.reserved * parseInt(d.price.replace('$',''))), '', 'dollar', '#3B82F6', '#EFF6FF')}
            ${metricCard('Captured', '$' + (d.checkedIn * parseInt(d.price.replace('$',''))), '', 'check', '#0D9488', '#F0FDFA')}
          </div>
        </div></div>
      ` : ''}

      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button onclick="navigate('checkin')" style="flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:600;border:none;background:#0D9488;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px">${icon('qr',16)} Check In</button>
        <button onclick="navigate('reservations')" style="flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid #D1D5DB;background:#fff;color:#374151;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px">${icon('users',16)} Guests</button>
      </div>
      <div style="display:flex;gap:8px">
        <button style="flex:1;padding:11px;border-radius:10px;font-size:12px;font-weight:500;border:1px solid #D1D5DB;background:#fff;color:#4B5563;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px">${icon('send',14)} Direct Offer</button>
        <button style="flex:1;padding:11px;border-radius:10px;font-size:12px;font-weight:500;border:1px solid #D1D5DB;background:#fff;color:#4B5563;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px">${icon('qr',14)} Show QR</button>
        <button style="flex:1;padding:11px;border-radius:10px;font-size:12px;font-weight:500;border:1px solid #F59E0B;background:#FFFBEB;color:#92400E;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px">${icon('pause',14)} Pause</button>
      </div>
    </div>`;
}

  } else if (checkinMode === 'success') {
    content = `
      <div class="fade-in" style="text-align:center;padding:20px 0">

        <input placeholder="Search by name or phone..." style="flex:1;border:none;outline:none;font-size:13px;color:#111827;background:transparent"/>
      </div>
      <div style="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto">
        ${filters.map(f => {
          const count = f === 'All' ? reservations.length : reservations.filter(r => r.status === f).length;
          return `<button onclick="resFilter='${f}';selectedRes=null;render()" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid ${resFilter === f ? '#3B82F6' : '#E5E7EB'};background:${resFilter === f ? '#EFF6FF' : '#fff'};color:${resFilter === f ? '#3B82F6' : '#4B5563'};cursor:pointer;white-space:nowrap;flex-shrink:0">${f} (${count})</button>`;
        }).join('')}
      </div>
      ${filtered.map(r => `
        <div onclick="selectedRes=selectedRes==='${r.id}'?null:'${r.id}';render()" style="background:#fff;border-radius:12px;padding:12px 14px;border:1px solid ${selectedRes === r.id ? '#3B82F6' : '#E5E7EB'};margin-bottom:8px;cursor:pointer;transition:border-color 0.15s">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div style="display:flex;gap:10px;align-items:center">
              <div style="width:38px;height:38px;border-radius:50%;background:#F3F4F6;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#4B5563">${r.name.charAt(0)}</div>
              <div>
                <div style="font-size:14px;font-weight:600;color:#111827">${r.name}</div>
                <div style="font-size:12px;color:#6B7280">${r.phone}</div>
              </div>
            </div>
            <div style="text-align:right">
              ${badge(r.status, true)}
              <div style="font-size:11px;color:#9CA3AF;margin-top:4px">${r.tickets} ticket${r.tickets > 1 ? 's' : ''}</div>
            </div>
          </div>
          ${selectedRes === r.id ? `
            <div class="fade-in" style="margin-top:10px;padding-top:10px;border-top:1px solid #F3F4F6;display:flex;gap:6px">
              ${r.status === 'Reserved' ? `<button style="flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:500;border:none;background:#0D9488;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px">${icon('check',14)} Check In</button>` : ''}
              ${r.status === 'No-Show' ? `<button style="flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:500;border:none;background:#F59E0B;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px">${icon('dollar',14)} Waive</button>` : ''}
              <button style="flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid #D1D5DB;background:#fff;color:#4B5563;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px">${icon('send',14)} Message</button>
              <button style="padding:8px 12px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid #EF4444;background:#FEF2F2;color:#EF4444;cursor:pointer">${icon('x',14)}</button>
            </div>
          ` : ''}
        </div>
      `).join('')}
      <div style="background:#fff;border-radius:12px;padding:14px;border:1px solid #E5E7EB;margin-top:8px;display:flex;justify-content:space-between;font-size:12px">
        <span style="color:#6B7280">Payment Summary</span>
        <span style="color:#1F2937;font-weight:600">Free Drop — No charges</span>
      </div>
    </div>`;
}

// ═════════════════════════════════════════════════════════════════════
// SCREEN: ANALYTICS
// ═════════════════════════════════════════════════════════════════════
function renderAnalytics() {
  const barData = [{l:'Mon',v:12},{l:'Tue',v:28},{l:'Wed',v:8},{l:'Thu',v:35},{l:'Fri',v:42},{l:'Sat',v:18},{l:'Sun',v:5}];
  const maxVal = Math.max(...barData.map(d => d.v));

  return `
    <div class="header">
      <div class="header-left">
        <div><div class="header-title">Analytics</div><div class="header-sub">Centro Boulder — Last 7 days</div></div>
      </div>
    </div>
    <div style="padding:16px">
      <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px">
        ${metricCard('Total Reservations', '148', '+23% vs last week', 'users', '#3B82F6', '#EFF6FF')}
        ${metricCard('Check-In Rate', '72%', '108 of 148', 'check', '#0D9488', '#F0FDFA')}
        ${metricCard('Revenue', '$2,340', 'After refunds', 'dollar', '#3B82F6', '#EFF6FF')}
        ${metricCard('No-Show Rate', '8.1%', '12 no-shows', 'alert', '#F59E0B', '#FFFBEB')}
      </div>

      <div class="card" style="margin-bottom:16px"><div class="card-body">
        <div style="font-size:13px;font-weight:600;color:#1F2937;margin-bottom:14px">Reservations by Day</div>
        <div style="display:flex;gap:8px;align-items:flex-end;height:120px">
          ${barData.map((d,i) => `
            <div style="flex:1;text-align:center">
              <div style="height:${(d.v/maxVal)*100}px;background:${i===4?'#3B82F6':'#DBEAFE'};border-radius:4px 4px 0 0;margin-bottom:6px;position:relative;transition:height 0.3s">
                <span style="position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:600;color:#4B5563">${d.v}</span>
              </div>
              <span style="font-size:10px;color:#6B7280">${d.l}</span>
            </div>
          `).join('')}
        </div>
      </div></div>

      <div class="card"><div class="card-body">
        <div style="font-size:13px;font-weight:600;color:#1F2937;margin-bottom:12px">Per-Drop Performance</div>
        ${drops.filter(d => d.status !== 'Draft').map((drop, i, arr) => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;${i < arr.length-1 ? 'border-bottom:1px solid #F3F4F6' : ''}">
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:600;color:#1F2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${drop.title}</div>
              <div style="font-size:11px;color:#6B7280;margin-top:2px">${drop.reserved} reservations — ${drop.checkedIn} checked in</div>
            </div>
            <div style="text-align:right;flex-shrink:0;margin-left:12px">
              <div style="font-size:14px;font-weight:700;color:#1F2937">${drop.price === 'Free' ? 'Free' : '$' + (parseInt(drop.price.replace('$','')) * drop.checkedIn)}</div>
              <div style="font-size:10px;color:#0D9488">${drop.reserved > 0 ? Math.round((drop.checkedIn/drop.reserved)*100) : 0}% rate</div>
            </div>
          </div>
        `).join('')}
      </div></div>
    </div>`;
}

// ── Main Render ──────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('screen-container');
  switch(currentScreen) {
    case 'dashboard': container.innerHTML = renderDashboard(); break;
    case 'create': container.innerHTML = renderCreate(); break;
    case 'liveview': container.innerHTML = renderLiveView(); break;
    case 'checkin': container.innerHTML = renderCheckIn(); break;
    case 'reservations': container.innerHTML = renderReservations(); break;
    case 'analytics': container.innerHTML = renderAnalytics(); break;
  }
  renderTabBar();
  container.scrollTop = 0;
}

// Boot
render();
</script>
</body>
</html>
